# Application name
spring.application.name=honeyRest_host

# Server port
server.port=8080

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/honeyrest_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
# cloud = tjfgusdh
# normal = honeyRest_host
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.username=root
# spring.datasource.password defined in application_security.properties

# JPA configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cache configuration
spring.cache.type=simple

# Swagger (API documentation)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Mail configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${gmail.username}
spring.mail.password=${gmail.access-token}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OAuth2 (Google login)
# google.client-id / client-secret defined in application_security.properties
spring.security.oauth2.client.registration.google.client-id=${google.client-id}
spring.security.oauth2.client.registration.google.client-secret=${google.client-secret}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo

# Logging configuration
logging.level.root=info
logging.level.org.springframework=info
logging.level.org.springframework.web=warn
logging.level.org.springframework.security=warn
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=warn
logging.level.org.thymeleaf=warn
logging.level.com.honeyrest=info

# 파일 로깅 (에러 추적용)
logging.file.name=logs/honeyrest.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.file-name-pattern=logs/honeyrest.%d{yyyy-MM-dd}.%i.log


# Import secret configuration file
spring.config.import=optional:application_security.properties

# JWT configuration
jwt.expiration-ms=3600000

# S3 ???? ?
spring.cloud.aws.s3.enabled=false

# (??? ??? ???? ???)
spring.autoconfigure.exclude=io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration

