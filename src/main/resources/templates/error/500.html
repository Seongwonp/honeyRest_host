<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 서버 오류 | HoneyRest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #F5F7FA; font-family: 'Noto Sans KR', sans-serif; }
        .error-code { font-size: 6rem; font-weight: 900; background: linear-gradient(135deg,#FFD54F,#F9A825); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; }
        .error-title { font-size:1.5rem; font-weight:700; color:#0F172A; }
        .error-desc { color:#64748B; }
        .btn-honey { background:linear-gradient(135deg,#FFD54F,#F9A825); color:#1A1200; font-weight:700; border:none; border-radius:10px; padding:.7rem 2rem; }
        .btn-honey:hover { box-shadow:0 4px 12px rgba(249,168,37,.4); color:#1A1200; }
    </style>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center justify-content-center text-center p-4">
    <div>
        <div class="error-code">500</div>
        <div class="error-title mt-3">서버 오류가 발생했습니다</div>
        <p class="error-desc mt-2 mb-4" th:text="${message} ?: '잠시 후 다시 시도해 주세요.'">잠시 후 다시 시도해 주세요.</p>
        <a href="/admin/dashboard" class="btn btn-honey me-2">대시보드로</a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">뒤로가기</a>
    </div>
</div>
</body>
</html>
