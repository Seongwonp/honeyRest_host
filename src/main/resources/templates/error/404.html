<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - HoneyRest</title>

    <link rel="shortcut icon" th:href="@{/assets/compiled/svg/favicon.svg}" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/assets/compiled/css/app.css}" />
    <link rel="stylesheet" th:href="@{/assets/compiled/css/error.css}" />
</head>

<body>
<script th:src="@{/assets/static/js/initTheme.js}"></script>

<div id="error">
    <div class="error-page container">
        <div class="col-md-8 col-12 offset-md-2">
            <div class="text-center">
                <img class="img-error" th:src="@{/assets/compiled/svg/error-404.svg}" alt="Not Found">
                <h1 class="error-title">NOT FOUND</h1>
                <p class='fs-5 text-gray-600'>요청하신 페이지를 찾을 수 없습니다.</p>
                <a th:href="@{/}" class="btn btn-lg btn-outline-primary mt-3">홈으로</a>
            </div>
        </div>
    </div>
</div>
</body>

</html>
