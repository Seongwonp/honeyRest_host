<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>숙소 관리자 대시보드</title>
    <th:block layout:fragment="head">
        <style>
            :root{
                --card-radius:16px;
                --shadow:0 6px 18px rgba(0,0,0,.05);
                --border:1px solid rgba(0,0,0,.06);
                --muted:#6b7280;
                --ink:#0f172a;
                --accent1:#6d5ef6;
                --accent2:#22c55e;
                --accent3:#3b82f6;
            }

            /* GRID */
            .grid{ display:grid; gap:16px; }
            .grid-12{ grid-template-columns: repeat(12,1fr); }
            @media (max-width:1199px){ .grid-12{ grid-template-columns:repeat(6,1fr);} }
            @media (max-width:767px){  .grid-12{ grid-template-columns:repeat(2,1fr);} }

            /* KPI */
            .kpi{ grid-column: span 4 / span 4; background:var(--bs-body-bg,#fff); border-radius:var(--card-radius);
                border:var(--border); box-shadow:var(--shadow); padding:16px; transition:transform .15s ease, box-shadow .15s ease; }
            .kpi:hover{ transform:translateY(-2px); box-shadow:0 12px 28px rgba(0,0,0,.08); }
            .kpi-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
            .kpi-title{ margin:0; color:var(--muted); font-size:.95rem; letter-spacing:.2px; }
            .kpi-value{ margin:0; color:var(--ink); font-weight:800; font-size:2rem; line-height:1.1; }
            .pill{ font-size:.78rem; padding:4px 10px; border-radius:999px; background:rgba(16,185,129,.12); color:#059669;}
            .pill.down{ background:rgba(239,68,68,.12); color:#dc2626; }

            /* ICON */
            .icon{
                width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center;
                background:rgba(0,0,0,.04);
            }
            .icon svg{ width:22px; height:22px; stroke:#fff; }
            .icon.p1{ background: linear-gradient(135deg,#7c5cff,#9a7cff); }
            .icon.p2{ background: linear-gradient(135deg,#10b981,#34d399); }
            .icon.p3{ background: linear-gradient(135deg,#3b82f6,#60a5fa); }
            .icon.p4{ background: linear-gradient(135deg,#8b5cf6,#a78bfa); }

            /* CARDS */
            .card-soft{ background:var(--bs-body-bg,#fff); border-radius:var(--card-radius); border:var(--border); box-shadow:var(--shadow); }
            .card-soft .card-body{ padding:20px; }

            /* TABLE */
            .table td, .table th{ vertical-align:middle; }
            .text-end{ text-align:end; }
            .muted{ color:var(--muted); }

            .chart-wrap{ position:relative; min-height:320px; }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3>숙소 관리자 대시보드</h3>
        <p class="text-subtitle text-muted">관리자용 숙소 · 예약 · 매출 현황</p>
    </div>

    <div class="page-content">
        <section class="section">

            <!-- ===== KPI 3종 + 프로필 카드 (상단) ===== -->
            <div class="grid grid-12">
                <!-- 등록 숙소 수 -->
                <div class="kpi">
                    <div class="kpi-head">
                        <div class="icon p1" aria-hidden="true">
                            <!-- house -->
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                                <path d="M3 10.5 12 3l9 7.5" stroke="currentColor" />
                                <path d="M5 10v10h14V10" stroke="currentColor"/>
                                <path d="M9 20v-6h6v6" stroke="currentColor"/>
                            </svg>
                        </div>
                        <!-- 변화율이 있으면 pill 표시 (선택) -->
                        <span class="pill" th:if="${accChange != null}" th:text="${accChange}">+0%</span>
                    </div>
                    <p class="kpi-title">등록 숙소 수</p>
                    <p class="kpi-value" th:text="${#numbers.formatInteger(accCount, 0)}">0</p>
                    <p class="muted m-0">회사 소유 전체 숙소</p>
                </div>

                <!-- 예약 건수 -->
                <div class="kpi">
                    <div class="kpi-head">
                        <div class="icon p2" aria-hidden="true">
                            <!-- calendar-check -->
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                                <rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor"/>
                                <path d="M16 2v4M8 2v4M3 9h18" stroke="currentColor"/>
                                <path d="m9 14 2.5 2.5L15.5 12" stroke="currentColor"/>
                            </svg>
                        </div>
                        <span class="pill" th:if="${resChange != null}"
                              th:classappend="${resChangeLt0} ? ' down' : ''"
                              th:text="${resChange}">+0%</span>
                    </div>
                    <p class="kpi-title">예약 건수</p>
                    <p class="kpi-value" th:text="${#numbers.formatInteger(resCount, 0)}">0</p>
                    <p class="muted m-0">취소 제외</p>
                </div>

                <!-- 총 객실 수 -->
                <div class="kpi">
                    <div class="kpi-head">
                        <div class="icon p3" aria-hidden="true">
                            <!-- bed -->
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                                <path d="M3 12V6" stroke="currentColor"/>
                                <path d="M3 13h18v5H3z" stroke="currentColor"/>
                                <path d="M7 13V9a2 2 0 0 1 2-2h3a3 3 0 0 1 3 3v3" stroke="currentColor"/>
                            </svg>
                        </div>
                    </div>
                    <p class="kpi-title">총 객실 수</p>
                    <p class="kpi-value"><span th:text="${#numbers.formatInteger(roomCount, 0)}">0</span></p>
                    <p class="muted m-0">운영 중인 모든 객실</p>
                </div>

                <!-- 관리자 프로필 -->
                <div class="card-soft" style="grid-column: span 12;">
                    <div class="card-body d-flex align-items-center">
                        <div class="icon p4 me-3" aria-hidden="true">
                            <!-- user -->
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                                <circle cx="12" cy="8" r="4" stroke="currentColor"/>
                                <path d="M4 20a8 8 0 0 1 16 0" stroke="currentColor"/>
                            </svg>
                        </div>
                        <div>
                            <h5 class="mb-1" th:text="${currentAdmin != null ? currentAdmin.name : '관리자'}">관리자</h5>
                            <div class="muted" th:text="${currentAdmin != null ? currentAdmin.email : '-'}">-</div>
                            <div class="muted" th:text="${currentAdmin != null ? currentAdmin.role : '-'}">-</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== 매출/예약 위젯 ===== -->
            <div class="grid grid-12" style="margin-top:16px;">
                <!-- 일별 매출 차트 -->
                <div class="card-soft" style="grid-column: span 8;">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">일별 매출 추이</h5>
                            <div>
                                <input id="from" type="date" class="form-control d-inline-block" style="width:150px;">
                                <span> ~ </span>
                                <input id="to" type="date" class="form-control d-inline-block" style="width:150px;">
                                <button id="btnApply" class="btn btn-primary ms-2">적용</button>
                                <button id="btnLast7" class="btn btn-light ms-1">최근 7일</button>
                                <button id="btnLast30" class="btn btn-light ms-1">최근 30일</button>
                            </div>
                        </div>
                        <div class="chart-wrap mt-3">
                            <canvas id="dailySalesChart" aria-label="일별 매출 차트" role="img"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Top-매출 숙소 -->
                <div class="card-soft" style="grid-column: span 4;">
                    <div class="card-body">
                        <h5>Top 매출 숙소</h5>
                        <table class="table table-striped">
                            <thead><tr><th>숙소명</th><th class="text-end">매출</th></tr></thead>
                            <tbody id="topAccTbody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 점유/ADR/RevPAR/취소율 KPI (하단 요약) -->
                <div class="card-soft" style="grid-column: span 8;">
                    <div class="card-body">
                        <h5 class="mb-3">운영 지표</h5>
                        <div class="grid" style="grid-template-columns:repeat(4,1fr); gap:12px;">
                            <div>
                                <div class="muted">점유율</div>
                                <div class="h4 m-0" id="kpiOccupancy">-</div>
                            </div>
                            <div>
                                <div class="muted">ADR</div>
                                <div class="h4 m-0" id="kpiAdr">-</div>
                            </div>
                            <div>
                                <div class="muted">RevPAR</div>
                                <div class="h4 m-0" id="kpiRevpar">-</div>
                            </div>
                            <div>
                                <div class="muted">취소율</div>
                                <div class="h4 m-0" id="kpiCancel">-</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 오늘 체크인 예정 -->
                <div class="card-soft" style="grid-column: span 4;">
                    <div class="card-body">
                        <h5>오늘 체크인 예정</h5>
                        <ul id="upcomingList" class="list-group list-group-flush"></ul>
                    </div>
                </div>
            </div>

        </section>
    </div>
</th:block>

<th:block layout:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // 포맷
        const fmtCurrency = n => new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(n ?? 0);
        const fmtNumber   = n => new Intl.NumberFormat('ko-KR').format(n ?? 0);
        const fmtPercent  = n => (Number(n||0)*100).toFixed(1)+'%';

        // 날짜 유틸
        const toIso = d => { const z=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`; };
        function setDefaultDates(days=7){
            const to = new Date(), from = new Date(); from.setDate(to.getDate()-(days-1));
            document.getElementById('from').value = toIso(from);
            document.getElementById('to').value   = toIso(to);
        }

        let salesChart;

        async function loadKpis(){
            const [occ, cancel] = await Promise.all([
                fetch('/admin/reports/occupancy').then(r=>r.json()),
                fetch('/admin/reports/cancellations/summary').then(r=>r.json())
            ]);
            document.getElementById('kpiOccupancy').textContent = fmtPercent(occ.occupancyRate ?? 0);
            document.getElementById('kpiAdr').textContent       = fmtCurrency(occ.adr ?? 0);
            document.getElementById('kpiRevpar').textContent    = fmtCurrency(occ.revpar ?? 0);
            document.getElementById('kpiCancel').textContent    = fmtPercent(cancel.cancelRate ?? 0);
        }

        async function loadDailySales(from, to){
            const rows = await fetch(`/admin/reports/daily-sales?from=${from}&to=${to}`).then(r=>r.json());
            const labels = rows.map(r => r.bucket);
            const data   = rows.map(r => Number(r.totalSales ?? 0));
            const ctx = document.getElementById('dailySalesChart').getContext('2d');
            if (salesChart) salesChart.destroy();
            salesChart = new Chart(ctx,{
                type:'line',
                data:{ labels, datasets:[{ label:'매출(원)', data, tension:.35, pointRadius:3, fill:false }] },
                options:{
                    responsive:true,
                    plugins:{ legend:{ display:false }, tooltip:{ callbacks:{
                                label:ctx=> `매출: ${fmtCurrency(ctx.parsed.y)}`
                            }}},
                    scales:{ y:{ ticks:{ callback:v=>fmtNumber(v) } } }
                }
            });
        }

        async function loadTopAccommodations(from, to){
            const rows = await fetch(`/admin/reports/top-accommodations?from=${from}&to=${to}&limit=5`).then(r=>r.json());
            const tb = document.getElementById('topAccTbody');
            tb.innerHTML='';
            for(const r of rows){
                tb.innerHTML += `<tr><td>${r.accommodationName}</td><td class="text-end">${fmtCurrency(r.totalSales)}</td></tr>`;
            }
        }

        async function loadUpcoming(){
            const rows = await fetch('/admin/reports/upcoming-checkins').then(r=>r.json());
            const ul = document.getElementById('upcomingList');
            ul.innerHTML='';
            for(const r of rows){
                ul.innerHTML += `<li class="list-group-item">
          <strong>${r.guestName}</strong> · ${r.accommodationName}${r.roomName ? ' ('+r.roomName+')' : ''} · 체크인 ${r.checkIn}
        </li>`;
            }
        }

        async function applyRange(){
            const from = document.getElementById('from').value;
            const to   = document.getElementById('to').value;
            await Promise.all([ loadDailySales(from,to), loadTopAccommodations(from,to) ]);
        }

        document.addEventListener('DOMContentLoaded', async ()=>{
            setDefaultDates(7);
            await loadKpis();
            await applyRange();
            await loadUpcoming();

            document.getElementById('btnApply').addEventListener('click', applyRange);
            document.getElementById('btnLast7').addEventListener('click', async ()=>{ setDefaultDates(7); await applyRange(); });
            document.getElementById('btnLast30').addEventListener('click', async ()=>{ setDefaultDates(30); await applyRange(); });
        });
    </script>
</th:block>
</body>
</html>
