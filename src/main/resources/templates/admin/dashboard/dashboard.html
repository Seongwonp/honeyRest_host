<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>숙소 관리자 대시보드</title>
    <th:block layout:fragment="head">
        <!-- 페이지별 head 내용 -->
    </th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3>숙소 관리자 대시보드</h3>
        <p class="text-subtitle text-muted">관리자용 숙소 및 예약 현황</p>
    </div>


    <div class="page-content">
        <section class="section">
            <div class="row">
                <!-- 등록 숙소 수 카드 -->
                <div class="col-6 col-lg-3 col-md-6">
                    <div class="card">
                        <div class="card-body px-4 py-4">
                            <div class="d-flex align-items-center">
                                <div class="stats-icon purple mb-2">
                                    <i class="bi bi-house-door-fill"></i>
                                </div>
                                <div class="ms-3">
                                    <!-- 등록 숙소 수 -->
                                    <h6 class="text-muted font-semibold">등록 숙소 수</h6>
                                    <h6 class="font-extrabold mb-0" id="acc-count">-</h6>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 예약 건수 카드 -->
                <div class="col-6 col-lg-3 col-md-6">
                    <div class="card">
                        <div class="card-body px-4 py-4">
                            <div class="d-flex align-items-center">
                                <div class="stats-icon green mb-2">
                                    <i class="bi bi-calendar-check-fill"></i>
                                </div>
                                <div class="ms-3">
                                    <h6 class="text-muted font-semibold">예약 건수</h6>
                                    <h6 class="font-extrabold mb-0" id="res-count">-</h6>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 관리자 프로필 카드 -->
                <div class="col-12 col-lg-6">
                    <div class="card">
                        <div class="card-body py-4 px-4">
                            <div class="d-flex align-items-center">
                                <div class="avatar avatar-xl">
                                    이미지
                                </div>
                                <div class="ms-3 name">
                                    <h5 class="font-bold" id="admin-name">admin01</h5>
                                    <h6 class="text-muted mb-0">HOST</h6>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</th:block>

<th:block layout:fragment="script">
    <!-- 페이지별 스크립트 -->
    <script>
        (async function () {
            const token = localStorage.getItem('accessToken');
            if (!token) {
                // 토큰 없으면 로그인 페이지로
                location.href = '/admin/auth/login';
                return;
            }

            try {
                const res = await fetch('/api/admin/dashboard/summary', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                if (res.status === 401 || res.status === 403) {
                    // 인증/권한 문제 → 로그인 페이지로
                    localStorage.removeItem('accessToken');
                    location.href = '/admin/auth/login';
                    return;
                }
                if (!res.ok) throw new Error('HTTP ' + res.status);

                const data = await res.json();

                // 숫자 렌더링
                document.querySelector('#acc-count').textContent = data.accommodationCount ?? 0;
                document.querySelector('#res-count').textContent = data.reservationCount ?? 0;

                // 관리자 정보
                document.querySelector('#admin-name').textContent = data.adminName ?? '-';
                document.querySelector('#admin-role').textContent = data.adminRole ?? '-';

            } catch (e) {
                console.error(e);
                // 화면에 간단 표시
                alert('대시보드 데이터를 불러오는 데 실패했습니다.');
            }
        })();
    </script>
</th:block>
</body>
</html>
