<th:block th:fragment="sidebar">
    <div id="sidebar" class="active">
        <div class="sidebar-wrapper active">
            <div class="sidebar-header position-relative">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="logo d-flex align-items-center">
                        <a href="/admin/dashboard" class="d-flex align-items-center gap-2">
                            <img src="/assets/compiled/png/logo.png" alt="HoneyRest Logo" style="height: 30px;">
                            <span class="fw-bold fs-4 text-warning">HoneyRest</span>
                        </a>
                    </div>
                    <div class="theme-toggle d-flex gap-2 align-items-center mt-2">
                        <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
                             aria-hidden="true" role="img" class="iconify iconify--system-uicons" width="20" height="20"
                             preserveAspectRatio="xMidYMid meet" viewBox="0 0 21 21">
                            <g fill="none" fill-rule="evenodd" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M10.5 14.5c2.219 0 4-1.763 4-3.982a4.003 4.003 0 0 0-4-4.018c-2.219 0-4 1.781-4 4c0 2.219 1.781 4 4 4zM4.136 4.136L5.55 5.55m9.9 9.9l1.414 1.414M1.5 10.5h2m14 0h2M4.135 16.863L5.55 15.45m9.899-9.9l1.414-1.415M10.5 19.5v-2m0-14v-2" opacity=".3"></path>
                                <g transform="translate(-210 -1)">
                                    <path d="M220.5 2.5v2m6.5.5l-1.5 1.5"></path>
                                    <circle cx="220.5" cy="11.5" r="4"></circle>
                                    <path d="m214 5l1.5 1.5m5 14v-2m6.5-.5l-1.5-1.5M214 18l1.5-1.5m-4-5h2m14 0h2"></path>
                                </g>
                            </g>
                        </svg>
                        <div class="form-check form-switch fs-6">
                            <input class="form-check-input me-0" type="checkbox" id="toggle-dark" style="cursor: pointer">
                            <label class="form-check-label"></label>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
                             aria-hidden="true" role="img" class="iconify iconify--mdi" width="20" height="20"
                             preserveAspectRatio="xMidYMid meet" viewBox="0 0 24 24">
                            <path fill="currentColor"
                                  d="m17.75 4.09l-2.53 1.94l.91 3.06l-2.63-1.81l-2.63 1.81l.91-3.06l-2.53-1.94L12.44 4l1.06-3l1.06 3l3.19.09m3.5 6.91l-1.64 1.25l.59 1.98l-1.7-1.17l-1.7 1.17l.59-1.98L15.75 11l2.06-.05L18.5 9l.69 1.95l2.06.05m-2.28 4.95c.83-.08 1.72 1.1 1.19 1.85c-.32.45-.66.87-1.08 1.27C15.17 23 8.84 23 4.94 19.07c-3.91-3.9-3.91-10.24 0-14.14c.4-.4.82-.76 1.27-1.08c.75-.53 1.93.36 1.85 1.19c-.27 2.86.69 5.83 2.89 8.02a9.96 9.96 0 0 0 8.02 2.89m-1.64 2.02a12.08 12.08 0 0 1-7.8-3.47c-2.17-2.19-3.33-5-3.49-7.82c-2.81 3.14-2.7 7.96.31 10.98c3.02 3.01 7.84 3.12 10.98.31Z">
                            </path>
                        </svg>
                    </div>
                    <div class="sidebar-toggler-btn">
                        <a href="#" class="sidebar-hide d-xl-none d-block"><i class="bi bi-x bi-middle"></i></a>
                    </div>
                </div>
            </div>

            <div class="sidebar-menu">
                <ul class="menu">
                    <li class="sidebar-title">업주 메뉴</li>

                    <li class="sidebar-item">
                        <a href="/admin/dashboard" class="sidebar-link">
                            <i class="bi bi-speedometer2"></i>
                            <span>대시보드</span>
                        </a>
                    </li>

                    <li class="sidebar-item has-sub">
                        <a href="#" class="sidebar-link">
                            <i class="bi bi-house-door"></i>
                            <span>숙소 관리</span>
                        </a>
                        <ul class="submenu">
                            <li class="submenu-item"><a href="/admin/accommodations/add">숙소 등록</a></li>
                            <li class="submenu-item"><a href="/admin/accommodations/list">내 숙소 목록</a></li>
                        </ul>
                    </li>

                    <li class="sidebar-item has-sub">
                        <a href="#" class="sidebar-link">
                            <i class="bi bi-door-open"></i>
                            <span>객실 관리</span>
                        </a>
                        <ul class="submenu">
                            <li class="submenu-item"><a href="/admin/rooms/add">객실 등록</a></li>
                            <li class="submenu-item"><a href="/admin/rooms/list_all">내 객실 목록</a></li>
                        </ul>
                    </li>

                    <li class="sidebar-item">
                        <a href="/admin/price/page" class="sidebar-link">
                            <i class="bi bi-calendar-check"></i>
                            <span>가격/재고 캘린더</span>
                        </a>
                    </li>

                    <li class="sidebar-item has-sub">
                        <a href="#" class="sidebar-link">
                            <i class="bi bi-journal-bookmark"></i>
                            <span>예약 관리</span>
                            <span th:if="${_notifyCancelCount != null and _notifyCancelCount > 0}"
                                  class="badge ms-auto"
                                  style="background:var(--danger);color:#fff;font-size:.7rem;border-radius:9999px;padding:.2rem .45rem;"
                                  th:text="${_notifyCancelCount}">0</span>
                        </a>
                        <ul class="submenu">
                            <li class="submenu-item"><a href="/admin/reservations/my">예약 현황</a></li>
                            <li class="submenu-item">
                                <a href="/admin/reservations/cancel-requests">
                                    취소 요청 목록
                                    <span th:if="${_notifyCancelCount != null and _notifyCancelCount > 0}"
                                          class="badge ms-1"
                                          style="background:var(--danger);color:#fff;font-size:.68rem;border-radius:9999px;padding:.15rem .4rem;"
                                          th:text="${_notifyCancelCount}">0</span>
                                </a>
                            </li>
                            <li class="submenu-item"><a href="/admin/point/refunds">환불/취소 관리</a></li>
                        </ul>
                    </li>

                    <li class="sidebar-item">
                        <a href="/admin/reviews/list" class="sidebar-link">
                            <i class="bi bi-star"></i>
                            <span>리뷰 관리</span>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="/admin/inquiries/list" class="sidebar-link">
                            <i class="bi bi-chat-left-text"></i>
                            <span>1:1 문의</span>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="/admin/point/list" class="sidebar-link">
                            <i class="bi bi-credit-card"></i>
                            <span>결제 내역</span>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="/admin/reports/sales" class="sidebar-link">
                            <i class="bi bi-bar-chart-line"></i>
                            <span>매출 통계</span>
                        </a>
                    </li>

                </ul>
            </div>

            <div class="mt-auto pb-2">
                <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none"></form>
                <button type="button" class="sidebar-logout-btn"
                        onclick="document.getElementById('logoutForm').submit();">
                    <i class="bi bi-box-arrow-right me-2"></i>로그아웃
                </button>
            </div>
        </div>
    </div>
</th:block>
