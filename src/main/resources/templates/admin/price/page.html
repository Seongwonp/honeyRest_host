<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>가격/재고 캘린더</title>
    <link th:href="@{/assets/compiled/css/app.css}" rel="stylesheet"/>

    <th:block layout:fragment="head">
        <style>
            :root {
                --line: #EEF0F2;
                --muted: #6B7280;
                --bg: #F8FAFC;
                --ok-bg: #E8F7EE;
                --ok: #1E7F3A;
                --low-bg: #FFF4E5;
                --low: #A15C00;
                --zero-bg: #FDE8E8;
                --zero: #B42318;
            }

            .toolbar {
                display: flex;
                gap: .75rem;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 16px
            }

            .controls {
                display: flex;
                gap: .5rem;
                align-items: center;
                flex-wrap: wrap
            }

            .month-grid {
                display: grid;
                grid-template-columns:repeat(7, 1fr);
                gap: 8px
            }

            .dow {
                font-weight: 700;
                text-align: center;
                padding: 6px 0;
                background: #f4f6f9;
                border-radius: 8px
            }

            .day {
                min-height: 130px;
                border: 1px solid var(--line);
                border-radius: 10px;
                padding: 8px;
                display: flex;
                flex-direction: column
            }

            .day.weekend {
                background: #fcfcff
            }

            .day.today {
                box-shadow: 0 0 0 2px #1f6feb inset
            }

            .date {
                font-weight: 700
            }

            .meta {
                margin-top: 4px;
                font-size: .85rem;
                color: var(--muted)
            }

            .price {
                margin-top: 6px;
                font-weight: 800
            }

            .actions {
                margin-top: auto;
                display: flex;
                gap: .35rem
            }

            .pill {
                display: inline-flex;
                gap: .35rem;
                align-items: center;
                border-radius: 999px;
                padding: 0 8px;
                font-size: .75rem;
                height: 22px
            }

            .pill.ok {
                background: var(--ok-bg);
                color: var(--ok)
            }

            .pill.low {
                background: var(--low-bg);
                color: var(--low)
            }

            .pill.zero {
                background: var(--zero-bg);
                color: var(--zero)
            }

            .pill.muted {
                background: #f2f4f7;
                color: #59636e
            }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="content">

    <!-- 상단 컨트롤: 숙소/객실 선택 + 월 이동 -->
    <div class="toolbar">
        <form method="get" th:action="@{/admin/price/page}" class="controls">
            <!-- 필수 공통 파라미터 -->
            <input type="hidden" name="companyId" th:value="${companyId}">
            <input type="hidden" name="mode" value="calendar"/>

            <!-- 숙소 선택 -->
            <label class="form-label mb-0">숙소</label>
            <select name="accommodationId"
                    class="form-select"
                    style="min-width:240px"
                    onchange="this.form.submit()">
                <!-- ★ 여기: th:value="" -> value="" 로 변경 -->
                <option value="" th:selected="${accommodationId == null}">전체(선택하세요)</option>
                <option th:each="a, iter : ${accommodations}"
                        th:value="${a.accommodationId}"
                        th:selected="${accommodationId != null ? accommodationId.equals(a.accommodationId) : false}"
                        th:text="${a.name}">
                </option>
            </select>

            <!-- 객실 선택(숙소 선택 후에만 노출) -->
            <label class="form-label mb-0 ms-2">객실</label>
            <select th:if="${priceCalendarDTO != null}"
                    name="roomId"
                    class="form-select"
                    style="max-width:320px"
                    onchange="this.form.submit()">

                <!-- 추가: 전체 객실 보기 -->
                <option value="" th:selected="${roomId == null}">전체 객실 보기</option>

                <!-- 기존: 특정 객실 선택 -->
                <option th:each="r, iter : ${priceCalendarDTO.rooms}"
                        th:value="${r.room.roomId}"
                        th:selected="${roomId != null ? roomId.equals(r.room.roomId) : false}"
                        th:text="${r.room.roomName}">
                </option>
            </select>

            <!-- 월 입력 -->
            <label class="form-label mb-0 ms-2">월</label>
            <input type="month" name="ym" class="form-control" style="max-width:160px"
                   th:value="${#temporals.format(ym,'yyyy-MM')}"
                   onchange="this.form.submit()"/>

            <!-- 이동 버튼(현재 선택 유지) -->
            <a class="btn btn-outline-secondary ms-2"
               th:href="@{/admin/price/page(
      companyId=${companyId},
      ym=${#temporals.format(preYm,'yyyy-MM')},
      mode=${mode},
      accommodationId=${accommodationId},
      roomId=${roomId}
   )}">
                « 이전달
            </a>

            <a class="btn btn-outline-secondary"
               th:href="@{/admin/price/page(
      companyId=${companyId},
      ym=${#temporals.format(nextYm,'yyyy-MM')},
      mode=${mode},
      accommodationId=${accommodationId},
      roomId=${roomId}
   )}">
                다음달 »
            </a>
        </form>

        <div class="btn btn-light fw-semibold" th:text="${#temporals.format(ym,'yyyy년 MM월')}">YYYY-MM</div>
    </div>

    <!-- 안내: 숙소 미선택 -->
    <div class="alert alert-light border" th:if="${accommodationId == null}">
        숙소를 먼저 선택하세요.
    </div>

    <!-- 안내: 객실 미선택/없음 -->
    <div class="alert alert-light border"
         th:if="${accommodationId != null and (priceCalendarDTO == null or #lists.isEmpty(priceCalendarDTO.rooms))}">
        선택된 숙소에 표시할 객실이 없습니다.
    </div>

    <!-- 월 달력 -->
    <!-- 회사 전체 보기(overview) -->
    <div th:if="${overview != null}" class="mt-3">
        <div class="month-grid">
            <!-- 요일 헤더 -->
            <div class="dow">Sun</div><div class="dow">Mon</div><div class="dow">Tue</div>
            <div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div><div class="dow">Sat</div>

            <!-- 앞쪽 빈 칸 -->
            <div class="day"
                 th:with="startDow=${#temporals.dayOfWeek(ym.atDay(1))},
                  leadingBlanks=${(startDow + 6) % 7}"
                 th:each="i : ${#numbers.sequence(1, leadingBlanks)}"></div>

            <!-- 날짜 칸 -->
            <div class="day" th:each="d : ${#numbers.sequence(1, ym.lengthOfMonth())}">
                <th:block th:with="curDate=${ym.atDay(d)},
                         day=${overview[curDate]}">
                    <div class="date" th:text="${#temporals.format(curDate,'d (E)')}">1 (월)</div>

                    <div class="meta">
          <span th:text="'총객실 ' + ${(day != null and day.totalRoomsSum != null) ? day.totalRoomsSum : 0}">
            총객실 0
          </span>
                    </div>

                    <div class="price"
                         th:text="${
                (day != null and day.minPrice != null and day.maxPrice != null)
                  ? #numbers.formatDecimal(day.minPrice,0,'COMMA',0,'POINT') + '원 ~ ' +
                    #numbers.formatDecimal(day.maxPrice,0,'COMMA',0,'POINT') + '원'
                  : '-'
             }">-</div>

                    <div>
          <span class="pill"
                th:classappend="${
                  day == null or day.availableSum == null ? ' muted' :
                  (day.availableSum == 0 ? ' zero' :
                   (day.availableSum <= 2 ? ' low' : ' ok'))
                }"
                th:text="${
                  day == null or day.availableSum == null ? '재고 -' :
                  (day.availableSum == 0 ? '품절' : '재고 ' + day.availableSum)
                }">재고 -</span>
                    </div>
                </th:block>
            </div>
        </div>
    </div>

    <!-- 숙소 선택: priceCalendarDTO.rooms 존재 -->
    <div th:if="${overview == null and priceCalendarDTO != null and not #lists.isEmpty(priceCalendarDTO.rooms)}" class="mt-3">

        <!-- 2-1) 특정 객실 선택됨: 단일 객실 달력 + 수정 버튼 -->
        <th:block th:if="${roomId != null}"
                  th:with="
              rooms=${priceCalendarDTO.rooms},
              rc=${ rooms.^[ room != null and T(java.lang.String).valueOf(room.roomId) == T(java.lang.String).valueOf(#vars.roomId) ] },
              days=${ym.lengthOfMonth()},
              startDow=${#temporals.dayOfWeek(ym.atDay(1))},
              leadingBlanks=${(startDow + 6) % 7}
            ">

            <div th:if="${rc != null}">
                <h6 class="mb-2" th:text="${rc.room.roomName}">객실명</h6>
                <div class="month-grid">
                    <!-- 요일 헤더 -->
                    <div class="dow">Sun</div><div class="dow">Mon</div><div class="dow">Tue</div>
                    <div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div><div class="dow">Sat</div>

                    <!-- 앞쪽 빈 칸 -->
                    <div class="day" th:each="i : ${#numbers.sequence(1, leadingBlanks)}"></div>

                    <!-- 날짜 칸 -->
                    <div class="day" th:each="d : ${#numbers.sequence(1, days)}">
                        <th:block th:with="
              curDate=${ym.atDay(d)},
              dow=${#temporals.dayOfWeek(curDate)},
              cell=${ rc.days != null ? rc.days.^[ date != null and (
                                (date instanceof T(java.time.LocalDate) and date.equals(#vars.curDate)) or
                                (date instanceof T(java.time.LocalDateTime) and date.toLocalDate().equals(#vars.curDate))
                              ) ] : null }
            ">
                            <div th:classappend="${dow >= 6} ? ' weekend' : ''">
                                <div class="date" th:text="${#temporals.format(curDate,'d (E)')}">1 (월)</div>

                                <div class="meta">
                                    <span th:text="'총객실 ' + ${rc.room.totalRooms}">총객실 0</span>
                                </div>

                                <div class="price"
                                     th:text="${cell != null and cell.price != null
                                ? #numbers.formatDecimal(cell.price,0,'COMMA',0,'POINT') + '원' : '-'}">-
                                </div>

                                <div th:with="av=${cell != null ? cell.available : null}">
                                    <span th:if="${av == null}" class="pill muted">재고 -</span>
                                    <span th:if="${av != null and av == 0}" class="pill zero">품절</span>
                                    <span th:if="${av != null and av > 0 and av <= 2}" class="pill low"  th:text="'재고 ' + ${av}"></span>
                                    <span th:if="${av != null and av > 2}" class="pill ok"   th:text="'재고 ' + ${av}"></span>
                                </div>

                                <div class="actions">
                                    <button class="btn btn-sm btn-outline-primary"
                                            th:attr="data-roomid=${rc.room.roomId},
                                 data-date=${#temporals.format(curDate,'yyyy-MM-dd')},
                                 data-price=${cell != null ? cell.price : null},
                                 data-available=${cell != null ? cell.available : null}"
                                            onclick="openEditModal(this)">수정</button>
                                </div>
                            </div>
                        </th:block>
                    </div>
                </div>
            </div>

            <div class="alert alert-light border" th:if="${rc == null}">
                선택된 객실 정보를 찾을 수 없습니다.
            </div>
        </th:block>

        <!-- 2-2) 객실 미선택: 전체 객실 보기(같은 달력 여러 개) -->
        <th:block th:if="${roomId == null}">
            <div th:each="rc : ${priceCalendarDTO.rooms}"
                 th:with="
           days=${ym.lengthOfMonth()},
           startDow=${#temporals.dayOfWeek(ym.atDay(1))},
           leadingBlanks=${(startDow + 6) % 7}
         "
                 class="mb-4">
                <h6 class="mb-2" th:text="${rc.room.roomName}">객실명</h6>
                <div class="month-grid">
                    <!-- 요일 헤더 -->
                    <div class="dow">Sun</div><div class="dow">Mon</div><div class="dow">Tue</div>
                    <div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div><div class="dow">Sat</div>

                    <!-- 앞쪽 빈 칸 -->
                    <div class="day" th:each="i : ${#numbers.sequence(1, leadingBlanks)}"></div>

                    <!-- 날짜 칸 -->
                    <div class="day" th:each="d : ${#numbers.sequence(1, days)}">
                        <th:block th:with="
              curDate=${ym.atDay(d)},
              dow=${#temporals.dayOfWeek(curDate)},
              cell=${ rc.days != null ? rc.days.^[ date != null and (
                                (date instanceof T(java.time.LocalDate) and date.equals(#vars.curDate)) or
                                (date instanceof T(java.time.LocalDateTime) and date.toLocalDate().equals(#vars.curDate))
                              ) ] : null }
            ">
                            <div th:classappend="${dow >= 6} ? ' weekend' : ''">
                                <div class="date" th:text="${#temporals.format(curDate,'d (E)')}">1 (월)</div>

                                <div class="meta">
                                    <span th:text="'총객실 ' + ${rc.room.totalRooms}">총객실 0</span>
                                </div>

                                <div class="price"
                                     th:text="${cell != null and cell.price != null
                                ? #numbers.formatDecimal(cell.price,0,'COMMA',0,'POINT') + '원' : '-'}">-
                                </div>

                                <div th:with="av=${cell != null ? cell.available : null}">
                                    <span th:if="${av == null}" class="pill muted">재고 -</span>
                                    <span th:if="${av != null and av == 0}" class="pill zero">품절</span>
                                    <span th:if="${av != null and av > 0 and av <= 2}" class="pill low"  th:text="'재고 ' + ${av}"></span>
                                    <span th:if="${av != null and av > 2}" class="pill ok"   th:text="'재고 ' + ${av}"></span>
                                </div>

                                <!-- 전체 객실 보기에서는 수정 버튼 숨김 -->
                            </div>
                        </th:block>
                    </div>
                </div>
            </div>
        </th:block>
    </div>
    <!-- 수정 모달 -->
    <div class="modal fade" id="cellEditModal" tabindex="-1">
        <div class="modal-dialog">
            <form class="modal-content" th:action="@{/admin/price/upsert}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">가격/재고 수정</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body d-flex flex-column gap-2">
                    <input type="hidden" name="companyId" th:value="${companyId}">
                    <input type="hidden" name="accommodationId" th:value="${accommodationId}">
                    <input type="hidden" name="ym" th:value="${#temporals.format(ym,'yyyy-MM')}">
                    <input type="hidden" name="roomId" id="modalRoomId">
                    <input type="hidden" name="date" id="modalDate">

                    <div>
                        <label class="form-label">가격</label>
                        <input type="number" class="form-control" name="price" id="modalPrice" step="1000" min="0">
                    </div>
                    <div>
                        <label class="form-label">재고</label>
                        <input type="number" class="form-control" name="available" id="modalAvailable" min="0">
                        <div class="form-text">재고 0 = 판매중지</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

</th:block>

<script>
    function openEditModal(btn) {
        const m = document.getElementById('cellEditModal');
        document.getElementById('modalRoomId').value = btn.dataset.roomid;
        document.getElementById('modalDate').value = btn.dataset.date;
        document.getElementById('modalPrice').value = btn.dataset.price || '';
        document.getElementById('modalAvailable').value = btn.dataset.available || '';
        bootstrap.Modal.getOrCreateInstance(m).show();
    }
</script>

<script th:src="@{/assets/static/js/initTheme.js}"></script>
</body>
</html>
