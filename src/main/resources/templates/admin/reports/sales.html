<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <meta charset="UTF-8" />
    <title>매출 통계</title>
    <th:block layout:fragment="head">
        <style>
            :root{
                --radius:16px; --shadow:0 8px 24px rgba(0,0,0,.06); --border:1px solid rgba(0,0,0,.06);
                --ink:#111827; --muted:#6b7280; --bg-soft: var(--bs-body-bg, #fff);
            }
            .toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between}
            .seg{display:inline-flex;border:var(--border);border-radius:999px;overflow:hidden;background:var(--bg-soft);box-shadow:var(--shadow)}
            .seg button{border:0;background:transparent;padding:8px 14px;font-weight:600;color:var(--muted);cursor:pointer}
            .seg button.active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
            .chip{border:var(--border);border-radius:999px;padding:8px 12px;background:var(--bg-soft);cursor:pointer}
            .kpi-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;margin-top:14px}
            @media (max-width:1199px){ .kpi-grid{grid-template-columns:repeat(6,1fr)} }
            @media (max-width:767px) { .kpi-grid{grid-template-columns:repeat(2,1fr)} }
            .kpi{grid-column:span 4;background:var(--bg-soft);border:var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
            .kpi .title{margin:0;color:var(--muted);font-size:.95rem}
            .kpi .value{margin:2px 0 0;font-weight:900;font-size:2rem;color:var(--ink)}
            .card-soft{background:var(--bg-soft);border:var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
            .card-soft .card-body{padding:20px}
            .chart-wrap{position:relative;min-height:380px}
            .table th{color:var(--muted);font-weight:600}
            .text-end{text-align:right}
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3>매출 통계</h3>
        <p class="text-subtitle text-muted">결제/예약 기준으로 일·주·월·요일별 추이를 확인하세요.</p>
    </div>

    <section class="section">

        <!-- Toolbar -->
        <div class="card-soft mb-3">
            <div class="card-body">
                <div class="toolbar">
                    <div class="toolbar-left" style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">

                        <!-- 기준 선택: 결제/예약 -->
                        <div class="seg" role="tablist" aria-label="집계 기준">
                            <button type="button" class="active" data-source="payment" role="tab" aria-selected="true">결제 기준</button>
                            <button type="button" data-source="reservation" role="tab" aria-selected="false">예약 기준</button>
                        </div>

                        <!-- 단위 선택: 일/주/월/요일 -->
                        <div class="seg" role="tablist" aria-label="집계 단위">
                            <button type="button" class="active" data-group="daily"   role="tab" aria-selected="true">일</button>
                            <button type="button" data-group="weekly"  role="tab" aria-selected="false">주</button>
                            <button type="button" data-group="monthly" role="tab" aria-selected="false">월</button>
                            <button type="button" data-group="weekday" role="tab" aria-selected="false">요일</button>
                        </div>

                        <!-- 기간 -->
                        <div class="chip">
                            <label class="m-0" for="from" style="margin-right:6px;color:#6b7280">시작</label>
                            <input id="from" type="date" class="border-0" style="outline:none" autocomplete="off">
                        </div>
                        <div class="chip">
                            <label class="m-0" for="to" style="margin-right:6px;color:#6b7280">종료</label>
                            <input id="to" type="date" class="border-0" style="outline:none" autocomplete="off">
                        </div>
                    </div>

                    <div class="toolbar-right" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
                        <button type="button" class="chip" id="btnLast7">최근 7일</button>
                        <button type="button" class="chip" id="btnLast30">최근 30일</button>
                        <button type="button" class="btn btn-primary" id="btnApply">적용</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- KPI -->
        <div class="kpi-grid">
            <div class="kpi">
                <p class="title">기간 총 매출</p>
                <p class="value" id="kpiTotalSales">-</p>
            </div>
            <div class="kpi">
                <p class="title">총 주문 수</p>
                <p class="value" id="kpiTotalOrders">-</p>
            </div>
            <div class="kpi">
                <p class="title">평균 주문 금액</p>
                <p class="value" id="kpiAov">-</p>
            </div>
        </div>

        <!-- Chart -->
        <div class="card-soft mt-3">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="m-0" id="titleLabel">매출 추이</h5>
                    <small class="text-muted" id="subtitleLabel">기준: 결제 · 단위: 일</small>
                </div>
                <div class="chart-wrap mt-2">
                    <canvas id="salesChart" aria-label="매출 추이 차트" role="img"></canvas>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card-soft mt-3 mb-5">
            <div class="card-body table-responsive">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>버킷</th>
                        <th class="text-end">매출</th>
                        <th class="text-end">주문 수</th>
                        <th class="text-end">평균 주문 금액</th>
                    </tr>
                    </thead>
                    <tbody id="rowsTbody"></tbody>
                </table>
            </div>
        </div>

    </section>
</th:block>

<!-- admin/reports/sales.html 일부 (script 영역) -->
<th:block layout:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        (() => {
            // ===== 유틸 =====
            const fmtCurrency = n => new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0}).format(Number(n||0));
            const fmtNumber   = n => new Intl.NumberFormat('ko-KR').format(Number(n||0));
            const pad2 = n => String(n).padStart(2,'0');
            const toIso = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
            const parseIso = s => { const [y,m,d] = (s||'').split('-').map(Number); return new Date(y,(m||1)-1,d||1); };

            // 상태
            let source = 'payment'; // 'payment' | 'reservation'
            let groupBy = 'daily';  // 'daily' | 'weekly' | 'monthly' | 'weekday'
            let chart;

            // 요소 캐시 (없으면 에러 로그)
            function must(id){
                const el = document.getElementById(id);
                if(!el){ console.error(`[sales] element #${id} not found`); }
                return el;
            }

            // KPI 엘리먼트
            const elTotal   = must('kpiTotalSales');
            const elOrders  = must('kpiTotalOrders');
            const elAov     = must('kpiAov');

            // 날짜 입력/버튼
            const elFrom    = must('from');
            const elTo      = must('to');
            const btnApply  = must('btnApply');
            const btn7      = must('btnLast7');
            const btn30     = must('btnLast30');

            // 기준 버튼들(결제/예약)
            const btnBasisPayment = document.querySelector('[data-source="payment"]');
            const btnBasisResv    = document.querySelector('[data-source="reservation"]');

            // 단위 버튼들(일/주/월/요일)
            const btnDaily   = document.querySelector('[data-group="daily"]');
            const btnWeekly  = document.querySelector('[data-group="weekly"]');
            const btnMonthly = document.querySelector('[data-group="monthly"]');
            const btnWeekday = document.querySelector('[data-group="weekday"]');

            // 보조 라벨
            const subLabel = must('subtitleLabel');

            // 차트
            function renderChart(rows){
                const labels = rows.map(r => r.label ?? r.bucket ?? r.date ?? '');
                const sales  = rows.map(r => Number(r.totalSales ?? r.total ?? 0));
                const orders = rows.map(r => Number(r.totalOrders ?? 0));

                const ctx = must('salesChart')?.getContext('2d');
                if(!ctx) return;

                if(chart) chart.destroy();
                chart = new Chart(ctx, {
                    data:{
                        labels,
                        datasets:[
                            {
                                type:'bar',
                                label:'매출(원)',
                                data:sales,
                                yAxisID:'y1',
                                backgroundColor:'rgba(255, 206, 86, 0.8)',  // 노란색
                                borderColor:'rgba(255, 206, 86, 1)',
                                borderWidth:1,
                                barPercentage:0.5,
                                categoryPercentage:0.6
                            },
                            {
                                type:'line',
                                label:'주문 수',
                                data:orders,
                                yAxisID:'y2',
                                tension:.35,
                                pointRadius:3,
                                borderColor:'#ec4899',   // 핑크
                                backgroundColor:'#ec4899',
                                borderWidth:2
                            }
                        ]
                    },
                    options:{
                        responsive:true,
                        interaction:{ mode:'index', intersect:false },
                        plugins:{
                            legend:{ display:true },
                            tooltip:{ callbacks:{
                                    label:(c)=>
                                        c.dataset.label.includes('매출')
                                            ? `${c.dataset.label}: ${fmtCurrency(c.raw)}`
                                            : `${c.dataset.label}: ${fmtNumber(c.raw)}건`
                                } }
                        },
                        scales:{
                            y1:{
                                position:'left',
                                ticks:{ callback:v=>fmtNumber(v) }
                            },
                            y2:{
                                position:'right',
                                grid:{ drawOnChartArea:false },
                                ticks:{ precision:0 }
                            }
                        }
                    }
                });
            }

            // KPI
            function renderKpis(rows){
                const totalSales = rows.reduce((s,r)=> s + Number(r.totalSales ?? r.total ?? 0), 0);
                const totalOrders= rows.reduce((s,r)=> s + Number(r.totalOrders ?? 0), 0);
                const aov = totalOrders ? totalSales / totalOrders : 0;
                if(elTotal)  elTotal.textContent = fmtCurrency(totalSales);
                if(elOrders) elOrders.textContent= fmtNumber(totalOrders);
                if(elAov)    elAov.textContent  = fmtCurrency(aov);
            }

            // 라벨
            function refreshSubtitle(){
                const s = (source==='payment'?'결제':'예약');
                const g = (groupBy==='daily'?'일':groupBy==='weekly'?'주':groupBy==='monthly'?'월':'요일');
                if (subLabel) subLabel.textContent = `기준: ${s} · 단위: ${g}`;
            }

            // 날짜 디폴트
            function setDefaultDates(days=7){
                const to = new Date();
                const from = new Date(to.getFullYear(), to.getMonth(), to.getDate()- (days-1));
                if(elFrom) elFrom.value = toIso(from);
                if(elTo)   elTo.value   = toIso(to);
            }

            function setDefaultDatesByGroup(){
                if (groupBy==='daily')   return setDefaultDates(7);
                if (groupBy==='weekly')  return setDefaultDates(70);
                if (groupBy==='weekday') return setDefaultDates(28);
                if (groupBy==='monthly'){
                    const to = new Date();
                    const from = new Date(to.getFullYear(), to.getMonth()-5, 1);
                    if(elFrom) elFrom.value = toIso(from);
                    if(elTo)   elTo.value   = toIso(to);
                }
            }

            // 서버 호출 (로그인 리다이렉트도 잡음)
            async function fetchRows(){
                const from = document.getElementById('from').value;
                const to   = document.getElementById('to').value;

                // groupBy = 'daily' | 'weekly' | 'monthly' | 'weekday'
                // source(결제/예약 기준)를 추가로 쓰고 싶다면 &source=payment 같은 파라미터를 확장하세요.
                const url = `/admin/reports/chart?mode=${groupBy}&from=${from}&to=${to}`;

                const res = await fetch(url, { headers:{ 'Accept':'application/json' }, credentials:'include' });
                const ct = res.headers.get('content-type') || '';
                if (!res.ok || !ct.includes('application/json')) {
                    const text = await res.text();
                    console.error('[chart] not JSON (maybe login redirect?)', text.slice(0,200));
                    throw new Error('데이터를 불러오지 못했습니다.');
                }
                return await res.json(); // List<SalesChartPointDTO>
            }

            // 적용
            async function apply(){
                try{
                    refreshSubtitle();
                    const rows = await fetchRows();
                    renderKpis(rows);
                    renderChart(rows);
                }catch(e){
                    alert(e.message);
                }
            }

            // ===== 바인딩 =====
            document.addEventListener('DOMContentLoaded', () => {
                try{
                    // 기준
                    btnBasisPayment?.addEventListener('click', () => { source='payment'; btnBasisPayment.classList.add('active'); btnBasisResv?.classList.remove('active'); apply(); });
                    btnBasisResv   ?.addEventListener('click', () => { source='reservation'; btnBasisResv.classList.add('active'); btnBasisPayment?.classList.remove('active'); apply(); });

                    // 단위
                    btnDaily  ?.addEventListener('click', () => { groupBy='daily';   setDefaultDatesByGroup(); apply(); toggleActive(btnDaily); });
                    btnWeekly ?.addEventListener('click', () => { groupBy='weekly';  setDefaultDatesByGroup(); apply(); toggleActive(btnWeekly); });
                    btnMonthly?.addEventListener('click', () => { groupBy='monthly'; setDefaultDatesByGroup(); apply(); toggleActive(btnMonthly); });
                    btnWeekday?.addEventListener('click', () => { groupBy='weekday'; setDefaultDatesByGroup(); apply(); toggleActive(btnWeekday); });

                    // 기간 버튼
                    btnApply?.addEventListener('click', () => apply());
                    btn7    ?.addEventListener('click', () => { setDefaultDates(7);  apply(); });
                    btn30   ?.addEventListener('click', () => { setDefaultDates(30); apply(); });

                    // 최초 진입 디폴트
                    setDefaultDatesByGroup();
                    refreshSubtitle();
                    apply();
                }catch(err){
                    console.error('[sales] init failed', err);
                    alert('스크립트 초기화 중 오류가 발생했습니다. 콘솔을 확인하세요.');
                }
            });

            function toggleActive(targetBtn){
                // 같은 그룹의 버튼 스타일 정리 (선택)
                [btnDaily, btnWeekly, btnMonthly, btnWeekday].forEach(b => b?.classList.remove('active'));
                targetBtn?.classList.add('active');
            }
        })();
    </script>
</th:block>
</body>
</html>
