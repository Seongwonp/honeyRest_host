<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>고객 상세</title>
    <th:block layout:fragment="head">
        <style>
            :root{
                --mint:var(--success-soft);      /* 파스텔 민트 */
                --mint-deep:var(--success);
                --lilac:var(--honey-soft);     /* 파스텔 라일락 */
                --lilac-deep:#5B21B6;
                --soft-gray:#F8FAFC;
                --ink:#0F172A;
                --line:#eef0f4;
            }
            .card{ border:none; border-radius:18px; box-shadow:0 6px 16px rgba(2,6,23,.06); }
            .page-heading h3{font-weight:800; letter-spacing:.2px}
            .btn-rounded{border-radius:12px}

            /* 아바타 & 상단 정보 (이미지 위, 이름 아래) */
            .avatar{
                width:96px; height:96px; border-radius:50%;
                object-fit:cover; border:2px solid #e5e7eb; background:#fff;
            }
            .avatar-fallback{
                width:96px; height:96px; border-radius:50%;
                display:flex; align-items:center; justify-content:center;
                background:linear-gradient(135deg, var(--mint), var(--lilac));
                color:#fff; font-weight:800; font-size:1.6rem; border:2px solid #fff;
            }
            .meta-badges{ display:flex; flex-wrap:wrap; gap:.4rem; justify-content:center; }
            .pill{
                background:var(--soft-gray); color:#475569;
                border-radius:9999px; padding:.25rem .55rem; font-size:.75rem; font-weight:700;
                border:1px dashed rgba(71,85,105,.25);
            }

            /* key-value */
            .kv dt{font-weight:700; color:#6b7280; margin-bottom:.25rem}
            .kv dd{margin-bottom:1rem; font-weight:500}

            .badge-soft{
                border-radius:9999px; padding:.35rem .7rem;
                font-size:.8rem; font-weight:700; letter-spacing:.2px; border:1px solid transparent;
            }
            .badge-active{ background:#d1fae5; color:#065f46; border-color:rgba(6,95,70,.15)}
            .badge-suspended{ background:#fee2e2; color:#991b1b; border-color:rgba(153,27,27,.15)}
            .badge-deleted{ background:#f3f4f6; color:#6b7280; border-color:rgba(107,114,128,.15)}

            .section-title{ font-weight:800; font-size:1.05rem; margin-bottom:.75rem; display:flex; align-items:center; gap:.5rem; }
            .section-title .dot{ width:8px; height:8px; border-radius:50%; background:var(--lilac-deep); opacity:.4; }
            .divider{height:1px; background:var(--line); margin:.75rem 0 1rem}

            /* 소셜 로그인 */
            .social-chip{
                display:flex; align-items:center; gap:.6rem;
                border-radius:12px; padding:.55rem .7rem;
                border:1px solid var(--line); background:#fff;
            }
            .social-chip .logo{
                width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center;
                font-weight:800; color:#fff;
            }
            .kakao{ background:#F7E317; color:#3A2929 }
            .naver{ background:#03C75A }
            .google{ background:#4285F4 }
            .apple{ background:#000 }
            .github{ background:#24292F }
            .pv{display:flex; flex-direction:column; line-height:1.15}
            .pv .name{font-weight:700; font-size:.9rem}
            .pv .meta{font-size:.75rem; color:#64748B}

            /* 탭 */
            .nav-tabs .nav-link{
                border:none; border-bottom:3px solid transparent;
                color:#475569; font-weight:700; border-radius:0;
            }
            .nav-tabs .nav-link.active{
                color:var(--honey-deeper); border-color:var(--honey-deeper);
                background:linear-gradient(0deg,#fff,#fff);
            }
            .tab-pane .muted{color:#64748B}
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="content">

    <div class="page-heading d-flex justify-content-between align-items-center">
        <h3 class="mb-0">고객 상세</h3>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/customers/list}" class="btn btn-light btn-rounded">목록</a>
            <a th:href="@{/admin/customers/edit/{id}(id=${user.userId})}" class="btn btn-primary btn-rounded">수정</a>
        </div>
    </div>

    <div class="page-content mt-3">
        <!-- 프로필 카드 (이미지 위, 이름 아래) -->
        <div class="card mb-3">
            <div class="card-body">
                <div class="text-center mb-3">
                    <!-- 프로필 이미지 또는 이니셜 -->
                    <img th:if="${user.profileImage != null}" th:src="${user.profileImage}" class="avatar mb-3" alt="profile">
                    <div th:if="${user.profileImage == null}" class="avatar-fallback mb-3"
                         th:text="${user.name != null ? #strings.substring(user.name,0,1) : 'U'}">U</div>

                    <!-- 이름 -->
                    <h4 class="mb-1 fw-bold" th:text="${user.name}">홍길동</h4>

                    <!-- 이메일/전화 -->
                    <div class="text-muted small" th:text="${user.email}">hong@example.com</div>
                    <div class="text-muted small" th:text="${user.phone != null && !#strings.isEmpty(user.phone) ? user.phone : '-'}">010-0000-0000</div>

                    <!-- 가입/수정/마지막 로그인 배지 -->
                    <div class="meta-badges mt-3">
            <span class="pill"
                  th:text="|가입일 ${user.createdAt != null ? #temporals.format(user.createdAt,'yyyy-MM-dd HH:mm') : '-'}|">
              가입일 -
            </span>
                        <span class="pill"
                              th:text="|최종수정 ${user.updatedAt != null ? #temporals.format(user.updatedAt,'yyyy-MM-dd HH:mm') : '-'}|">
              최종수정 -
            </span>
                        <span class="pill"
                              th:text="|마지막 로그인 ${user.lastLogin != null ? #temporals.format(user.lastLogin,'yyyy-MM-dd HH:mm') : '-'}|">
              마지막 로그인 -
            </span>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="row">
                    <!-- 기본 정보 -->
                    <div class="col-lg-7">
                        <div class="section-title"><span class="dot"></span><span>기본 정보</span></div>
                        <dl class="row kv">
                            <dt class="col-sm-3">고객 ID</dt>
                            <dd class="col-sm-9" th:text="${user.userId}">1</dd>

                            <dt class="col-sm-3">성별</dt>
                            <dd class="col-sm-9" th:text="${user.gender != null ? user.gender : '-'}">-</dd>

                            <dt class="col-sm-3">생년월일</dt>
                            <dd class="col-sm-9" th:text="${user.birthDate != null ? #temporals.format(user.birthDate, 'yyyy-MM-dd') : '-'}">-</dd>

                            <dt class="col-sm-3">마케팅 수신</dt>
                            <dd class="col-sm-9"><span th:text="${user.marketingAgree} ? '거부' == 'x' : (user.marketingAgree ? '동의' : '거부')">거부</span></dd>

                            <dt class="col-sm-3">이메일 인증</dt>
                            <dd class="col-sm-9"><span th:text="${user.isVerified} ? '인증됨' : '미인증'">미인증</span></dd>

                            <dt class="col-sm-3">포인트</dt>
                            <dd class="col-sm-9" th:text="${#numbers.formatInteger(user.point,3,'COMMA')} + ' P'">000 P</dd>

                            <dt class="col-sm-3">권한</dt>
                            <dd class="col-sm-9" th:text="${user.role != null ? user.role : '-'}">-</dd>

                            <dt class="col-sm-3">상태</dt>
                            <dd class="col-sm-9">
                                <span th:if="${user.status == 'ACTIVE'}" class="badge-soft badge-active">ACTIVE</span>
                                <span th:if="${user.status == 'SUSPENDED'}" class="badge-soft badge-suspended">SUSPENDED</span>
                                <span th:if="${user.status == 'DELETED'}" class="badge-soft badge-deleted">DELETED</span>
                                <span th:if="${user.status == null}" class="pill">UNKNOWN</span>
                            </dd>
                        </dl>
                    </div>

                    <!-- 소셜 로그인 (단일 socialType) -->
                    <div class="col-lg-5">
                        <div class="section-title"><span class="dot"></span><span>소셜 로그인</span></div>

                        <div th:if="${user.socialType != null}">
                            <div class="social-chip">
                                <div class="logo"
                                     th:classappend="${#strings.equalsIgnoreCase(user.socialType,'KAKAO')} ? ' kakao' :
                                     ${#strings.equalsIgnoreCase(user.socialType,'NAVER')} ? ' naver' :
                                     ${#strings.equalsIgnoreCase(user.socialType,'GOOGLE')} ? ' google' :
                                     ${#strings.equalsIgnoreCase(user.socialType,'APPLE')} ? ' apple' :
                                     ${#strings.equalsIgnoreCase(user.socialType,'GITHUB')} ? ' github' : ''">
                                    <span th:text="${#strings.substring(user.socialType,0,1)}">S</span>
                                </div>
                                <div class="pv">
                                    <span class="name" th:text="${user.socialType}">KAKAO</span>
                                    <span class="meta">연결됨</span>
                                </div>
                            </div>
                        </div>

                        <div th:if="${user.socialType == null}" class="text-muted">
                            연결된 소셜 계정이 없습니다.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 탭: 포인트/예약/리뷰 -->
        <div class="card">
            <div class="card-body">
                <ul class="nav nav-tabs" id="detailTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="points-tab" data-bs-toggle="tab" data-bs-target="#points"
                                type="button" role="tab">포인트 내역</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="reservations-tab" data-bs-toggle="tab" data-bs-target="#reservations"
                                type="button" role="tab">예약 내역</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="reviews-tab" data-bs-toggle="tab" data-bs-target="#reviews"
                                type="button" role="tab">리뷰</button>
                    </li>
                </ul>
                <div class="tab-content mt-3">
                    <div class="tab-pane fade show active" id="points" role="tabpanel">
                        <p class="muted">포인트 내역을 여기에 표시합니다.</p>
                    </div>
                    <div class="tab-pane fade" id="reservations" role="tabpanel">
                        <p class="muted">예약 내역을 여기에 표시합니다.</p>
                    </div>
                    <div class="tab-pane fade" id="reviews" role="tabpanel">
                        <p class="muted">리뷰 내역을 여기에 표시합니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
