<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
  <title>고객 목록</title>
  <th:block layout:fragment="head">
    <style>
      :root{
        --mint:#D9F7F1;      /* 파스텔 민트 */
        --mint-deep:#0F766E; /* 진한 민트 텍스트 */
        --lilac:#EDE9FE;     /* 파스텔 라일락 */
        --lilac-deep:#5B21B6;
        --soft-gray:#F8FAFC;
        --ink:#0F172A;
        --line:#eef0f4;
      }

      /* 상단 헤딩 */
      .page-heading h3 { font-weight: 800; letter-spacing:.2px; }
      .page-heading .count-badge{
        background: var(--lilac);
        color: var(--lilac-deep);
        border-radius: 9999px;
        padding:.45rem .8rem;
        font-weight:700;
        font-size:.85rem;
      }

      /* 상단 검색바 (톤만 다듬기) */
      .search-wrap{
        display:flex; gap:.5rem; align-items:center;
        background: var(--soft-gray);
        border-radius: 14px;
        padding:.45rem .5rem;
        border:1px solid #edf1f7;
        box-shadow: 0 2px 10px rgba(2,6,23,.03) inset;
      }
      .search-wrap input{
        border:none; background: transparent; box-shadow:none;
        min-width:220px;
      }
      .search-wrap input:focus{ outline:none; box-shadow:none; }

      /* 검색 버튼을 둥근 알약 스타일로 (부피 과하지 않게) */
      .btn-search{
        border-radius:9999px;
        padding:.4rem .9rem;
        font-weight:700;
      }

      /* 표 + 카드 */
      .card { border: none; box-shadow: 0 6px 16px rgba(2, 6, 23, .06); border-radius: 16px; }
      .table thead{ background:linear-gradient(0deg,#fff,#fff), var(--soft-gray); }
      .table thead th{ border-bottom:1px solid var(--line)!important; color:#475569; font-weight:700; font-size:.9rem; }
      .table tbody tr{ transition: background-color .15s ease, transform .05s ease; }
      .table tbody tr:hover{ background: #FBFEFF; }
      .table td{ vertical-align: middle; }

      /* 상태/사용여부 배지 */
      .badge-soft {
        border-radius: 9999px;
        padding: .35rem .7rem;
        font-size: .72rem;
        font-weight: 700;
        letter-spacing:.2px;
      }
      .badge-success-soft { background: var(--mint); color: var(--mint-deep); border: 1px solid rgba(15,118,110,.15); }
      .badge-secondary-soft { background: var(--soft-gray); color: #475569; border: 1px dashed rgba(71,85,105,.25); }

      .chip-status{
        background: var(--lilac);
        color: var(--lilac-deep);
        padding:.28rem .6rem; border-radius:9999px;
        font-size:.72rem; font-weight:700;
        border:1px solid rgba(91,33,182,.12);
      }

      /* 행의 액션 버튼 – 리스트와 컬러 맞춘 알약형 아웃라인 */
      .btn-pill{
        border-radius:9999px;
        padding:.32rem .72rem;
        font-weight:700;
        line-height:1;
      }
      .btn-pill-primary{
        background:#fff;
        border:1.2px solid #7c3aed;   /* 보라(라일락 딥 계열) */
        color:#5B21B6;
      }
      .btn-pill-primary:hover{
        background:var(--lilac);
        border-color:#6d28d9;
        color:#4c1d95;
      }
      .btn-pill-secondary{
        background:#fff;
        border:1.2px solid #0ea5a3;   /* 민트 계열 */
        color:#0F766E;
      }
      .btn-pill-secondary:hover{
        background:var(--mint);
        border-color:#0F766E;
        color:#0c5f59;
      }

      /* 페이징은 네가 좋다한 기존 스타일 유지 (아래 그대로) */
      .pagination .page-link{ border-radius: 10px; border:none; color:#475569; }
      .pagination .page-item.active .page-link{ background: var(--lilac); color: var(--lilac-deep); font-weight:800; }
      .pagination .page-item:not(.active) .page-link:hover{ background: var(--mint); color: var(--mint-deep); }

      /* 빈 상태 */
      .empty-state{ text-align:center; padding:4rem 1rem; color:#64748B; }
      .empty-state .emoji{ font-size: 2rem; display:block; margin-bottom:.4rem; }
    </style>
  </th:block>
</head>

<body>
<th:block layout:fragment="content">

  <div class="page-heading d-flex flex-wrap justify-content-between align-items-center gap-2">
    <div class="d-flex align-items-center gap-3">
      <h3 class="mb-0">고객 목록</h3>
      <span class="count-badge" th:text="'총 ' + ${page.totalElements} + '명'">총 0명</span>
    </div>

    <!-- 상단 검색창: 스타일만 개선 -->
    <form th:action="@{/admin/customers/list}" method="get" class="search-wrap">
      <input type="text" name="q" th:value="${q}" placeholder="이름/이메일/전화 검색" class="form-control">
      <button type="submit" class="btn btn-primary btn-search">검색</button>
    </form>
  </div>

  <div class="page-content mt-3">
    <div class="card">
      <div class="card-body">
        <div th:if="${page.content == null or #lists.isEmpty(page.content)}" class="empty-state">
          <span class="emoji">🫧</span>
          <div class="fw-semibold">검색 결과가 없어요</div>
          <div class="small">다른 키워드로 다시 시도해보세요.</div>
        </div>

        <div th:unless="${page.content == null or #lists.isEmpty(page.content)}">
          <table class="table table-hover align-middle">
            <thead>
            <tr>
              <th>NO</th>
              <th>이름</th>
              <th>연락처 / 이메일</th>
              <th>포인트</th>
              <th>최근 포인트</th>
              <th>사용 여부</th>
              <th>예약수</th>
              <th>최근 예약일</th>
              <th>리뷰수</th>
              <th>평균 평점</th>
              <th>마지막 로그인</th>
              <th>상태</th>
              <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u, stat : ${page.content}">
              <td th:text="${page.number * page.size + stat.index + 1}">1</td>

              <td>
                <div class="fw-semibold" th:text="${u.name}">홍길동</div>
              </td>

              <td>
                <div th:text="${u.phone != null && !#strings.isEmpty(u.phone) ? u.phone : '-'}">010-1234-5678</div>
                <div class="small text-muted" th:text="${u.email}">hong@sample.com</div>
              </td>

              <td>
                <span th:text="${u.point != null ? #numbers.formatInteger(u.point, 3, 'COMMA') : '0'}">0</span>
              </td>

              <td th:text="${u.lastPointAt != null ? #temporals.format(u.lastPointAt,'yyyy-MM-dd HH:mm') : '-'}">-</td>

              <!-- 사용 여부: usedPoints가 0 초과면 사용함 -->
              <td>
                <span th:if="${u.usedPoints != null and u.usedPoints > 0}" class="badge-soft badge-success-soft">사용함</span>
                <span th:if="${u.usedPoints != null and u.usedPoints == 0}" class="badge-soft badge-secondary-soft">미사용</span>
                <span th:if="${u.usedPoints == null}" class="text-muted">-</span>
              </td>

              <td th:text="${u.reservationCount != null ? u.reservationCount : 0}">0</td>
              <td th:text="${u.lastReservationDate != null ? #temporals.format(u.lastReservationDate,'yyyy-MM-dd') : '-'}">-</td>
              <td th:text="${u.reviewCount != null ? u.reviewCount : 0}">0</td>
              <td th:text="${u.avgRating != null ? #numbers.formatDecimal(u.avgRating,1,'POINT',1,'POINT') : '-'}">-</td>
              <td th:text="${u.lastLogin != null ? #temporals.format(u.lastLogin,'yyyy-MM-dd HH:mm') : '-'}">-</td>

              <td>
                <span class="chip-status" th:text="${u.status != null ? u.status : 'UNKNOWN'}">ACTIVE</span>
              </td>

              <td>
                <!-- 상세/포인트 버튼만 톤 맞춰 변경 (기능 동일) -->
                <div class="d-inline-flex gap-2">
                  <a th:href="@{/admin/customers/detail/{id}(id=${u.userId})}" class="btn btn-pill btn-pill-primary">상세</a>
                  <a th:href="@{/admin/customers/{id}/points(id=${u.userId})}" class="btn btn-pill btn-pill-secondary">포인트</a>
                </div>
              </td>
            </tr>
            </tbody>
          </table>

          <!-- 페이징: 너가 마음에 든 기존 디자인 그대로 유지 -->
          <nav th:if="${page.totalPages > 1}" class="mt-3">
            <ul class="pagination">
              <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/customers/list(page=${page.number-1}, q=${q})}">이전</a>
              </li>
              <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages-1)}"
                  th:classappend="${i == page.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/customers/list(page=${i}, q=${q})}"
                   th:text="${i+1}">1</a>
              </li>
              <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/customers/list(page=${page.number+1}, q=${q})}">다음</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </div>
</th:block>
</body>
</html>
