<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>리뷰 등록</title>
    <th:block layout:fragment="head">
        <style>
            .form-label {
                font-weight: 600
            }

            .hint {
                color: #6b7280;
                font-size: .9rem
            }

            /* 업로드 미리보기 그리드 */
            .upload-previews {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
                gap: .5rem;
                margin-top: .5rem;
            }

            .upload-previews .preview {
                position: relative;
                border: 1px solid #e5e7eb;
                border-radius: 10px;
                overflow: hidden;
                background: #f8fafc;
            }

            .upload-previews img {
                width: 100%;
                height: 92px;
                object-fit: cover;
                display: block;
            }

            .upload-previews .name {
                position: absolute;
                left: 6px;
                bottom: 6px;
                padding: .1rem .35rem;
                font-size: .7rem;
                background: rgba(0, 0, 0, .6);
                color: #fff;
                border-radius: 6px;
                max-width: calc(100% - 12px);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* 썸네일 프리뷰 */
            .preview-thumb img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 10px;
                border: 1px solid #eee;
            }

            .preview-thumb .remove {
                width: 120px;
                height: 120px;
                position: relative;
                top: .25rem;
                right: .25rem;
                line-height: 1;
                padding: .15rem .4rem;
                border-radius: 9999px;
            }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">리뷰 등록</h3>
        <a class="btn btn-light" th:href="@{/admin/reviews/list}">목록</a>
    </div>

    <!-- 1) 예약 불러오기 (GET) -->
    <div class="card mb-3">
        <div class="card-body">
            <form th:action="@{/admin/reviews/add}" method="get" class="row g-2 align-items-end">
                <div class="col-auto">
                    <label class="form-label mb-1">예약 ID</label>
                    <input type="number" name="reservationId" class="form-control"
                           th:value="${form != null ? form.reservationId : ''}" placeholder="예) 123">
                </div>
                <div class="col-auto">
                    <button class="btn btn-outline-primary">예약 불러오기</button>
                </div>
                <div class="col-auto hint" th:if="${accName != null}">
                    <div>숙소: <b th:text="${accName}">-</b></div>
                    <div>객실: <b th:text="${roomName}">-</b></div>
                    <div>예약자: <b th:text="${guestName}">-</b></div>
                </div>
            </form>
        </div>
    </div>

    <!-- 2) 등록 폼 (POST) -->
    <div class="card">
        <div class="card-body">
            <!-- 컨트롤러: model.addAttribute("form", ReviewDTO) -->
            <form th:action="@{/admin/reviews/add}" th:object="${form}" method="post" enctype="multipart/form-data">
                <!-- 예약/연관 hidden (예약 불러오기로 채워짐) -->
                <input type="hidden" th:field="*{reservationId}" id="f_reservationId">
                <input type="hidden" th:field="*{accommodationId}" id="accIdHidden">
                <input type="hidden" th:field="*{roomId}" id="roomIdHidden">
                <input type="hidden" th:field="*{userId}" id="userIdHidden">

                <div class="row g-3">
                    <!-- (선택) datalist: 목록 주입 시에만 노출됨 -->
                    <div class="col-md-4" th:if="${accList != null}">
                        <label class="form-label">숙소</label>
                        <input class="form-control" list="accList" id="accNameInput"
                               placeholder="숙소명으로 검색"
                               th:value="${accName != null ? accName : ''}">
                        <datalist id="accList">
                            <option th:each="acc : ${accList}"
                                    th:value="${acc.name}"
                                    th:attr="data-id=${acc.accommodationId}"></option>
                        </datalist>
                        <div class="hint">선택 시 숙소 ID가 자동 설정됩니다.</div>
                    </div>

                    <div class="col-md-4" th:if="${roomList != null}">
                        <label class="form-label">객실</label>
                        <input class="form-control" list="roomList" id="roomNameInput"
                               placeholder="객실명으로 검색"
                               th:value="${roomName != null ? roomName : ''}">
                        <datalist id="roomList">
                            <option th:each="room : ${roomList}"
                                    th:value="${room.name}"
                                    th:attr="data-id=${room.roomId},data-acc=${room.accommodationId}"></option>
                        </datalist>
                        <div class="hint">숙소와 다른 숙소의 객실을 선택하지 않도록 주의하세요.</div>
                    </div>

                    <div class="col-md-4" th:if="${userList != null}">
                        <label class="form-label">작성자</label>
                        <input class="form-control" list="userList" id="userNameInput"
                               placeholder="작성자 이름/이메일"
                               th:value="${guestName != null ? guestName : ''}">
                        <datalist id="userList">
                            <option th:each="u : ${userList}"
                                    th:value="${u.name}"
                                    th:attr="data-id=${u.userId}"></option>
                        </datalist>
                        <div class="hint">선택 시 사용자 ID가 자동 설정됩니다.</div>
                    </div>

                    <!-- 평점들 -->
                    <div class="col-md-3">
                        <label class="form-label">종합 평점</label>
                        <input type="number" step="0.1" min="0" max="5" class="form-control" th:field="*{rating}"
                               required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">청결</label>
                        <input type="number" step="0.1" min="0" max="5" class="form-control"
                               th:field="*{cleanlinessRating}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">서비스</label>
                        <input type="number" step="0.1" min="0" max="5" class="form-control"
                               th:field="*{serviceRating}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">위치</label>
                        <input type="number" step="0.1" min="0" max="5" class="form-control"
                               th:field="*{locationRating}">
                    </div>

                    <!-- 내용 -->
                    <div class="col-12">
                        <label class="form-label">리뷰 내용</label>
                        <textarea class="form-control" rows="4" th:field="*{content}"></textarea>
                    </div>

                    <!-- 상태 -->
                    <div class="col-md-3">
                        <label class="form-label">상태</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="VISIBLE">VISIBLE</option>
                            <option value="PENDING">PENDING</option>
                            <option value="HIDDEN">HIDDEN</option>
                        </select>
                    </div>

                    <!-- 이미지 업로드 -->
                    <div class="col-12">
                        <label class="form-label">이미지 파일(여러 장)</label>
                        <input class="form-control" type="file" name="files" id="reviewFiles" multiple accept="image/*">
                        <div id="uploadPreview" class="upload-previews"></div>
                        <div class="hint">테스트용 업로드(Firebase 저장)</div>
                    </div>
                    <div id="filePreviews" class="mt-2 d-flex flex-wrap gap-2"></div>
                </div>

                <script>
                    (function(){
                        const input = document.getElementById('reviewFiles');
                        const box   = document.getElementById('filePreviews');
                        if(!input || !box){ return; }

                        function clearPreviews(){
                            // objectURL 정리 + DOM 비우기
                            box.querySelectorAll('img[data-url]').forEach(img => {
                                URL.revokeObjectURL(img.getAttribute('data-url'));
                            });
                            box.innerHTML = '';
                        }

                        function rebuildFileListExcluding(removeIndex){
                            const dt = new DataTransfer();
                            Array.from(input.files).forEach((f,i) => { if(i!==removeIndex) dt.items.add(f); });
                            input.files = dt.files;
                        }

                        input.addEventListener('change', () => {
                            clearPreviews();
                            const files = Array.from(input.files || []);
                            files.forEach((f, idx) => {
                                if(!f.type.startsWith('image/')) return;

                                const url = URL.createObjectURL(f);

                                const wrap = document.createElement('div');
                                wrap.style.width = '120px';
                                wrap.style.height = '120px';
                                wrap.style.position = 'relative';

                                const img = document.createElement('img');
                                img.src = url;
                                img.setAttribute('data-url', url);
                                img.style.width = '100%';
                                img.style.height = '100%';
                                img.style.objectFit = 'cover';
                                img.style.borderRadius = '10px';
                                img.style.border = '1px solid #eee';

                                const btn = document.createElement('button');
                                btn.type = 'button';
                                btn.textContent = '×';
                                btn.className = 'btn btn-light border';
                                btn.style.position = 'absolute';
                                btn.style.top = '.25rem';
                                btn.style.right = '.25rem';
                                btn.style.lineHeight = '1';
                                btn.style.padding = '.15rem .4rem';
                                btn.style.borderRadius = '9999px';

                                btn.addEventListener('click', () => {
                                    rebuildFileListExcluding(idx);
                                    // 인덱스가 바뀌므로 전체를 다시 그림
                                    const evt = new Event('change');
                                    input.dispatchEvent(evt);
                                });

                                wrap.appendChild(img);
                                wrap.appendChild(btn);
                                box.appendChild(wrap);
                            });
                        });
                    })();
                </script>

                <div class="mt-3 d-flex gap-2">
                    <button class="btn btn-primary">
                        <i class="bi bi-check2-circle me-1"></i> 등록
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/reviews/list}">목록</a>
                </div>
            </form>
        </div>
    </div>
</th:block>

<!-- 바인딩/알림 & datalist-hidden 동기화 스크립트(선택) -->
<th:block layout:fragment="body-end">
    <script th:inline="javascript">
        (function () {
            function wireDatalist(inputId, listId, hiddenId, keyAttr) {
                const inp = document.getElementById(inputId);
                const list = document.getElementById(listId);
                const hid = document.getElementById(hiddenId);
                if (!inp || !list || !hid) return;

                function updateHidden() {
                    const val = inp.value;
                    let id = "";
                    for (const opt of list.options) {
                        if (opt.value === val) {
                            id = opt.getAttribute(keyAttr) || "";
                            break;
                        }
                    }
                    hid.value = id;
                }

                inp.addEventListener('change', updateHidden);
                inp.addEventListener('blur', updateHidden);
            }

            // 선택적으로 제공되는 datalist에만 연결됨
            wireDatalist('accNameInput', 'accList', 'accIdHidden', 'data-id');
            wireDatalist('roomNameInput', 'roomList', 'roomIdHidden', 'data-id');
            wireDatalist('userNameInput', 'userList', 'userIdHidden', 'data-id');

            var s = /*[[${success}]]*/ null;
            var e = /*[[${error}]]*/   null;
            if (s) {
                alert(s);
            }
            if (e) {
                alert(e);
            }

            // === 이미지 미리보기 ===
            const fileInput = document.querySelector('input[name="files"]');
            const previewBox = document.getElementById('uploadPreview');
            let objectUrls = [];

            function clearPreviews() {
                // createObjectURL 해제
                objectUrls.forEach(url => URL.revokeObjectURL(url));
                objectUrls = [];
                if (previewBox) previewBox.innerHTML = '';
            }

            function renderPreviews(files) {
                if (!previewBox) return;
                clearPreviews();
                if (!files || files.length === 0) return;

                [...files].forEach(f => {
                    if (!f.type.startsWith('image/')) return;
                    const url = URL.createObjectURL(f);
                    objectUrls.push(url);

                    const wrap = document.createElement('div');
                    wrap.className = 'preview';
                    const img = document.createElement('img');
                    img.src = url;
                    const cap = document.createElement('div');
                    cap.className = 'name';
                    cap.textContent = f.name;

                    wrap.appendChild(img);
                    wrap.appendChild(cap);
                    previewBox.appendChild(wrap);
                });
            }

            if (fileInput) {
                fileInput.addEventListener('change', e => renderPreviews(e.target.files));
                // 폼 떠날 때 정리(선택)
                window.addEventListener('beforeunload', clearPreviews);
            }
        })();
    </script>
</th:block>
</body>
</html>
