<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>리뷰 목록</title>
    <th:block layout:fragment="head">
        <style>
            :root{
                --lilac:var(--honey-soft);
                --lilac-deep:var(--honey-deeper);
                --lilac-line:#C7BFF8;
                --mint:var(--success-soft);
                --ink:#0F172A;
                --slate:#475569;
                --line:#E9EDF5;
                --soft:#F7F9FC;
            }

            body{ background:var(--soft); }
            .fw-700{ font-weight:700; }

            /* 카드/테이블 */
            .card{ border:1px solid var(--line); border-radius:14px; box-shadow:0 8px 24px rgba(15,23,42,.05); }
            .table{ margin:0; width:100%; table-layout:fixed; } /* ← 고정 레이아웃 */
            .table thead th{
                background:#F5F7FF; color:#334155; font-weight:700;
                border-bottom:1px solid #E2E8F0 !important; vertical-align:middle;
            }
            .table tbody td{ vertical-align:middle; border-color:#EEF2F7; font-weight:600; color:#334155; }
            .table-hover tbody tr:hover{ background:#FAFBFF; }

            /* 컬럼별 말줄임 (이름/객실/작성자/내용 등) */
            .ellipsis{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
            .line-2{ display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

            /* 썸네일 플레이스홀더 */
            .thumb-empty{
                width:60px; height:60px; border-radius:9px; display:flex; align-items:center; justify-content:center;
                border:1px dashed #CBD5E1; color:#94A3B8; font-size:.76rem; background:linear-gradient(180deg,#fff,#FBFDFF);
            }
            .img-count-badge{
                font-size:.72rem; color:#475569; background:#EEF2FF; border:1px solid #E0E7FF;
                border-radius:999px; padding:.15rem .45rem; display:inline-block; margin-top:.35rem;
                font-weight:700;
            }

            /* 상태 뱃지 */
            .badge-status{
                font-weight:800; padding:.38rem .7rem; border-radius:999px; font-size:.78rem;
                border:1px solid transparent; letter-spacing:.2px;
            }
            .badge-visible { background:#DCFCE7; color:#166534; border-color:#BBF7D0; }
            .badge-hidden  { background:#F1F5F9; color:#334155; border-color:#E2E8F0; }
            .badge-reported{ background:#FEE2E2; color:#991B1B; border-color:#FECACA; }
            .badge-pending { background:#FEF3C7; color:#7C2D12; border-color:#FDE68A; }

            /* 상단 툴바 */
            .toolbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
            .toolbar h3{ font-weight:800; letter-spacing:.2px; color:var(--ink); }
            .count-chip{
                background:var(--honey-soft);
                color:var(--honey-deeper);
                font-weight:800; font-size:.82rem;
                border:1px solid var(--lilac-line);
                border-radius:9999px; padding:.35rem .7rem;
                margin-left:.5rem;
            }
            .filters{ display:flex; gap:.5rem; align-items:center; }
            .filters .form-select, .filters input[type="search"]{ font-weight:700; color:var(--slate); }

            /* 검색 버튼 / 세그먼트 / 메인 액션 */
            .btn-search{
                border-radius:12px; font-weight:700;
                background:var(--lilac-deep); color:#fff; border:1px solid var(--lilac-deep);
                padding:.4rem .9rem;
            }
            .btn-search:hover{ filter:brightness(1.05); }

            .seg{ display:inline-flex; align-items:center; border-radius:9999px; overflow:hidden; border:2px solid var(--lilac-deep); background:#fff; }
            .seg a{ padding:.4rem .85rem; font-weight:800; color:var(--honey-deeper); text-decoration:none; display:inline-flex; align-items:center; gap:.35rem; }
            .seg a + a{ border-left:1px solid var(--lilac-deep); }
            .seg a.active{ background:var(--honey-soft); color:var(--honey-deeper); }
            .seg .bi{ font-size:.95em; }

            .btn-primary-pill{ border-radius:9999px; padding:.45rem 1rem; font-weight:800; background:#3B82F6; border:1px solid #1D4ED8; color:#fff; }

            /* 내용 / 보조 텍스트 */
            .text-clip{ max-width:420px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#475569; font-weight:600; }
            .sub-muted{ font-size:.82rem; color:#94A3B8; margin-top:.2rem; font-weight:700; }

            /* 액션 알약 버튼 */
            .btn-pill{ --h:34px; height:var(--h); line-height:calc(var(--h) - 2px); padding:0 .9rem; border-radius:9999px; font-size:.875rem; font-weight:800; display:inline-flex; align-items:center; gap:.35rem; transition:transform .06s ease, box-shadow .2s ease, background-color .2s ease, border-color .2s ease, color .2s ease; }
            .btn-pill:active{ transform:translateY(1px) }
            .btn-pill-detail{ background:#fff; border:1.5px solid var(--lilac-deep); color:var(--honey-deeper); box-shadow:0 2px 10px rgba(15,23,42,.06); }
            .btn-pill-detail:hover{ background:#F5F3FF; }
            .btn-pill-toggle{ background:#fff; border:1.5px solid #FFD6E7; color:#BE185D; }
            .btn-pill-toggle:hover{ background:#FFF1F5; border-color:#F9A8D4; }
            .btn-pill .bi{ font-size:.9em; }

            /* 운영자 댓글 배지 */
            .reply-badge{ display:inline-flex; align-items:center; gap:.3rem; padding:.2rem .5rem; border-radius:999px; font-size:.72rem; font-weight:800; background:#F0EAFF; color:#5B21B6; border:1px solid #D9D2FF; white-space:nowrap; }
            .reply-badge .dot{ width:6px; height:6px; border-radius:50%; background:#5B21B6; display:inline-block; }

            /* 페이지네이션 */
            .pagination .page-link{ border:none; border-radius:10px; color:#475569; font-weight:700; }
            .pagination .page-item.active .page-link{ background:var(--honey-soft); color:var(--honey-deeper); font-weight:800; }
            .pagination .page-item:not(.active) .page-link:hover{ background:var(--mint); color:#0F766E; }


            /* ===== Reply bubble (운영자 답글 말풍선) - 강화 버전 ===== */
            .reply-wrap{
                margin-top:.6rem;
                display:flex; align-items:flex-start; gap:.6rem;
            }
            .reply-avatar{
                --s:32px;
                width:var(--s); height:var(--s);
                border-radius:50%;
                background:linear-gradient(180deg,#F0EAFF,#FFF);
                border:1px solid #DDD6FE;
                display:flex; align-items:center; justify-content:center;
                font-size:.82rem; color:#5B21B6; font-weight:900;
                flex:0 0 var(--s);
            }
            .reply-bubble{
                position:relative;
                background:#F8F7FF; border:1px solid #E5E0FF; color:#3F1D96;
                padding:.70rem .9rem; border-radius:14px;
                box-shadow:0 3px 12px rgba(93,63,211,.08);
                font-size:.92rem; line-height:1.6; font-weight:700;
                max-width:560px;   /* 리스트에서 더 시원하게 보이도록 넓힘 */
                z-index:1;         /* 꼬리가 다른 요소에 가려지지 않도록 */
            }
            .reply-bubble:before{
                content:""; position:absolute; left:-9px; top:14px; width:0; height:0;
                border-top:9px solid transparent; border-bottom:9px solid transparent;
                border-right:9px solid #E5E0FF;   /* 외곽 꼬리 */
            }
            .reply-bubble:after{
                content:""; position:absolute; left:-8px; top:15px; width:0; height:0;
                border-top:8px solid transparent; border-bottom:8px solid transparent;
                border-right:8px solid #F8F7FF;   /* 내부 꼬리 */
            }
            .reply-meta{ margin-top:.35rem; font-size:.78rem; color:#7C3AED; font-weight:800; }
            .reply-text{
                display:-webkit-box; -webkit-line-clamp:5; -webkit-box-orient:vertical;
                overflow:hidden; word-break:keep-all;
            }

            /* 리스트에서 내용 컬럼이 너무 좁으면 말풍선이 찌그러질 수 있어 폭 보정 */
            .table col:nth-child(6){ width: 360px; }  /* "내용" 컬럼 */
            .card .reply-bubble{ max-width:100%; }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 헤더/필터/뷰 토글 -->
    <div class="toolbar">
        <div class="d-flex align-items-center">
            <h3 class="mb-0">리뷰 관리</h3>
            <span class="count-chip" th:if="${page != null}" th:text="'총 ' + ${page.total} + '개'">총 0개</span>
        </div>

        <div class="d-flex align-items-center gap-2">
            <form class="filters" method="get" th:action="@{/admin/reviews/list}">
                <input type="hidden" name="view" th:value="${view != null ? view : 'list'}"/>
                <select name="status" class="form-select form-select-sm" style="width:auto">
                    <option value="">전체 상태</option>
                    <option value="VISIBLE"  th:selected="${status=='VISIBLE'}">노출</option>
                    <option value="HIDDEN"   th:selected="${status=='HIDDEN'}">숨김</option>
                    <option value="REPORTED" th:selected="${status=='REPORTED'}">신고</option>
                    <option value="PENDING"  th:selected="${status=='PENDING'}">검토중</option>
                </select>
                <select name="sort" class="form-select form-select-sm" style="width:auto">
                    <option value="latest"     th:selected="${sort=='latest'}">최신순</option>
                    <option value="ratingDesc" th:selected="${sort=='ratingDesc'}">평점 높은순</option>
                    <option value="ratingAsc"  th:selected="${sort=='ratingAsc'}">평점 낮은순</option>
                </select>
                <input type="hidden" name="page" th:value="${pageRequestDTO.page}">
                <input type="hidden" name="size" th:value="${pageRequestDTO.size}">
                <button class="btn btn-search">검색</button>
            </form>

            <div class="seg">
                <a th:classappend="${view}=='list' ? ' active' : ''"
                   th:href="@{/admin/reviews/list(view='list', status=${status}, sort=${sort}, page=${pageRequestDTO.page}, size=${pageRequestDTO.size})}">
                    <i class="bi bi-table"></i> 리스트
                </a>
                <a th:classappend="${view}=='grid' ? ' active' : ''"
                   th:href="@{/admin/reviews/list(view='grid', status=${status}, sort=${sort}, page=${pageRequestDTO.page}, size=${pageRequestDTO.size})}">
                    <i class="bi bi-grid-3x3-gap"></i> 카드
                </a>
            </div>

            <a th:href="@{/admin/accommodations/add}" class="btn btn-primary-pill">+ 새 숙소 등록</a>
        </div>
    </div>

    <!-- 리스트 뷰 -->
    <div class="card" th:if="${view}=='list'">
        <div class="card-body table-responsive">
            <table class="table table-hover align-middle">
                <!-- 고정 폭으로 컬럼 구성 : 이름/객실이 너무 줄지 않게 -->
                <colgroup>
                    <col style="width:60px">   <!-- NO -->
                    <col style="width:90px">   <!-- 이미지 -->
                    <col style="width:320px">  <!-- 숙소/객실 -->
                    <col style="width:140px">  <!-- 작성자 -->
                    <col style="width:110px">  <!-- 평점 -->
                    <col>                       <!-- 내용 (가변) -->
                    <col style="width:120px">  <!-- 상태 -->
                    <col style="width:160px">  <!-- 작성일 -->
                    <col style="width:200px">  <!-- 액션 -->
                </colgroup>

                <thead>
                <tr>
                    <th>NO</th>
                    <th>이미지</th>
                    <th>숙소/객실</th>
                    <th>작성자</th>
                    <th>평점</th>
                    <th>내용</th>
                    <th>상태</th>
                    <th>작성일</th>
                    <th>액션</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${page == null or #lists.isEmpty(page.dtoList)}">
                    <td colspan="9" class="text-center text-muted py-4">리뷰가 없습니다.</td>
                </tr>

                <tr th:each="review, stat : ${page.dtoList}">
                    <td th:text="${(pageRequestDTO.page - 1) * pageRequestDTO.size + stat.index + 1}">1</td>

                    <!-- 이미지 (썸네일 + 개수 배지) -->
                    <td>
                        <!-- 썸네일이 있으면 표시 -->
                        <img th:if="${thumbUrlMap[review.reviewId] != null}"
                             th:src="${thumbUrlMap[review.reviewId]}"
                             alt="thumbnail"
                             style="width:60px;height:60px;object-fit:cover;border-radius:9px;border:1px solid #E2E8F0;" />

                        <!-- 없으면 플레이스홀더 -->
                        <div class="thumb-empty"
                             th:if="${thumbUrlMap[review.reviewId] == null}">
                            이미지
                        </div>

                        <!-- 이미지 개수 뱃지 -->
                        <div class="img-count-badge"
                             th:if="${imageCountMap[review.reviewId] != null and imageCountMap[review.reviewId] > 0}"
                             th:text="${imageCountMap[review.reviewId]} + '장'">0장</div>
                    </td>

                    <!-- 숙소/객실 (가로 말줄임) -->
                    <td>
                        <div class="fw-700 ellipsis"
                             th:title="${review.accommodationName != null ? review.accommodationName : '숙소ID: ' + review.accommodationId}"
                             th:text="${review.accommodationName != null ? review.accommodationName : '숙소ID: ' + review.accommodationId}">숙소명</div>
                        <div class="sub-muted ellipsis"
                             th:title="${review.roomName != null ? review.roomName : '객실ID: ' + review.roomId}"
                             th:text="${review.roomName != null ? review.roomName : '객실ID: ' + review.roomId}">객실명</div>
                    </td>

                    <!-- 작성자 -->
                    <td class="fw-700 ellipsis"
                        th:title="${review.userName != null ? review.userName : review.userId}"
                        th:text="${review.userName != null ? review.userName : review.userId}">작성자</td>

                    <!-- 평점(⭐️ 포함) -->
                    <td class="fw-700">
                        <i class="bi bi-star-fill text-warning"></i>
                        <span th:text="${review.rating != null ? #numbers.formatDecimal(review.rating,1,'POINT',1,'POINT') : '-'}">-</span>
                    </td>

                    <!-- 내용 + 운영자 댓글 배지 -->
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="ellipsis" th:text="${review.content != null ? review.content : ''}">내용 미리보기</div>
                            <span class="reply-badge"
                                  th:if="${review.reply != null and !#strings.isEmpty(review.reply)}">
                                <span class="dot"></span> 운영자 댓글 (1건)
                            </span>
                        </div>

                        <!-- 운영자 답글 말풍선 -->
                        <div class="reply-wrap"
                             th:if="${review.reply != null and !#strings.isEmpty(review.reply)}">
                            <div class="reply-avatar">OP</div>
                            <div class="reply-bubble">
                                <div class="reply-text" th:text="${review.reply}">답글 내용</div>
                                <div class="reply-meta"
                                     th:text="${review.updatedAt != null ? '운영자 · ' + #temporals.format(review.updatedAt,'yyyy-MM-dd HH:mm') : '운영자'}">
                                    운영자 · 2025-09-07 12:00
                                </div>
                            </div>
                        </div>
                    </td>

                    <!-- 상태 -->
                    <td>
                        <span class="badge-status"
                              th:classappend="${
                                review.status=='VISIBLE'  ? ' badge-visible'  :
                                review.status=='HIDDEN'   ? ' badge-hidden'   :
                                review.status=='REPORTED' ? ' badge-reported' :
                                                            ' badge-pending'
                              }"
                              th:text="${review.status}">VISIBLE</span>
                    </td>

                    <!-- 작성일 -->
                    <td class="fw-700 ellipsis"
                        th:text="${review.createdAt != null ? #temporals.format(review.createdAt,'yyyy-MM-dd HH:mm') : '-'}">-</td>

                    <!-- 액션 -->
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <a class="btn btn-pill btn-pill-detail"
                               th:href="@{/admin/reviews/detail/{id}(id=${review.reviewId})}">
                                <i class="bi bi-search"></i> 상세
                            </a>
                            <form th:action="@{/admin/reviews/{id}/toggle(id=${review.reviewId})}" method="post"
                                  onsubmit="this.querySelector('button[type=submit]').disabled=true;">
                                <input type="hidden" th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="view"   th:value="${view}">
                                <input type="hidden" name="status" th:value="${status}">
                                <input type="hidden" name="sort"   th:value="${sort}">
                                <input type="hidden" name="page"   th:value="${pageRequestDTO.page}">
                                <input type="hidden" name="size"   th:value="${pageRequestDTO.size}">
                                <button type="submit" class="btn btn-pill btn-pill-toggle"
                                        th:text="${review.status=='VISIBLE' ? '숨김' : '노출'}"></button>
                            </form>
                        </div>
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <!-- 카드 뷰 -->
    <div th:if="${view}=='grid'">
        <div class="row g-3">
            <div class="col-12 col-sm-6 col-lg-4" th:each="review : ${page.dtoList}">
                <div class="card shadow-sm h-100 border-0" style="border-radius:14px; overflow:hidden;">
                    <!-- 이미지 영역 -->
                    <div class="position-relative" style="background:#F7F8FB; height:180px; overflow:hidden;">
                        <!-- 썸네일 -->
                        <img th:if="${thumbUrlMap[review.reviewId] != null}"
                             th:src="${thumbUrlMap[review.reviewId]}"
                             alt="thumbnail"
                             style="width:100%;height:100%;object-fit:cover;display:block;" />
                        <!-- 없으면 플레이스홀더 -->
                        <div th:if="${thumbUrlMap[review.reviewId] == null}"
                             class="d-flex align-items-center justify-content-center h-100"
                             style="color:#94A3B8; font-weight:700;">
                            이미지 없음
                        </div>
                        <!-- 이미지 개수 뱃지 -->
                        <span th:if="${imageCountMap[review.reviewId] != null and imageCountMap[review.reviewId] > 0}"
                              class="badge bg-dark position-absolute end-0 m-2"
                              th:text="${imageCountMap[review.reviewId]} + '장'">0장</span>
                        <!-- 운영자 댓글 배지 -->
                        <span class="reply-badge position-absolute m-2"
                              style="top:0; left:0;"
                              th:if="${review.reply != null and !#strings.isEmpty(review.reply)}">
        <span class="dot"></span> 운영자 댓글 (1건)
      </span>

                        <!-- 운영자 답글 말풍선 -->
                        <div class="reply-wrap"
                             th:if="${review.reply != null and !#strings.isEmpty(review.reply)}">
                            <div class="reply-avatar">OP</div>
                            <div class="reply-bubble">
                                <div class="reply-text" th:text="${review.reply}">답글 내용</div>
                                <div class="reply-meta"
                                     th:text="${review.updatedAt != null ? '운영자 · ' + #temporals.format(review.updatedAt,'yyyy-MM-dd HH:mm') : '운영자'}">
                                    운영자 · 2025-09-07 12:00
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-body">
                        <div class="d-flex align-items-start justify-content-between mb-2">
                            <div class="fw-700 ellipsis"
                                 th:title="${review.accommodationName != null ? review.accommodationName : '숙소ID: ' + review.accommodationId}"
                                 th:text="${review.accommodationName != null ? review.accommodationName : '숙소ID: ' + review.accommodationId}">숙소명</div>
                            <span class="badge-status"
                                  th:classappend="${
                review.status=='VISIBLE'  ? ' badge-visible' :
                review.status=='HIDDEN'   ? ' badge-hidden'  :
                review.status=='REPORTED' ? ' badge-reported':
                                            ' badge-pending'}"
                                  th:text="${review.status}">VISIBLE</span>
                        </div>

                        <div class="text-muted small mb-1 fw-700 ellipsis"
                             th:title="${review.roomName != null ? review.roomName : '객실ID: ' + review.roomId}"
                             th:text="${review.roomName != null ? review.roomName : '객실ID: ' + review.roomId}">객실명</div>

                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <div class="small text-secondary fw-700 ellipsis"
                                 th:title="${review.userName != null ? review.userName : review.userId}"
                                 th:text="${review.userName != null ? review.userName : review.userId}">작성자</div>
                            <div class="fw-700">
                                <i class="bi bi-star-fill text-warning"></i>
                                <span th:text="${review.rating != null ? #numbers.formatDecimal(review.rating,1,'POINT',1,'POINT') : '-'}">-</span>
                            </div>
                        </div>

                        <div class="line-2 small" style="color:#475569; font-weight:600;"
                             th:text="${review.content != null ? review.content : ''}">
                            내용 미리보기
                        </div>

                        <div class="text-muted small mt-2 fw-700"
                             th:text="${review.createdAt != null ? #temporals.format(review.createdAt,'yyyy-MM-dd HH:mm') : '-'}">-</div>
                    </div>

                    <div class="card-footer bg-white border-0 pt-0 pb-3 px-3">
                        <div class="d-flex gap-2">
                            <a class="btn btn-pill btn-pill-detail"
                               th:href="@{/admin/reviews/detail/{id}(id=${review.reviewId})}">
                                <i class="bi bi-search"></i> 상세
                            </a>
                            <form th:action="@{/admin/reviews/{id}/toggle(id=${review.reviewId})}" method="post"
                                  onsubmit="this.querySelector('button[type=submit]').disabled=true;">
                                <input type="hidden" th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="view"   th:value="${view}">
                                <input type="hidden" name="status" th:value="${status}">
                                <input type="hidden" name="sort"   th:value="${sort}">
                                <input type="hidden" name="page"   th:value="${pageRequestDTO.page}">
                                <input type="hidden" name="size"   th:value="${pageRequestDTO.size}">
                                <button type="submit" class="btn btn-pill btn-pill-toggle"
                                        th:text="${review.status=='VISIBLE' ? '숨김' : '노출'}"></button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

    <!-- 페이지네이션 -->
    <nav class="mt-3" th:if="${page != null && page.total > 0}">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${pageRequestDTO.page == 1}? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/reviews/list(view=${view}, page=${pageRequestDTO.page-1}, size=${pageRequestDTO.size}, status=${status}, sort=${sort})}">&laquo;</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(1, page.totalPages)}"
                th:classappend="${i == pageRequestDTO.page}? 'active'">
                <a class="page-link"
                   th:href="@{/admin/reviews/list(view=${view}, page=${i}, size=${pageRequestDTO.size}, status=${status}, sort=${sort})}"
                   th:text="${i}">1</a>
            </li>
            <li class="page-item" th:classappend="${pageRequestDTO.page == page.totalPages}? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/reviews/list(view=${view}, page=${pageRequestDTO.page+1}, size=${pageRequestDTO.size}, status=${status}, sort=${sort})}">&raquo;</a>
            </li>
        </ul>
    </nav>

</th:block>

<th:block layout:fragment="body-end">
    <script th:inline="javascript">
        (function () {
            var s = /*[[${success}]]*/ null;
            var e = /*[[${error}]]*/   null;
            if (s) alert(s);
            if (e) alert(e);
        })();
    </script>
</th:block>
</body>
</html>
