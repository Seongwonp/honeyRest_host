<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>객실 수정</title>
    <th:block layout:fragment="head"></th:block>
</head>

<body>
<th:block layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0 fw-bold">객실 수정</h3>
        <a class="btn btn-light" th:href="@{/admin/rooms/list_all}">목록</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{|/admin/rooms/${form.roomId}|}" th:object="${form}" method="post">
                <!-- CSRF -->
<!--                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->

                <input type="hidden" th:field="*{roomId}"/>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">객실명</label>
                        <input type="text" class="form-control" th:field="*{roomName}" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">타입</label>
                        <select class="form-select" th:field="*{type}">
                            <option value="Standard">Standard</option>
                            <option value="Deluxe">Deluxe</option>
                            <option value="Suite">Suite</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">상태</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="ACTIVE">ACTIVE</option>
                            <option value="INACTIVE">INACTIVE</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">가격</label>
                        <input type="number" class="form-control" th:field="*{price}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">기준 인원</label>
                        <input type="number" class="form-control" th:field="*{standardOccupancy}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">최대 인원</label>
                        <input type="number" class="form-control" th:field="*{maxOccupancy}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">추가 인원 요금</label>
                        <input type="number" class="form-control" th:field="*{extraPersonFee}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">보유수(재고)</label>
                        <input type="number" class="form-control" th:field="*{totalRooms}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">숙소</label>
                        <select class="form-select" th:field="*{accommodationId}">
                            <option th:each="a : ${accommodations}"
                                    th:value="${a.accommodationId}"
                                    th:selected="${a.accommodationId} == ${form.accommodationId}"
                                    th:text="${a.name}">
                            </option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">설명</label>
                        <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="file">피일찾기</label>
                        <input type="file" class="form-control" id="file" name="file" required>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">수정</button>
                    <a class="btn btn-light"
                       th:href="@{/admin/rooms/list/by-accommodation(accommodationId=${form.accommodationId})}">
                        취소
                    </a>
                </div>
            </form>
        </div>
    </div>

</th:block>

<th:block layout:fragment="script"></th:block>
</body>
</html>
