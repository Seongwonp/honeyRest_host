<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>객실 수정</title>
    <th:block layout:fragment="head">
        <style>
            /* 섹션 구분(연한 카드 느낌) */
            .form-section {
                background: #fafbff;
                border: 1px solid #eef2f7;
                border-radius: 12px;
                padding: 16px;
            }

            /* time 인풋이 붙어도 깨지지 않게 */
            .input-group .form-control {
                min-width: 0;
            }

            /* 텍스트영역 기본 높이 살짝 통일 */
            textarea.form-control {
                min-height: 56px;
            }

            /* 라벨 시각적 강조 조금 */
            .form-label {
                font-weight: 600;
                color: #334155;
            }

            .form-label {
                font-weight: 600;
            }

            .input-group .form-control-lg {
                padding-top: .6rem;
                padding-bottom: .6rem;
            }

        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0 fw-bold">객실 수정</h3>
        <a class="btn btn-light" th:href="@{/admin/rooms/list_all}">목록</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{|/admin/rooms/${form.roomId}|}" th:object="${form}" method="post"
                  enctype="multipart/form-data">

                <!-- ★ form 내부 시작 -->
                <input type="hidden" th:field="*{roomId}"/>

                <!-- 1행: 객실명 / 타입 / 체크인~체크아웃 -->
                <div class="row g-3">
                    <div class="col-lg-6">
                        <label class="form-label">객실명</label>
                        <input type="text" class="form-control" th:field="*{roomName}" required>
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label class="form-label">타입</label>
                        <select class="form-select" th:field="*{type}">
                            <option value="">-- 선택 --</option>
                            <option value="Standard">Standard</option>
                            <option value="Deluxe">Deluxe</option>
                            <option value="Suite">Suite</option>
                        </select>
                    </div>

<!--                    <div class="col-lg-3 col-md-6">-->
                        <!-- detail.html (표시) -->
                    <div class="col-lg-3 col-md-6">
                        <label class="form-label">체크인 / 체크아웃 <small class="text-muted">(숙소 기준)</small></label>
                        <div class="form-control-plaintext">
                            <span th:text="${form.displayCheckInTime != null ? #temporals.format(form.displayCheckInTime,'HH:mm') : '-'}"></span>
                            &nbsp;~&nbsp;
                            <span th:text="${form.displayCheckOutTime != null ? #temporals.format(form.displayCheckOutTime,'HH:mm') : '-'}"></span>
                        </div>
                    </div>
                </div>


                <div class="row g-3 mt-1">
                    <div class="col-lg-3 col-md-6">
                        <label class="form-label">상태</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="">-- 선택 --</option>
                            <option value="ACTIVE">ACTIVE</option>
                            <option value="INACTIVE">INACTIVE</option>
                        </select>
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label class="form-label">가격</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{price}">
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label class="form-label">기준 인원</label>
                        <input type="number" class="form-control" th:field="*{standardOccupancy}">
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label class="form-label">최대 인원</label>
                        <input type="number" class="form-control" th:field="*{maxOccupancy}">
                    </div>
                </div>

                <div class="row g-3 mt-1">
                    <div class="col-lg-3 col-md-6">
                        <label class="form-label">추가 인원 요금</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{extraPersonFee}">
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label class="form-label">보유수(재고)</label>
                        <input type="number" class="form-control" th:field="*{totalRooms}">
                    </div>

                    <div class="col-lg-6">
                        <label class="form-label">숙소</label>
                        <select class="form-select" th:field="*{accommodationId}">
                            <option th:each="a : ${accommodations}"
                                    th:value="${a.accommodationId}"
                                    th:selected="${a.accommodationId} == ${form.accommodationId}"
                                    th:text="${a.name}">
                            </option>
                        </select>
                    </div>
                </div>


                <!-- 설명 / 편의시설 / 침대 / 환불정책 (섹션 카드) -->
                <div class="form-section row g-3 mt-2">
                    <div class="col-12">
                        <label class="form-label">설명</label>
                        <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                    </div>

                    <div class="col-12">
                        <label class="form-label">편의시설</label>
                        <textarea class="form-control" rows="2" th:field="*{amenities}"
                                  placeholder="예) 와이파이,주차,수영장"></textarea>
                        <small class="text-muted">쉼표(,)로 구분하세요. 비워두면 저장 시 빈 목록 처리됩니다.</small>
                    </div>

                    <div class="col-12">
                        <label class="form-label">침대 구성</label>
                        <textarea class="form-control" rows="2" th:field="*{bedInfo}"
                                  placeholder='예) ["킹침대2개","객실+욕실"] 또는 킹침대2개, 객실+욕실'></textarea>
                        <small class="text-muted">쉼표(,) 또는 JSON 배열 형태 모두 저장 가능해요.</small>
                    </div>

                </div>

                <div class="row g-3 mt-3">
                    <!-- LEFT: 메인(0번) 큰 미리보기 -->
                    <div class="col-12">
                        <!-- 메인 이미지(한 장) -->
                        <label class="form-label">메인 이미지(1장)</label>
                        <input type="file" class="form-control" th:field="*{file}" accept="image/*">
                        <div id="mainPreview" class="mt-2"></div>
                    </div>

                    <!-- 서브 이미지(여러 장) -->
                    <div class="col-12">
                        <label class="form-label mt-3">추가 이미지(여러 장)</label>
                        <!-- ★ DTO: List<MultipartFile> files 와 이름을 맞춤 -->
                        <input type="file" class="form-control" th:field="*{files}" accept="image/*" multiple>
                        <div class="form-text">여러 장 선택 가능. 서버에서 업로드 순서대로 SUB(1,2,3,…)로 저장합니다.</div>

                        <!-- 이미 저장된 이미지 미리보기 -->
                        <div class="row mt-3" th:if="${form.images}">
                            <div class="col-md-4" th:if="${#lists.size(form.images) > 0}">
                                <div class="small text-muted mb-1">메인(0)</div>
                                <img class="img-fluid rounded border" th:src="${form.images.get(0).imageUrl}"
                                     alt="main">
                            </div>

                            <div class="col-md-8">
                                <div class="small text-muted mb-1">서브(1,2,3…)</div>
                                <div class="d-flex flex-wrap gap-2">
                                    <img class="rounded border" style="width:120px;height:120px;object-fit:cover"
                                         th:each="img, iStat : ${form.images}"
                                         th:if="${iStat.index > 0}"
                                         th:src="${img.imageUrl}"
                                         th:alt="|sub ${iStat.index}|">
                                </div>
                            </div>
                        </div>


                        <!-- 메인 아래에 서브 이미지 미리보기 로직 -->
                        <!-- 서브(1~) 썸네일 -->
<!--                        <div id="subsPreview" class="row mt-2"></div>-->
<!--                        <div class="col-md-8">-->
<!--                            <div class="small text-muted mb-1">서브(1,2,3…)</div>-->
<!--                            <div class="d-flex flex-wrap gap-2">-->
<!--                                <img class="rounded border" style="width:120px;height:120px;object-fit:cover"-->
<!--                                     th:each="img, iStat : ${form.images}"-->
<!--                                     th:if="${iStat.index > 0}"-->
<!--                                     th:src="${img.imageUrl}"-->
<!--                                     th:alt="|sub ${iStat.index}|">-->
<!--                            </div>-->
<!--                        </div>-->

                    </div>

                    <div class="mt-4">
                        <button class="btn btn-primary" type="submit">저장</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

</th:block>

<th:block layout:fragment="script">
    <script>
        // 메인 파일 미리보기
        document.getElementById('mainFile')?.addEventListener('change', e => {
            const wrap = document.getElementById('mainPreview');
            wrap.innerHTML = '';
            const f = e.target.files?.[0];
            if (!f) return;
            const img = document.createElement('img');
            img.style.maxWidth = '200px';
            img.style.borderRadius = '8px';
            img.src = URL.createObjectURL(f);
            wrap.appendChild(img);
        });

        // 서브 파일들 미리보기
        document.getElementById('subFiles')?.addEventListener('change', e => {
            const wrap = document.getElementById('subsPreview');
            wrap.innerHTML = '';
            [...(e.target.files || [])].forEach((f, i) => {
                const col = document.createElement('div');
                col.className = 'col-6 col-md-3';
                col.innerHTML =
                    `<div class="position-relative border rounded overflow-hidden">
           <img style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:.25rem">
           <span class="badge bg-dark bg-opacity-75 position-absolute top-0 start-0 m-1">새 ${i + 1}</span>
         </div>`;
                col.querySelector('img').src = URL.createObjectURL(f);
                wrap.appendChild(col);
            });
        });
    </script>

</th:block>
</body>
</html>
