<!-- templates/admin/rooms/list.html -->
<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
  <title>객실 목록</title>
  <th:block layout:fragment="head">
    <style>
      .status-badge{padding:.35em .65em;border-radius:.25rem;font-size:.75rem;font-weight:600}
      .status-active{background:#e7f1ff;color:#0a58ca}
      .status-inactive{background:#f8d7da;color:#842029}
      .table thead th{vertical-align:middle}
    </style>
  </th:block>
</head>
<body>
<th:block layout:fragment="content">

  <!-- 헤더 -->
  <div class="page-heading d-flex justify-content-between align-items-center">
    <div>
      <h3 class="mb-1">
        객실 목록
        <span th:if="${accommodationName != null}">· <span th:text="${accommodationName}">숙소명</span></span>
      </h3>
      <div class="text-muted small" th:if="${accommodationId != null}">
        숙소 ID: <span th:text="${accommodationId}">0</span>
      </div>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-light" th:href="@{/admin/accommodations/list}">← 숙소 목록</a>
      <a class="btn btn-primary"
         th:href="@{/admin/rooms/add(accommodationId=${accommodationId})}">+ 객실 등록</a>
    </div>
  </div>

  <!-- 표 -->
  <div class="card mt-3">
    <div class="card-body table-responsive">
      <table class="table table-hover table-sm align-middle">
        <colgroup>
          <col style="width:80px"><!-- 번호 -->
          <col><!-- 객실명 -->
          <col style="width:140px"><!-- 유형 -->
          <col style="width:140px"><!-- 정원 -->
          <col style="width:140px"><!-- 가격 -->
          <col style="width:120px"><!-- 상태 -->
          <col style="width:170px"><!-- 액션 -->
        </colgroup>

        <thead class="table-light">
        <tr>
          <th class="text-center">번호</th>
          <th>객실명</th>
          <th>유형</th>
          <th class="text-center">정원(기준/최대)</th>
          <th class="text-end">가격(원)</th>
          <th class="text-center">상태</th>
          <th class="text-center">액션</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="room, iter : ${page.content}">
          <!-- 번호: 전체 페이지 기준 순번 -->
          <td class="text-center"
              th:text="${room.roomId}">1</td>

          <td class="fw-semibold" th:text="${room.name}">디럭스 트윈</td>
          <td th:text="${room.type}">Standard</td>

          <td class="text-center"
              th:text="|${room.standardOccupancy} / ${room.maxOccupancy}|">2 / 3</td>

          <td class="text-end"
              th:text="|${#numbers.formatDecimal(room.price,0,'COMMA',0,'POINT')}|">120,000</td>

          <td class="text-center">
            <span class="status-badge"
                  th:classappend="${#strings.equalsIgnoreCase(room.status,'ACTIVE') ? ' status-active' : ' status-inactive'}"
                  th:text="${room.status}">ACTIVE</span>
          </td>

          <td class="text-center">
            <div class="btn-group btn-group-sm" role="group">
              <a class="btn btn-outline-secondary"
                 th:href="@{/admin/rooms/edit/{id}(id=${room.roomId})}">수정</a>
              <form th:action="@{/admin/rooms/delete/{id}(id=${room.roomId})}"
                    method="post" class="d-inline"
                    onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <button type="submit" class="btn btn-outline-danger">삭제</button>
              </form>
            </div>
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(page.content)}">
          <td colspan="7" class="text-center text-muted py-4">등록된 객실이 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 페이징 -->
  <nav th:if="${page.totalPages > 1}" class="mt-3">
    <ul class="pagination pagination-sm justify-content-center mb-0">
      <li class="page-item" th:classappend="${page.first} ? ' disabled'">
        <a class="page-link"
           th:href="@{/admin/rooms/list/by-accommodation(
                     accommodationId=${accommodationId},
                     page=${page.number-1}, size=${page.size})}">이전</a>
      </li>

      <li class="page-item"
          th:each="p : ${#numbers.sequence(0, page.totalPages-1)}"
          th:classappend="${p==page.number} ? ' active'">
        <a class="page-link"
           th:text="${p+1}"
           th:href="@{/admin/rooms/list/by-accommodation(
                     accommodationId=${accommodationId},
                     page=${p}, size=${page.size})}">1</a>
      </li>

      <li class="page-item" th:classappend="${page.last} ? ' disabled'">
        <a class="page-link"
           th:href="@{/admin/rooms/list/by-accommodation(
                     accommodationId=${accommodationId},
                     page=${page.number+1}, size=${page.size})}">다음</a>
      </li>
    </ul>
  </nav>

</th:block>
</body>
</html>
