<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>객실 등록</title>
    <th:block layout:fragment="head">
        <style>
            body { background:#f7f9fc; }
            .card { border:1px solid #e9edf5; border-radius:14px; box-shadow:0 8px 24px rgba(15,23,42,.05); }
            .hint{ color:#6b7280; font-size:.9rem; }
            .required::after{ content:" *"; color:#ef4444; }
            .btn-chip{ border-radius:999px; padding:.45rem .9rem; font-weight:700; font-size:.9rem; }
            .btn-ghost{ background:#fff; border:1.5px solid #2563eb; color:#1d4ed8; }
            .btn-ghost:hover{ background:#eff6ff; }
            .btn-soft{ background:#f8fafc; border:1px solid #e5e7eb; color:#334155; }
            .btn-soft:hover{ background:#eef2f7; }

            /* 미리보기 */
            .preview-thumb{ width:160px; height:160px; object-fit:cover; border-radius:12px; border:1px solid #e5e7eb; background:#f6f6f6; }
            .preview-sub-wrap{ width:120px; height:120px; position:relative; }
            .preview-sub{ width:120px; height:120px; object-fit:cover; border-radius:10px; border:1px solid #e5e7eb; background:#f6f6f6; }
            .btn-x{
                position:absolute; top:4px; right:4px; width:26px; height:26px;
                padding:0; line-height:1; font-weight:800;
                border-radius:999px; background:#fff; border:1px solid #e5e7eb;
            }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-2">
        <div>
            <h3 class="mb-1">객실 등록</h3>
            <div class="text-muted">숙소별로 여러 개의 객실을 등록할 수 있어요.</div>
        </div>
        <a class="btn btn-soft btn-chip"
           th:href="${form.accommodationId} != null
                    ? @{/admin/rooms/list/by-accommodation(accommodationId=${form.accommodationId})}
                    : @{/admin/accommodations/list}">
            ← 돌아가기
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/rooms/add}"
                  th:object="${form}"
                  method="post"
                  enctype="multipart/form-data"
                  class="row g-3">

                <!-- CSRF (프로젝트 설정에 맞게 해제) -->
                <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/> -->

                <!-- 숙소 선택 -->
                <div class="col-md-6">
                    <label class="form-label required">숙소</label>
                    <select class="form-select" th:field="*{accommodationId}" required>
                        <!-- 항상 첫 줄은 '선택하세요' -->
                        <option value="" th:selected="${form.accommodationId == null}">선택하세요</option>
                        <!-- 컨트롤러에서 accommodations = 로그인 회사의 숙소만 주입 -->
                        <option th:each="a : ${accommodations}"
                                th:value="${a.accommodationId}"
                                th:text="|[${a.accommodationId}] ${a.name}|"
                                th:selected="${form.accommodationId == a.accommodationId}">
                        </option>
                    </select>
                    <div class="hint">로그인한 회사의 숙소만 표시됩니다.</div>
                </div>

                <!-- 객실명 -->
                <div class="col-md-6">
                    <label class="form-label required">객실명</label>
                    <input type="text" class="form-control" th:field="*{roomName}" placeholder="예) 디럭스 트윈" required>
                </div>

                <!-- 유형(enum) -->
                <div class="col-md-4">
                    <label class="form-label required">객실 유형</label>
                    <select class="form-select" th:field="*{type}" required>
                        <option value="" th:selected="${form.type == null}">선택</option>
                        <option value="Standard">Standard</option>
                        <option value="Deluxe">Deluxe</option>
                        <option value="Suite">Suite</option>
                    </select>
                </div>

                <!-- 가격/정원/추가요금 -->
                <div class="col-md-4">
                    <label class="form-label required">가격(원)</label>
                    <input type="number" min="0" step="100" class="form-control" th:field="*{price}" placeholder="예) 120000" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label required">총 객실 수</label>
                    <input type="number" min="1" class="form-control" th:field="*{totalRooms}" placeholder="예) 10" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label required">기준 인원</label>
                    <input type="number" min="1" class="form-control" th:field="*{standardOccupancy}" placeholder="예) 2" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label required">최대 인원</label>
                    <input type="number" min="1" class="form-control" th:field="*{maxOccupancy}" placeholder="예) 3" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">추가 인원 요금(원)</label>
                    <input type="number" min="0" step="1000" class="form-control" th:field="*{extraPersonFee}" placeholder="예) 15000">
                </div>

                <!-- 침대/편의/설명 -->
                <div class="col-12">
                    <label class="form-label">침대 정보 (쉼표로 구분)</label>
                    <input type="text" class="form-control" th:field="*{bedInfo}" placeholder="예) 더블베드1, 싱글베드1">
                    <div class="hint">쉼표(,)로 구분해서 입력해주세요</div>
                </div>

                <div class="col-12">
                    <label class="form-label">편의시설 (쉼표로 구분)</label>
                    <input type="text" class="form-control" th:field="*{amenities}" placeholder="예) TV, 와이파이, 에어컨">
                    <div class="hint">쉼표(,)로 구분해서 입력해주세요</div>
                </div>

                <div class="col-12">
                    <label class="form-label">설명</label>
                    <textarea rows="4" class="form-control" th:field="*{description}" placeholder="객실에 대한 상세 설명을 입력하세요."></textarea>
                </div>

                <!-- 이미지 업로드 -->
                <div class="col-12">
                    <div class="row g-3">
                        <!-- 메인 1장 -->
                        <div class="col-lg-6">
                            <label class="form-label">메인 이미지(1장)</label>
                            <input type="file" id="mainImage" class="form-control" th:field="*{file}" accept="image/*">
                            <div class="hint">메인 이미지는 목록/상세 상단에 노출돼요.</div>
                            <div class="mt-2" id="mainPreviewBox">
                                <img id="mainPreview" class="preview-thumb" alt="main preview" style="display:none;">
                            </div>
                        </div>

                        <!-- 서브 N장 -->
                        <div class="col-lg-6">
                            <label class="form-label">추가 이미지(여러 장)</label>
                            <input type="file" id="subImages" class="form-control" th:field="*{files}" accept="image/*" multiple>
                            <div class="hint">여러 장 선택 가능. 저장하면 메인 다음 순서로 저장됩니다.</div>
                            <div class="d-flex flex-wrap gap-2 mt-2" id="subPreview"></div>
                        </div>
                    </div>
                </div>

                <!-- 상태 -->
                <div class="col-md-4">
                    <label class="form-label">상태</label>
                    <select class="form-select" th:field="*{status}">
                        <option value="ACTIVE" selected>ACTIVE</option>
                        <option value="INACTIVE">INACTIVE</option>
                    </select>
                </div>

                <div class="col-12 mt-1 d-flex gap-2">
                    <button type="submit" class="btn btn-ghost btn-chip">저장</button>
                    <a class="btn btn-soft btn-chip"
                       th:href="${form.accommodationId} != null
                                ? @{/admin/rooms/list/by-accommodation(accommodationId=${form.accommodationId})}
                                : @{/admin/rooms/list_all}">
                        취소
                    </a>
                </div>
            </form>
        </div>
    </div>
</th:block>

<th:block layout:fragment="body-end">
    <script>
        (function(){
            /* --- 메인 이미지 미리보기 --- */
            const mainInput = document.getElementById('mainImage');
            const mainPreview = document.getElementById('mainPreview');
            if(mainInput && mainPreview){
                mainInput.addEventListener('change', (e)=>{
                    const f = e.target.files && e.target.files[0];
                    if(!f){ mainPreview.style.display='none'; mainPreview.src=''; return; }
                    const url = URL.createObjectURL(f);
                    mainPreview.src = url;
                    mainPreview.style.display = 'inline-block';
                });
            }

            /* --- 서브 이미지 미리보기 + 개별 제거(X) --- */
            const subInput = document.getElementById('subImages');
            const subBox = document.getElementById('subPreview');

            function rebuildSubPreview(){
                subBox.innerHTML = '';
                const files = Array.from(subInput.files || []);
                files.forEach((f, idx)=>{
                    if(!f.type.startsWith('image/')) return;
                    const url = URL.createObjectURL(f);

                    const wrap = document.createElement('div');
                    wrap.className = 'preview-sub-wrap';

                    const img = document.createElement('img');
                    img.className = 'preview-sub';
                    img.src = url;
                    img.alt = f.name || ('image-'+idx);

                    const x = document.createElement('button');
                    x.type = 'button';
                    x.className = 'btn-x';
                    x.textContent = '×';
                    x.title = '이 파일 제거';
                    x.addEventListener('click', ()=>{
                        const dt = new DataTransfer();
                        Array.from(subInput.files).forEach((file,i)=>{ if(i!==idx) dt.items.add(file); });
                        subInput.files = dt.files;
                        rebuildSubPreview();
                    });

                    wrap.appendChild(img);
                    wrap.appendChild(x);
                    subBox.appendChild(wrap);
                });
            }

            if(subInput && subBox){
                subInput.addEventListener('change', rebuildSubPreview);
            }
        })();
    </script>
</th:block>
</body>
</html>
