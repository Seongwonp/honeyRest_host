<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>객실 등록</title>
    <th:block layout:fragment="head">
        <!-- 페이지 전용 CSS가 있으면 여기 -->
        <style>
            .help-text{font-size:.875rem;color:#6c757d}
            .required::after{content:" *"; color:#dc3545;}
        </style>
    </th:block>
    <link rel="shortcut icon" th:href="@{/assets/compiled/svg/favicon.svg}" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/assets/compiled/css/app.css}">
    <link rel="stylesheet" th:href="@{/assets/compiled/css/app-dark.css}">
    <link rel="stylesheet" th:href="@{/assets/compiled/css/iconly.css}">
    <script th:src="@{/assets/static/js/initTheme.js}"></script>
    <script th:src="@{/assets/static/js/components/dark.js}"></script>
    <script th:src="@{/assets/extensions/perfect-scrollbar/perfect-scrollbar.min.js}"></script>
    <script th:src="@{/assets/compiled/js/app.js}"></script>
</head>

<body>
<th:block layout:fragment="content">
    <!-- Page heading -->
    <div class="page-heading">
        <h3>객실 등록</h3>
        <p class="text-subtitle text-muted">새 객실 정보를 입력해 주세요.</p>
    </div>

    <div class="page-content">
        <section class="section">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">기본 정보</h5></div>
                <div class="card-body">
                    <form th:action="@{/admin/rooms/add}" th:object="${room}" method="post" id="roomForm">
                        <!-- ★ Spring Security 사용 시 CSRF 토큰 -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <!-- ★ accommodationId는 모델에 바인딩된 값만 사용(단 하나의 hidden) -->
                        <input type="hidden" th:field="*{accommodationId}"/>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">객실 이름</label>
                                <input type="text" class="form-control" th:field="*{name}">
                                <div class="text-danger small" th:errors="*{name}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">객실 유형</label>
                                <input type="text" class="form-control" th:field="*{type}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">가격</label>
                                <input type="number" class="form-control" th:field="*{price}" step="1000">
                                <div class="text-danger small" th:errors="*{price}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">최대 인원</label>
                                <input type="number" class="form-control" th:field="*{maxOccupancy}">
                                <div class="text-danger small" th:errors="*{maxOccupancy}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">기준 인원</label>
                                <input type="number" class="form-control" th:field="*{standardOccupancy}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">침대 정보</label>
                                <input type="text" class="form-control" th:field="*{bedInfo}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">편의시설</label>
                                <input type="text" class="form-control" th:field="*{amenities}">
                            </div>
                            <div class="col-12">
                                <label class="form-label">설명</label>
                                <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">보유 객실 수</label>
                                <input type="number" class="form-control" th:field="*{totalRooms}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">상태</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="">선택하세요</option>
                                    <option value="ACTIVE">ACTIVE</option>
                                    <option value="INACTIVE">INACTIVE</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <a href="/admin/dashboard" class="btn btn-outline-secondary">취소</a>
                            <button type="submit" class="btn btn-primary">등록</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
</th:block>

<th:block layout:fragment="script">
    <!-- 페이지 전용 스크립트 -->
    <script th:inline="javascript">
        // 간단한 클라이언트 유효성 검사 (필수값)
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('roomForm');
            form.addEventListener('submit', function (e) {
                const name = form.querySelector('[name="name"]').value.trim();
                const price = form.querySelector('[name="price"]').value;
                const maxOcc = form.querySelector('[name="maxOccupancy"]').value;

                if (!name || !price || !maxOcc) {
                    e.preventDefault();
                    alert('객실 이름, 가격, 최대 인원은 필수입니다.');
                    return;
                }
                // 확인 알림 후 그대로 전송
                alert('등록되었습니다.');
            });
        });
    </script>
</th:block>
</body>
</html>
