<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title layout:fragment="title">객실 등록</title>
</head>

<body>
<main layout:fragment="content">
    <div class="page-heading d-flex justify-content-between align-items-center">
        <div>
            <h3>객실 등록</h3>
            <p class="text-muted">숙소별로 여러 개의 객실을 등록할 수 있습니다.</p>
        </div>
        <div>
            <a class="btn btn-light"
               th:href="${form.accommodationId} != null ? @{/admin/rooms/by-accommodation(accommodationId=${form.accommodationId})} : @{/admin/accommodations/list}">
                ← 돌아가기
            </a>
        </div>
    </div>

    <div class="page-content">
        <div class="card">
            <div class="card-body">
                <form th:action="@{/admin/rooms/add}" th:object="${form}" method="post" class="row g-3">
<!--                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->

                    <!-- 숙소 선택 -->
                    <div class="col-md-6">
                        <label class="form-label required">숙소</label>
                        <select class="form-select" th:field="*{accommodationId}" required>
                            <option value="" disabled th:selected="${form.accommodationId == null}">선택하세요</option>
                            <option th:each="a : ${accommodations}"
                                    th:value="${a.accommodationId}"
                                    th:text="|[${a.accommodationId}] ${a.name}|"
                                    th:selected="${form.accommodationId == a.accommodationId}">
                            </option>
                        </select>
                    </div>

                    <!-- 객실명 -->
                    <div class="col-md-6">
                        <label class="form-label required">객실명</label>
                        <input type="text" class="form-control" th:field="*{roomName}" placeholder="예) 디럭스 트윈" required>
                    </div>

                    <!-- 유형(enum) -->
                    <div class="col-md-4">
                        <label class="form-label required">객실 유형</label>
                        <select class="form-select" th:field="*{type}" required>
                            <option value="" disabled selected>선택</option>
                            <option value="Standard">Standard</option>
                            <option value="Deluxe">Deluxe</option>
                            <option value="Suite">Suite</option>
                        </select>
                    </div>

                    <!-- 가격 -->
                    <div class="col-md-4">
                        <label class="form-label required">가격(원)</label>
                        <input type="number" min="0" step="1000" class="form-control" th:field="*{price}"
                               placeholder="예) 120000" required>
                    </div>

                    <!-- 총 객실수 -->
                    <div class="col-md-4">
                        <label class="form-label required">총 객실 수</label>
                        <input type="number" min="1" class="form-control" th:field="*{totalRooms}" placeholder="예) 10"
                               required>
                    </div>

                    <!-- 정원 -->
                    <div class="col-md-4">
                        <label class="form-label required">기준 인원</label>
                        <input type="number" min="1" class="form-control" th:field="*{standardOccupancy}"
                               placeholder="예) 2" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label required">최대 인원</label>
                        <input type="number" min="1" class="form-control" th:field="*{maxOccupancy}" placeholder="예) 3"
                               required>
                    </div>

                    <!-- 추가 인원 요금 -->
                    <div class="col-md-4">
                        <label class="form-label">추가 인원 요금(원)</label>
                        <input type="number" min="0" step="1000" class="form-control" th:field="*{extraPersonFee}"
                               placeholder="예) 15000">
                    </div>

                    <!-- 침대 정보 (CSV) -->
                    <div class="col-12">
                        <label class="form-label">침대 정보 (쉼표로 구분)</label>
                        <input type="text" class="form-control"
                               th:field="*{bedInfo}" placeholder="예) 더블베드1, 싱글베드1">
                        <div class="form-text">쉼표(,)로 구분해서 입력해주세요</div>
                    </div>

                    <!-- 편의시설 (CSV) -->
                    <div class="col-12">
                        <label class="form-label">편의시설 (쉼표로 구분)</label>
                        <input type="text" class="form-control"
                               th:field="*{amenities}" placeholder="예) TV, 와이파이, 에어컨">
                        <div class="form-text">쉼표(,)로 구분해서 입력해주세요</div>
                    </div>

                    <!-- 설명 -->
                    <div class="col-12">
                        <label class="form-label">설명</label>
                        <textarea rows="4" class="form-control" th:field="*{description}"
                                  placeholder="객실에 대한 상세 설명을 입력하세요."></textarea>
                    </div>

                    <!-- 상태 -->
                    <div class="col-md-4">
                        <label class="form-label">상태</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="ACTIVE" selected>ACTIVE</option>
                            <option value="INACTIVE">INACTIVE</option>
                        </select>
                    </div>

                    <div class="col-12 mt-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">저장</button>
                    <a class="btn btn-light"
                       th:href="${form.accommodationId} != null ?
                    @{/admin/rooms/list/by-accommodation(accommodationId=${form.accommodationId})} :
                    @{/admin/rooms/list_all}">
                        취소
                    </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
<script th:if="${msg}" th:inline="javascript">
    alert([[${msg}]]);
</script>
</main>
</body>
</html>
