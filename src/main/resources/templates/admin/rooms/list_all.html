<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>객실 전체 목록</title>
    <th:block layout:fragment="head">
        <style>
            :root{
                --lilac:var(--honey-soft);
                --lilac-deep:var(--honey-deeper);
                --lilac-deeper:#5B21B6;
                --soft:#F7F9FC;
                --line:#eef2f7;
            }

            /* 공통 버튼 타이포 */
            .btn, .btn *{ font-weight:700; letter-spacing:.2px; }

            /* 배지: ratio 규칙 완전 무시 + 우하단 고정 + 작게 */
            .room-card-img > .room-img-count{
                position: absolute !important;   /* .ratio > * 무력화 */
                inset: auto !important;          /* top/left/right/bottom 초기화 */
                right: .6rem !important;
                bottom: .6rem !important;

                width: auto !important;
                height: auto !important;

                display: inline-flex !important;
                align-items: center;
                gap: .35rem;
                padding: .26rem .55rem;
                font-size: .82rem;
                line-height: 1;
                color: #fff;
                background: rgba(0,0,0,.58);
                border-radius: 9999px;
                box-shadow: 0 3px 10px rgba(0,0,0,.18);
                pointer-events: none;
                z-index: 3;
            }

            .room-img-count svg{ width:16px; height:16px; opacity:.95; }

            /* 상세: 유리 + 샤인 */
            .btn-detail{
                background:rgba(248,250,252,.9); border:1px solid #e5e7eb; color:#334155;
                border-radius:9999px; padding:.45rem 1rem; backdrop-filter:blur(6px);
                position:relative; overflow:hidden;
                transition:transform .08s ease, box-shadow .2s ease, background-color .2s;
            }
            .btn-detail:hover{ transform:translateY(-1px); box-shadow:0 6px 18px rgba(15,23,42,.12); }
            .btn-detail::after{
                content:""; position:absolute; top:-150%; left:-60%; width:60%; height:400%;
                background:linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.45) 50%, rgba(255,255,255,0) 100%);
                transform:skewX(-20deg); opacity:0; pointer-events:none;
            }
            .btn-detail:hover::after{ animation:shine .9s ease forwards; }
            @keyframes shine{
                0%{ left:-60%; opacity:0; } 20%{ opacity:1; } 100%{ left:140%; opacity:0; }
            }

            /* 수정: 라벤더 아웃라인 */
            .btn-edit{ background:#fff; color:var(--lilac-deeper); border:1.5px solid var(--lilac-deep);
                border-radius:9999px; padding:.45rem 1rem; }
            .btn-edit:hover{ background:var(--honey-soft); }

            /* 케밥 버튼 */
            .btn-more{ background:#fff; color:#111; border:1px solid #e5e7eb;
                width:2.25rem; height:2.25rem; border-radius:9999px; padding:0; }
            .btn-more:hover{ background:#f8fafc; }

            /* 상단 메인 버튼 */
            .btn-primary-lilac{ background:var(--lilac-deep); border:1px solid var(--lilac-deeper);
                color:#fff; border-radius:9999px; padding:.5rem 1.1rem; }
            .btn-primary-lilac:hover{ filter:brightness(1.05); }

            /* 페이지네이션 라벤더 */
            .pagination .page-link{ border:none; border-radius:10px; color:#475569; }
            .pagination .page-item.active .page-link{ background:var(--honey-soft); color:var(--lilac-deeper); font-weight:800; }
            .pagination .page-item:not(.active) .page-link:hover{ background:var(--honey-soft); color:var(--lilac-deeper); }

            /* 상태 배지 */
            .badge-status{ display:inline-flex; align-items:center; gap:.45rem; padding:.35rem .7rem;
                font-weight:700; font-size:.8rem; border-radius:9999px; border:1px solid transparent; }
            .badge-active{ color:#065f46; background:#ecfdf5; border-color:#a7f3d0; }
            .badge-inactive{ color:#92400e; background:#fffbeb; border-color:#fde68a; }

            .card-divider{ margin:.25rem 0 1rem; border-color:var(--line); }

            /* 카드 높이 균일 */
            .room-card.h-100{ display:flex; flex-direction:column; }
            .room-card .card-body{ flex:1 1 auto; }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 헤더 -->
    <div class="page-heading d-flex justify-content-between align-items-center">
        <h3 class="mb-0">객실 전체 목록</h3>
        <a th:href="@{/admin/rooms/add}" class="btn btn-primary-lilac">+ 새 객실 등록</a>
    </div>

    <!-- 비어있을 때 -->
    <div th:if="${groups == null or #maps.isEmpty(groups)}" class="text-center text-muted py-4">
        표시할 객실이 없습니다.
    </div>

    <!-- 숙소별 그룹 -->
    <div th:if="${groups != null and !#maps.isEmpty(groups)}">
        <div th:each="entry : ${groups.entrySet()}">
            <h4 class="mt-4 mb-3" th:text="${entry.key != null ? entry.key : '(숙소 미지정)'}">숙소명</h4>

            <div class="row g-3">
                <div class="col-12 col-sm-6 col-md-4" th:each="room : ${entry.value}">
                    <div class="card room-card h-100">
                        <!-- 이미지 -->
                        <div class="ratio ratio-16x9 mb-2 room-card-img">
                            <img th:if="${room.images != null and !#lists.isEmpty(room.images)}"
                                 th:src="${room.images[0].imageUrl}" alt="room main">

                            <div th:if="${room.images == null or #lists.isEmpty(room.images)}"
                                 class="d-flex align-items-center justify-content-center bg-light w-100 h-100">
                                <span class="text-muted">이미지 없음</span>
                            </div>

                            <!-- 우하단 이미지 개수(작은 알약) -->
                            <div class="room-img-count" th:if="${room.images != null and room.images.size() > 1}">
                                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                    <path d="M21 19V7a2 2 0 0 0-2-2H5C3.9 5 3 5.9 3 7v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2ZM8 9a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm11 9H5l4.5-6 3.5 4.5 2.5-3 3.5 4.5Z"/>
                                </svg>
                                <span>+ <span th:text="${room.images.size() - 1}">0</span></span>
                            </div>
                        </div>

                        <!-- 본문 -->
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div class="d-flex align-items-center gap-2">
                                    <h5 class="card-title mb-0" th:text="${room.roomName}">객실명</h5>
                                    <span th:classappend="${room.status == 'ACTIVE' ? 'badge-status badge-active' : 'badge-status badge-inactive'}"
                                          th:text="${room.status}">상태</span>
                                </div>
                            </div>

                            <div class="text-muted small mb-2">
                                정원: <span th:text="${room.standardOccupancy}">2</span> /
                                최대: <span th:text="${room.maxOccupancy}">4</span>
                            </div>
                            <div class="fw-semibold"
                                 th:text="${room.price != null ? #numbers.formatInteger(room.price, 3, 'COMMA') + '원' : '-'}">0원</div>

                            <hr class="card-divider">

                            <!-- 액션 -->
                            <div class="d-flex align-items-center justify-content-between">
                                <a class="btn btn-detail" th:href="@{/admin/rooms/detail/{id}(id=${room.roomId})}">상세</a>

                                <div class="d-flex align-items-center gap-2">
                                    <a class="btn btn-edit" th:href="@{/admin/rooms/edit/{id}(id=${room.roomId})}">수정</a>

                                    <div class="dropstart">
                                        <button type="button" class="btn btn-more" data-bs-toggle="dropdown" aria-expanded="false">⋯</button>
                                        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                                            <li>
                                                <form th:action="@{/admin/rooms/{id}/toggle(id=${room.roomId})}" method="post">
                                                    <input type="hidden" name="accommodationId" th:value="${room.accommodationId}">
                                                    <button class="dropdown-item d-flex align-items-center" type="submit">
                                                        <span class="me-2" aria-hidden="true"></span>
                                                        <span th:text="${room.status == 'ACTIVE' ? '비활성화' : '활성화'}">비활성화</span>
                                                    </button>
                                                </form>
                                            </li>
                                            <li><hr class="dropdown-divider"/></li>
                                            <li>
                                                <form th:action="@{/admin/rooms/{id}/delete(id=${room.roomId})}" method="post"
                                                      onsubmit="return confirm('삭제하시겠습니까? 예약이 있으면 실패할 수 있어요.');">
                                                    <input type="hidden" name="accommodationId" th:value="${room.accommodationId}">
                                                    <button class="dropdown-item text-danger d-flex align-items-center" type="submit">
                                                        <span class="me-2" aria-hidden="true"></span>삭제
                                                    </button>
                                                </form>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div> <!-- /액션 -->
                        </div> <!-- /card-body -->
                    </div> <!-- /card -->
                </div> <!-- /col -->
            </div> <!-- /row -->
        </div> <!-- /each group -->
    </div> <!-- /groups wrapper -->

    <!-- 페이지네이션(하단 1곳만) -->
    <div class="d-flex justify-content-between align-items-center mt-3" th:if="${page != null}">
        <div class="text-muted">
            총 <span th:text="${page.totalElements}">0</span>개 /
            <span th:text="${page.number + 1}">1</span> /
            <span th:text="${page.totalPages}">1</span> 페이지
        </div>
        <nav th:if="${page.totalPages > 0}">
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:classappend="${page.first} ? ' disabled'">
                    <a class="page-link" th:href="@{/admin/rooms/list_all(page=${page.number - 1}, size=${page.size})}">&laquo;</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                    th:classappend="${i == page.number} ? ' active'">
                    <a class="page-link" th:text="${i + 1}"
                       th:href="@{/admin/rooms/list_all(page=${i}, size=${page.size})}">1</a>
                </li>
                <li class="page-item" th:classappend="${page.last} ? ' disabled'">
                    <a class="page-link" th:href="@{/admin/rooms/list_all(page=${page.number + 1}, size=${page.size})}">&raquo;</a>
                </li>
            </ul>
        </nav>
    </div>

</th:block>

<th:block layout:fragment="script"></th:block>
</body>
</html>
