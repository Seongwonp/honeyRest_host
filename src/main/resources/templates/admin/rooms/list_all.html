<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>객실 전체 목록</title>
    <th:block layout:fragment="head">
        <style>
            /* 카드 내부 레이아웃: 내용은 늘어나고, 버튼 영역은 항상 하단 */
            /* 카드 내부 레이아웃: 내용은 늘어나고 버튼영역은 하단 고정 */
            .room-card.h-100 {
                display: flex;
                flex-direction: column;
            }

            .room-card .card-body {
                flex: 1 1 auto;
            }

            /* 객실 이미지 */
            .object-cover {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .room-card-img {
                position: relative;
                border-radius: .75rem;
                overflow: hidden;
            }

            /* 우하단 알약 배지 (작고 둥글게) */
            .room-card-img > .room-img-count {
                position: absolute !important; /* ratio 기본 absolute와 충돌 제거 */
                top: auto !important;
                left: auto !important;
                right: .75rem;
                bottom: .75rem;
                width: auto !important;
                height: auto !important;

                display: inline-flex;
                align-items: center;
                gap: .35rem;
                padding: .28rem .6rem;
                font-size: .85rem;
                font-weight: 600;
                color: #fff;
                background: rgba(0, 0, 0, .65);
                border-radius: 9999px;
                box-shadow: 0 3px 8px rgba(0, 0, 0, .15);
                pointer-events: none;
            }

            .room-img-count svg {
                width: 16px;
                height: 16px;
            }

            /* 구분선 */
            .card-divider {
                margin: .25rem 0 1rem;
                border-color: #eef2f7;
            }

            /* ── 상태 배지 ─────────────────────────────────────────── */
            .badge-status {
                display: inline-flex;
                align-items: center;
                gap: .45rem;
                padding: .35rem .7rem;
                font-weight: 700;
                font-size: .8rem;
                border-radius: 9999px;
                border: 1px solid transparent;
            }

            .badge-status .dot {
                width: .5rem;
                height: .5rem;
                border-radius: 9999px;
                display: inline-block;
            }

            .badge-active {
                color: #065f46;
                background: #ecfdf5;
                border-color: #a7f3d0;
            }

            /* emerald */
            .badge-active .dot {
                background: #10b981;
            }

            .badge-inactive {
                color: #92400e;
                background: #fffbeb;
                border-color: #fde68a;
            }

            /* amber */
            .badge-inactive .dot {
                background: #f59e0b;
            }

            /* 타이틀 + 배지 정렬 */
            .room-title {
                display: flex;
                align-items: center;
                gap: .6rem;
            }

            /* ── 액션 버튼들 ───────────────────────────────────────── */
            .card-actions {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: .5rem;
            }

            .card-actions .right {
                display: flex;
                align-items: center;
                gap: .5rem;
            }

            .btn-chip {
                border-radius: 9999px;
                padding: .45rem 1rem;
                font-weight: 600;
                line-height: 1;
            }

            /* 상세: 유리(ghost) 버튼 */
            .btn-detail {
                composes: btn-chip;
                background: rgba(248, 250, 252, .8);
                border: 1px solid #e5e7eb;
                color: #334155;
                box-shadow: 0 2px 10px rgba(15, 23, 42, .06);
                backdrop-filter: blur(6px);
                transition: transform .08s ease, box-shadow .2s ease, background-color .2s;
            }

            .btn-detail:hover {
                transform: translateY(-1px);
                background: #f1f5f9;
                box-shadow: 0 6px 18px rgba(15, 23, 42, .1);
            }

            /* 수정: 파랑 아웃라인 */
            .btn-edit {
                composes: btn-chip;
                background: #fff;
                border: 1.5px solid #2563eb;
                color: #1d4ed8;
            }

            .btn-edit:hover {
                background: #eff6ff;
            }

            /* 케밥(…): 투명 */
            .btn-kebab {
                background: transparent;
                border: 1px solid rgba(0, 0, 0, .08);
                color: #111;
                border-radius: 9999px;
                width: 2.25rem;
                height: 2.25rem;
                padding: 0;
            }

            .btn-kebab:hover {
                background: rgba(0, 0, 0, .05);
            }

            /* 삭제 드롭다운 항목 강조 */
            .dropdown-item.text-danger:hover {
                background: #fef2f2;
            }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <div class="page-heading d-flex justify-content-between align-items-center">
        <h3 class="mb-0">객실 전체 목록</h3>
        <a th:href="@{/admin/rooms/add}" class="btn btn-primary">+ 새 객실 등록</a>
    </div>

    <!-- 숙소별 그룹 출력 -->
    <div th:if="${groups != null}">
        <div th:each="entry : ${groups.entrySet()}">
            <!-- 숙소명 헤더 (없으면 '(숙소 미지정)') -->
            <h4 class="mt-4 mb-3" th:text="${entry.key != null ? entry.key : '(숙소 미지정)'}">숙소명</h4>

            <!-- 객실 카드들 -->
            <div class="row g-3">
                <div class="col-md-4" th:each="room : ${entry.value}">
                    <div class="card h-100">
                        <!-- 카드 이미지 (NEW) -->
                        <div class="ratio ratio-16x9 mb-2 room-card-img">
                            <!-- 메인 이미지 -->
                            <img th:if="${room.images != null and !#lists.isEmpty(room.images)}"
                                 th:src="${room.images[0].imageUrl}"
                                 alt="room main" class="object-cover">

                            <!-- 플레이스홀더 -->
                            <div th:if="${room.images == null or #lists.isEmpty(room.images)}"
                                 class="d-flex align-items-center justify-content-center bg-light w-100 h-100">
                                <span class="text-muted">이미지 없음</span>
                            </div>

                            <!-- 우하단 알약 배지 -->
                            <!-- 🔹 충돌 없는 새 클래스 사용 -->
                            <div th:if="${room.images != null and room.images.size() > 0}" class="room-img-count">
                                <!-- 아이콘 -->
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M21 19V7a2 2 0 0 0-2-2H5C3.9 5 3 5.9 3 7v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2ZM8 9a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm11 9H5l4.5-6 3.5 4.5 2.5-3 3.5 4.5Z"/>
                                    </svg>

                                    <!-- 텍스트: 총 이미지 개수 + '+'  (예: 6+) -->
                                    +<span th:text="${room.images.size() - 1}">0</span>
                                </div>
                            </div>


                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <div class="room-title">
                                    <h5 class="card-title mb-0" th:text="${room.roomName}">객실명</h5>

                                    <!-- 상태 배지 -->
                                    <span th:classappend="${room.status == 'ACTIVE' ? 'badge-status badge-active' : 'badge-status badge-inactive'}"
                                          th:text="${room.status}">상태</span>
                                </div>
                            </div>

                            <div class="text-muted small mb-2">
                                정원: <span th:text="${room.standardOccupancy}">2</span> /
                                최대: <span th:text="${room.maxOccupancy}">4</span>
                            </div>
                            <div class="fw-semibold"
                                 th:text="${room.price != null ? #numbers.formatInteger(room.price, 3, 'COMMA') + '원' : '-'}">
                                0원
                            </div>


                            <hr class="card-divider">

                            <!-- 카드 하단 액션 (상세 / 수정 / 더보기: 토글·삭제) -->
                            <div class="card-actions d-flex align-items-center justify-content-between">
                                <!-- 상세 -->
                                <a class="btn btn-detail" th:href="@{/admin/rooms/detail/{id}(id=${room.roomId})}">
                                    상세
                                </a>

                                <!-- 우측: 수정 + 더보기 -->
                                <div class="d-flex align-items-center gap-2">
                                    <!-- 수정 -->
                                    <a class="btn btn-outline-primary btn-sm rounded-pill px-4"
                                       th:href="@{/admin/rooms/edit/{id}(id=${room.roomId})}">
                                        수정
                                    </a>

                                    <!-- 더보기 (토글/삭제) -->
                                    <div class="dropstart">
                                        <button type="button"
                                                class="btn btn-more btn-sm"
                                                data-bs-toggle="dropdown" aria-expanded="false">⋯
                                        </button>

                                        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                                            <!-- 상태 토글 -->
                                            <li>
                                                <form th:action="@{/admin/rooms/{id}/toggle(id=${room.roomId})}"
                                                      method="post">
                                                    <input type="hidden" name="accommodationId"
                                                           th:value="${room.accommodationId}">
                                                    <button class="dropdown-item d-flex align-items-center"
                                                            type="submit">
                                                        <span class="me-2" aria-hidden="true"></span>
                                                        <span th:text="${room.status == 'ACTIVE' ? '비활성화' : '활성화'}">비활성화</span>
                                                    </button>
                                                </form>
                                            </li>

                                            <li>
                                                <hr class="dropdown-divider"/>
                                            </li>

                                            <!-- 삭제 -->
                                            <li>
                                                <form th:action="@{/admin/rooms/{id}/delete(id=${room.roomId})}"
                                                      method="post"
                                                      onsubmit="return confirm('삭제하시겠습니까? 예약이 있으면 실패할 수 있어요.');">
                                                    <input type="hidden" name="accommodationId"
                                                           th:value="${room.accommodationId}">
                                                    <button class="dropdown-item text-danger d-flex align-items-center"
                                                            type="submit">
                                                        <span class="me-2" aria-hidden="true"></span>삭제
                                                    </button>
                                                </form>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 데이터 없을 때 -->
            <div th:if="${groups == null or #maps.isEmpty(groups)}" class="text-center text-muted py-4">
                표시할 객실이 없습니다.
            </div>

            <!-- 페이지네이션 (그대로 사용) -->
            <div class="d-flex justify-content-between align-items-center mt-3">
                <div class="text-muted">
                    총 <span th:text="${page.totalElements}">0</span>개 /
                    <span th:text="${page.number + 1}">1</span> /
                    <span th:text="${page.totalPages}">1</span> 페이지
                </div>
                <nav th:if="${page.totalPages > 0}">
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${page.first} ? ' disabled'">
                            <a class="page-link"
                               th:href="@{/admin/rooms/list_all(page=${page.number - 1}, size=${page.size})}">&laquo;</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                            th:classappend="${i == page.number} ? ' active'">
                            <a class="page-link" th:text="${i + 1}"
                               th:href="@{/admin/rooms/list_all(page=${i}, size=${page.size})}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${page.last} ? ' disabled'">
                            <a class="page-link"
                               th:href="@{/admin/rooms/list_all(page=${page.number + 1}, size=${page.size})}">&raquo;</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</th:block>
<!-- 페이지 맨 아래 쪽, base 레이아웃이 수용하는 script 프래그먼트 안에 배치 -->
<script th:inline="javascript">
    (function () {
        var el = document.getElementById('flashMsg');
        if (el) {
            var msg = (el.textContent || '').trim();
            if (msg) alert(msg);
        }
    })();
</script>
</body>
</html>
