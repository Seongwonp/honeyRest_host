<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
  <title>객실 전체 목록</title>
  <th:block layout:fragment="head">
    <style>
      .status-badge{padding:.35em .65em;border-radius:.25rem;font-size:.75rem;font-weight:500}
      .status-active{background:#e7f1ff;color:#0a58ca}
      .status-inactive{background:#f8d7da;color:#721c24}
      .acc-header{background:#f0f3f7;font-weight:700}
      .acc-title{font-size:1.05rem}
      .room-table thead th{background:#f8f9fb}
    </style>
  </th:block>
</head>
<body>
<th:block layout:fragment="content">
  <div class="page-heading d-flex justify-content-between align-items-center">
    <h3 class="mb-0">객실 전체 목록</h3>
    <a th:href="@{/admin/rooms/add}" class="btn btn-primary">+ 새 객실 등록</a>
  </div>

  <!-- 숙소별 그룹 출력 -->
  <!-- 숙소별 그룹 출력 -->
  <div th:if="${groups != null}">
    <div th:each="entry : ${groups.entrySet()}">
      <!-- 숙소명 헤더 (없으면 '(숙소 미지정)') -->
      <h4 class="mt-4 mb-3" th:text="${entry.key != null ? entry.key : '(숙소 미지정)'}">숙소명</h4>

      <!-- 객실 카드들 -->
      <div class="row g-3">
        <div class="col-md-4" th:each="room : ${entry.value}">
          <div class="card h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between mb-2">
                <h5 class="card-title mb-0" th:text="${room.roomName}">객실명</h5>
                <span class="badge text-bg-secondary" th:text="${room.status}">ACTIVE</span>
              </div>
              <div class="text-muted small mb-2">
                정원:
                <span th:text="${room.standardOccupancy}">2</span> /
                최대:
                <span th:text="${room.maxOccupancy}">4</span>
              </div>
              <div class="fw-semibold"
                   th:text="${room.price != null ? #numbers.formatInteger(room.price, 3, 'COMMA') + '원' : '-'}">
                0원
              </div>
            </div>
            <div class="card-footer bg-white d-flex gap-2">
              <a class="btn btn-outline-primary btn-sm"
                 th:href="@{/admin/rooms/edit/{id}(id=${room.roomId})}">수정</a>
              <form th:action="@{/admin/rooms/{id}/delete(id=${room.roomId})}"
                    method="post" class="ms-auto"
                    onsubmit="return confirm('삭제하시겠습니까?');">
                <input type="hidden" name="accommodationId" th:value="${room.accommodationId}">
                <button class="btn btn-outline-danger btn-sm" type="submit">삭제</button>
              </form>
            </div>
          </div>
        </div>
      </div>
      <hr class="my-4"/>
    </div>
  </div>

  <!-- 데이터 없을 때 -->
  <div th:if="${groups == null or #maps.isEmpty(groups)}" class="text-center text-muted py-4">
    표시할 객실이 없습니다.
  </div>

  <!-- 페이지네이션 (그대로 사용) -->
  <div class="d-flex justify-content-between align-items-center mt-3">
    <div class="text-muted">
      총 <span th:text="${page.totalElements}">0</span>개 /
      <span th:text="${page.number + 1}">1</span> /
      <span th:text="${page.totalPages}">1</span> 페이지
    </div>
    <nav th:if="${page.totalPages > 0}">
      <ul class="pagination pagination-sm mb-0">
        <li class="page-item" th:classappend="${page.first} ? ' disabled'">
          <a class="page-link" th:href="@{/admin/rooms/list_all(page=${page.number - 1}, size=${page.size})}">&laquo;</a>
        </li>
        <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
            th:classappend="${i == page.number} ? ' active'">
          <a class="page-link" th:text="${i + 1}"
             th:href="@{/admin/rooms/list_all(page=${i}, size=${page.size})}">1</a>
        </li>
        <li class="page-item" th:classappend="${page.last} ? ' disabled'">
          <a class="page-link" th:href="@{/admin/rooms/list_all(page=${page.number + 1}, size=${page.size})}">&raquo;</a>
        </li>
      </ul>
    </nav>
  </div>
</th:block>
</body>
</html>
