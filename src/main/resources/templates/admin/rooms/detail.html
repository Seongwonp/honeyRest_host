<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title th:text="${room.roomName} ?: '객실 상세'">객실 상세</title>

    <th:block layout:fragment="head">
        <style>
            :root {
                --ink: #0f172a;
                --muted: #64748b;
                --line: #e8eef6;
                --bg: #f7f9fc;
                --card: #ffffff;
                --chip: #f9fafb;
                --chip-line: #e5e7eb;
                --soft: #eef2ff;
                --radius: 16px;
                --radius-chip: 999px;
            }

            body {
                background: var(--bg);
            }

            /* 헤더 */
            .page-heading h3 {
                font-weight: 800;
                letter-spacing: .2px;
            }

            .meta {
                color: var(--muted);
                font-size: .92rem;
            }

            .pill {
                border-radius: var(--radius-chip);
                padding: .45rem .9rem;
                font-weight: 700;
                border-width: 1.5px;
            }

            /* 카드 */
            .card {
                border: 1px solid var(--line);
                border-radius: var(--radius);
                box-shadow: 0 8px 26px rgba(15, 23, 42, .06);
            }

            .section-title {
                font-weight: 800;
                font-size: .95rem;
                color: #1e293b;
                display: flex;
                align-items: center;
                gap: .45rem;
            }

            /* 상태 배지 */
            .badge-soft {
                border-radius: var(--radius-chip);
                padding: .35rem .7rem;
                font-weight: 800;
                font-size: .78rem;
                border: 1px solid #e2e8f0;
                color: #334155;
                background: #f8fafc;
            }

            /* 메인 이미지 */
            .hero {
                width: 100%;
                height: 360px;
                object-fit: cover;
                border-radius: 14px;
                border: 1px solid #e2e8f0;
                background: #f1f5f9;
            }

            .thumbs {
                display: flex;
                gap: .5rem;
                flex-wrap: wrap;
                margin-top: .6rem;
            }

            .thumb {
                width: 108px;
                height: 76px;
                object-fit: cover;
                border-radius: 10px;
                border: 2px solid transparent;
                background: #f8fafc;
                transition: transform .12s, box-shadow .12s, border-color .15s;
                cursor: pointer;
            }

            .thumb:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 18px rgba(15, 23, 42, .12);
            }

            .thumb.active {
                border-color: #93c5fd;
                box-shadow: 0 0 0 3px rgba(147, 197, 253, .45);
            }

            /* 정보표 */
            .kv dt {
                color: #475569;
                font-weight: 700;
                font-size: .92rem;
                margin-bottom: .35rem;
            }

            .kv dd {
                color: #0f172a;
                font-weight: 800;
                margin-bottom: .8rem;
            }

            /* 설명(클램프) */
            .desc {
                white-space: pre-line;
                line-height: 1.65;
            }

            .desc.clamp {
                display: -webkit-box;
                -webkit-box-orient: vertical;
                -webkit-line-clamp: 6;
                overflow: hidden;
                white-space: normal;
                position: relative;
            }

            .desc.clamp:after {
                content: "";
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                height: 2.2rem;
                background: linear-gradient(to bottom, rgba(255, 255, 255, 0), #fff);
            }

            .desc.expanded {
                -webkit-line-clamp: unset;
                display: block; /* ← 혹시 브라우저별 잔상 대비 */
            }

            .btn-link {
                background: none;
                border: none;
                color: #2563eb;
                font-weight: 700;
                padding: 0;
                cursor: pointer;
            }


            /* 칩 그리드 (편의시설/침대) */
            .chip-grid {
                display: grid;
                grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
                gap: .5rem .6rem;
            }

            .chip {
                display: inline-flex;
                align-items: center;
                gap: .35rem;
                background: var(--chip);
                border: 1px solid var(--chip-line);
                border-radius: var(--radius-chip);
                padding: .4rem .7rem;
                font-size: .86rem;
                font-weight: 700;
                color: #334155;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .chip .dot {
                width: .55rem;
                height: .55rem;
                border-radius: 50%;
                display: inline-block;
            }

            /* 파스텔 팔레트 (칩 점색) */
            .chip:nth-child(6n+1) .dot {
                background: #a5b4fc;
            }

            /* indigo */
            .chip:nth-child(6n+2) .dot {
                background: #fb7185;
            }

            /* rose */
            .chip:nth-child(6n+3) .dot {
                background: #34d399;
            }

            /* emerald */
            .chip:nth-child(6n+4) .dot {
                background: #fbbf24;
            }

            /* amber */
            .chip:nth-child(6n+5) .dot {
                background: #60a5fa;
            }

            /* blue */
            .chip:nth-child(6n) .dot {
                background: #f472b6;
            }

            /* pink */

            .muted {
                color: var(--muted);
            }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <div class="page-heading d-flex justify-content-between align-items-center">
        <div>
            <h3 class="mb-1" th:text="${room.roomName}">객실명</h3>
            <div class="meta">
                숙소:
                <a th:href="@{/admin/accommodations/detail/{id}(id=${room.accommodationId})}"
                   th:text="${room.accommodationName}">숙소명</a>
                · 상태:
                <span class="badge-soft" th:text="${room.status}">ACTIVE</span>
            </div>
        </div>

        <div class="d-flex gap-2">
            <a class="btn pill btn-outline-primary"
               th:href="@{/admin/rooms/edit/{id}(id=${room.roomId})}">수정</a>
            <form th:action="@{/admin/rooms/{id}/delete(id=${room.roomId})}" method="post"
                  onsubmit="return confirm('삭제하시겠습니까?');">
                <input type="hidden" name="accommodationId" th:value="${room.accommodationId}">
                <button class="btn pill btn-outline-danger">삭제</button>
            </form>
            <a class="btn pill btn-light" th:href="@{/admin/rooms/list_all}">목록</a>
        </div>
    </div>

    <div class="page-content">
        <div class="row g-4">
            <!-- 이미지 갤러리 -->
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <div class="section-title mb-3"><i class="bi bi-images"></i> 이미지</div>

                        <div th:with="
                 mains=${room.images != null ? room.images.?[imageType == 'MAIN'] : {}},
                 picked=${#lists.isEmpty(mains) ? ( #lists.isEmpty(room.images) ? null : room.images[0] ) : mains[0] }">
                            <img th:if="${picked != null}" th:src="${picked.imageUrl}" alt="room main" class="hero"/>
                            <div th:if="${picked == null}"
                                 class="d-flex align-items-center justify-content-center bg-light w-100 hero">
                                <span class="muted">이미지 없음</span>
                            </div>
                        </div>

                        <div class="thumbs">
                            <img th:each="img, iStat : ${room.images}"
                                 th:src="${img.imageUrl}"
                                 th:alt="'room image ' + ${iStat.index}"
                                 class="thumb"
                                 data-bs-toggle="modal"
                                 data-bs-target="#imageModal"
                                 th:attr="data-bs-slide-to=${iStat.index}"/>
                        </div>

                        <!-- 큰 미리보기 모달 -->
                        <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog modal-xl modal-dialog-centered">
                                <div class="modal-content bg-dark">
                                    <div class="modal-body p-0">
                                        <div id="imageCarousel" class="carousel slide" data-bs-ride="carousel">
                                            <div class="carousel-inner">
                                                <div th:each="img, iStat : ${room.images}"
                                                     th:classappend="${iStat.index == 0} ? ' active'"
                                                     class="carousel-item">
                                                    <img th:src="${img.imageUrl}" class="d-block w-100"
                                                         style="max-height:80vh; object-fit:contain;" alt="room image">
                                                </div>
                                            </div>
                                            <button class="carousel-control-prev" type="button"
                                                    data-bs-target="#imageCarousel" data-bs-slide="prev">
                                                <span class="carousel-control-prev-icon"></span>
                                            </button>
                                            <button class="carousel-control-next" type="button"
                                                    data-bs-target="#imageCarousel" data-bs-slide="next">
                                                <span class="carousel-control-next-icon"></span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div><!-- /모달 -->
                    </div>
                </div>
            </div>

            <!-- 기본 정보 -->
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <div class="section-title mb-3"><i class="bi bi-info-circle"></i> 객실 정보</div>
                        <dl class="row kv mb-0">
                            <dt class="col-sm-4">타입</dt>
                            <dd class="col-sm-8" th:text="${room.type ?: '-'}">Standard</dd>

                            <dt class="col-sm-4">체크인</dt>
                            <dd class="col-sm-8"
                                th:text="${room.displayCheckInTime != null ? #temporals.format(room.displayCheckInTime,'HH:mm') : '-'}">
                                -
                            </dd>

                            <dt class="col-sm-4">체크아웃</dt>
                            <dd class="col-sm-8"
                                th:text="${room.displayCheckOutTime != null ? #temporals.format(room.displayCheckOutTime,'HH:mm') : '-'}">
                                -
                            </dd>

                            <dt class="col-sm-4">기본가</dt>
                            <dd class="col-sm-8"
                                th:text="${room.price != null ? #numbers.formatInteger(room.price,3,'COMMA') + '원' : '-'}">
                                -
                            </dd>

                            <dt class="col-sm-4">정원(기준/최대)</dt>
                            <dd class="col-sm-8">
                                <span th:text="${room.standardOccupancy ?: 0}">2</span>
                                /
                                <span th:text="${room.maxOccupancy ?: 0}">4</span>
                            </dd>

                            <dt class="col-sm-4">추가 인원 요금</dt>
                            <dd class="col-sm-8"
                                th:text="${room.extraPersonFee != null ? #numbers.formatInteger(room.extraPersonFee,3,'COMMA') + '원' : '-'}">
                                -
                            </dd>

                            <dt class="col-sm-4">총 객실 수</dt>
                            <dd class="col-sm-8" th:text="${room.totalRooms ?: '-'}">-</dd>
                        </dl>
                    </div>
                </div>
            </div>

            <!-- 설명 / 편의시설 / 침대 구성 -->
            <div class="col-12">
                <div class="card">
                    <div class="card-body">

                        <!-- 설명 -->
                        <div class="section-title mb-2"><i class="bi bi-card-text"></i> 설명</div>
                        <div id="desc" class="desc clamp" th:text="${room.description ?: '설명 없음'}">설명 없음</div>

                        <button id="descToggle" type="button" class="btn-link mt-1"
                                onclick="(function(){
          var d=document.getElementById('desc');
          var b=document.getElementById('descToggle');
          if(!d||!b) return;
          var ex = d.getAttribute('data-expanded') === '1';
          if(ex){
            d.classList.add('clamp');
            d.classList.remove('expanded');
            d.setAttribute('data-expanded','0');
            b.textContent='더보기';
          }else{
            d.classList.remove('clamp');
            d.classList.add('expanded');
            d.setAttribute('data-expanded','1');
            b.textContent='접기';
          }
        })()">더보기
                        </button>

                        <!-- 편의시설 -->
                        <div class="section-title mt-4 mb-2"><i class="bi bi-check2-circle"></i> 편의시설</div>
                        <div th:if="${amenitiesList != null and !amenitiesList.isEmpty()}" class="chip-grid">
              <span class="chip" th:each="a : ${amenitiesList}">
                <span class="dot"></span><span th:text="${a}">WIFI</span>
              </span>
                        </div>
                        <p th:if="${amenitiesList == null or amenitiesList.isEmpty()}" class="muted">등록된 편의시설이 없습니다.</p>

                        <!-- 침대 구성 -->
                        <div class="section-title mt-4 mb-2"><i class="bi bi-collection"></i> 침대 구성</div>
                        <div th:if="${bedList != null and !bedList.isEmpty()}" class="chip-grid">
              <span class="chip" th:each="b : ${bedList}">
                <span class="dot"></span><span th:text="${b}">퀸 1</span>
              </span>
                        </div>
                        <p th:if="${bedList == null or bedList.isEmpty()}" class="muted">등록된 침대 정보가 없습니다.</p>

                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="body-end">
    <script>
        // 안전하게 캐러셀 초기화 (부트스트랩 미로딩/지연 로딩 대비)
        (function () {
            const carouselEl = document.getElementById('imageCarousel');
            let bsCarousel = null;
            try {
                if (carouselEl && window.bootstrap && bootstrap.Carousel) {
                    bsCarousel = new bootstrap.Carousel(carouselEl);
                }
            } catch (e) {
                // 부트스트랩이 없거나 초기화 실패해도 그냥 넘어감
                console.warn('Carousel init skipped:', e);
            }

            // 썸네일 클릭 핸들러 (bsCarousel 없으면 모달만 띄움)
            document.querySelectorAll('[data-bs-slide-to]').forEach(function (el) {
                el.addEventListener('click', function () {
                    const idx = this.getAttribute('data-bs-slide-to');
                    if (bsCarousel && typeof bsCarousel.to === 'function') {
                        bsCarousel.to(idx);
                    }
                    document.querySelectorAll('.thumb').forEach(function (t) {
                        t.classList.remove('active');
                    });
                    this.classList.add('active');
                });
            });
        })();

        // 설명 더보기/접기 (클램프 토글)
        (function () {
            const btn = document.getElementById('descToggle');
            const desc = document.getElementById('desc');
            if (!btn || !desc) return;

            // 혹시 서버에서 긴 설명이 없으면 버튼 숨김
            if (!desc.textContent || desc.textContent.trim().length === 0) {
                btn.style.display = 'none';
                return;
            }

            let expanded = false;

            function update() {
                if (expanded) {
                    desc.classList.remove('clamp');
                    desc.classList.add('expanded');
                    // 확실히 펼쳐지도록 display도 보강
                    desc.style.display = 'block';
                    btn.textContent = '접기';
                } else {
                    desc.classList.add('clamp');
                    desc.classList.remove('expanded');
                    desc.style.display = ''; // 기본값으로 되돌림
                    btn.textContent = '더보기';
                }
            }

            btn.addEventListener('click', function () {
                expanded = !expanded;
                update();
            });
            update();
        })();
    </script>
</th:block>
</body>
</html>
