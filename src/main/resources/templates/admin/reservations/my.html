<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>내 예약 현황</title>
    <th:block layout:fragment="head">
        <style>
            :root{
                --bg:#F8FAFC;          /* 배경 */
                --line:#E5EAF2;        /* 구분선 */
                --ink:#1F2937;         /* 본문 텍스트 */
                --muted:#94A3B8;       /* 보조 텍스트 */

                /* 포인트 컬러 2개만 */
                --pri:#8B5CF6;         /* 라일락 */
                --pri-soft:#F1EDFF;
                --sec:#14B8A6;         /* 민트 */
                --sec-soft:#E5FBF7;

                --card-radius:14px;
                --chip-radius:9999px;
                --shadow:0 6px 18px rgba(2,6,23,.05);
            }

            body{ background:var(--bg); color:var(--ink); }

            /* 헤더 */
            .page-heading h3{ font-weight:800; letter-spacing:.2px; }
            .subtext{ color:var(--muted); }

            /* 버튼: 더 작고 둥글게 */
            .btn-pill{ border-radius:9999px; padding:.4rem .8rem; font-weight:700; letter-spacing:.1px; }
            .btn-xs{ padding:.28rem .6rem; font-size:.82rem; border-radius:9999px; }

            .btn-ghost{ background:#fff; border:1px solid var(--line); color:#334155; }
            .btn-ghost:hover{ background:#fff; border-color:#CBD5E1; }

            .btn-pri{ background:var(--pri); border:1px solid var(--pri); color:#fff; }
            .btn-pri:hover{ filter:brightness(1.04); }
            .btn-sec-outline{ background:#fff; border:1px solid var(--sec); color:var(--sec); }
            .btn-sec-outline:hover{ background:var(--sec-soft); }

            /* 카드/필터바 */
            .card{ border:1px solid var(--line); border-radius:var(--card-radius); box-shadow:var(--shadow); overflow:hidden; }
            .filter-bar{ background:#fff; border-bottom:1px solid var(--line); padding:.7rem 1rem; }
            .filter-bar .form-select, .filter-bar .form-control{ border-radius:12px; }

            /* 테이블 */
            .table thead th{
                background:var(--pri-soft);
                border-bottom:1px solid #E7E3FF!important;
                color:#3C366B;
                font-weight:800; vertical-align:middle; font-size:.9rem;
            }
            .table tbody td{ vertical-align:middle; border-color:#EEF2F7; color:#334155; }
            .table-hover tbody tr:hover{ background:#FAFBFF; }

            .td-ellipsis{ max-width:230px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
            .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
            .price{ font-weight:800; letter-spacing:.2px; }

            /* 그룹 헤더 */
            .group-row th{
                background:#fff !important;
                border-top:1px solid var(--line) !important;
                border-bottom:1px solid var(--line) !important;
                font-weight:900; color:#111827;
                padding:.8rem 1rem !important;
            }
            .group-meta{ color:var(--muted); font-weight:600; }

            /* 상태 칩 */
            .chip{
                border-radius:var(--chip-radius);
                padding:.28rem .6rem;
                font-size:.78rem; font-weight:800;
                border:1px solid transparent;
                display:inline-flex; align-items:center; gap:.35rem;
                letter-spacing:.1px;
            }
            .chip-ok      { background:var(--sec-soft); color:var(--sec); border-color:rgba(20,184,166,.25);}
            .chip-wait    { background:#FFF6E2; color:#B45309; border-color:#FBD38D;}
            .chip-done    { background:#EEFDF8; color:#0F766E; border-color:#B6F3E6;}
            .chip-cancel  { background:#F3F4F6; color:#475569; border-color:#E2E8F0;}
            .chip-noshow  { background:#FDECEC; color:#991B1B; border-color:#FCA5A5;}
            .chip-unk     { background:#EEE; color:#475569; border-color:#E5E7EB;}

            /* 페이지네이션: 더 가볍게 */
            .pagination .page-link{ border:none; border-radius:10px; color:#475569; font-weight:700; }
            .pagination .page-item.active .page-link{ background:var(--pri-soft); color:var(--pri); font-weight:900; }
            .pagination .page-item:not(.active) .page-link:hover{ background:var(--pri-soft); color:var(--pri); }

            /* 상단 버튼 간격 조정 */
            .top-actions .btn-pill{ padding:.36rem .7rem; font-weight:700; }
            .top-actions .btn-pri{ background:var(--pri); border-color:var(--pri); }
            .top-actions .btn-ghost{ color:#475569; }

            /* 반응형 */
            @media (max-width: 1200px){ .td-ellipsis{ max-width:180px; } }
            @media (max-width: 992px){ .hide-md{ display:none!important; } }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 헤더 -->
    <div class="page-heading d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
            <h3 class="mb-1">내 예약 현황</h3>
            <div class="subtext">숙소별로 묶어서 한눈에 확인하세요.</div>
        </div>
        <div class="top-actions d-flex gap-2">
            <a class="btn btn-pill btn-ghost" th:href="@{/admin/reservations/list}">전체 목록</a>
            <a class="btn btn-pill btn-pri" th:href="@{/admin/reservations/new}">+ 수동 예약</a>
        </div>
    </div>

    <!-- 필터바 -->
    <div class="card mb-3">
        <div class="filter-bar">
            <form class="row g-2 align-items-center" th:action="@{/admin/reservations/my}" method="get">
                <div class="col-md-3" th:if="${accOptions != null}">
                    <select class="form-select" name="accId" aria-label="숙소 선택">
                        <option value="" th:selected="${selectedAccId == null}">전체 숙소</option>
                        <option th:each="a : ${accOptions}"
                                th:value="${a.accommodationId}"
                                th:text="${a.name}"
                                th:selected="${selectedAccId != null and selectedAccId == a.accommodationId}">
                            숙소
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select class="form-select" name="status" aria-label="상태 선택">
                        <option value="" th:selected="${selectedStatus == null or selectedStatus == 'ALL'}">전체 상태</option>
                        <option th:value="CONFIRMED"      th:selected="${selectedStatus == 'CONFIRMED'}">확정</option>
                        <option th:value="PENDING"        th:selected="${selectedStatus == 'PENDING'}">대기</option>
                        <option th:value="CANCEL_REQUEST" th:selected="${selectedStatus == 'CANCEL_REQUEST'}">취소요청</option>
                        <option th:value="COMPLETED"      th:selected="${selectedStatus == 'COMPLETED'}">완료</option>
                        <option th:value="NO_SHOW"        th:selected="${selectedStatus == 'NO_SHOW'}">노쇼</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <input class="form-control" type="search" name="q"
                           placeholder="예약번호/예약자/객실명 검색" th:value="${q}">
                </div>

                <div class="col-md-2 text-end">
                    <button class="btn btn-pill btn-sec-outline w-100" type="submit">필터 적용</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 본문 -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                    <tr>
                        <th class="text-center" style="width:72px">NO</th>
                        <th>예약번호</th>
                        <th>예약자</th>
                        <th>숙소/객실</th>
                        <th class="text-center hide-md" style="width:170px">체크인~아웃</th>
                        <th class="text-center" style="width:80px">인원</th>
                        <th class="text-end" style="width:130px">금액</th>
                        <th class="text-center" style="width:110px">상태</th>
                        <th class="text-center hide-md" style="width:150px">예약일</th>
                        <th class="text-center" style="width:150px">관리</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:if="${#lists.isEmpty(list)}">
                        <td colspan="10" class="text-center py-5 text-muted">표시할 예약이 없습니다.</td>
                    </tr>

                    <!-- 숙소별 그룹 -->
                    <th:block th:if="${!#lists.isEmpty(list)}" th:each="r, iter : ${list}">
                        <tr class="group-row"
                            th:if="${iter.index == 0 or list[iter.index-1].accommodationName != r.accommodationName}">
                            <th colspan="10">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <span class="me-2">🏨</span>
                                        <span class="h6 mb-0" th:text="${r.accommodationName}">숙소명</span>
                                    </div>
                                    <div class="group-meta">체크인 빠른순 · 같은 숙소끼리 묶어서 표시</div>
                                </div>
                            </th>
                        </tr>

                        <!-- 데이터 행 -->
                        <tr>
                            <td class="text-center" th:text="${(currentPage - 1) * pageSize + iter.index + 1}">1</td>

                            <!-- 예약번호: 모노 + 말줄임 + 툴팁 -->
                            <td class="td-ellipsis mono"
                                th:text="${r.reservationNumber}"
                                th:title="${r.reservationNumber}">HR-0000</td>

                            <td class="td-ellipsis">
                                <div class="fw-semibold" th:text="${r.guestName} ?: '-'">홍길동</div>
                                <div class="text-muted small" th:text="${r.guestPhone} ?: '-'">010-0000-0000</div>
                            </td>

                            <td class="td-ellipsis">
                                <div class="fw-bold" th:text="${r.accommodationName}">숙소명</div>
                                <div class="text-muted small" th:text="${r.roomName} ?: '-'">객실명</div>
                            </td>

                            <td class="text-center hide-md">
                                <div th:text="${#temporals.format(r.checkInDate, 'yyyy-MM-dd')}">-</div>
                                <div class="text-muted small">~ <span th:text="${#temporals.format(r.checkOutDate, 'yyyy-MM-dd')}">-</span></div>
                            </td>

                            <td class="text-center" th:text="${r.guestCount}">2</td>

                            <td class="text-end price"
                                th:text="${r.price != null ? #numbers.formatInteger(r.price.intValue(), 3, 'COMMA') + '원' : '0원'}">0원</td>

                            <!-- 状態 칩 -->
                            <td class="text-center">
                                <span class="chip"
                                      th:with="st=${#strings.toUpperCase(r.status)}"
                                      th:text="${st == 'CANCEL_REQUEST' ? '취소요청' :
                                               (st == 'CONFIRMED' ? '확정' :
                                               (st == 'PENDING' ? '대기' :
                                               (st == 'COMPLETED' ? '완료' :
                                               (st == 'NO_SHOW' ? '노쇼' : 'UNKNOWN'))))}"
                                      th:classappend="${
                                          st=='CONFIRMED' ? ' chip-ok' :
                                          (st=='PENDING' ? ' chip-wait' :
                                          (st=='COMPLETED' ? ' chip-done' :
                                          (st=='CANCEL_REQUEST' ? ' chip-cancel' :
                                          (st=='NO_SHOW' ? ' chip-noshow' : ' chip-unk'))))}">
                                </span>
                            </td>

                            <td class="text-center hide-md"
                                th:text="${r.createdAt != null ? #temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">-</td>

                            <td class="text-center">
                                <div class="d-inline-flex gap-1">
                                    <a class="btn btn-xs btn-sec-outline"
                                       th:href="@{|/admin/reservations/${r.reservationId}|}">상세</a>

                                    <button type="button"
                                            class="btn btn-xs btn-ghost"
                                            th:disabled="${#strings.toUpperCase(r.status) == 'CANCEL_REQUEST'}"
                                            data-bs-toggle="modal"
                                            data-bs-target="#cancelModal"
                                            th:attr="data-res-id=${r.reservationId}, data-res-num=${r.reservationNumber}">
                                        취소
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </th:block>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 하단: 총 건수 + 페이지네이션 -->
        <div class="card-footer d-flex justify-content-between align-items-center">
            <div class="small text-muted">총 <span th:text="${total}">0</span>건</div>
            <nav aria-label="pagination" class="mb-0">
                <ul class="pagination pagination-sm justify-content-center mb-0">
                    <li class="page-item" th:classappend="${hasPrevBlock == null or hasPrevBlock == false} ? ' disabled'">
                        <a class="page-link"
                           th:href="@{/admin/reservations/my(page=${startPage-1}, size=${pageSize}, status=${selectedStatus}, q=${q}, accId=${selectedAccId})}">&laquo;</a>
                    </li>
                    <li class="page-item"
                        th:each="p : ${#numbers.sequence(startPage, endPage)}"
                        th:classappend="${p == currentPage} ? ' active'">
                        <a class="page-link"
                           th:text="${p}"
                           th:href="@{/admin/reservations/my(page=${p}, size=${pageSize}, status=${selectedStatus}, q=${q}, accId=${selectedAccId})}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${hasNextBlock == null or hasNextBlock == false} ? ' disabled'">
                        <a class="page-link"
                           th:href="@{/admin/reservations/my(page=${endPage+1}, size=${pageSize}, status=${selectedStatus}, q=${q}, accId=${selectedAccId})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- 알림 -->
    <div th:if="${msg}">
        <script th:inline="javascript"> alert([[${msg}]]); </script>
    </div>

    <!-- 예약 취소 모달 (작게) -->
    <div class="modal fade" id="cancelModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <form class="modal-content" th:action="@{/admin/reservations/0/list}" method="post" id="cancelForm">
                <div class="modal-header">
                    <h5 class="modal-title">예약 취소</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2 small text-muted">
                        예약번호: <span id="cancelResNum">-</span>
                    </div>
                    <label class="form-label">취소 사유</label>
                    <textarea class="form-control" name="reason" rows="4" placeholder="관리자 취소 사유를 입력하세요" required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-pill btn-ghost" data-bs-dismiss="modal">닫기</button>
                    <button type="submit" class="btn btn-pill btn-sec-outline">취소 확정</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 모달 스크립트: 액션/예약번호 주입 -->
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function(){
            var cancelModal = document.getElementById('cancelModal');
            var cancelForm  = document.getElementById('cancelForm');
            var cancelNum   = document.getElementById('cancelResNum');

            cancelModal.addEventListener('show.bs.modal', function (event) {
                var button = event.relatedTarget;
                var id  = button.getAttribute('data-res-id');
                var num = button.getAttribute('data-res-num');

                var base = /*[[@{/admin/reservations/}]]*/ '/admin/reservations/';
                cancelForm.setAttribute('action', base + id + '/cancel');
                cancelNum.textContent = num || '-';
            });
        });
    </script>
</th:block>
</body>
</html>
