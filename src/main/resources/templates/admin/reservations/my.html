<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>내 예약 현황</title>
    <th:block layout:fragment="head">
        <style>
            .badge-status {
                font-size: .85rem;
            }

            .bg-success-subtle {
                background: #e8f5e9 !important;
                color: #2e7d32 !important;
            }

            .bg-warning-subtle {
                background: #fff8e1 !important;
                color: #8d6e63 !important;
            }

            .bg-secondary-subtle {
                background: #f1f3f5 !important;
                color: #495057 !important;
            }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <div class="page-heading d-flex justify-content-between align-items-center">
        <div>
            <h3 class="mb-1">내 예약 현황</h3>
            <p class="text-muted mb-0">내가 소속된 회사/숙소의 예약만 모아서 봅니다.</p>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/admin/reservations/list}">전체 목록</a>
            <a class="btn btn-primary" th:href="@{/admin/reservations/new(roomId=)}">+ 수동 예약 등록</a>
        </div>
    </div>

    <div class="page-content">
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                        <tr>
                            <th style="width:80px" class="text-center">번호</th>
                            <th>예약번호</th>
                            <th>예약자</th>
                            <th>숙소/객실</th>
                            <th class="text-center" style="width:160px">체크인~아웃</th>
                            <th class="text-center" style="width:90px">인원</th>
                            <th class="text-end" style="width:140px">금액</th>
                            <th class="text-center" style="width:120px">상태</th>
                            <!-- 선택 컬럼들 -->
                            <th class="text-center" style="width:150px">예약일</th>        <!-- 생성일 -->
                            <th class="text-center" style="width:120px">관리</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="r, iter : ${list}">
                            <!-- 번호: 페이지 시작 + 현재 인덱스 -->
                            <td class="text-center"
                                th:text="${(currentPage - 1) * pageSize + iter.index + 1}">1</td>
                            <td>
                                <div class="fw-semibold" th:text="${r.reservationNumber}">HR-…</div>
                            </td>
                            <td>
                                <div class="text-muted small">예약자: <span th:text="${r.guestName} ?: '-'">-</span> (<span
                                        th:text="${r.guestPhone} ?: '-'">-</span>)
                                </div>
                            </td>
                            <td>
                                <div th:text="${r.getAccommodationName()}">숙소명</div>
                                <div class="text-muted small" th:text="${r.getRoomName()} ?: '-'">객실명</div>
                            </td>
                            <td class="text-center">
                                <div th:text="${#temporals.format(r.checkInDate, 'yyyy-MM-dd')}">-</div>
                                <div class="text-muted small">~ <span
                                        th:text="${#temporals.format(r.checkOutDate, 'yyyy-MM-dd')}">-</span></div>
                            </td>
                            <td class="text-center" th:text="${r.guestCount}">2</td>
                            <td class="text-end"
                                th:text="${r.price != null ? #numbers.formatInteger(r.price.intValue(), 3, 'COMMA') : '0'}">
                                0
                            </td>
                            <td class="text-center">
                <span class="badge badge-status rounded-pill"
                      th:with="st=${#strings.toUpperCase(r.status)}"
                      th:text="${st ?: 'UNKNOWN'}"
                      th:classappend="${st=='CONFIRMED'} ? ' bg-success-subtle text-success' :
                      (${st=='PENDING'}   ? ' bg-warning-subtle text-warning' :
                      (${st=='CANCELLED'} ? ' bg-secondary-subtle text-secondary' :
                                            ' bg-light text-dark'))"></span>
                            </td>
                            <td class="text-center"
                                th:text="${r.createdAt != null ? #temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">-</td>

                            <td class="text-center">

                                <div class="btn-group btn-group-sm">
                                    <a class="btn btn-outline-primary"
                                       th:href="@{|/admin/reservations/${r.reservationId}|}">상세</a>
                                    <form th:action="@{|/admin/reservations/${r.reservationId}/cancel|}" method="post"
                                          onsubmit="return confirm('이 예약을 취소하시겠습니까?');">
                                        <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}"/>
                                        <input type="hidden" name="reason" value="관리자 취소"/>
                                        <button type="submit" class="btn btn-outline-danger"
                                                th:disabled="${#strings.toUpperCase(r.status) == 'CANCELLED'}">취소
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(list)}">
                            <td colspan="8" class="text-center py-5 text-muted">표시할 예약이 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 페이지네이션 (원하면 동일하게 붙여쓰기) -->
            <div class="card-footer d-flex justify-content-between align-items-center">
                <div class="small text-muted">총 <span th:text="${total}">0</span>건</div>

                <!-- 페이지네이션 -->
                <nav aria-label="pagination" class="mb-0">
                    <ul class="pagination justify-content-center mb-0">

                        <!-- 이전 블록 -->
                        <li class="page-item" th:classappend="${hasPrevBlock == null or hasPrevBlock == false} ? ' disabled'">
                            <a class="page-link"
                               th:href="@{/admin/reservations/my(
                              page=${startPage-1},
                              size=${pageSize},
                              status=${selectedStatus},
                              q=${q}
                            )}">&laquo;</a>
                        </li>

                        <!-- 개별 페이지 -->
                        <li class="page-item"
                            th:each="p : ${#numbers.sequence(startPage, endPage)}"
                            th:classappend="${p == currentPage} ? ' active'">
                            <a class="page-link"
                               th:text="${p}"
                               th:href="@{/admin/reservations/my(
                              page=${p},
                              size=${pageSize},
                              status=${selectedStatus},
                              q=${q}
                            )}">1</a>
                        </li>

                        <!-- 다음 블록 -->
                        <li class="page-item" th:classappend="${hasNextBlock == null or hasNextBlock == false} ? ' disabled'">
                            <a class="page-link"
                               th:href="@{/admin/reservations/my(
                              page=${endPage+1},
                              size=${pageSize},
                              status=${selectedStatus},
                              q=${q}
                            )}">&raquo;</a>
                        </li>

                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <div th:if="${msg}">
        <script th:inline="javascript"> alert([[${msg}]]); </script>
    </div>
</th:block>
</body>
</html>
