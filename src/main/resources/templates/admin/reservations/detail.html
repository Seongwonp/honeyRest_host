<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>예약 상세</title>
    <th:block layout:fragment="head">
        <style>
            :root{
                --lilac:#EDE9FE;
                --lilac-deep:#6D28D9;
                --lilac-deeper:#5B21B6;
                --soft:#F7F9FC;
                --line:#E9EDF5;
                --slate:#475569;
            }
            body{ background:var(--soft); }

            /* 카드/섹션 */
            .card{ border:1px solid var(--line); border-radius:16px; box-shadow:0 8px 24px rgba(2,6,23,.05); }
            .card-header{ border-bottom:1px solid var(--line); }
            .section-title{ font-weight:800; letter-spacing:.2px; color:#334155; }

            /* 헤더 바 */
            .page-heading h3{ font-weight:800; letter-spacing:.2px; }
            .page-heading .sub{ color:#94A3B8; }

            /* 알약 버튼(라벤더 외곽선) */
            .btn-pill{
                border-radius:9999px;
                padding:.5rem 1rem;
                font-weight:700;
                letter-spacing:.2px;
            }
            .btn-outline-lilac{
                background:#fff;
                border:1.5px solid var(--lilac-deep);
                color:var(--lilac-deeper);
            }
            .btn-outline-lilac:hover{ background:var(--lilac); }

            /* key–value 줄맞춤 */
            .kv{ display:flex; gap:.75rem; }
            .kv dt{ min-width:120px; color:#6c757d; margin:0; }
            .kv dd{ margin:0; font-weight:700; color:#334155; }

            /* 상태 배지 (파스텔) */
            .badge-soft{
                border-radius:9999px;
                padding:.4rem .7rem;
                font-size:.85rem;
                font-weight:800;
                border:1px solid transparent;
            }
            .badge-confirmed{ background:#D9F7F1; color:#0F766E; border-color:rgba(15,118,110,.15); }
            .badge-pending  { background:#FFF8E1; color:#8D6E63; border-color:#FDE68A; }
            .badge-cancel   { background:#F1F5F9; color:#334155; border-color:#E2E8F0; }
            .badge-unknown  { background:#EEE; color:#475569; border-color:#E5E7EB; }

            /* 사이드 요약 아이콘 행 간격 */
            .summary li{ display:flex; align-items:center; gap:.5rem; }
            .summary i{ color:#94A3B8; }

            @media (max-width: 768px){
                .kv dt{ min-width:100px; }
            }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="content">

    <!-- 헤더 -->
    <div class="page-heading d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
            <h3 class="mb-1">예약 상세</h3>
            <div class="sub">예약 번호와 상태, 투숙 정보, 결제 금액을 확인하세요.</div>
        </div>
        <div class="d-flex gap-2">
            <!-- 전체 목록 버튼 제거, 요청대로 유지: 내 예약 현황만 -->
            <a class="btn btn-pill btn-outline-lilac" th:href="@{/admin/reservations/my}">← 내 예약 현황</a>
        </div>
    </div>

    <!-- 예약 없을 때 -->
    <div class="alert alert-danger" th:if="${reservation == null}">예약을 찾을 수 없습니다.</div>

    <div class="page-content" th:if="${reservation != null}">
        <section class="row">
            <!-- 본문 -->
            <div class="col-12 col-xl-8">
                <!-- 기본 정보 -->
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-light"><span class="section-title">기본 정보</span></div>
                    <div class="card-body" th:object="${reservation}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="kv"><dt>예약 ID</dt><dd th:text="*{reservationId}">-</dd></div>
                                <div class="kv"><dt>예약 번호</dt><dd th:text="*{reservationNumber}">-</dd></div>
                                <div class="kv"><dt>상태</dt>
                                    <dd>
                    <span class="badge-soft"
                          th:with="st=${#strings.toUpperCase(reservation.status)}"
                          th:text="${st ?: 'UNKNOWN'}"
                          th:classappend="${
                             st=='CONFIRMED' ? ' badge-confirmed' :
                             (st=='PENDING' ? ' badge-pending' :
                             (st=='CANCELLED' ? ' badge-cancel' : ' badge-unknown'))}">
                    </span>
                                    </dd>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="kv"><dt>생성일</dt>
                                    <dd th:text="${#temporals.format(reservation.createdAt, 'yyyy-MM-dd HH:mm')}">-</dd></div>
                                <div class="kv"><dt>수정일</dt>
                                    <dd th:text="${#temporals.format(reservation.updatedAt, 'yyyy-MM-dd HH:mm')}">-</dd></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 투숙/객실 정보 -->
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-light"><span class="section-title">투숙/객실 정보</span></div>
                    <div class="card-body" th:object="${reservation}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="kv"><dt>숙소명</dt><dd th:text="*{accommodationName}">-</dd></div>
                                <div class="kv"><dt>객실명</dt><dd th:text="*{roomName} ?: '-'">-</dd></div>
                                <div class="kv"><dt>체크인</dt><dd th:text="${#temporals.format(reservation.checkInDate, 'yyyy-MM-dd')}">-</dd></div>
                                <div class="kv"><dt>체크아웃</dt><dd th:text="${#temporals.format(reservation.checkOutDate, 'yyyy-MM-dd')}">-</dd></div>
                            </div>
                            <div class="col-md-6">
                                <div class="kv"><dt>인원</dt><dd th:text="*{guestCount}">-</dd></div>
                                <div class="kv"><dt>요청사항</dt><dd th:text="*{specialRequest} ?: '-'">-</dd></div>
                                <div class="kv"><dt>취소사유</dt><dd th:text="*{cancelReason} ?: '-'">-</dd></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 예약자 / 결제 -->
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-light"><span class="section-title">예약자 / 결제</span></div>
                    <div class="card-body" th:object="${reservation}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="kv"><dt>예약자</dt><dd th:text="*{guestName}">-</dd></div>
                                <div class="kv"><dt>연락처</dt><dd th:text="*{guestPhone}">-</dd></div>
                            </div>
                            <div class="col-md-6">
                                <div class="kv">
                                    <dt>결제 금액</dt>
                                    <dd>
                                        <span th:text="${reservation.price != null ? #numbers.formatInteger(reservation.price.intValue(), 3, 'COMMA') : '0'}">0</span> 원
                                    </dd>
                                </div>
                                <div class="kv"><dt>결제 방법</dt>
                                    <dd th:text="${reservation.payment != null && reservation.payment.paymentMethod != null ? reservation.payment.paymentMethod : '-'}">-</dd></div>
                                <div class="kv"><dt>결제 상태</dt>
                                    <dd th:text="${reservation.payment != null && reservation.payment.paymentStatus != null ? reservation.payment.paymentStatus : '-'}">-</dd></div>
                                <div class="kv"><dt>결제일</dt>
                                    <dd th:text="${reservation.payment != null && reservation.payment.paymentDate != null ? #temporals.format(reservation.payment.paymentDate,'yyyy-MM-dd HH:mm') : '-'}">-</dd></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 액션 -->
                <div class="card shadow-sm">
                    <div class="card-body d-flex flex-wrap gap-2">
                        <a class="btn btn-pill btn-outline-lilac" th:href="@{/admin/reservations/my}">목록</a>

                        <form th:action="@{|/admin/reservations/${reservation.reservationId}/cancel|}" method="post"
                              onsubmit="return confirm('이 예약을 취소하시겠습니까?');">
                            <!-- CSRF -->
                            <input type="hidden" th:if="${_csrf}"
                                   th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="reason" value="관리자 취소"/>
                            <button type="submit" class="btn btn-pill btn-outline-lilac"
                                    th:disabled="${#strings.toUpperCase(reservation.status) == 'CANCELLED'}">
                                예약 취소
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 사이드 요약 -->
            <div class="col-12 col-xl-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-light"><span class="section-title">요약</span></div>
                    <div class="card-body">
                        <ul class="list-unstyled mb-0 summary" th:object="${reservation}">
                            <li class="mb-2"><i class="bi bi-hash"></i><strong th:text="*{reservationNumber}">-</strong></li>
                            <li class="mb-2"><i class="bi bi-house"></i><span th:text="*{accommodationName}">-</span></li>
                            <li class="mb-2"><i class="bi bi-door-open"></i><span th:text="*{roomName} ?: '-'">-</span></li>
                            <li class="mb-2"><i class="bi bi-people"></i><span th:text="*{guestCount}">-</span>명</li>
                            <li class="mb-2"><i class="bi bi-calendar-event"></i>
                                <span th:text="${#temporals.format(reservation.checkInDate, 'MM/dd')}">-</span> ~
                                <span th:text="${#temporals.format(reservation.checkOutDate, 'MM/dd')}">-</span>
                            </li>
                            <li class="mb-2"><i class="bi bi-currency-exchange"></i>
                                <strong th:text="${reservation.price != null ? #numbers.formatInteger(reservation.price.intValue(), 3, 'COMMA') : '0'}">0</strong> 원
                            </li>
                            <li class="mb-2"><i class="bi bi-credit-card"></i>
                                <span th:text="${reservation.payment != null && reservation.payment.paymentMethod != null ? reservation.payment.paymentMethod : '-'}">-</span>
                            </li>
                            <li>
                <span class="badge-soft"
                      th:with="st=${#strings.toUpperCase(reservation.status)}"
                      th:text="${st ?: 'UNKNOWN'}"
                      th:classappend="${
                         st=='CONFIRMED' ? ' badge-confirmed' :
                         (st=='PENDING' ? ' badge-pending' :
                         (st=='CANCELLED' ? ' badge-cancel' : ' badge-unknown'))}">
                </span>
                            </li>
                        </ul>
                    </div>
                </div>

                <div th:if="${msg}">
                    <script th:inline="javascript"> alert([[${msg}]]); </script>
                </div>
            </div>
        </section>
    </div>
</th:block>

<th:block layout:fragment="script">
    <!-- 필요 시 스크립트 -->
</th:block>
</body>
</html>
