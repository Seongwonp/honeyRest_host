<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>예약 목록</title>
    <th:block layout:fragment="head">
        <style>
            .table td,.table th{vertical-align:middle}
            .badge-light{background:#f8f9fa;color:#343a40}
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="content">

    <!-- 플래시 메시지 -->
    <div th:if="${msg}" class="alert alert-success" role="alert" th:text="${msg}">수정되었습니다.</div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0 fw-bold">예약 목록</h3>
        <a class="btn btn-outline-secondary" href="/admin/reservations/my">내 예약 현황</a>
    </div>

    <div class="card mb-3 shadow-sm">
        <div class="card-body">
            <form method="get" class="row g-2">
                <div class="col-md-3">
                    <input type="text" class="form-control" name="number" placeholder="예약번호 검색"
                           th:value="${number}">
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="ALL" th:selected="${selectedStatus}=='ALL'">전체 상태</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                th:selected="${selectedStatus}==${s}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select class="form-select" name="size">
                        <option th:value="10" th:selected="${pageSize==10}">10개</option>
                        <option th:value="20" th:selected="${pageSize==20}">20개</option>
                        <option th:value="50" th:selected="${pageSize==50}">50개</option>
                    </select>
                </div>
                <div class="col-md-4 text-end">
                    <button class="btn btn-primary" type="submit">조회</button>
                    <a class="btn btn-light" th:href="@{/admin/reservations/list}">초기화</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th style="width:80px" class="text-center">#</th>
                        <th style="width:160px">예약번호</th>
                        <th>숙소/객실</th>
                        <th style="width:140px">체크인</th>
                        <th style="width:140px">체크아웃</th>
                        <th style="width:120px" class="text-end">금액</th>
                        <th style="width:120px" class="text-center">상태</th>
                        <th style="width:140px" class="text-center">관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r,iter : ${list}">
                        <td class="text-center"
                            th:text="${(currentPage-1)*pageSize + iter.index + 1}">1</td>
                        <td>
                            <div class="fw-semibold" th:text="${r.reservationNumber}">HR-...</div>
                            <div class="text-muted small">ID: <span th:text="${r.reservationId}">1</span></div>
                        </td>
                        <td>
                            <div th:text="${r.accommodationName}">숙소명</div>
                            <div class="text-muted small" th:text="${r.roomName}">객실명</div>
                        </td>
                        <td th:text="${r.checkInDate}">2025-08-20</td>
                        <td th:text="${r.checkOutDate}">2025-08-21</td>
                        <td class="text-end" th:text="${r.price}">120000</td>
                        <td class="text-center">
              <span class="badge"
                    th:classappend="${r.status}=='CONFIRMED' ? ' bg-success-subtle text-success' :
                                    (${r.status}=='PENDING' ? ' bg-warning-subtle text-warning' :
                                    (${r.status}=='CANCELLED' ? ' bg-secondary' : ' badge-light'))"
                    th:text="${r.status}">CONFIRMED</span>
                        </td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">
                                <a class="btn btn-outline-primary"
                                   th:href="@{|/admin/reservations/${r.reservationId}|}">상세</a>
                                <form th:action="@{|/admin/reservations/${r.reservationId}/cancel|}" method="post"
                                      th:if="${r.status!='CANCELLED'}" onsubmit="return confirm('취소하시겠어요?')">
                                    <button type="submit" class="btn btn-outline-danger">취소</button>
                                </form>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(list)}">
                        <td colspan="8" class="text-center py-5 text-muted">데이터가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 페이지네이션 -->
        <div class="card-footer d-flex justify-content-between align-items-center">
            <div class="small text-muted">
                총 <span th:text="${total}">0</span>건 · 페이지
                <span th:text="${currentPage}">1</span>/<span th:text="${totalPages}">1</span>
            </div>
            <nav th:if="${totalPages > 1}">
                <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${currentPage==1} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/reservations/list(page=${currentPage-1},size=${pageSize},status=${selectedStatus},number=${number})}">이전</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                        th:classappend="${i==currentPage} ? 'active'">
                        <a class="page-link"
                           th:text="${i}"
                           th:href="@{/admin/reservations/list(page=${i},size=${pageSize},status=${selectedStatus},number=${number})}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage==totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/reservations/list(page=${currentPage+1},size=${pageSize},status=${selectedStatus},number=${number})}">다음</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</th:block>

<th:block layout:fragment="script">
    <script th:if="${msg}" th:inline="javascript">
        // 메시지 토스트/알림이 필요하면 alert으로 간단 처리
        alert([[${msg}]]);
    </script>
</th:block>
</body>
</html>
