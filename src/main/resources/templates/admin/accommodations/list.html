<!-- templates/admin/accommodations/list.html -->
<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>숙소 목록</title>
    <th:block layout:fragment="head">
        <style>
            .status-badge {
                padding: 0.35em 0.65em;
                border-radius: 0.25rem;
                font-size: .75rem;
                font-weight: 500;
            }
            .status-pending {background-color: #fff3cd; color: #856404;}
            .status-approved {background-color: #d4edda; color: #155724;}
            .status-rejected {background-color: #f8d7da; color: #721c24;}
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <div class="page-heading d-flex justify-content-between align-items-center">
        <h3 class="mb-0">숙소 목록</h3>
        <a th:href="@{/admin/accommodations/add}" class="btn btn-primary">+ 새 숙소 등록</a>
    </div>

    <div class="card mt-3">
        <div class="card-body table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                <tr>
                    <th>번호</th>
                    <th>숙소명</th>
                    <th>카테고리</th>
                    <th>지역</th>
                    <th>상태</th>
                    <th>등록일</th>
                    <th>액션</th>
                </tr>
                </thead>
                <tbody>
                <!-- 컨트롤러에서 model.addAttribute("accommodations", service.getAll()); -->
                <tr th:each="acc, stat : ${accommodations}">
                    <td th:text="${acc.accommodationId}">1</td>
                    <td>
                        <span th:text="${acc.name}">허니레스트 강남점</span>
                    </td>
                    <td th:text="${acc.categoryName}">호텔</td>
                    <td>
                        <span th:text="${acc.mainRegionName}">서울</span>
                        <span th:text="${acc.subRegionName}">강남구</span>
                    </td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${acc.status}=='PENDING' ? 'status-pending'
                                            : ${acc.status}=='APPROVED' ? 'status-approved'
                                            : 'status-rejected'"
                              th:text="${acc.status}">승인대기</span>
                    </td>
                    <td th:text="${#temporals.format(acc.createdAt, 'yyyy-MM-dd HH:mm')}">
                        2025-08-19
                    </td>
                    <td>
                        <a th:href="@{/admin/accommodations/detail/{id}(id=${acc.accommodationId})}"
                           class="btn btn-sm btn-outline-primary">상세보기</a>
                        <a th:href="@{/admin/accommodations/edit/{id}(id=${acc.accommodationId})}"
                           class="btn btn-sm btn-outline-secondary">수정</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(accommodations)}">
                    <td colspan="7" class="text-center text-muted">등록된 숙소가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</body>
</html>
