<!-- templates/admin/accommodations/cancel-requests.html -->
<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>숙소 목록</title>
    <th:block layout:fragment="head">
        <style>
            :root{
                --mint:#D9F7F1;      /* 파스텔 민트 */
                --mint-deep:#0F766E;
                --lilac:#EDE9FE;     /* 파스텔 라일락 */
                --lilac-deep:#6a2fc8;/* 톤다운 보라 */
                --soft-gray:#F8FAFC;
                --ink:#0F172A;
                --line:#eef0f4;
            }

            body { background:#f7f9fc; }

            /* 공통 카드 */
            .card{ border:none; border-radius:16px; box-shadow:0 8px 24px rgba(2,6,23,.06); }

            /* 헤더/툴바 */
            .toolbar{
                display:flex; gap:1rem; align-items:center; justify-content:space-between;
                margin-bottom:1.25rem; /* 간격 ↑ */
            }
            .toolbar h3{ font-weight:700; letter-spacing:.2px; } /* 800 → 700 */
            .count-badge{
                background: var(--lilac); color: var(--lilac-deep);
                border-radius: 9999px; padding:.32rem .6rem;
                font-weight:700; font-size:.78rem; margin-left:.5rem;
            }
            .search-wrap{
                display:flex; gap:.5rem; align-items:center; background:var(--soft-gray);
                border-radius:12px; padding:.38rem .5rem;
            }
            .search-wrap input{
                border:none; background:transparent; box-shadow:none; min-width:220px;
                font-weight:500;
            }
            .search-wrap input:focus{ outline:none; box-shadow:none; }

            /* 표 */
            .table thead{ background:linear-gradient(0deg,#fff,#fff); }
            .table thead th{
                border-bottom:1px solid var(--line)!important; color:#475569;
                font-weight:600; font-size:.9rem; /* 700 → 600 */
                padding-top:1rem; padding-bottom:1rem; /* 헤더 호흡 ↑ */
            }
            .table tbody td{
                vertical-align:middle; border-color:#f1f5f9;
                padding-top:.9rem; padding-bottom:.9rem; /* 행간 ↑ */
                font-weight:500; color:#334155;         /* 600 → 500 */
            }
            .table-hover tbody tr:hover{ background:#FBFEFF; }

            /* 썸네일 */
            .thumb{ width:56px; height:56px; object-fit:cover; border-radius:12px; border:1px solid #e5e7eb; background:#f6f8fb; }
            .thumb-empty{
                width:56px; height:56px; border-radius:12px; border:1px dashed #cbd5e1; color:#94a3b8; font-size:.75rem;
                display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg,#fff,#fbfdff);
            }

            /* 칩/배지 */
            .badge-chip{font-weight:700; padding:.3rem .6rem; border-radius:999px; font-size:.78rem; border:1px solid transparent; letter-spacing:.2px;} /* 800→700, 패딩↓ */
            .badge-active  { background:var(--mint);   color:var(--mint-deep);   border-color:rgba(15,118,110,.15); }
            .badge-pending { background:#FFFBEB;       color:#92400e;           border-color:#FDE68A; }
            .badge-inactive{ background:#F1F5F9;       color:#334155;           border-color:#E2E8F0; }
            .badge-rejected{ background:#FEE2E2;       color:#991B1B;           border-color:#FECACA; }

            .pill{
                border-radius:9999px; padding:.22rem .5rem; font-weight:600; font-size:.74rem; /* 굵기↓, 부피↓ */
                border:1px solid #e2e8f0; background:#f8fafc; color:#334155;
            }

            /* 버튼 (부피↓, 굵기↓) */
            .btn-chip{ border-radius:999px; padding:.3rem .6rem; font-weight:700; font-size:.84rem; }
            .btn-outline-primary, .btn-outline-secondary{ border-radius:10px; }
            .btn-outline-primary:hover{ background:var(--mint); border-color:var(--mint-deep); color:var(--mint-deep); }
            .btn-outline-secondary:hover{ background:var(--lilac); border-color:var(--lilac-deep); color:var(--lilac-deep); }
            .btn-ghost{ background:#fff; border:1.2px solid #2563eb; color:#1d4ed8; } /* 1.5px→1.2px */
            .btn-ghost:hover{ background:#eff6ff; }
            .btn-soft{ background:#f8fafc; border:1px solid #e5e7eb; color:#334155; }
            .btn-soft:hover{ background:#eef2f7; }
            .btn-danger-soft{ background:#fff; border:1.2px solid #ef4444; color:#b91c1c; }
            .btn-danger-soft:hover{ background:#fff1f2; color:#991b1b; }

            /* 뷰 토글 (톤다운/부피↓) */
            .view-toggle .btn{
                border-radius:999px; padding:.3rem .6rem; font-weight:700;
            }
            .view-toggle .btn-primary{
                background:var(--lilac); border-color:var(--lilac-deep); color:var(--lilac-deep);
            }
            .view-toggle .btn-outline-primary:hover{
                background:var(--mint); border-color:var(--mint-deep); color:var(--mint-deep);
            }

            /* 카드 그리드 */
            .acc-card{ border-radius:16px; overflow:hidden; }
            .acc-cover{ width:100%; height:160px; object-fit:cover; background:#f6f8fb; }
            .acc-meta{ font-size:.88rem; color:#64748b; }
            .price{ font-weight:700; } /* 800 → 700 */

            /* 액션칸 간격 조금 더 */
            td .d-inline-flex.gap-1{ gap:.6rem !important; }

            /* 페이지네이션 (톤 유지/굵기↓) */
            .pagination .page-link{ border:none; border-radius:10px; color:#475569; font-weight:600; }
            .pagination .page-item.active .page-link{ background:var(--lilac); color:var(--lilac-deep); font-weight:700; }
            .pagination .page-item:not(.active) .page-link:hover{ background:var(--mint); color:var(--mint-deep); }

            /* Empty state */
            .empty-state{ text-align:center; padding:3rem 1rem; color:#64748B; }
            .empty-state .emoji{ font-size:1.8rem; display:block; margin-bottom:.4rem; }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content"
          th:with="
            v=${param.view != null ? param.view[0] : 'list'},
            s=${param.status != null ? param.status[0] : null},
            q=${param.q != null ? param.q[0] : null}
          ">

    <!-- 헤더 + 툴바 -->
    <div class="toolbar">
        <div class="d-flex align-items-center gap-2">
            <h3 class="mb-0">숙소 관리</h3>
            <span class="count-badge" th:text="'총 ' + ${page.totalElements} + '개'">총 0개</span>
        </div>

        <div class="d-flex align-items-center gap-2">
            <!-- 필터/검색 -->
            <form class="search-wrap" method="get" th:action="@{/admin/accommodations/list}">
                <input type="hidden" name="view" th:value="${v}">
                <select name="status" class="form-select form-select-sm" style="width:auto">
                    <option value="" th:selected="${s == null}">전체 상태</option>
                    <option value="ACTIVE"   th:selected="${s=='ACTIVE'}">ACTIVE</option>
                    <option value="PENDING"  th:selected="${s=='PENDING'}">PENDING</option>
                    <option value="INACTIVE" th:selected="${s=='INACTIVE'}">INACTIVE</option>
                    <option value="REJECTED" th:selected="${s=='REJECTED'}">REJECTED</option>
                </select>
                <input type="search" name="q" placeholder="숙소명/지역 검색" th:value="${q}">
                <button class="btn btn-primary btn-sm" style="font-weight:700; padding:.32rem .7rem;">검색</button>
            </form>

            <!-- 뷰 토글 -->
            <div class="view-toggle btn-group">
                <a class="btn btn-sm" th:classappend="${v}=='list' ? 'btn-primary' : 'btn-outline-primary'"
                   th:href="@{/admin/accommodations/list(view='list', status=${s}, q=${q}, page=${page.number}, size=${page.size})}">
                    <i class="bi bi-table"></i> 리스트
                </a>
                <a class="btn btn-sm" th:classappend="${v}=='grid' ? 'btn-primary' : 'btn-outline-primary'"
                   th:href="@{/admin/accommodations/list(view='grid', status=${s}, q=${q}, page=${page.number}, size=${page.size})}">
                    <i class="bi bi-grid-3x3-gap"></i> 카드
                </a>
            </div>

            <a th:href="@{/admin/accommodations/add}" class="btn btn-primary btn-chip">+ 새 숙소 등록</a>
        </div>
    </div>

    <!-- 리스트 뷰 -->
    <div class="card" th:if="${v}=='list'">
        <div class="card-body table-responsive">
            <table class="table table-hover align-middle">
                <colgroup>
                    <col style="width:70px;"/>
                    <col style="width:84px;"/>
                    <col/>
                    <col style="width:160px;"/>
                    <col style="width:160px;"/>
                    <col style="width:120px;"/>
                    <col style="width:140px;"/>
                    <col style="width:260px;"/>
                </colgroup>

                <thead>
                <tr>
                    <th class="text-center">번호</th>
                    <th class="text-center">썸네일</th>
                    <th>숙소명</th>
                    <th>카테고리</th>
                    <th>지역</th>
                    <th class="text-end">최저가</th>
                    <th class="text-center">상태</th>
                    <th class="text-center">액션</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="acc, iStat : ${accommodations}">
                    <!-- 번호 -->
                    <td class="text-center" th:text="${iStat.index + 1}">1</td>

                    <!-- 썸네일 -->
                    <td class="text-center">
                        <img th:if="${acc.thumbnail != null and !#strings.isEmpty(acc.thumbnail)}"
                             th:src="@{${acc.thumbnail}}" alt="thumb" class="thumb">
                        <span th:if="${acc.thumbnail == null or #strings.isEmpty(acc.thumbnail)}"
                              class="thumb-empty">없음</span>
                    </td>

                    <!-- 숙소명 + 보조 메타 -->
                    <td class="fw-semibold">
                        <div style="font-weight:600;" th:text="${acc.name}">숙소명</div>
                        <div class="acc-meta">
                            <span class="pill me-1" th:text="${acc.categoryName ?: '카테고리 없음'}">카테고리</span>
                            <span class="pill" th:text="${acc.regionName ?: '지역 없음'}">지역</span>
                        </div>
                    </td>

                    <!-- 카테고리/지역 (열 유지) -->
                    <td th:text="${acc.categoryName ?: '-'}">카테고리</td>
                    <td th:text="${acc.regionName ?: '-'}">지역</td>

                    <!-- 최저가 -->
                    <td class="text-end price"
                        th:text="${acc.minPrice != null ? #numbers.formatDecimal(acc.minPrice,0,'COMMA',0,'POINT') + '원' : '-'}">-</td>

                    <!-- 상태 뱃지 -->
                    <td class="text-center">
                        <span class="badge-chip"
                              th:classappend="${
                                #strings.equalsIgnoreCase(acc.status,'ACTIVE')   ? ' badge-active'  :
                                #strings.equalsIgnoreCase(acc.status,'PENDING')  ? ' badge-pending' :
                                #strings.equalsIgnoreCase(acc.status,'INACTIVE') ? ' badge-inactive':
                                                                                    ' badge-rejected'
                              }"
                              th:text="${acc.status}">ACTIVE</span>
                    </td>

                    <!-- 액션 -->
                    <td class="text-center">
                        <div class="d-inline-flex gap-1">
                            <a class="btn btn-ghost btn-chip"
                               th:href="@{/admin/accommodations/detail/{id}(id=${acc.accommodationId})}">상세</a>
                            <a class="btn btn-soft btn-chip"
                               th:href="@{/admin/accommodations/edit/{id}(id=${acc.accommodationId})}">수정</a>
                            <a class="btn btn-soft btn-chip"
                               th:href="@{|/admin/rooms/list/by-accommodation?accommodationId=${acc.accommodationId}|}">객실목록</a>

                            <form th:action="@{/admin/accommodations/{id}/delete(id=${acc.accommodationId})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.');">
                                <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
                                <button type="submit" class="btn btn-danger-soft btn-chip">삭제</button>
                            </form>
                        </div>
                    </td>
                </tr>

                <tr th:if="${accommodations == null or #lists.isEmpty(accommodations)}">
                    <td colspan="8" class="empty-state">
                        <span class="emoji">🫧</span>
                        등록된 숙소가 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- 페이지네이션 -->
            <div class="d-flex justify-content-between align-items-center mt-3">
                <div class="text-muted">
                    총 <span th:text="${page.totalElements}">0</span>개 /
                    <span th:text="${page.number + 1}">1</span> /
                    <span th:text="${page.totalPages}">1</span> 페이지
                </div>

                <nav th:if="${page.totalPages > 0}">
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${page.first}? ' disabled'">
                            <a class="page-link"
                               th:href="@{/admin/accommodations/list(view=${v}, status=${s}, q=${q}, page=${page.number - 1}, size=${page.size})}">&laquo;</a>
                        </li>
                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                            th:classappend="${i == page.number}? ' active'">
                            <a class="page-link" th:text="${i + 1}"
                               th:href="@{/admin/accommodations/list(view=${v}, status=${s}, q=${q}, page=${i}, size=${page.size})}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${page.last}? ' disabled'">
                            <a class="page-link"
                               th:href="@{/admin/accommodations/list(view=${v}, status=${s}, q=${q}, page=${page.number + 1}, size=${page.size})}">&raquo;</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- 카드 뷰 -->
    <div th:if="${v}=='grid'">
        <div class="row g-3">
            <div class="col-12" th:if="${accommodations == null or #lists.isEmpty(accommodations)}">
                <div class="empty-state">
                    <span class="emoji">🫧</span>
                    등록된 숙소가 없습니다.
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-4" th:each="acc : ${accommodations}">
                <div class="card acc-card h-100">
                    <img class="acc-cover"
                         th:if="${acc.thumbnail != null and !#strings.isEmpty(acc.thumbnail)}"
                         th:src="@{${acc.thumbnail}}" alt="cover">
                    <div th:if="${acc.thumbnail == null or #strings.isEmpty(acc.thumbnail)}"
                         class="d-flex align-items-center justify-content-center acc-cover text-muted">
                        썸네일 없음
                    </div>

                    <div class="card-body">
                        <div class="d-flex align-items-start justify-content-between">
                            <h5 class="mb-1" style="font-weight:700;" th:text="${acc.name}">숙소명</h5>
                            <span class="badge-chip"
                                  th:classappend="${
                                      #strings.equalsIgnoreCase(acc.status,'ACTIVE')   ? ' badge-active'  :
                                      #strings.equalsIgnoreCase(acc.status,'PENDING')  ? ' badge-pending' :
                                      #strings.equalsIgnoreCase(acc.status,'INACTIVE') ? ' badge-inactive':
                                                                                          ' badge-rejected'}"
                                  th:text="${acc.status}">ACTIVE</span>
                        </div>

                        <div class="acc-meta mb-2">
                            <span class="pill me-1" th:text="${acc.categoryName ?: '카테고리 없음'}">카테고리</span>
                            <span class="pill"     th:text="${acc.regionName ?: '지역 없음'}">지역</span>
                        </div>

                        <div class="price" th:text="${acc.minPrice != null ? #numbers.formatDecimal(acc.minPrice,0,'COMMA',0,'POINT') + '원' : '-'}">-</div>
                    </div>

                    <div class="card-footer bg-white border-0 pt-0 pb-3 px-3">
                        <div class="d-flex gap-2">
                            <a class="btn btn-sm btn-ghost"
                               th:href="@{/admin/accommodations/detail/{id}(id=${acc.accommodationId})}">상세</a>
                            <a class="btn btn-sm btn-soft"
                               th:href="@{/admin/accommodations/edit/{id}(id=${acc.accommodationId})}">수정</a>
                            <a class="btn btn-sm btn-soft"
                               th:href="@{|/admin/rooms/list/by-accommodation?accommodationId=${acc.accommodationId}|}">객실목록</a>
                            <form th:action="@{/admin/accommodations/{id}/delete(id=${acc.accommodationId})}"
                                  method="post" class="d-inline ms-auto"
                                  onsubmit="return confirm('정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.');">
                                <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
                                <button type="submit" class="btn btn-sm btn-danger-soft">삭제</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div><!-- /card col -->
        </div>

        <!-- 페이지네이션(카드뷰도 동일) -->
        <nav class="mt-3" th:if="${page.totalPages > 0}">
            <ul class="pagination pagination-sm justify-content-center">
                <li class="page-item" th:classappend="${page.first}? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/accommodations/list(view=${v}, status=${s}, q=${q}, page=${page.number - 1}, size=${page.size})}">&laquo;</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                    th:classappend="${i == page.number}? 'active'">
                    <a class="page-link" th:text="${i + 1}"
                       th:href="@{/admin/accommodations/list(view=${v}, status=${s}, q=${q}, page=${i}, size=${page.size})}">1</a>
                </li>
                <li class="page-item" th:classappend="${page.last}? 'disabled'">
                    <a class="page-link"
                       th:href="@{/admin/accommodations/list(view=${v}, status=${s}, q=${q}, page=${page.number + 1}, size=${page.size})}">&raquo;</a>
                </li>
            </ul>
        </nav>
    </div>
</th:block>

<th:block layout:fragment="script">
    <script th:if="${param.updated}">
        alert('수정되었습니다.');
    </script>
</th:block>
</body>
</html>
