<!-- templates/admin/accommodations/detail.html -->
<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
  <title>숙소 상세</title>
  <th:block layout:fragment="head">
    <style>
      .status-badge { padding:.35em .65em;border-radius:.25rem;font-size:.75rem;font-weight:500; }
      .status-pending{background:#fff3cd;color:#856404}
      .status-approved{background:#d4edda;color:#155724}
      .status-rejected{background:#f8d7da;color:#721c24}
      .status-active{background:#e7f1ff;color:#0a58ca}
      .thumb{width:96px;height:96px;object-fit:cover;border-radius:.5rem;border:1px solid #eee}
      .kv dt{color:#6c757d}
      .tag{display:inline-block;padding:.25rem .5rem;border:1px solid #e5e7eb;border-radius:.5rem;margin:.125rem;font-size:.8rem}
    </style>
  </th:block>
</head>
<body>
<th:block layout:fragment="content">
  <div class="page-heading d-flex justify-content-between align-items-center">
    <h3 class="mb-0">숙소 상세</h3>
    <div class="d-flex gap-2">
      <a th:href="@{/admin/accommodations/edit/{id}(id=${acc.accommodationId})}" class="btn btn-outline-secondary">수정</a>
      <a th:href="@{/admin/accommodations/list}" class="btn btn-primary">목록으로</a>
    </div>
  </div>

  <div class="card mt-3">
    <div class="card-body">
      <!-- 상단 요약 -->
      <div class="d-flex align-items-center gap-3 mb-3">
        <img th:if="${acc.thumbnail}" th:src="${acc.thumbnail}" alt="thumbnail" class="thumb">
        <div>
          <h4 class="mb-1" th:text="${acc.name}">숙소명</h4>
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <span>·</span>
            카테고리:
            <span th:text="${categoryName != null ? categoryName : '-'}"></span>
            <span>·</span>
            &nbsp;·&nbsp;지역:
            <span th:text="${mainRegionName != null ? mainRegionName : '-'}"></span>
            <span th:if="${subRegionName != null}" th:text="' / ' + ${subRegionName}"></span>
            <span>·</span>
            <strong th:text="|최저가 ${#numbers.formatDecimal(acc.minPrice,0,'COMMA',0,'POINT')}원|">최저가</strong>
            <span class="status-badge"
                  th:classappend="${#strings.equalsIgnoreCase(acc.status,'PENDING') ? ' status-pending'
                                   : (#strings.equalsIgnoreCase(acc.status,'APPROVED') ? ' status-approved'
                                   : (#strings.equalsIgnoreCase(acc.status,'ACTIVE') ? ' status-active' : ' status-rejected'))}"
                  th:text="${acc.status}">ACTIVE</span>
          </div>
        </div>
      </div>

      <hr>

      <!-- 기본 정보 -->
      <div class="row">
        <div class="col-lg-6">
          <h6 class="mb-3">기본 정보</h6>
          <dl class="row kv">
            <dt class="col-sm-3">업체명</dt>
            <dd class="col-sm-9" th:text="${companyName}">1</dd>

            <dt class="col-sm-3">주소</dt>
            <dd class="col-sm-9" th:text="${acc.address}">주소</dd>

            <dt class="col-sm-3">체크인</dt>
            <dd class="col-sm-9" th:text="${acc.checkInTime != null ? #temporals.format(acc.checkInTime,'HH:mm') : '-'}">15:00</dd>

            <dt class="col-sm-3">체크아웃</dt>
            <dd class="col-sm-9" th:text="${acc.checkOutTime != null ? #temporals.format(acc.checkOutTime,'HH:mm') : '-'}">11:00</dd>

            <dt class="col-sm-3">평점</dt>
            <dd class="col-sm-9" th:text="${acc.rating}">4.8</dd>
          </dl>
        </div>
        <div class="col-lg-6">
          <h6 class="mb-3">숙소 소개</h6>
          <p class="text-muted" th:text="${acc.description}">설명</p>

          <h6 class="mt-4 mb-2">확인사항 및 기타</h6>
          <ul th:if="${amenitiesList != null and !amenitiesList.isEmpty()}">
            <li th:each="a : ${amenitiesList}" th:text="${a}"></li>
          </ul>

<!--          <p th:if="${amenitiesList == null or amenitiesList.isEmpty()}" class="text-muted">등록된 확인사항이 없습니다.</p>-->


        </div>
      </div>

      <hr>

      <!-- 이미지 -->
      <h6 class="mb-3">이미지</h6>
      <div class="row g-3">
        <div class="col-6 col-md-3" th:each="img : ${acc.images}">
          <img th:src="${img.imageUrl}" class="w-100 rounded border" style="height:160px;object-fit:cover" alt="image">
          <div class="small text-muted mt-1" th:text="${img.imageType}">MAIN</div>
        </div>
        <div th:if="${acc.images == null or #lists.isEmpty(acc.images)}" class="text-muted">등록된 이미지가 없습니다.</div>
      </div>

      <hr>

      <!-- 태그 -->
      <h6 class="mb-2">태그</h6>
      <div>
        <span class="tag" th:each="t : ${acc.tags}" th:text="${t.name}">오션뷰</span>
        <span th:if="${acc.tags == null || #lists.isEmpty(acc.tags)}" class="text-muted">등록된 태그가 없습니다.</span>
      </div>
    </div>
  </div>

  <div class="mt-3 d-flex gap-2">
    <a th:href="@{/admin/accommodations/list}" class="btn btn-light">목록</a>
    <a th:href="@{/admin/accommodations/edit/{id}(id=${acc.accommodationId})}" class="btn btn-secondary">수정</a>
  </div>
</th:block>
</body>
</html>
