<!-- templates/admin/accommodations/detail.html -->
<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
  <title>숙소 상세</title>
  <th:block layout:fragment="head">
    <style>
      .thumb{width:104px;height:104px;object-fit:cover;border-radius:.75rem;border:1px solid #eee}
      .chip{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .6rem;border:1px solid #e5e7eb;border-radius:999px;font-size:.8rem;background:#fff}
      .chip .dot{width:.5rem;height:.5rem;border-radius:999px;display:inline-block}
      .status-badge{padding:.35em .65em;border-radius:999px;font-size:.75rem;font-weight:600;border:1px solid transparent}
      .status-pending{background:#fff9e6;color:#a87c00;border-color:#ffe8a3}
      .status-approved{background:#eaf8ee;color:#147a3c;border-color:#bfe6cb}
      .status-rejected{background:#fdecec;color:#b64141;border-color:#f6c1c1}
      .status-active{background:#e7f1ff;color:#0a58ca;border-color:#cfe0ff}

      .section-title{font-weight:700;font-size:1rem;margin-bottom:.75rem}
      .kv dt{color:#6c757d}
      .card-lite{border:1px solid #edf1f5;border-radius:.75rem;padding:1rem}
      .list-plain{margin:0;padding-left:1.2rem}
      .list-plain li{margin:.25rem 0}

      .desc{white-space:pre-line;line-height:1.6}
      .desc.clamp{display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:6;overflow:hidden;white-space:normal;position:relative}
      .desc.clamp:after{content:"";position:absolute;bottom:0;left:0;right:0;height:2.5rem;background:linear-gradient(to bottom,rgba(255,255,255,0),#fff)}
      .desc.expanded{-webkit-line-clamp:unset;max-height:none}
      .btn-link-like{border:none;background:none;padding:0;font-size:.9rem;color:#0a58ca;cursor:pointer}

      .imgbox{position:relative}
      .imgbox img{width:100%;height:180px;object-fit:cover;border-radius:.5rem;border:1px solid #eee}
      .img-type{position:absolute;left:.5rem;top:.5rem;font-size:.7rem;background:#0009;color:#fff;padding:.15rem .4rem;border-radius:.35rem}

      .tag{display:inline-block;padding:.28rem .6rem;border:1px solid #e5e7eb;border-radius:999px;
        margin:.2rem;font-size:.8rem;background:#fff}
      .tag .dot{width:.45rem;height:.45rem;border-radius:999px;display:inline-block;margin-right:.35rem;
        background:#a78bfa}
    </style>
  </th:block>
</head>
<body>
<th:block layout:fragment="content">

  <!-- 상단 헤더 -->
  <div class="d-flex align-items-center justify-content-between">
    <h3 class="mb-0">숙소 상세</h3>
    <div class="d-flex gap-2">
      <a th:href="@{/admin/accommodations/edit/{id}(id=${acc.accommodationId})}" class="btn btn-outline-secondary">수정</a>
      <a th:href="@{/admin/accommodations/list}" class="btn btn-primary">목록으로</a>
    </div>
  </div>

  <div class="card mt-3">
    <div class="card-body">

      <!-- 요약 -->
      <div class="d-flex align-items-start gap-3 flex-wrap">
        <img th:if="${acc.thumbnail}" th:src="${acc.thumbnail}" alt="thumbnail" class="thumb">
        <div class="flex-grow-1">
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <h4 class="mb-1" th:text="${acc.name}">숙소명</h4>
            <span class="status-badge"
                  th:classappend="${#strings.equalsIgnoreCase(acc.status,'PENDING') ? ' status-pending'
                                   : (#strings.equalsIgnoreCase(acc.status,'APPROVED') ? ' status-approved'
                                   : (#strings.equalsIgnoreCase(acc.status,'ACTIVE') ? ' status-active' : ' status-rejected'))}"
                  th:text="${acc.status}">ACTIVE</span>
          </div>

          <div class="d-flex flex-wrap gap-2 mt-2">
            <span class="chip">
              <span class="dot" style="background:#8b5cf6"></span>
              <span>카테고리</span>
              <strong th:text="${categoryName != null ? categoryName : '-'}">-</strong>
            </span>
            <span class="chip">
              <span class="dot" style="background:#10b981"></span>
              <span>지역</span>
              <strong>
                <span th:text="${mainRegionName != null ? mainRegionName : '-'}">-</span>
                <span th:if="${subRegionName != null}" th:text="' / ' + ${subRegionName}"></span>
              </strong>
            </span>
            <span class="chip">
  <span class="dot" style="background:#f59e0b"></span>
  <span>최저가</span>
  <strong th:text="${acc.minPrice != null} ?
                 |${#numbers.formatDecimal(acc.minPrice,0,'COMMA',0,'POINT')}원| : '-'">
</strong>
</span>
            <span class="chip">
              <span class="dot" style="background:#ef4444"></span>
              <span>평점</span>
              <strong th:text="${acc.rating != null ? acc.rating : '-'}">-</strong>
            </span>
          </div>
        </div>
      </div>

      <hr>

      <!-- 2열 -->
      <div class="row">
        <!-- 기본 정보 -->
        <div class="col-lg-5">
          <div class="card-lite">
            <div class="section-title">기본 정보</div>
            <dl class="row kv mb-0">
              <dt class="col-sm-4">업체명</dt>
              <dd class="col-sm-8" th:text="${companyName}">-</dd>

              <dt class="col-sm-4">주소</dt>
              <dd class="col-sm-8" th:text="${acc.address}">-</dd>

              <dt class="col-sm-4">체크인</dt>
              <dd class="col-sm-8" th:text="${acc.checkInTime != null ? #temporals.format(acc.checkInTime,'HH:mm') : '-'}">-</dd>

              <dt class="col-sm-4">체크아웃</dt>
              <dd class="col-sm-8" th:text="${acc.checkOutTime != null ? #temporals.format(acc.checkOutTime,'HH:mm') : '-'}">-</dd>
            </dl>
          </div>
        </div>

        <!-- 소개/확인/취소규정 -->
        <div class="col-lg-7">
          <div class="card-lite mb-3">
            <div class="section-title d-flex justify-content-between align-items-center">
              <span>숙소 소개</span>
              <button type="button" class="btn-link-like" id="descToggle">더보기</button>
            </div>
            <div id="desc" class="desc clamp" th:text="${acc.description}"></div>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <div class="card-lite h-100">
                <div class="section-title">확인사항 및 기타</div>
                <ul th:if="${amenitiesList != null and !#lists.isEmpty(amenitiesList)}" class="list-plain">
                  <li th:each="a : ${amenitiesList}" th:text="${a}"></li>
                </ul>
                <div th:if="${(amenitiesList == null or #lists.isEmpty(amenitiesList)) and (acc.amenities != null and !#strings.isEmpty(acc.amenities))}"
                     class="desc" th:text="${acc.amenities}"></div>
                <div th:if="${(amenitiesList == null or #lists.isEmpty(amenitiesList)) and (acc.amenities == null or #strings.isEmpty(acc.amenities))}"
                     class="text-muted">등록된 확인사항이 없습니다.</div>
              </div>
            </div>

            <div class="col-md-6">
              <!-- 취소규정 상세 -->
              <div class="card-lite h-100">
                <div class="section-title">취소/환불 규정</div>

                <!-- 1) policyList(List<String>) 우선 -->
                <ul th:if="${policyList != null and !#lists.isEmpty(policyList)}" class="list-plain">
                  <li th:each="p : ${policyList}" th:text="${p}"></li>
                </ul>

                <!-- 2) policyList가 비었고, acc.cancellationPolicyDetail 문자열이 있으면 원문 표시 -->
                <div th:if="${(policyList == null or #lists.isEmpty(policyList))
               and (acc.cancellationPolicyDetail != null and !#strings.isEmpty(acc.cancellationPolicyDetail))}"
                     class="desc" th:text="${acc.cancellationPolicyDetail}"></div>

                <!-- 3) 둘 다 없으면 안내 -->
                <div th:if="${(policyList == null or #lists.isEmpty(policyList))
               and (acc.cancellationPolicyDetail == null or #strings.isEmpty(acc.cancellationPolicyDetail))}"
                     class="text-muted">등록된 환불 규정이 없습니다.</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <hr>

      <div class="section-title">이미지</div>

      <!-- 이미지가 있을 때만 그리드 -->
      <div class="row g-3" th:if="${acc.images != null and !#lists.isEmpty(acc.images)}">
        <div class="col-6 col-md-3" th:each="img : ${acc.images}">
          <div class="imgbox">
            <img th:src="${img.imageUrl}" alt="image">
            <div class="img-type" th:text="${img.imageType}">MAIN</div>
          </div>
        </div>
      </div>

      <!-- 없을 때는 별도 문구 -->
      <div th:if="${acc.images == null or #lists.isEmpty(acc.images)}" class="text-muted">
        등록된 이미지가 없습니다.
      </div>

      <hr>

      <div class="section-title">태그</div>

      <!-- 1) tags 있을 때 -->
      <div th:if="${acc.tags != null and !#lists.isEmpty(acc.tags)}">
  <span class="tag" th:each="t : ${acc.tags}">
    <span class="dot"></span><span th:text="${t.name}">오션뷰</span>
  </span>
      </div>

      <!-- 2) tags는 없고 tagIds만 있을 때 -->
      <div th:if="${(acc.tags == null or #lists.isEmpty(acc.tags))
              and (acc.tagIds != null and !#lists.isEmpty(acc.tagIds))}">
  <span class="tag" th:each="tid : ${acc.tagIds}">
    <span class="dot"></span><span th:text="|#${tid}|">#1</span>
  </span>
      </div>

      <!-- 3) 둘 다 없을 때 -->
      <div th:if="${(acc.tags == null or #lists.isEmpty(acc.tags))
              and (acc.tagIds == null or #lists.isEmpty(acc.tagIds))}"
           class="text-muted">등록된 태그가 없습니다.</div>

    </div>
  </div>

  <div class="mt-3 d-flex gap-2">
    <a th:href="@{/admin/accommodations/list}" class="btn btn-light">목록</a>
    <a th:href="@{/admin/accommodations/edit/{id}(id=${acc.accommodationId})}" class="btn btn-secondary">수정</a>
  </div>

  <script>
    (function(){
      const btn = document.getElementById('descToggle');
      const desc = document.getElementById('desc');
      if (!btn || !desc) return;

      let expanded = false;
      const update = () => {
        if (expanded) {
          desc.classList.remove('clamp');
          desc.classList.add('expanded');
          btn.textContent = '접기';
        } else {
          desc.classList.add('clamp');
          desc.classList.remove('expanded');
          btn.textContent = '더보기';
        }
      };
      btn.addEventListener('click', () => { expanded = !expanded; update(); });
      update();
    })();
  </script>

</th:block>
</body>
</html>
