<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>숙소 수정</title>
</head>

<body>
<main layout:fragment="content">
    <div class="page-heading">
        <h3>숙소 수정</h3>
    </div>

    <div class="page-content">
        <section class="row">
            <div class="col-12 col-lg-12">
                <div class="card">
                    <div class="card-body">

                        <!-- ★ 반드시 multipart/form-data -->
                        <form th:action="@{/admin/accommodations/edit/{id}(id=${acc.accommodationId})}"
                              th:object="${form}" method="post" enctype="multipart/form-data" >

                            <div class="row g-3">
                                <!-- 숙소명 -->
                                <div class="col-md-6">
                                    <label class="form-label required">숙소명</label>
                                    <input type="text" class="form-control" th:field="*{name}" required>
                                </div>

                                <!-- 카테고리 -->
                                <div class="col-md-6">
                                    <label class="form-label">카테고리</label>
                                    <select class="form-select" th:field="*{categoryId}">
                                        <option value="">선택</option>
                                        <option th:each="c : ${categories}"
                                                th:value="${c.categoryId}"
                                                th:text="${c.name}"></option>
                                    </select>
                                </div>

                                <!-- 주소 -->
                                <div class="col-md-12">
                                    <label class="form-label required">주소</label>
                                    <input type="text" class="form-control" th:field="*{address}" required>
                                </div>

                                <!-- 지역(대/소) -->
                                <div class="col-md-4">
                                    <label class="form-label required">지역(대)</label>
                                    <select id="mainRegion" class="form-select"
                                            th:field="*{mainRegionId}" required
                                            th:data-url="@{/admin/accommodations/regions/children}">
                                        <option value="">선택하세요</option>
                                        <option th:each="r : ${mainRegions}" th:value="${r.regionId}"
                                                th:text="${r.name}"></option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label required">지역(소)</label>
                                    <select id="subRegion" class="form-select"
                                            th:field="*{subRegionId}" required
                                            th:data-selected="${form.subRegionId}">
                                        <option value="">상위를 먼저 선택하세요</option>
                                        <option th:each="r : ${subRegions}" th:value="${r.regionId}"
                                                th:text="${r.name}"
                                                th:selected="${r.regionId == form.subRegionId}"></option>
                                    </select>
                                </div>

                                <!-- 소개 -->
                                <div class="col-12">
                                    <label class="form-label">숙소 소개</label>
                                    <textarea class="form-control" th:field="*{description}" rows="3"
                                              placeholder="숙소 소개, 편의시설 등"></textarea>
                                </div>

                                <!-- 편의시설(JSON/CSV 허용) -->
                                <div class="col-12">
                                    <label class="form-label">확인사항 및 기타</label>
                                    <textarea class="form-control" th:field="*{amenities}" rows="2"
                                              placeholder="예) 와이파이,주차,수영장"></textarea>
                                    <div class="form-text">쉼표(,)로 구분해서 입력하거나, 이미 JSON 배열이면 그대로 저장됩니다.</div>
                                </div>

                                <!-- 영업시간/최저가 -->
                                <div class="col-md-3">
                                    <label class="form-label required">영업시작</label>
                                    <input type="time" class="form-control" th:field="*{checkInTime}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label required">영업종료</label>
                                    <input type="time" class="form-control" th:field="*{checkOutTime}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">최저가(원)</label>
                                    <input type="number" step="100" min="0" class="form-control" th:field="*{minPrice}"
                                           placeholder="예) 80000">
                                </div>

                                <!-- 썸네일(메인 이미지) -->
                                <div class="col-12">
                                    <label class="form-label">썸네일(메인)</label>

                                    <!-- 현재 썸네일 미리보기 -->
                                    <div class="d-flex align-items-center gap-3">
                                        <!-- 이미지가 있을 때 -->
                                        <img th:if="${acc != null and #strings.length(acc.thumbnailUrl) > 0}"
                                             th:src="${acc.thumbnailUrl}"
                                             alt="preview"
                                             style="width:96px;height:96px;object-fit:cover;border-radius:8px;background:#f6f6f6;">

                                        <!-- 이미지가 없을 때 -->
                                        <span th:if="${acc == null or #strings.length(acc.thumbnailUrl) == 0}"
                                              class="text-muted" id="thumbEmpty">이미지 없음</span>
                                    </div>

                                    <!-- 파일 선택 (서버로 바로 제출) -->
                                    <div class="mt-2" style="max-width:360px">
                                        <!-- ★ name="thumbnail" : 컨트롤러 파라미터와 동일 -->
                                        <input type="file" id="thumbFile" name="thumbnail" accept="image/*" class="form-control">
                                    </div>
                                    <div class="form-text">파일을 선택하고 저장하면 메인 썸네일이 교체됩니다. (MAIN / sortOrder=0)</div>
                                </div>
                                <!-- 서브 이미지 -->
                                <div class="col-12 mt-4">
                                    <label class="form-label">서브 이미지들</label>

                                    <!-- 기존 SUB 이미지 목록 (미리보기) -->
                                    <div class="d-flex flex-wrap gap-2 mb-2">
                                        <div th:each="img : ${images}" th:if="${img.imageType == 'SUB'}"
                                             class="position-relative" style="width:96px;height:96px">
                                            <img th:src="${img.imageUrl}" alt="sub" style="width:96px;height:96px;object-fit:cover;border-radius:8px;background:#f6f6f6;">
                                        </div>
                                        <span th:if="${images != null and #lists.size(images) > 0}"
                                              class="text-muted">등록된 서브 이미지가 없습니다.</span>
                                    </div>

                                    <!-- 새 서브 이미지 업로드 (여러 장) -->
                                    <!-- ★ name="subImages" / multiple : 컨트롤러와 일치 -->
                                    <input type="file" name="subImages" id="subImages" accept="image/*" multiple class="form-control" style="max-width:480px">

                                    <!-- 선택한 파일들 로컬 미리보기 -->
                                    <div id="subPreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                                    <div class="form-text">여러 장 선택 가능. 저장하면 서브 이미지로 추가됩니다 (imageType=SUB, sortOrder는 1부터 자동부여).</div>
                                </div>

                                <!-- 태그 -->
                                <div class="col-12">
                                    <label class="form-label">태그</label>
                                    <select id="tagSelect" class="form-select" multiple size="10" th:field="*{tagIds}">
                                        <optgroup th:each="e : ${tagsByCategory}" th:label="${e.key}">
                                            <option th:each="t : ${e.value}"
                                                    th:value="${t.tagId}"
                                                    th:text="${t.name}">
                                            </option>
                                        </optgroup>
                                    </select>
                                    <div class="form-text">여러 개 선택 가능 (Ctrl/⌘)</div>
                                    <div id="tagSelected" class="d-flex flex-wrap gap-2 mt-2"></div>
                                </div>

                                <!-- 상태 -->
                                <div class="col-md-3">
                                    <label class="form-label">상태</label>
                                    <select class="form-select" th:field="*{status}">
                                        <option value="PENDING">PENDING</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">수정</button>
                                <a th:href="@{/admin/accommodations/list}" class="btn btn-light">취소</a>
                            </div>
                        </form>

                    </div><!-- card-body -->
                </div><!-- card -->
            </div>
        </section>
    </div>
</main>

<th:block layout:fragment="script">
    <script>
        // 지역(소) 동적 로드
        (function () {
            const main = document.getElementById('mainRegion');
            const sub = document.getElementById('subRegion');
            if (!main || !sub) return;

            const dataUrl = main.getAttribute('data-url');

            main.addEventListener('change', async function () {
                const parentId = this.value;
                sub.innerHTML = '<option value="">불러오는 중...</option>';
                if (!parentId) {
                    sub.innerHTML = '<option value="">상위를 먼저 선택하세요</option>';
                    return;
                }

                try {
                    const res = await fetch(`${dataUrl}?parentId=${parentId}`, {headers: {'Accept': 'application/json'}});
                    if (!res.ok) throw new Error(res.status);
                    const list = await res.json();

                    const selected = sub.getAttribute('data-selected');
                    sub.innerHTML = '<option value="">선택하세요</option>';
                    list.forEach(item => {
                        const opt = document.createElement('option');
                        opt.value = item.id;
                        opt.textContent = item.name;
                        if (selected && String(item.id) === String(selected)) opt.selected = true;
                        sub.appendChild(opt);
                    });
                } catch (e) {
                    console.error('지역(소) 로드 실패:', e);
                    sub.innerHTML = '<option value="">불러오기 실패</option>';
                }
            });
        })();

        // 태그 선택 미리보기
        document.addEventListener('DOMContentLoaded', function(){
            const sel = document.getElementById('tagSelect');
            const box = document.getElementById('tagSelected');
            if(!sel || !box) return;

            function renderSelected(){
                box.innerHTML = '';
                const selected = [...sel.selectedOptions].map(o => ({
                    value: o.value,
                    label: o.textContent.trim(),
                    category: o.closest('optgroup') ? o.closest('optgroup').label : ''
                }));
                if(selected.length === 0){
                    box.innerHTML = '<span class="text-muted">선택된 태그가 없습니다.</span>';
                    return;
                }
                selected.forEach(s => {
                    const chip = document.createElement('span');
                    chip.className = 'badge bg-primary-subtle text-primary border rounded-pill px-2 py-1 d-inline-flex align-items-center';
                    chip.textContent = (s.category ? (s.category + ' - ') : '') + s.label;

                    const close = document.createElement('button');
                    close.type = 'button';
                    close.className = 'btn-close btn-sm ms-2';
                    close.setAttribute('aria-label', 'remove');
                    close.addEventListener('click', () => {
                        const opt = [...sel.options].find(o => o.value === s.value);
                        if(opt){ opt.selected = false; }
                        renderSelected();
                    });

                    chip.appendChild(close);
                    box.appendChild(chip);
                });
            }

            renderSelected();
            sel.addEventListener('change', renderSelected);
        });

        // 썸네일 로컬 미리보기 (선택 시 즉시 화면에만 반영)
        (function () {
            const input = document.getElementById('thumbFile');
            const preview = document.getElementById('thumbPreview');
            const empty = document.getElementById('thumbEmpty');
            if(!input) return;

            input.addEventListener('change', function () {
                const f = this.files && this.files[0];
                if (!f) return;
                const url = URL.createObjectURL(f);
                if (preview) {
                    preview.src = url;
                    preview.style.display = 'inline-block';
                }
                if (empty) empty.style.display = 'none';
            });
        })();
    </script>
    <script>
        // 서브 이미지 로컬 미리보기
        (function(){
            const input = document.getElementById('subImages');
            const box = document.getElementById('subPreview');
            if(!input || !box) return;

            input.addEventListener('change', function(){
                box.innerHTML = '';
                const files = Array.from(this.files || []);
                files.forEach(f => {
                    const url = URL.createObjectURL(f);
                    const wrap = document.createElement('div');
                    wrap.style.width = '96px';
                    wrap.style.height = '96px';
                    const img = document.createElement('img');
                    img.src = url;
                    img.alt = 'preview';
                    img.style.cssText = 'width:96px;height:96px;object-fit:cover;border-radius:8px;background:#f6f6f6;';
                    wrap.appendChild(img);
                    box.appendChild(wrap);
                });
            });
        })();
    </script>
</th:block>
</body>
</html>
