<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>숙소 수정</title>
    <style>
        .img-wrap {
            position: relative;
            width: 96px;
            height: 96px;
        }
        .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            background: #f6f6f6;
            border: 1px solid #eee;
        }
        .img-wrap button.remove-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            border: none;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            display: none; /* 기본은 숨김 */
        }
        .img-wrap:hover button.remove-btn {
            display: block; /* hover 시에만 표시 */
        }
        .img-wrap button.remove-btn:hover {
            background: rgba(220,53,69,0.9);
        }
    </style>
</head>

<body>
<main layout:fragment="content">
    <div class="page-heading">
        <h3>숙소 수정</h3>
    </div>

    <div class="page-content">
        <section class="row">
            <div class="col-12 col-lg-12">
                <div class="card">
                    <div class="card-body">

                        <form th:action="@{/admin/accommodations/edit/{id}(id=${acc.accommodationId})}"
                              th:object="${form}" method="post" enctype="multipart/form-data">

                            <input type="hidden" name="id" th:value="${acc.accommodationId}"/>

                            <div class="row g-3">
                                <!-- 숙소명 -->
                                <div class="col-md-6">
                                    <label class="form-label required">숙소명</label>
                                    <input type="text" class="form-control" th:field="*{name}" required>
                                </div>

                                <!-- 카테고리 -->
                                <div class="col-md-6">
                                    <label class="form-label">카테고리</label>
                                    <select class="form-select" th:field="*{categoryId}">
                                        <option value="">선택</option>
                                        <option th:each="c : ${categories}"
                                                th:value="${c.categoryId}"
                                                th:text="${c.name}"></option>
                                    </select>
                                </div>

                                <!-- 주소 -->
                                <div class="col-md-12">
                                    <label class="form-label required">주소</label>
                                    <input type="text" class="form-control" th:field="*{address}" required>
                                </div>

                                <!-- 지역(대/소) -->
                                <div class="col-md-4">
                                    <label class="form-label required">지역(대)</label>
                                    <select id="mainRegion" class="form-select"
                                            th:field="*{mainRegionId}" required
                                            th:data-url="@{/admin/accommodations/regions/children}">
                                        <option value="">선택하세요</option>
                                        <option th:each="r : ${mainRegions}" th:value="${r.regionId}"
                                                th:text="${r.name}"></option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label required">지역(소)</label>
                                    <select id="subRegion" class="form-select"
                                            th:field="*{subRegionId}" required
                                            th:data-selected="${form.subRegionId}">
                                        <option value="">상위를 먼저 선택하세요</option>
                                        <option th:each="r : ${subRegions}" th:value="${r.regionId}"
                                                th:text="${r.name}"
                                                th:selected="${r.regionId == form.subRegionId}"></option>
                                    </select>
                                </div>

                                <!-- 소개 -->
                                <div class="col-12">
                                    <label class="form-label">숙소 소개</label>
                                    <textarea class="form-control" th:field="*{description}" rows="3"
                                              placeholder="숙소 소개, 편의시설 등"></textarea>
                                </div>

                                <!-- 편의시설 -->
                                <div class="col-12">
                                    <label class="form-label">확인사항 및 기타</label>
                                    <textarea class="form-control" th:field="*{amenities}" rows="3"
                                              placeholder="예) 와이파이,주차,수영장"></textarea>
                                </div>

                                <!-- 썸네일 -->
                                <div class="col-12">
                                    <label class="form-label">썸네일(메인)</label>
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="img-wrap" th:if="${acc != null and #strings.length(acc.thumbnail) > 0}">
                                            <img id="thumbPreview" th:src="${acc.thumbnail}" alt="thumbnail">
                                            <button type="button" class="remove-btn" id="removeThumb">×</button>
                                        </div>
                                        <span th:if="${acc == null or #strings.length(acc.thumbnail) == 0}"
                                              class="text-muted" id="thumbEmpty">이미지 없음</span>
                                    </div>
                                    <input type="hidden" th:field="*{thumbnail}">
                                    <input type="hidden" name="deleteThumbnail" id="deleteThumbnail" value="false">
                                    <div class="mt-2" style="max-width:360px">
                                        <input type="file" id="thumbFile" name="thumbnailFile" accept="image/*" class="form-control">
                                    </div>
                                </div>

                                <!-- 서브 이미지 -->
                                <div class="col-12 mt-4">
                                    <label class="form-label">서브 이미지들</label>
                                    <div class="d-flex flex-wrap gap-2 mb-2">
                                        <div th:each="img : ${images}" th:if="${img.imageType == 'SUB'}"
                                             class="img-wrap">
                                            <img th:src="${img.imageUrl}" alt="sub">
                                            <button type="button" class="remove-btn remove-sub"
                                                    th:attr="data-id=${img.imageId}">×</button>
                                        </div>
                                    </div>
                                    <input type="file" name="subImages" id="subImages" accept="image/*" multiple class="form-control" style="max-width:480px">
                                    <div id="subPreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                                </div>
                            </div>

                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">수정</button>
                                <a th:href="@{/admin/accommodations/list}" class="btn btn-light">취소</a>
                            </div>
                        </form>
                    </div><!-- card-body -->
                </div>
            </div>
        </section>
    </div>
</main>

<th:block layout:fragment="script">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 썸네일 삭제
            const btn = document.getElementById('removeThumb');
            if (btn) {
                btn.addEventListener('click', () => {
                    document.getElementById('deleteThumbnail').value = 'true';
                    const preview = document.getElementById('thumbPreview');
                    if (preview) preview.style.display = 'none';
                    btn.style.display = 'none';
                    const empty = document.getElementById('thumbEmpty');
                    if (empty) empty.style.display = 'inline';
                });
            }

            // 서브 이미지 삭제
            document.querySelectorAll('.remove-sub').forEach(b => {
                b.addEventListener('click', () => {
                    const id = b.getAttribute('data-id');
                    if (id) {
                        const hidden = document.createElement('input');
                        hidden.type = 'hidden';
                        hidden.name = 'deleteSubImageIds';
                        hidden.value = id;
                        b.closest('form').appendChild(hidden);
                    }
                    b.parentElement.remove();
                });
            });

            // 새 서브 이미지 미리보기
            const input = document.getElementById('subImages');
            const box = document.getElementById('subPreview');
            if (input && box) {
                input.addEventListener('change', function () {
                    box.innerHTML = '';
                    Array.from(this.files).forEach(f => {
                        const url = URL.createObjectURL(f);
                        const wrap = document.createElement('div');
                        wrap.className = 'img-wrap';
                        const img = document.createElement('img');
                        img.src = url;
                        wrap.appendChild(img);
                        box.appendChild(wrap);
                    });
                });
            }
        });
    </script>
</th:block>
</body>
</html>
