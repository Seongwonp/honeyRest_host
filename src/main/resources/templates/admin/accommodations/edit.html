<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>숙소 수정</title>
</head>

<body>
<main layout:fragment="content">
    <div class="page-heading">
        <h3>숙소 수정</h3>
    </div>

    <div class="page-content">
        <section class="row">
            <div class="col-12 col-lg-12">
                <div class="card">
                    <div class="card-body">

                        <form th:action="@{|/admin/accommodations/edit/${acc.accommodationId}|}"
                              th:object="${form}" method="post">
                            <!--                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>-->

                            <!-- 기본 정보 -->
                            <div class="row g-3">

                                <div class="col-md-6">
                                    <label class="form-label required">숙소명</label>
                                    <input type="text" class="form-control" th:field="*{name}" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">카테고리</label>
                                    <select class="form-select" th:field="*{categoryId}">
                                        <option value="">선택</option>
                                        <option th:each="c : ${categories}"
                                                th:value="${c.categoryId}"
                                                th:text="${c.name}"></option>
                                    </select>
                                </div>

                                <div class="col-md-12">
                                    <label class="form-label required">주소</label>
                                    <input type="text" class="form-control" th:field="*{address}" required>
                                </div>

                                <!-- 지역 선택 -->
                                <div class="col-md-4">
                                    <label class="form-label required">지역(대)</label>
                                    <select id="mainRegion" class="form-select"
                                            th:field="*{mainRegionId}" required
                                            th:data-url="@{/admin/accommodations/regions/children}">
                                        <option value="">선택하세요</option>
                                        <option th:each="r : ${mainRegions}" th:value="${r.regionId}"
                                                th:text="${r.name}"></option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label required">지역(소)</label>
                                    <select id="subRegion" class="form-select" th:field="*{subRegionId}" required
                                            th:data-selected="${form.subRegionId}">
                                        <option value="">상위를 먼저 선택하세요</option>
                                        <!-- 초기 진입시 서버가 내려준 subRegions 로 채움 -->
                                        <option th:each="r : ${subRegions}" th:value="${r.regionId}"
                                                th:text="${r.name}"
                                                th:selected="${r.regionId} == ${form.subRegionId}"></option>
                                    </select>
                                </div>

                                <!-- 썸네일/설명 -->
                                <div class="mb-3">
                                    <label class="form-label">썸네일</label>

                                    <!-- 미리보기 -->
                                    <div class="d-flex align-items-center gap-3">
                                        <img id="thumbPreview" src="#" alt="preview"
                                             style="width:96px;height:96px;object-fit:cover;border-radius:8px;background:#f6f6f6;display:none;">
                                        <span id="thumbEmpty" class="text-muted">이미지 없음</span>
                                    </div>

                                    <!-- 파일 선택 + 업로드 버튼 -->
                                    <div class="mt-2 d-flex gap-2">
                                        <input type="file" id="thumbFile" accept="image/*" class="form-control"
                                               style="max-width:320px;">
                                        <!--                                        <button type="button" id="btnUploadThumb" class="btn btn-outline-primary">업로드</button>-->
                                    </div>

                                    <!-- 진행률 -->
                                    <div class="progress mt-2" style="height:6px;display:none;" id="thumbProgWrap">
                                        <div class="progress-bar" id="thumbProg" style="width:0%"></div>
                                    </div>

                                    <!-- 서버에 같이 보낼 hidden 입력 -->
                                    <input type="hidden" name="thumbnailUrl" id="thumbnailUrl"
                                           th:value="${accommodation?.thumbnailUrl}">
                                </div>


                                <div class="col-md-3">
                                    <label class="form-label">상태</label>
                                    <select class="form-select" th:field="*{status}">
                                        <option value="">선택</option>
                                        <option value="ACTIVE">ACTIVE</option>
                                        <option value="INACTIVE">INACTIVE</option>
                                        <option value="PENDING">PENDING</option>
                                        <option value="REJECTED">REJECTED</option>
                                        <option value="DRAFT">DRAFT</option>
                                    </select>
                                </div>

                                <div class="col-md-3">
                                    <label class="form-label">최저가(원)</label>
                                    <input type="number" class="form-control" th:field="*{minPrice}">
                                </div>
                                <!-- 카테고리/주소 아래 아무 데나 섹션 추가 -->
                                <div class="col-12">
                                    <label class="form-label">태그</label>
                                    <select id="tagSelect" class="form-select" multiple size="10" th:field="*{tagIds}">
                                        <!-- optgroup 방식이라면 -->
                                        <optgroup th:each="e : ${tagsByCategory}" th:label="${e.key}">
                                            <option th:each="t : ${e.value}"
                                                    th:value="${t.tagId}"
                                                    th:text="${t.name}">
                                            </option>
                                        </optgroup>
                                    </select>
                                    <div class="form-text">여러 개 선택 가능 (Ctrl/⌘)</div>

                                    <!-- 선택 미리보기 영역 -->
                                    <div id="tagSelected" class="d-flex flex-wrap gap-2 mt-2"></div>
                                </div>
                            </div>

                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">수정</button>
                                <a th:href="@{|/admin/accommodations/list|}" class="btn btn-light">
                                    취소
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>

<th:block layout:fragment="script">
    <script>
        (function () {
            const main = document.getElementById('mainRegion');
            const sub = document.getElementById('subRegion');
            if (!main || !sub) return;

            const dataUrl = main.getAttribute('data-url'); // /admin/accommodations/regions/children

            main.addEventListener('change', async function () {
                const parentId = this.value;
                sub.innerHTML = '<option value="">불러오는 중...</option>';
                if (!parentId) {
                    sub.innerHTML = '<option value="">상위를 먼저 선택하세요</option>';
                    return;
                }

                try {
                    const res = await fetch(`${dataUrl}?parentId=${parentId}`, {headers: {'Accept': 'application/json'}});
                    if (!res.ok) throw new Error(res.status);
                    const list = await res.json();

                    const selected = sub.getAttribute('data-selected'); // 기존 선택값
                    sub.innerHTML = '<option value="">선택하세요</option>';
                    list.forEach(item => {
                        const opt = document.createElement('option');
                        opt.value = item.id;
                        opt.textContent = item.name;
                        if (selected && String(item.id) === String(selected)) opt.selected = true;
                        sub.appendChild(opt);
                    });
                } catch (e) {
                    console.error('지역(소) 로드 실패:', e);
                    sub.innerHTML = '<option value="">불러오기 실패</option>';
                }
            });
        })();

        //  태그 미리보기
            document.addEventListener('DOMContentLoaded', function(){
            const sel = document.getElementById('tagSelect');
            const box = document.getElementById('tagSelected');
            if(!sel || !box) return;

            function renderSelected(){
            box.innerHTML = '';
            const selected = [...sel.selectedOptions].map(o => ({
            value: o.value,
            label: o.textContent.trim(),
            category: o.closest('optgroup') ? o.closest('optgroup').label : ''
        }));

            if(selected.length === 0){
            box.innerHTML = '<span class="text-muted">선택된 태그가 없습니다.</span>';
            return;
        }
            selected.forEach(s => {
            const chip = document.createElement('span');
            chip.className = 'badge bg-primary-subtle text-primary border rounded-pill px-2 py-1 d-inline-flex align-items-center';
            chip.textContent = (s.category ? (s.category + ' - ') : '') + s.label;

            const close = document.createElement('button');
            close.type = 'button';
            close.className = 'btn-close btn-sm ms-2';
            close.setAttribute('aria-label', 'remove');
            close.addEventListener('click', () => {
            const opt = [...sel.options].find(o => o.value === s.value);
            if(opt){ opt.selected = false; }
            renderSelected(); // 재랜더
        });

            chip.appendChild(close);
            box.appendChild(chip);
        });
        }

            // 초기 표시 + 변경 시 업데이트
            renderSelected();
            sel.addEventListener('change', renderSelected);
        });
    </script>
</th:block>
</body>
</html>
