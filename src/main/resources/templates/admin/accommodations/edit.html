<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>숙소 수정</title>
    <style>
        .img-wrap {
            position: relative;
            width: 96px;
            height: 96px;
        }
        .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            background: #f6f6f6;
            border: 1px solid #eee;
        }
        .img-wrap button.remove-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            border: none;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            display: none;
        }
        .img-wrap:hover button.remove-btn {
            display: block;
        }
        .img-wrap button.remove-btn:hover {
            background: rgba(220,53,69,0.9);
        }
    </style>
</head>

<body>
<main layout:fragment="content">
    <div class="page-heading">
        <h3>숙소 수정</h3>
    </div>

    <div class="page-content">
        <section class="row">
            <div class="col-12 col-lg-12">
                <div class="card">
                    <div class="card-body">

                        <form th:action="@{/admin/accommodations/edit/{id}(id=${acc.accommodationId})}"
                              th:object="${form}" method="post" enctype="multipart/form-data">

                            <input type="hidden" name="id" th:value="${acc.accommodationId}"/>

                            <div class="row g-3">
                                <!-- 숙소명 -->
                                <div class="col-md-6">
                                    <label class="form-label required">숙소명</label>
                                    <input type="text" class="form-control" th:field="*{name}" required>
                                </div>

                                <!-- 카테고리 -->
                                <div class="col-md-6">
                                    <label class="form-label">카테고리</label>
                                    <select class="form-select" th:field="*{categoryId}">
                                        <option value="">선택</option>
                                        <option th:each="c : ${categories}"
                                                th:value="${c.categoryId}"
                                                th:text="${c.name}"></option>
                                    </select>
                                </div>

                                <!-- 주소 -->
                                <div class="col-md-12">
                                    <label class="form-label required">주소</label>
                                    <input type="text" class="form-control" th:field="*{address}" required>
                                </div>

                                <!-- 지역(대/소) -->
                                <div class="col-md-4">
                                    <label class="form-label required">지역(대)</label>
                                    <select id="mainRegion" class="form-select"
                                            th:field="*{mainRegionId}" required
                                            th:data-url="@{/admin/accommodations/regions/children}">
                                        <option value="">선택하세요</option>
                                        <option th:each="r : ${mainRegions}" th:value="${r.regionId}"
                                                th:text="${r.name}"></option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label required">지역(소)</label>
                                    <select id="subRegion" class="form-select"
                                            th:field="*{subRegionId}" required
                                            th:data-selected="${form.subRegionId}">
                                        <option value="">상위를 먼저 선택하세요</option>
                                        <option th:each="r : ${subRegions}" th:value="${r.regionId}"
                                                th:text="${r.name}"
                                                th:selected="${r.regionId == form.subRegionId}"></option>
                                    </select>
                                </div>

                                <!-- 소개 -->
                                <div class="col-12">
                                    <label class="form-label">숙소 소개</label>
                                    <textarea class="form-control" rows="6" name="description" th:text="${form.description}"
                                              placeholder="숙소 소개, 편의시설 등">

                                    </textarea>
                                </div>

                                <!-- 편의시설 -->
                                <div class="col-12">
                                    <label class="form-label mt-3">확인사항 및 기타</label>
                                    <textarea class="form-control" rows="6"
                                              name="amenities"
                                              th:text="${form.amenities}"></textarea>
                                </div>
                                <!-- 취소 규정 상세 -->
                                <div>
                                <label class="form-label mt-3">취소규정 상세</label>
                                <textarea class="form-control" rows="6"
                                          name="policyMultiline"
                                          th:text="${form.policyMultiline}"></textarea>
                                </div>


                                <!-- 썸네일 -->
                                <div class="col-12">
                                    <label class="form-label">썸네일(메인)</label>

                                    <!-- 항상 프리뷰 컨테이너를 렌더링: 이미지 유무에 따라 show/hide -->
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="img-wrap" id="thumbWrap">
                                            <img id="thumbPreview"
                                                 th:if="${acc != null and #strings.length(acc.thumbnail) > 0}"
                                                 th:src="${acc.thumbnail}"
                                                 alt="thumbnail">
                                            <img id="thumbPreviewEmpty"
                                                 th:if="${acc == null or #strings.length(acc.thumbnail) == 0}"
                                                 src=""
                                                 alt="thumbnail"
                                                 style="display:none;">
                                            <button type="button" class="remove-btn" id="removeThumb" th:if="${acc != null and #strings.length(acc.thumbnail) > 0}">×</button>
                                        </div>
                                        <span class="text-muted" id="thumbEmptyText"
                                              th:if="${acc == null or #strings.length(acc.thumbnail) == 0}">
                                          이미지 없음
                                        </span>
                                    </div>

                                    <!-- 서버 반영용 히든 -->
                                    <input type="hidden" th:field="*{thumbnail}">
                                    <input type="hidden" name="deleteThumbnail" id="deleteThumbnail" value="false">

                                    <div class="mt-2" style="max-width:360px">
                                        <!-- 파일 선택 시 미리보기 갱신 -->
                                        <input type="file" id="thumbFile" name="thumbnailFile" accept="image/*" class="form-control">
                                    </div>
                                </div>

                                <!-- 서브 이미지 -->
                                <div class="col-12 mt-4">
                                    <label class="form-label">서브 이미지들</label>
                                    <div class="d-flex flex-wrap gap-2 mb-2" id="subExistingList">
                                        <div th:each="img : ${images}" th:if="${img.imageType == 'SUB'}"
                                             class="img-wrap">
                                            <img th:src="${img.imageUrl}" alt="sub">
                                            <button type="button" class="remove-btn remove-sub"
                                                    th:attr="data-id=${img.imageId}">×</button>
                                        </div>
                                    </div>

                                    <!-- 새 파일 선택 -->
                                    <input type="file" name="subImages" id="subImages" accept="image/*" multiple class="form-control" style="max-width:480px">
                                    <!-- 새 파일 미리보기 -->
                                    <div id="subPreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                                </div>
                            </div>

                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">수정</button>
                                <a th:href="@{/admin/accommodations/list}" class="btn btn-light">취소</a>
                            </div>
                        </form>
                    </div><!-- card-body -->
                </div>
            </div>
        </section>
    </div>
</main>

<th:block layout:fragment="script">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /* ===============================
             * 1) 썸네일 미리보기 (파일 선택 시)
             * =============================== */
            const thumbFile = document.getElementById('thumbFile');
            const thumbWrap = document.getElementById('thumbWrap');
            const thumbPreview = document.getElementById('thumbPreview');       // 기존 썸네일 있을 때
            const thumbPreviewEmpty = document.getElementById('thumbPreviewEmpty'); // 기존 썸네일 없을 때 사용할 img
            const thumbEmptyText = document.getElementById('thumbEmptyText');
            const removeThumbBtn = document.getElementById('removeThumb');
            const deleteThumbHidden = document.getElementById('deleteThumbnail');

            if (thumbFile) {
                thumbFile.addEventListener('change', () => {
                    const f = thumbFile.files && thumbFile.files[0];
                    if (!f) return;

                    const url = URL.createObjectURL(f);

                    // 기존 프리뷰가 있으면 그걸 쓰고, 없으면 empty img를 사용
                    let targetImg = thumbPreview || thumbPreviewEmpty;
                    targetImg.src = url;
                    targetImg.style.display = 'block';

                    // "이미지 없음" 텍스트 숨기기
                    if (thumbEmptyText) thumbEmptyText.style.display = 'none';

                    // 삭제 플래그는 해제 (새 파일 선택이므로)
                    if (deleteThumbHidden) deleteThumbHidden.value = 'false';

                    // 삭제 버튼이 없으면 생성(파일 선택으로 프리뷰가 생겼으니)
                    if (!removeThumbBtn) {
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.id = 'removeThumb';
                        btn.className = 'remove-btn';
                        btn.textContent = '×';
                        btn.addEventListener('click', () => {
                            // 삭제 표시 + 프리뷰 숨김
                            if (deleteThumbHidden) deleteThumbHidden.value = 'true';
                            targetImg.style.display = 'none';
                            if (thumbEmptyText) thumbEmptyText.style.display = 'inline';

                            // 파일 입력 초기화
                            thumbFile.value = '';
                            btn.remove();
                        });
                        thumbWrap.appendChild(btn);
                    }
                });
            }

            // 기존 썸네일 삭제 버튼 동작(초기 렌더에만 존재)
            if (removeThumbBtn) {
                removeThumbBtn.addEventListener('click', () => {
                    if (deleteThumbHidden) deleteThumbHidden.value = 'true';
                    if (thumbPreview) thumbPreview.style.display = 'none';
                    if (thumbEmptyText) thumbEmptyText.style.display = 'inline';
                    // 파일 입력도 초기화
                    if (thumbFile) thumbFile.value = '';
                    removeThumbBtn.remove();
                });
            }

            /* ==================================
             * 2) 서브 이미지(기존) 삭제 버튼
             *    → hidden name=deleteSubImageIds 추가
             * ================================== */
            document.querySelectorAll('.remove-sub').forEach(b => {
                b.addEventListener('click', () => {
                    const id = b.getAttribute('data-id');
                    if (id) {
                        const hidden = document.createElement('input');
                        hidden.type = 'hidden';
                        hidden.name = 'deleteSubImageIds';
                        hidden.value = id;
                        b.closest('form').appendChild(hidden);
                    }
                    b.parentElement.remove();
                });
            });

            /* ==================================
             * 3) 새 서브 이미지 미리보기 + X 제거
             *    (파일 input 목록에서도 제거)
             * ================================== */
            const subInput = document.getElementById('subImages');
            const subBox   = document.getElementById('subPreview');
            if (subInput && subBox) {
                subInput.addEventListener('change', () => {
                    subBox.innerHTML = '';
                    const files = Array.from(subInput.files || []);

                    files.forEach((f, idx) => {
                        if (!f.type.startsWith('image/')) return;
                        const url = URL.createObjectURL(f);

                        const wrap = document.createElement('div');
                        wrap.className = 'img-wrap';

                        const img = document.createElement('img');
                        img.src = url;
                        img.alt = f.name;

                        const x = document.createElement('button');
                        x.type = 'button';
                        x.className = 'remove-btn';
                        x.textContent = '×';
                        x.title = '이 파일 제거';

                        x.addEventListener('click', () => {
                            // DataTransfer로 해당 index 파일 제거
                            const dt = new DataTransfer();
                            Array.from(subInput.files).forEach((file, i) => {
                                if (i !== idx) dt.items.add(file);
                            });
                            subInput.files = dt.files;
                            subInput.dispatchEvent(new Event('change'));
                        });

                        wrap.appendChild(img);
                        wrap.appendChild(x);
                        subBox.appendChild(wrap);
                    });
                });
            }

            /* ==================================
             * 4) 지역(대) → 지역(소) 동적 로드
             *    #mainRegion[data-url] 사용
             * ================================== */
            const mainRegion = document.getElementById('mainRegion');
            const subRegion  = document.getElementById('subRegion');
            if (mainRegion && subRegion) {
                const dataUrl = mainRegion.getAttribute('data-url'); // 예: /admin/accommodations/regions/children

                async function loadSubRegions(parentId, selectedValue) {
                    if (!parentId) {
                        subRegion.innerHTML = '<option value="">상위를 먼저 선택하세요</option>';
                        return;
                    }
                    subRegion.innerHTML = '<option value="">불러오는 중...</option>';
                    try {
                        const res = await fetch(`${dataUrl}?parentId=${encodeURIComponent(parentId)}`, {
                            headers: { 'Accept': 'application/json' }
                        });
                        if (!res.ok) throw new Error(res.status);
                        const list = await res.json(); // [{id, name}, ...]

                        subRegion.innerHTML = '<option value="">선택하세요</option>';
                        list.forEach(item => {
                            const opt = document.createElement('option');
                            opt.value = item.id;
                            opt.textContent = item.name;
                            if (selectedValue && String(selectedValue) === String(item.id)) {
                                opt.selected = true;
                            }
                            subRegion.appendChild(opt);
                        });
                    } catch (e) {
                        console.error('지역(소) 로드 실패:', e);
                        subRegion.innerHTML = '<option value="">불러오기 실패</option>';
                    }
                }

                // 변경 시 로드
                mainRegion.addEventListener('change', () => {
                    const selected = subRegion.getAttribute('data-selected'); // 기존 선택 복원용
                    loadSubRegions(mainRegion.value, selected);
                });

                // 최초 로딩 시, mainRegion 값이 이미 있으면 소지역 세팅
                const initialMain = mainRegion.value;
                if (initialMain) {
                    const selected = subRegion.getAttribute('data-selected');
                    loadSubRegions(initialMain, selected);
                }
            }
        });
    </script>
</th:block>
</body>
</html>
