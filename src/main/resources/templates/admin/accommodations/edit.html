<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <title>숙소 수정</title>
    <style>
        .img-wrap {
            position: relative;
            width: 96px;
            height: 96px;
        }
        .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            background: #f6f6f6;
            border: 1px solid #eee;
        }
        .img-wrap button.remove-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            border: none;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            display: none;
        }
        .img-wrap:hover button.remove-btn {
            display: block;
        }
        .img-wrap button.remove-btn:hover {
            background: rgba(220,53,69,0.9);
        }
    </style>
</head>

<body>
<main layout:fragment="content">
    <div class="page-heading">
        <h3>숙소 수정</h3>
    </div>

    <div class="page-content">
        <section class="row">
            <div class="col-12 col-lg-12">
                <div class="card">
                    <div class="card-body">

                        <form th:action="@{/admin/accommodations/edit/{id}(id=${acc.accommodationId})}"
                              th:object="${form}" method="post" enctype="multipart/form-data">

                            <input type="hidden" name="id" th:value="${acc.accommodationId}"/>

                            <div class="row g-3">
                                <!-- 숙소명 -->
                                <div class="col-md-6">
                                    <label class="form-label required">숙소명</label>
                                    <input type="text" class="form-control" th:field="*{name}" required>
                                </div>

                                <!-- 카테고리 -->
                                <div class="col-md-6">
                                    <label class="form-label">카테고리</label>
                                    <select class="form-select" th:field="*{categoryId}">
                                        <option value="">선택</option>
                                        <option th:each="c : ${categories}"
                                                th:value="${c.categoryId}"
                                                th:text="${c.name}"></option>
                                    </select>
                                </div>

                                <!-- 주소 -->
                                <div class="col-md-12">
                                    <label class="form-label required">주소</label>
                                    <input type="text" class="form-control" th:field="*{address}" required>
                                </div>

                                <!-- 지역(대/소) -->
                                <div class="col-md-4">
                                    <label class="form-label required">지역(대)</label>
                                    <select id="mainRegion" class="form-select"
                                            th:field="*{mainRegionId}" required
                                            th:data-url="@{/admin/accommodations/regions/children}">
                                        <option value="">선택하세요</option>
                                        <option th:each="r : ${mainRegions}" th:value="${r.regionId}"
                                                th:text="${r.name}"></option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label required">지역(소)</label>
                                    <select id="subRegion" class="form-select"
                                            th:field="*{subRegionId}" required
                                            th:data-selected="${form.subRegionId}">
                                        <option value="">상위를 먼저 선택하세요</option>
                                        <option th:each="r : ${subRegions}" th:value="${r.regionId}"
                                                th:text="${r.name}"
                                                th:selected="${r.regionId == form.subRegionId}"></option>
                                    </select>
                                </div>

                                <!-- 소개 -->
                                <div class="col-12">
                                    <label class="form-label">숙소 소개</label>
                                    <textarea class="form-control" rows="6" name="description" th:text="${form.description}"
                                              placeholder="숙소 소개, 편의시설 등">

                                    </textarea>
                                </div>

                                <!-- 편의시설 -->
                                <div class="col-12">
                                    <label class="form-label mt-3">확인사항 및 기타</label>
                                    <textarea class="form-control" rows="6"
                                              name="amenities"
                                              th:text="${form.amenities}"></textarea>
                                </div>
                                <!-- 취소 규정 상세 -->
                                <div>
                                <label class="form-label mt-3">취소규정 상세</label>
                                <textarea class="form-control" rows="6"
                                          name="policyMultiline"
                                          th:text="${form.policyMultiline}"></textarea>
                                </div>

                                <!-- 태그(다중) -->
                                <div class="col-12">
                                    <label class="form-label">태그</label>
                                    <!-- DTO: List<Long> tagIds 와 바인딩 -->
                                    <select id="tagSelect" class="form-select" multiple size="10" th:field="*{tagIds}">
                                        <!-- 컨트롤러에서 model.addAttribute("tagsByCategory", Map<String, List<TagDTO>>) 제공 -->
                                        <optgroup th:each="e : ${tagsByCategory}" th:label="${e.key}">
                                            <option th:each="t : ${e.value}"
                                                    th:value="${t.tagId}"
                                                    th:text="${t.name}">
                                            </option>
                                        </optgroup>
                                    </select>
                                    <div class="form-text">여러 개 선택 가능 (Ctrl/⌘)</div>

                                    <!-- 선택 결과 미리보기 칩 -->
                                    <div id="tagSelected" class="d-flex flex-wrap gap-2 mt-2"></div>
                                </div>


                                <!-- 썸네일 -->
                                <div class="col-12">
                                    <label class="form-label">썸네일(메인)</label>

                                    <!-- 삭제 플래그 -->

                                    <!-- 항상 프리뷰 컨테이너를 렌더링: 이미지 유무에 따라 show/hide -->
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="img-wrap" id="thumbWrap">
                                            <img id="thumbPreview"
                                                 th:if="${acc != null and acc.thumbnail != null and !#strings.isEmpty(acc.thumbnail)}"
                                                 th:src="${acc.thumbnail}"
                                                 alt="thumbnail">
                                            <img id="thumbPreviewEmpty"
                                                 th:if="${acc == null or acc.thumbnail == null or #strings.isEmpty(acc.thumbnail)}"
                                                 src=""
                                                 alt="thumbnail"
                                                 style="display:none;">
                                            <button type="button" class="remove-btn" id="removeThumb" th:if="${acc != null and acc.thumbnail != null and !#strings.isEmpty(acc.thumbnail)}">×</button>
                                        </div>
                                        <span class="text-muted" id="thumbEmptyText"
                                              th:if="${acc == null or acc.thumbnail == null or #strings.isEmpty(acc.thumbnail)}">
                                          이미지 없음
                                        </span>
                                    </div>

                                    <!-- 서버 반영용 히든 -->

                                    <input type="hidden" name="deleteThumbnail" id="deleteThumbnail" value="false">

                                    <div class="mt-2" style="max-width:360px">
                                        <!-- 파일 선택 시 미리보기 갱신 -->
                                        <input type="file" id="thumbFile" name="thumbnailFile" accept="image/*" class="form-control">
                                    </div>
                                </div>

                                <!-- 서브 이미지 -->
                                <div class="col-12 mt-4">
                                    <label class="form-label">서브 이미지들</label>
                                    <div class="d-flex flex-wrap gap-2 mb-2" id="subExistingList">
                                        <div th:each="img : ${images}" th:if="${img.imageType == 'SUB'}"
                                             class="img-wrap">
                                            <img th:src="${img.imageUrl}" alt="sub">
                                            <button type="button" class="remove-btn remove-sub"
                                                    th:attr="data-id=${img.imageId}">×</button>
                                        </div>
                                    </div>

                                    <!-- 새 파일 선택 -->
                                    <input type="file" name="subImages" id="subImages" accept="image/*" multiple class="form-control" style="max-width:480px">
                                    <!-- 새 파일 미리보기 -->
                                    <div id="subPreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                                </div>
                            </div>

                            <div class="mt-4 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">수정</button>
                                <a th:href="@{/admin/accommodations/list}" class="btn btn-light">취소</a>
                            </div>
                        </form>
                    </div><!-- card-body -->
                </div>
            </div>
        </section>
    </div>
</main>

<th:block layout:fragment="script">
    <script>

            // ===============================
            // 1) 썸네일(대표 이미지)
            // ===============================
            (() => {
                const thumbFile      = document.getElementById('thumbFile');
                const thumbWrap      = document.getElementById('thumbWrap');
                const deleteFlag     = document.getElementById('deleteThumbnail');
                const emptyTextEl    = document.getElementById('thumbEmptyText');

                let removeBtn        = document.getElementById('removeThumb');          // 있을 수도
                let previewImg       = document.getElementById('thumbPreview');         // 있을 수도
                let emptyPreviewImg  = document.getElementById('thumbPreviewEmpty');    // 있을 수도
                let lastObjectUrl    = null;

                const setDelete = (v) => { if (deleteFlag) deleteFlag.value = String(v); };
                const showEmptyText = (show) => { if (emptyTextEl) emptyTextEl.style.display = show ? 'inline' : 'none'; };

                // 빈/깨진 URL로 렌더된 img 방어
                const normalizeInitialPreview = () => {
                    if (previewImg && !previewImg.getAttribute('src')) {
                        previewImg.remove(); previewImg = null;
                    }
                };

                const ensurePreviewImg = () => {
                    if (previewImg) return previewImg;
                    if (!emptyPreviewImg) {
                        emptyPreviewImg = document.createElement('img');
                        emptyPreviewImg.id = 'thumbPreviewEmpty';
                        emptyPreviewImg.alt = 'thumbnail';
                        emptyPreviewImg.style.display = 'none';
                        thumbWrap && thumbWrap.prepend(emptyPreviewImg);
                    }
                    return emptyPreviewImg;
                };

                const ensureRemoveBtn = () => {
                    if (removeBtn) return removeBtn;
                    removeBtn = document.createElement('button');
                    removeBtn.type = 'button';
                    removeBtn.id = 'removeThumb';
                    removeBtn.className = 'remove-btn';
                    removeBtn.textContent = '×';
                    removeBtn.addEventListener('click', clearPreview);
                    thumbWrap && thumbWrap.appendChild(removeBtn);
                    return removeBtn;
                };

                const revokeLastUrl = () => {
                    if (lastObjectUrl) { URL.revokeObjectURL(lastObjectUrl); lastObjectUrl = null; }
                };

                const showPreview = (url) => {
                    const img = ensurePreviewImg();
                    img.src = url;
                    img.style.display = 'block';
                    showEmptyText(false);
                    setDelete(false);
                    ensureRemoveBtn();
                };

                function clearPreview() {
                    revokeLastUrl();
                    const img = previewImg || emptyPreviewImg;
                    if (img) { img.src = ''; img.style.display = 'none'; }
                    showEmptyText(true);
                    setDelete(true);
                    if (thumbFile) thumbFile.value = '';
                    if (removeBtn) { removeBtn.remove(); removeBtn = null; }
                }

                // 초기 상태 정리 및 X버튼 리스너
                normalizeInitialPreview();
                if (removeBtn) removeBtn.addEventListener('click', clearPreview);

                // 파일 선택 → 미리보기
                if (thumbFile) {
                    thumbFile.addEventListener('change', () => {
                        const f = thumbFile.files && thumbFile.files[0];
                        if (!f || !f.type.startsWith('image/')) return;
                        revokeLastUrl();
                        lastObjectUrl = URL.createObjectURL(f);
                        showPreview(lastObjectUrl);
                    });
                }
            })();

                // 서브 이미지(기존) 삭제: 클릭 시 삭제ID 히든 추가 + 미리보기 카드 제거
                document.addEventListener('click', (e) => {
                const btn = e.target.closest('.remove-sub');
                if (!btn) return;

                e.preventDefault();

                const id = btn.dataset.id; // th:attr="data-id=${img.imageId}"
                const form = btn.closest('form');

                if (id && form) {
                const hidden = document.createElement('input');
                hidden.type = 'hidden';
                hidden.name = 'deleteSubImageIds'; // 컨트롤러와 동일한 이름
                hidden.value = id;
                form.appendChild(hidden);
            }

                const card = btn.closest('.img-wrap');
                if (card) card.remove();
            });

            /* ==================================
             * 4) 지역(대) → 지역(소) 동적 로드
             *    #mainRegion[data-url] 사용
             * ================================== */
            const mainRegion = document.getElementById('mainRegion');
            const subRegion  = document.getElementById('subRegion');
            if (mainRegion && subRegion) {
                const dataUrl = mainRegion.getAttribute('data-url'); // 예: /admin/accommodations/regions/children

                async function loadSubRegions(parentId, selectedValue) {
                    if (!parentId) {
                        subRegion.innerHTML = '<option value="">상위를 먼저 선택하세요</option>';
                        return;
                    }
                    subRegion.innerHTML = '<option value="">불러오는 중...</option>';
                    try {
                        const res = await fetch(`${dataUrl}?parentId=${encodeURIComponent(parentId)}`, {
                            headers: {'Accept': 'application/json'}
                        });
                        if (!res.ok) throw new Error(res.status);
                        const list = await res.json(); // [{id, name}, ...]

                        subRegion.innerHTML = '<option value="">선택하세요</option>';
                        list.forEach(item => {
                            const opt = document.createElement('option');
                            opt.value = item.id;
                            opt.textContent = item.name;
                            if (selectedValue && String(selectedValue) === String(item.id)) {
                                opt.selected = true;
                            }
                            subRegion.appendChild(opt);
                        });
                    } catch (e) {
                        console.error('지역(소) 로드 실패:', e);
                        subRegion.innerHTML = '<option value="">불러오기 실패</option>';
                    }
                }

                // 변경 시 로드
                mainRegion.addEventListener('change', () => {
                    const selected = subRegion.getAttribute('data-selected'); // 기존 선택 복원용
                    loadSubRegions(mainRegion.value, selected);
                });

                // 최초 로딩 시, mainRegion 값이 이미 있으면 소지역 세팅
                const initialMain = mainRegion.value;
                if (initialMain) {
                    const selected = subRegion.getAttribute('data-selected');
                    loadSubRegions(initialMain, selected);
                }
            }
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /* -------- 태그 미리보기 칩 렌더 -------- */
            const sel = document.getElementById('tagSelect');
            const box = document.getElementById('tagSelected');

            function renderSelected() {
                if (!sel || !box) return;
                box.innerHTML = '';

                const selected = [...sel.selectedOptions].map(o => ({
                    value: o.value,
                    label: o.textContent.trim(),
                    category: o.closest('optgroup') ? o.closest('optgroup').label : ''
                }));

                if (selected.length === 0) {
                    box.innerHTML = '<span class="text-muted">선택된 태그가 없습니다.</span>';
                    return;
                }

                selected.forEach(s => {
                    const chip = document.createElement('span');
                    chip.className = 'badge bg-primary-subtle text-primary border rounded-pill px-2 py-1 d-inline-flex align-items-center';
                    chip.textContent = (s.category ? (s.category + ' - ') : '') + s.label;

                    const close = document.createElement('button');
                    close.type = 'button';
                    close.className = 'btn-close btn-sm ms-2';
                    close.setAttribute('aria-label', 'remove');
                    close.addEventListener('click', () => {
                        const opt = [...sel.options].find(o => o.value === s.value);
                        if (opt) opt.selected = false;
                        // change 이벤트를 트리거해 폼 바인딩/검증 흐름 유지
                        sel.dispatchEvent(new Event('change', { bubbles: true }));
                        renderSelected();
                    });

                    chip.appendChild(close);
                    box.appendChild(chip);
                });
            }

            if (sel) {
                sel.addEventListener('change', renderSelected);
                // 초기 값(tagIds)이 있으면 바로 칩 렌더
                renderSelected();
            }
        });
    </script>
</th:block>
</body>
</html>
