<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">

<head>
    <meta charset="utf-8"/>
    <title>숙소 등록</title>
    <th:block layout:fragment="head">
    <style>
        .required::after{content:" *"; color:#dc3545;}
        .error{color:#dc3545;font-size:.85rem;margin-top:4px}
        .card{background:#fff;border:1px solid #e9ecef;border-radius:.5rem}
        .card-header{padding:.75rem 1rem;border-bottom:1px solid #e9ecef;font-weight:600}
        .card-body{padding:1rem}
        pre.result{background:#f8f9fa;border-radius:.5rem;padding:12px;white-space:pre-wrap}
        .table thead th { position: sticky; top: 0; background: #fff; }
    </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <div class="container-fluid py-3">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h2 class="mb-0">숙소 등록</h2>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-secondary btn-sm" href="/swagger-ui/index.html" target="_blank">Swagger</a>
                <a class="btn btn-outline-primary btn-sm" href="/admin/accommodations/list">목록</a>
            </div>
        </div>

        <div class="row g-3">
            <!-- 폼 -->
            <div class="col-12 col-xxl-8">
                <div class="card">
                    <div class="card-header">기본 정보</div>
                    <div class="card-body">
                        <form id="accForm" class="row g-3">
                            <!-- 연관키 -->
                            <div class="col-md-3">
                                <label class="form-label required">회사 ID</label>
                                <input type="number" class="form-control" name="companyId" required>
                                <div class="error" data-err-for="companyId"></div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label required">카테고리 ID</label>
                                <input type="number" class="form-control" name="categoryId" required>
                                <div class="error" data-err-for="categoryId"></div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label required">메인지역 ID</label>
                                <input type="number" class="form-control" name="mainRegionId" required>
                                <div class="error" data-err-for="mainRegionId"></div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label required">서브지역 ID</label>
                                <input type="number" class="form-control" name="subRegionId" required>
                                <div class="error" data-err-for="subRegionId"></div>
                            </div>

                            <!-- 기본필드 -->
                            <div class="col-md-6">
                                <label class="form-label required">숙소명</label>
                                <input type="text" class="form-control" name="name" required>
                                <div class="error" data-err-for="name"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label required">주소</label>
                                <input type="text" class="form-control" name="address" required>
                                <div class="error" data-err-for="address"></div>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">위도</label>
                                <input type="number" step="0.000001" class="form-control" name="latitude" placeholder="예: 37.5665">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">경도</label>
                                <input type="number" step="0.000001" class="form-control" name="longitude" placeholder="예: 126.9780">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">썸네일 URL</label>
                                <input type="url" class="form-control" name="thumbnailUrl" placeholder="https://...">
                            </div>

                            <div class="col-12">
                                <label class="form-label">설명</label>
                                <textarea class="form-control" rows="2" name="description"></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label">편의시설 JSON</label>
                                <textarea class="form-control" rows="2" name="amenities" placeholder='예: {"wifi":true,"parking":true}'></textarea>
                                <div class="error" data-err-for="amenities"></div>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">체크인</label>
                                <input type="time" class="form-control" name="checkInTime" value="15:00">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">체크아웃</label>
                                <input type="time" class="form-control" name="checkOutTime" value="11:00">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">상태</label>
                                <select class="form-select" name="status">
                                    <option value="">(기본: ACTIVE)</option>
                                    <option value="ACTIVE">ACTIVE</option>
                                    <option value="INACTIVE">INACTIVE</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">최저가</label>
                                <input type="number" class="form-control" name="minPrice" min="0" step="1">
                            </div>

                            <!-- 태그 -->
                            <div class="col-12">
                                <label class="form-label">태그 ID(콤마구분)</label>
                                <input type="text" class="form-control" name="tagIds" placeholder="예: 1,3,7">
                                <div class="help-text">DB에 존재하는 tag_id만 입력하세요.</div>
                            </div>

                            <!-- 이미지 테이블 -->
                            <div class="col-12">
                                <div class="d-flex align-items-center justify-content-between">
                                    <label class="form-label mb-2">이미지</label>
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-sm btn-outline-primary" type="button" id="btnAddImage">행 추가</button>
                                        <button class="btn btn-sm btn-outline-secondary" type="button" id="btnClearImage">모두 삭제</button>
                                    </div>
                                </div>

                                <div class="table-responsive" style="max-height: 280px; overflow:auto;">
                                    <table class="table table-sm align-middle mb-0" id="imageTable">
                                        <thead>
                                        <tr>
                                            <th style="width:45%">Image URL</th>
                                            <th style="width:20%">Type</th>
                                            <th style="width:20%">Sort</th>
                                            <th style="width:15%"></th>
                                        </tr>
                                        </thead>
                                        <tbody></tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="col-12 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">등록</button>
                                <button type="button" id="btnReset" class="btn btn-light">초기화</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 결과/빠른 테스트 -->
            <div class="col-12 col-xxl-4">
                <div class="card mb-3">
                    <div class="card-header">등록 결과</div>
                    <div class="card-body">
                        <pre id="resultBox" class="result">아직 결과가 없습니다.</pre>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">API 테스트 (목록)</div>
                    <div class="card-body">
                        <div class="d-flex gap-2 mb-2">
                            <button class="btn btn-outline-secondary btn-sm" id="btnLoad">GET /api/admin/accommodations</button>
                        </div>
                        <div class="table-responsive" style="max-height:320px;overflow:auto;">
                            <table class="table table-sm mb-0">
                                <thead><tr><th>ID</th><th>이름</th><th>상태</th><th>지역</th></tr></thead>
                                <tbody id="listBody"><tr><td colspan="4" class="text-muted">데이터 없음</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        /* ---------- 공통 ---------- */
        function csrfHeader() {
            const t = document.querySelector('meta[name="_csrf"]')?.content;
            const h = document.querySelector('meta[name="_csrf_header"]')?.content;
            return t && h ? { [h]: t } : {};
        }
        function errSet(name, msg){ const el = document.querySelector(`.error[data-err-for="${name}"]`); if(el) el.textContent = msg || ''; }
        function errClear(){ document.querySelectorAll('.error').forEach(e=>e.textContent=''); }

        /* ---------- 이미지 행 ---------- */
        const imageTBody = document.querySelector('#imageTable tbody');
        function addImageRow(imgUrl='', imgType='', sort='') {
            const tr = document.createElement('tr');
            tr.innerHTML = `
        <td><input type="url" class="form-control form-control-sm img-url" placeholder="https://..." value="${imgUrl}"></td>
        <td><input type="text" class="form-control form-control-sm img-type" placeholder="ROOM/LOBBY" value="${imgType}"></td>
        <td><input type="number" class="form-control form-control-sm img-sort" min="0" step="1" value="${sort}"></td>
        <td class="text-end"><button type="button" class="btn btn-sm btn-outline-danger btn-del">삭제</button></td>
      `;
            tr.querySelector('.btn-del').addEventListener('click', ()=> tr.remove());
            imageTBody.appendChild(tr);
        }
        document.getElementById('btnAddImage').addEventListener('click', ()=> addImageRow());
        document.getElementById('btnClearImage').addEventListener('click', ()=> imageTBody.innerHTML='');

        /* ---------- 목록 로드 ---------- */
        async function loadList(){
            const listBody = document.getElementById('listBody');
            listBody.innerHTML = `<tr><td colspan="4" class="text-muted">불러오는 중...</td></tr>`;
            try{
                const res = await fetch('/api/admin/accommodations', { headers: csrfHeader() });
                if(!res.ok) throw new Error('HTTP '+res.status);
                const data = await res.json();
                if(!Array.isArray(data) || data.length===0){
                    listBody.innerHTML = `<tr><td colspan="4" class="text-muted">데이터 없음</td></tr>`;
                    return;
                }
                listBody.innerHTML = data.map(r=>`
          <tr>
            <td>${r.accommodationId ?? ''}</td>
            <td>${r.name ?? ''}</td>
            <td>${r.status ?? ''}</td>
            <td>${r.mainRegionId ?? ''}</td>
          </tr>
        `).join('');
            }catch(e){
                listBody.innerHTML = `<tr><td colspan="4" class="text-danger">불러오기 실패: ${e.message}</td></tr>`;
            }
        }
        document.getElementById('btnLoad').addEventListener('click', loadList);

        /* ---------- 폼 제출 ---------- */
        const form = document.getElementById('accForm');
        const resultBox = document.getElementById('resultBox');

        document.getElementById('btnReset').addEventListener('click', ()=>{
            form.reset(); imageTBody.innerHTML=''; errClear(); resultBox.textContent='아직 결과가 없습니다.';
        });

        form.addEventListener('submit', async (e)=>{
            e.preventDefault(); errClear();

            const fd = new FormData(form);
            const raw = Object.fromEntries(fd.entries());

            // 숫자 필드
            ['companyId','categoryId','mainRegionId','subRegionId'].forEach(k=>{
                raw[k] = raw[k] ? Number(raw[k]) : null;
            });
            ['latitude','longitude','minPrice'].forEach(k=>{
                raw[k] = raw[k] !== '' ? Number(raw[k]) : null;
            });

            // 시간: "HH:mm" 문자열 → LocalTime으로 자동 변환
            raw.checkInTime  = raw.checkInTime  || null;
            raw.checkOutTime = raw.checkOutTime || null;

            // amenities JSON
            if(raw.amenities && raw.amenities.trim()!==''){
                try { raw.amenities = JSON.parse(raw.amenities); }
                catch(e){ errSet('amenities','올바른 JSON 형식이 아닙니다. 예: {"wifi":true}'); return; }
            } else {
                raw.amenities = {};
            }

            // 태그 IDs (콤마구분)
            raw.tagIds = (raw.tagIds || '')
                .split(',')
                .map(s=>s.trim())
                .filter(Boolean)
                .map(n=>Number(n));

            // 이미지 배열
            raw.images = Array.from(imageTBody.querySelectorAll('tr')).map((tr, idx)=>({
                imageUrl : tr.querySelector('.img-url').value || '',
                imageType: tr.querySelector('.img-type').value || null,
                sortOrder: (()=>{ const v=tr.querySelector('.img-sort').value; return v===''? idx : Number(v) })()
            })).filter(it=>it.imageUrl!==''); // URL 없는 행은 제외

            // 필수값 프론트 검증
            let hasErr=false;
            ['companyId','categoryId','mainRegionId','subRegionId','name','address'].forEach(k=>{
                if(raw[k]===null || raw[k]===''){ errSet(k,'필수값입니다.'); hasErr=true; }
            });
            if(hasErr) return;

            // 빈 문자열 → null 정리
            ['thumbnailUrl','description','status'].forEach(k=>{ if(raw[k]==='') raw[k]=null; });

            try{
                const res = await fetch('/api/admin/accommodations', {
                    method: 'POST',
                    headers: { 'Content-Type':'application/json', ...csrfHeader() },
                    body: JSON.stringify(raw)
                });
                if(res.ok){
                    const json = await res.json();
                    resultBox.textContent = '등록 성공 ✅\n' + JSON.stringify(json, null, 2);
                    // 등록 후 목록 갱신
                    loadList();
                }else{
                    let text = await res.text();
                    try{ text = JSON.stringify(JSON.parse(text), null, 2);}catch{}
                    resultBox.textContent = '등록 실패 ❌\nHTTP '+res.status+'\n'+text;
                }
            }catch(err){
                resultBox.textContent = '요청 실패 ❌\n'+(err?.message || err);
            }
        });

        // 필요 시 자동 목록 로드
        // loadList();
    </script>
</th:block>
</body>
</html>
