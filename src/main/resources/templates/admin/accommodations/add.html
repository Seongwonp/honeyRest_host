<!-- templates/admin/accommodations/add.html -->
<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>숙소 등록</title>
    <th:block layout:fragment="head">
        <style>
            /* 톤 & 카드 */
            body {
                background: #f7f9fc;
            }

            .card {
                border: 1px solid #e9edf5;
                border-radius: 14px;
                box-shadow: 0 8px 24px rgba(15, 23, 42, .05);
            }

            /* 미리보기 타일 */
            .pv {
                width: 120px;
                height: 120px;
                object-fit: cover;
                border-radius: 10px;
                border: 1px solid #e5e7eb;
                background: #f6f6f6;
            }

            .pv-wrap {
                position: relative;
                width: 120px;
                height: 120px;
            }

            .pv-x {
                position: absolute;
                top: 4px;
                right: 4px;
                width: 26px;
                height: 26px;
                line-height: 1;
                font-weight: 800;
                padding: 0;
            }

            .help-text {
                font-size: .875rem;
                color: #6b7280;
            }

            .required::after {
                content: " *";
                color: #dc3545;
            }

            .is-invalid {
                border-color: #dc3545;
            }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3 class="mb-2">숙소 등록</h3>
        <p class="text-muted">필수 항목은 <span class="text-danger">*</span> 표시가 있어요.</p>
    </div>

    <div class="card">
        <div class="card-body">
            <!-- 컨트롤러: model.addAttribute("form", new AccommodationCreateRequestDTO()) -->
            <form th:object="${form}"
                  th:action="@{/admin/accommodations/add}"
                  method="post" id="accForm" novalidate
                  enctype="multipart/form-data">

                <!-- CSRF -->
<!--                <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>-->

                <div class="row g-3">
                    <!-- 회사ID -->
                    <div class="col-md-4">
                        <label class="form-label required">회사 ID</label>
                        <input type="number" class="form-control" th:field="*{companyId}"
                               th:classappend="${#fields.hasErrors('companyId')}? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('companyId')}"
                             th:errors="*{companyId}">에러
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label required">카테고리</label>
                        <select class="form-select" th:field="*{categoryId}" required>
                            <option value="" disabled selected>선택하세요</option>
                            <option value="1">호텔</option>
                            <option value="2">모텔</option>
                            <option value="3">게스트하우스</option>
                            <option value="4">펜션</option>
                            <option value="5">글램핑/캠핑</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label required">지역(대)</label>
                        <select id="mainRegion" class="form-select" th:field="*{mainRegionId}" required
                                th:data-url="@{/admin/accommodations/regions/children}">
                            <option value="" disabled selected>선택하세요</option>
                            <option th:each="r : ${mainRegions}" th:value="${r.regionId}" th:text="${r.name}"></option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label required">지역(소)</label>
                        <select id="subRegion" class="form-select" th:field="*{subRegionId}" required
                                th:classappend="${#fields.hasErrors('subRegionId')}? 'is-invalid'">
                            <option value="" disabled selected>상위를 먼저 선택하세요</option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('subRegionId')}"
                             th:errors="*{subRegionId}">에러
                        </div>
                    </div>

                    <!-- 기본 정보 -->
                    <div class="col-md-8">
                        <label class="form-label required">숙소명</label>
                        <input type="text" class="form-control" th:field="*{name}" required
                               th:classappend="${#fields.hasErrors('name')}? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                             th:errors="*{name}">에러
                        </div>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label required">주소</label>
                        <input type="text" class="form-control" th:field="*{address}" required
                               th:classappend="${#fields.hasErrors('address')}? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}"
                             th:errors="*{address}">에러
                        </div>
                    </div>

                    <!-- 소개 -->
                    <div class="col-12">
                        <label class="form-label">숙소 소개</label>
                        <textarea class="form-control" rows="6" th:field="*{description}"
                                  placeholder="숙소 소개, 편의시설 등"></textarea>
                    </div>

                    <!-- 편의시설 -->
                    <div class="col-12">
                        <label class="form-label mt-3">확인사항 및 기타</label>
                        <textarea class="form-control" rows="6"
                                   placeholder="예) 투숙객 외 다른 사람의 방문을 제한합니다"
                                  name="amenities"
                                  th:field="*{amenities}"></textarea>
                        <div class="help-text">쉼표(,)로 구분해서 입력하세요. 비워두면 저장 시 자동으로 빈 목록 처리됩니다.</div>
                    </div>
                    <!-- 취소 규정 상세 -->
                    <div>
                        <label class="form-label mt-3">취소규정 상세</label>
                        <textarea rows="6" class="form-control"
                                  name="cancellationPolicyDetail"
                                  th:field="*{cancellationPolicyDetail}"
                                  placeholder="예) 체크인 7일 전: 전액 환불, 체크인 3일 전: 50% 환불 ..."></textarea>
                        <div class="help-text">쉼표(,) 또는 줄바꿈으로 여러 항목을 입력하세요</div>
                    </div>


                    <!-- 운영 시간 / 가격 -->
                    <div class="col-md-3">
                        <label class="form-label required">체크인</label>
                        <input type="datetime-local" class="form-control" th:field="*{checkInTime}"
                               th:classappend="${#fields.hasErrors('checkInTime')}? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('checkInTime')}"
                             th:errors="*{checkInTime}">에러
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label required">체크아웃</label>
                        <input type="datetime-local" class="form-control" th:field="*{checkOutTime}"
                               th:classappend="${#fields.hasErrors('checkOutTime')}? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('checkOutTime')}"
                             th:errors="*{checkOutTime}">에러
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">최저가(원)</label>
                        <input type="number" step="0.01" min="0" class="form-control" th:field="*{minPrice}"
                               placeholder="예) 80000">
                    </div>

                    <!-- 태그(다중) -->
                    <div class="col-12">
                        <label class="form-label">태그</label>


                        <select id="tagSelect" class="form-select" size="10" th:field="*{tagIds}" name='tagIds' multiple>
                            <optgroup th:each="e : ${tagsByCategory}" th:label="${e.key}">
                                <option th:each="t : ${e.value}"
                                        th:value="${t.tagId}"
                                        th:text="${t.name}">
                                </option>
                            </optgroup>
                        </select>
                        <div class="form-text">여러 개 선택 가능 (Ctrl/⌘)</div>
                        <div id="tagSelected" class="d-flex flex-wrap gap-2 mt-2"></div>
                    </div>

                    <!-- 이미지 업로드 -->
                    <div class="row g-2 mt-1">
                        <!-- 썸네일 -->
                        <div class="col-md-6">
                            <label class="form-label required">썸네일 이미지</label>
                            <!-- DTO에 MultipartFile file; 이라고 가정 -->
                            <input type="file" class="form-control" th:field="*{file}" id="fileInput" accept="image/*"
                                   required>
                            <div class="help-text">JPG/PNG 등 이미지 1장 업로드</div>
                            <div class="mt-2">
                                <img id="thumbPreview" alt="thumbnail preview" class="pv"
                                     style="display:none; max-width:200px;">
                            </div>
                        </div>

                        <!-- 서브 이미지 -->
                        <div class="col-md-6">
                            <label class="form-label">추가 이미지(여러 장)</label>
                            <!-- 컨트롤러 @RequestParam("subImages")와 동일한 name 사용 -->
                            <input type="file" name="subImages" id="subImages" accept="image/*" multiple
                                   class="form-control">
                            <div id="subPreview" class="d-flex flex-wrap gap-2 mt-2"></div>
                            <div class="form-text">여러 장 선택 가능. 저장하면 서브 이미지로 추가됩니다 (imageType=SUB, sortOrder는 1부터
                                자동부여).
                            </div>
                        </div>
                    </div>

                    <!-- 상태 -->
                    <div class="col-12">
                        <label class="form-label">상태</label>
                        <select class="form-select" th:field="*{status}">
                            <option value="">선택</option>
                            <option value="PENDING">PENDING</option>
                            <option value="ACTIVE">ACTIVE</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">저장(승인요청)</button>
                    <a th:href="@{/admin/accommodations/list}" class="btn btn-outline-secondary">목록으로</a>
                </div>
            </form>
        </div>
    </div>
</th:block>

<!-- 페이지 전용 스크립트 -->
<th:block layout:fragment="script">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /* -------- 썸네일 미리보기 -------- */
            const thumbInput = document.getElementById('fileInput');
            const thumbPreview = document.getElementById('thumbPreview');
            if (thumbInput && thumbPreview) {
                thumbInput.addEventListener('change', (e) => {
                    const f = e.target.files && e.target.files[0];
                    if (!f) {
                        thumbPreview.style.display = 'none';
                        thumbPreview.src = '';
                        return;
                    }
                    const url = URL.createObjectURL(f);
                    thumbPreview.src = url;
                    thumbPreview.style.display = 'inline-block';
                });
            }

            /* -------- 서브 이미지 미리보기 + X 제거 -------- */
            const subInput = document.getElementById('subImages');
            const subBox = document.getElementById('subPreview');
            if (subInput && subBox) {
                subInput.addEventListener('change', () => {
                    subBox.innerHTML = '';
                    const files = Array.from(subInput.files || []);
                    files.forEach((f, idx) => {
                        if (!f.type.startsWith('image/')) return;
                        const url = URL.createObjectURL(f);

                        const wrap = document.createElement('div');
                        wrap.className = 'pv-wrap';

                        const img = document.createElement('img');
                        img.src = url;
                        img.alt = f.name || 'preview';
                        img.className = 'pv';

                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'btn btn-light border rounded-circle pv-x';
                        btn.textContent = '×';
                        btn.title = '이 파일 제거';
                        btn.addEventListener('click', () => {
                            // DataTransfer로 idx번째 파일 제거
                            const dt = new DataTransfer();
                            Array.from(subInput.files).forEach((file, i) => {
                                if (i !== idx) dt.items.add(file);
                            });
                            subInput.files = dt.files;
                            subInput.dispatchEvent(new Event('change'));
                        });

                        wrap.appendChild(img);
                        wrap.appendChild(btn);
                        subBox.appendChild(wrap);
                    });
                });
            }

            /* -------- 지역(소) 동적 로드 -------- */
            const main = document.getElementById('mainRegion');
            const sub = document.getElementById('subRegion');
            if (main && sub) {
                const url = main.dataset.url; // "/admin/accommodations/regions/children"
                main.addEventListener('change', async () => {
                    sub.innerHTML = '<option value="" disabled selected>로딩 중...</option>';
                    const parentId = main.value;
                    if (!parentId) {
                        sub.innerHTML = '<option value="" disabled selected>상위를 먼저 선택하세요</option>';
                        return;
                    }
                    try {
                        const res = await fetch(`${url}?parentId=${encodeURIComponent(parentId)}`, {
                            headers: {'Accept': 'application/json'}
                        });
                        if (!res.ok) throw new Error(res.status);
                        const data = await res.json(); // [{id, name}]
                        sub.innerHTML = '<option value="" disabled selected>선택하세요</option>';
                        data.forEach(r => {
                            const opt = document.createElement('option');
                            opt.value = r.id;
                            opt.textContent = r.name;
                            sub.appendChild(opt);
                        });
                    } catch (e) {
                        console.error('지역(소) 로드 실패:', e);
                        sub.innerHTML = '<option value="" disabled selected>불러오기 실패</option>';
                    }
                });
            }

            /* -------- 태그 미리보기 -------- */
            const sel = document.getElementById('tagSelect');
            const box = document.getElementById('tagSelected');
            if (sel && box) {
                function renderSelected() {
                    box.innerHTML = '';
                    const selected = [...sel.selectedOptions].map(o => ({
                        value: o.value,
                        label: o.textContent.trim(),
                        category: o.closest('optgroup') ? o.closest('optgroup').label : ''
                    }));
                    if (selected.length === 0) {
                        box.innerHTML = '<span class="text-muted">선택된 태그가 없습니다.</span>';
                        return;
                    }
                    selected.forEach(s => {
                        const chip = document.createElement('span');
                        chip.className = 'badge bg-primary-subtle text-primary border rounded-pill px-2 py-1 d-inline-flex align-items-center';
                        chip.textContent = (s.category ? (s.category + ' - ') : '') + s.label;

                        const close = document.createElement('button');
                        close.type = 'button';
                        close.className = 'btn-close btn-sm ms-2';
                        close.setAttribute('aria-label', 'remove');
                        close.addEventListener('click', () => {
                            const opt = [...sel.options].find(o => o.value === s.value);
                            if (opt) opt.selected = false;
                            renderSelected();
                        });

                        chip.appendChild(close);
                        box.appendChild(chip);
                    });
                }

                sel.addEventListener('change', renderSelected);
                renderSelected();
            }
        });
    </script>
</th:block>
</body>
</html>
