<!-- templates/admin/accommodations/add.html -->
<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>숙소 등록</title>
    <th:block layout:fragment="head">
        <style>
            .help-text{font-size:.875rem;color:#6c757d}
            .required::after{content:" *";color:#dc3545}
            .field-error{border-color:#dc3545}
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1">
                <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">대시보드</a></li>
                <li class="breadcrumb-item">숙소</li>
                <li class="breadcrumb-item active" aria-current="page">등록</li>
            </ol>
        </nav>
        <h3 class="mb-2">숙소 등록</h3>
        <p class="text-muted">필수 항목은 <span class="text-danger">*</span> 표시가 있어요.</p>
    </div>

    <div class="card">
        <div class="card-body">
            <!-- 컨트롤러에서 model.addAttribute("form", new AccommodationCreateRequestDTO()) -->
            <form th:object="${form}"
                  th:action="@{/admin/accommodations/add}"
                  method="post" id="accForm" novalidate>

                <!-- CSRF -->
                <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>

                <div class="row g-3">

                    <!-- 회사 / 카테고리 / 지역 -->
                    <div class="col-md-4">
                        <label class="form-label required">회사 ID</label>
                        <input type="number" class="form-control" th:field="*{companyId}" placeholder="예) 1" required>
                        <div class="help-text">로그인 회사 고정이라면 hidden 처리 가능</div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label required">카테고리</label>
                        <select class="form-select" th:field="*{categoryId}" required>
                            <option value="" disabled selected>선택하세요</option>
                            <option value="1">호텔</option>
                            <option value="2">모텔</option>
                            <option value="3">게스트하우스</option>
                            <option value="4">펜션</option>
                            <option value="5">글램핑/캠핑</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label required">지역(대)</label>
                        <select id="mainRegion" class="form-select" th:field="*{mainRegionId}" required
                                th:data-url="@{/admin/accommodations/regions/children}">
                            <option value="" disabled selected>선택하세요</option>
                            <option th:each="r : ${mainRegions}" th:value="${r.regionId}" th:text="${r.name}"></option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label required">지역(소)</label>
                        <label for="subRegion"></label>
                        <select id="subRegion" class="form-select" th:field="*{subRegionId}" required>
                            <option value="" disabled selected>상위를 먼저 선택하세요</option>
                        </select>
                    </div>

                    <!-- 기본 정보 -->
                    <div class="col-md-8">
                        <label class="form-label required">숙소명</label>
                        <input type="text" class="form-control" th:field="*{name}" placeholder="예) 허니레스트 강남점" required>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label required">주소</label>
                        <input type="text" class="form-control" th:field="*{address}" placeholder="도로명/지번" required>
                        <div class="help-text">주소검색 연동은 나중에 붙여도 됩니다.</div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">썸네일 URL</label>
                        <input type="text" class="form-control" th:field="*{thumbnailUrl}" placeholder="https://...">
                    </div>

                    <div class="col-12">
                        <label class="form-label">설명</label>
                        <textarea class="form-control" th:field="*{description}" rows="3" placeholder="숙소 소개, 편의시설 등"></textarea>
                    </div>

                    <!-- 편의시설(JSON) -->
                    <div class="col-12">
                        <label class="form-label">편의시설(amenities, JSON)</label>
                        <textarea class="form-control" th:field="*{amenities}" rows="2"
                                  placeholder='예) ["wifi","parking","pool"]'></textarea>
                        <div class="help-text">JSON 배열 형태 권장. 단순 문자열도 수용 코딩되어 있으면 사용 가능.</div>
                    </div>

                    <!-- 운영 시간 / 가격 -->
                    <div class="col-md-3">
                        <label class="form-label required">영업시작</label>
                        <input type="time" class="form-control" th:field="*{checkInTime}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label required">영업종료</label>
                        <input type="time" class="form-control" th:field="*{checkOutTime}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">최저가(원)</label>
                        <input type="number" step="0.01" min="0" class="form-control" th:field="*{minPrice}" placeholder="예) 80000">
                    </div>

                    <!-- 태그(복수 선택) : name=tagIds 다중 -->
                    <div class="col-md-3">
                        <label class="form-label">태그 선택</label>
                        <select class="form-select" th:field="*{tagIds}" multiple size="4">
                            <option value="1">오션뷰</option>
                            <option value="2">바베큐</option>
                            <option value="3">수영장</option>
                            <option value="4">조식 포함</option>
                            <!-- 실제 태그로 교체 -->
                        </select>
                        <div class="help-text">Ctrl(⌘)로 다중 선택</div>
                    </div>

                    <!-- 이미지(간단 3개 슬롯 예시) -->
                    <div class="col-12">
                        <label class="form-label">이미지</label>
                        <div class="row g-2 align-items-end">
                            <div class="col-md-6">
                                <input type="text" class="form-control" name="images[0].imageUrl" placeholder="이미지 URL">
                            </div>
                            <div class="col-md-3">
                                <select class="form-select" name="images[0].imageType">
                                    <option value="">(선택)</option>
                                    <option value="MAIN">MAIN</option>
                                    <option value="EXTERIOR">EXTERIOR</option>
                                    <option value="COMMON">COMMON</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <input type="number" class="form-control" name="images[0].sortOrder" placeholder="정렬(숫자)">
                            </div>
                        </div>
                        <div class="row g-2 mt-1">
                            <div class="col-md-6">
                                <label class="form-label required">썸네일 이미지</label>
                                <input type="file" class="form-control" name="thumbnailFile" accept="image/*" required>
                                <div class="help-text">JPG/PNG 등 이미지 1장 업로드</div>
                            </div>
                            <div class="mb-3">
                                <label for="file">피일찾기</label>
                                <input type="file" class="form-control" id="file" name="file" required>
                            </div>

                            <div class="col-md-3">
                                <select class="form-select" name="images[1].imageType">
                                    <option value="">(선택)</option>
                                    <option value="MAIN">MAIN</option>
                                    <option value="EXTERIOR">EXTERIOR</option>
                                    <option value="COMMON">COMMON</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <input type="number" class="form-control" name="images[1].sortOrder" placeholder="정렬(숫자)">
                            </div>
                        </div>
                        <div class="row g-2 mt-1">
                            <div class="col-md-6">
                                <input type="text" class="form-control" name="images[2].imageUrl" placeholder="이미지 URL">
                            </div>
                            <div class="col-md-3">
                                <select class="form-select" name="images[2].imageType">
                                    <option value="">(선택)</option>
                                    <option value="MAIN">MAIN</option>
                                    <option value="EXTERIOR">EXTERIOR</option>
                                    <option value="COMMON">COMMON</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <input type="number" class="form-control" name="images[2].sortOrder" placeholder="정렬(숫자)">
                            </div>
                        </div>
                        <div class="help-text mt-1">필요 시 동적 추가 스크립트로 확장 가능</div>
                    </div>

                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        저장(승인요청)
                    </button>
                    <a th:href="@{/admin/accommodations/list}" class="btn btn-outline-secondary">목록으로</a>
                </div>

            </form>
        </div>
    </div>
</th:block>

<!-- 페이지 전용 스크립트가 필요하면 여기에 -->
<th:block layout:fragment="script">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.getElementById('mainRegion');
            const sub  = document.getElementById('subRegion');
            const url  = main.dataset.url; // "/admin/accommodations/regions/children"

            main.addEventListener('change', async () => {
                sub.innerHTML = '<option value="" disabled selected>로딩 중...</option>';
                try {
                    const res = await fetch(`${url}?parentId=${encodeURIComponent(main.value)}`);
                    if (!res.ok) throw new Error(res.status);
                    const data = await res.json(); // [{id, name}]
                    sub.innerHTML = '<option value="" disabled selected>선택하세요</option>';
                    data.forEach(r => {
                        const opt = document.createElement('option');
                        opt.value = r.id;
                        opt.textContent = r.name;
                        sub.appendChild(opt);
                    });
                } catch (e) {
                    sub.innerHTML = '<option value="" disabled selected>불러오기 실패</option>';
                    console.error('지역(소) 로드 실패:', e);
                }
            });
        });
    </script>
</th:block>
</body>
</html>
