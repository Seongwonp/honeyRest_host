<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout/blank}">
<head>
    <meta charset="UTF-8">
    <title layout:fragment="title">로그인 | HoneyRest</title>
    <th:block layout:fragment="head">
        <link rel="stylesheet" th:href="@{/assets/css/honey-theme.css}" />
        <style>
            body { background: linear-gradient(135deg, #FFF8E1 0%, #FFE082 40%, #FFD54F 100%) !important; }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">
    <div class="login-wrapper">
        <div class="login-card-honey">
            <div class="login-logo">
                <span class="logo-icon">🍯</span>
                <h1>HoneyRest</h1>
                <p>호스트 관리 시스템</p>
            </div>

            <form method="post" th:action="@{/auth/login}">
                <div class="mb-3">
                    <label for="email" class="form-label">이메일</label>
                    <input type="email" class="form-control" id="email"
                           name="email" placeholder="관리자 이메일 입력"
                           required autocomplete="username" />
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" class="form-control" id="password"
                           name="password" placeholder="비밀번호 입력"
                           required autocomplete="current-password" />
                </div>

                <button type="submit" class="btn btn-login">로그인</button>
            </form>

            <div th:if="${param.error}" class="alert mt-3 p-2 text-center"
                 style="background:#FEE2E2;color:#DC2626;border-radius:10px;font-size:.9rem;">
                이메일 또는 비밀번호가 올바르지 않습니다.
            </div>
            <div th:if="${param.logout}" class="alert mt-3 p-2 text-center"
                 style="background:#DCFCE7;color:#16A34A;border-radius:10px;font-size:.9rem;">
                로그아웃되었습니다.
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
