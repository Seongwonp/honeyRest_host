<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<head>
    <title>리뷰 관리</title>
    <th:block layout:fragment="head">
        <style>
            .btn-chip { border-radius: var(--pill) !important; padding: .28rem .65rem; font-weight: 700; font-size: .82rem; }
            .review-content { max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 헤더 -->
    <div class="toolbar">
        <div class="d-flex align-items-center gap-2">
            <h3 class="mb-0">리뷰 관리</h3>
            <span class="count-badge"
                  th:text="'총 ' + ${pageResponse != null ? pageResponse.total : 0} + '개'">총 0개</span>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <form class="d-flex gap-2 align-items-center flex-wrap" method="get" th:action="@{/owner/review/list}">
                <select class="form-select form-select-sm" name="accommodationId" style="width:auto">
                    <option value="">전체 숙소</option>
                    <option th:each="acc : ${accommodations}"
                            th:value="${acc.accommodationId}"
                            th:text="${acc.name}"
                            th:selected="${selectedAccommodationId != null and selectedAccommodationId == acc.accommodationId}">숙소명</option>
                </select>
                <button class="btn btn-primary btn-chip">검색</button>
            </form>
        </div>
    </div>

    <!-- 테이블 -->
    <div class="card">
        <div class="card-body table-responsive p-0">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-3 text-center">ID</th>
                    <th>숙소 / 객실</th>
                    <th class="hide-md">작성자</th>
                    <th class="text-center">평점</th>
                    <th class="hide-sm">내용</th>
                    <th class="hide-md">답글</th>
                    <th class="text-center">상태</th>
                    <th class="hide-sm">작성일</th>
                    <th class="text-center">액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${reviews}">
                    <td class="ps-3 text-center text-muted" style="font-size:.85rem;" th:text="${r.reviewId}">1</td>
                    <td>
                        <div class="fw-semibold" style="font-size:.9rem;" th:text="${r.accommodationId ?: '-'}">숙소ID</div>
                        <div class="text-muted" style="font-size:.78rem;" th:text="${r.roomId != null ? '객실 #' + r.roomId : ''}"></div>
                    </td>
                    <td class="hide-md" th:text="${r.userId ?: '-'}">user123</td>
                    <td class="text-center">
                        <span class="fw-bold" style="color:#F59E0B;" th:text="${r.rating != null ? r.rating + '★' : '-'}">5★</span>
                    </td>
                    <td class="hide-sm">
                        <div class="review-content" th:text="${r.content ?: ''}">내용</div>
                    </td>
                    <td class="hide-md">
                        <span th:if="${r.reply != null and !#strings.isEmpty(r.reply)}"
                              class="badge" style="background:#EFF6FF;color:#1D4ED8;font-weight:600;">답글 있음</span>
                        <span th:if="${r.reply == null or #strings.isEmpty(r.reply)}"
                              class="text-muted" style="font-size:.82rem;">없음</span>
                    </td>
                    <td class="text-center">
                        <span class="badge-chip"
                              th:classappend="${#strings.equalsIgnoreCase(r.status,'VISIBLE')} ? ' badge-active' :
                                             (${#strings.equalsIgnoreCase(r.status,'HIDDEN')} ? ' badge-inactive' : ' chip-unk')"
                              th:text="${r.status}">VISIBLE</span>
                    </td>
                    <td class="hide-sm text-muted" style="font-size:.82rem;"
                        th:text="${r.createdAt != null ? #temporals.format(r.createdAt,'yyyy-MM-dd') : '-'}">2025-01-01</td>
                    <td class="text-center">
                        <div class="d-inline-flex gap-1">
                            <a class="btn btn-ghost btn-chip"
                               th:href="@{'/owner/review/' + ${r.reviewId} + '/modify'}">수정</a>
                            <form th:action="@{'/owner/review/' + ${r.reviewId} + '/delete'}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                <button type="submit" class="btn btn-danger-soft btn-chip">삭제</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${reviews == null or #lists.isEmpty(reviews)}">
                    <td colspan="9" class="text-center py-5 text-muted">
                        <i class="bi bi-star d-block fs-2 mb-2"></i>
                        리뷰가 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div class="card-footer d-flex justify-content-between align-items-center"
             th:if="${pageResponse != null}">
            <div class="text-muted" style="font-size:.85rem;">
                총 <span th:text="${pageResponse.total}">0</span>개
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${!pageResponse.prev} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/review/list(page=${pageResponse.prevPage}, size=${pageResponse.pageRequestDTO.size},
                                       accommodationId=${selectedAccommodationId})}">&laquo;</a>
                    </li>
                    <li class="page-item"
                        th:each="num : ${pageResponse.pageNumList}"
                        th:classappend="${num == pageResponse.current} ? 'active'">
                        <a class="page-link"
                           th:href="@{/owner/review/list(page=${num}, size=${pageResponse.pageRequestDTO.size},
                                       accommodationId=${selectedAccommodationId})}"
                           th:text="${num}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${!pageResponse.next} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/review/list(page=${pageResponse.nextPage}, size=${pageResponse.pageRequestDTO.size},
                                       accommodationId=${selectedAccommodationId})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</th:block>
</body>
</html>
