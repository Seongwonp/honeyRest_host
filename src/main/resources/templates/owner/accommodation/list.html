<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<head>
    <title>숙소 목록</title>
    <th:block layout:fragment="head">
        <style>
            .thumb { width: 56px; height: 56px; object-fit: cover; border-radius: var(--r); border: 1px solid var(--border); }
            .thumb-empty {
                width: 56px; height: 56px; border-radius: var(--r); border: 1px dashed #CBD5E1;
                color: var(--subtle); font-size: .7rem;
                display: flex; align-items: center; justify-content: center; background: #F8FAFC;
            }
            .btn-chip { border-radius: var(--pill) !important; padding: .28rem .65rem; font-weight: 700; font-size: .82rem; }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 업체 컨텍스트 배너 (특정 업체 필터 시) -->
    <div class="d-flex align-items-center gap-2 mb-3 p-3 rounded"
         style="background:var(--primary-soft);border:1px solid var(--primary-mid);"
         th:if="${company != null}">
        <i class="bi bi-building text-primary fs-5"></i>
        <div>
            <span class="fw-bold" th:text="${company.name}">업체명</span>
            <span class="text-muted ms-2" style="font-size:.85rem;"
                  th:text="${company.ownerName + ' · ' + (company.commissionRate != null ? company.commissionRate + '%' : '')}"></span>
        </div>
        <a th:href="@{/owner/accommodation/list}" class="btn btn-soft btn-chip ms-auto">전체 보기</a>
    </div>

    <!-- 헤더 -->
    <div class="toolbar">
        <div class="d-flex align-items-center gap-2">
            <h3 class="mb-0"
                th:text="${company != null ? company.name + ' 숙소 목록' : '전체 숙소 목록'}">숙소 목록</h3>
            <span class="count-badge"
                  th:if="${responseDTO != null}"
                  th:text="'총 ' + ${responseDTO.total} + '개'">총 0개</span>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <form class="d-flex gap-2 align-items-center flex-wrap" method="get" th:action="@{/owner/accommodation/list}">
                <select class="form-select form-select-sm" name="companyId" style="width:auto"
                        onchange="this.form.submit()">
                    <option value="">전체 업체</option>
                    <option th:each="c : ${companies}"
                            th:value="${c.companyId}"
                            th:text="${c.name}"
                            th:selected="${companyId != null and companyId == c.companyId}">업체명</option>
                </select>
            </form>
            <a th:href="@{/owner/accommodation/create}" class="btn btn-primary btn-chip">
                <i class="bi bi-plus-lg me-1"></i>숙소 등록
            </a>
        </div>
    </div>

    <!-- 테이블 -->
    <div class="card">
        <div class="card-body table-responsive p-0">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-3 hide-md text-center">ID</th>
                    <th class="hide-sm text-center">썸네일</th>
                    <th>숙소명</th>
                    <th class="hide-md">업체</th>
                    <th class="hide-sm">지역</th>
                    <th class="hide-sm text-end">최저가</th>
                    <th class="text-center">상태</th>
                    <th class="text-center">액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${accommodations}">
                    <td class="ps-3 hide-md text-center text-muted" style="font-size:.85rem;"
                        th:text="${a.accommodationId}">1</td>
                    <td class="hide-sm text-center">
                        <img th:if="${a.thumbnailUrl != null and !#strings.isEmpty(a.thumbnailUrl)}"
                             th:src="${a.thumbnailUrl}" alt="thumb" class="thumb">
                        <div th:if="${a.thumbnailUrl == null or #strings.isEmpty(a.thumbnailUrl)}"
                             class="thumb-empty mx-auto">없음</div>
                    </td>
                    <td>
                        <div class="fw-semibold" th:text="${a.name}">숙소명</div>
                        <div class="text-muted" style="font-size:.78rem;" th:text="${a.address ?: ''}"></div>
                    </td>
                    <td class="hide-md text-muted" style="font-size:.88rem;"
                        th:text="${a.companyName ?: '-'}">업체명</td>
                    <td class="hide-sm text-muted" style="font-size:.88rem;"
                        th:text="${a.regionName ?: '-'}">지역</td>
                    <td class="hide-sm text-end fw-semibold"
                        th:text="${a.minPrice != null ? #numbers.formatDecimal(a.minPrice,0,'COMMA',0,'POINT') + '원' : '-'}">-</td>
                    <td class="text-center">
                        <span class="badge-chip"
                              th:classappend="${#strings.equalsIgnoreCase(a.status,'ACTIVE')}   ? ' badge-active'  :
                                             (${#strings.equalsIgnoreCase(a.status,'PENDING')}  ? ' badge-pending' :
                                             (${#strings.equalsIgnoreCase(a.status,'INACTIVE')} ? ' badge-inactive':
                                                                                                   ' badge-rejected'))"
                              th:text="${a.status}">ACTIVE</span>
                    </td>
                    <td class="text-center">
                        <div class="d-inline-flex gap-1">
                            <a class="btn btn-ghost btn-chip"
                               th:href="@{'/owner/accommodation/' + ${a.accommodationId} + '/rooms'}">객실</a>
                            <a class="btn btn-soft btn-chip"
                               th:href="@{'/owner/accommodation/' + ${a.accommodationId} + '/modify'}">수정</a>
                            <form th:action="@{'/owner/accommodation/' + ${a.accommodationId} + '/delete'}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                <button type="submit" class="btn btn-danger-soft btn-chip">삭제</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${accommodations == null or #lists.isEmpty(accommodations)}">
                    <td colspan="8" class="text-center py-5 text-muted">
                        <i class="bi bi-house-door d-block fs-2 mb-2"></i>
                        등록된 숙소가 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div class="card-footer d-flex justify-content-between align-items-center"
             th:if="${responseDTO != null}">
            <div class="text-muted" style="font-size:.85rem;">
                총 <span th:text="${responseDTO.total}">0</span>개
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${!responseDTO.prev} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/accommodation/list(page=${responseDTO.prevPage}, size=${responseDTO.pageRequestDTO.size}, companyId=${companyId})}">&laquo;</a>
                    </li>
                    <li class="page-item"
                        th:each="num : ${responseDTO.pageNumList}"
                        th:classappend="${num == responseDTO.current} ? 'active'">
                        <a class="page-link"
                           th:href="@{/owner/accommodation/list(page=${num}, size=${responseDTO.pageRequestDTO.size}, companyId=${companyId})}"
                           th:text="${num}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${!responseDTO.next} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/accommodation/list(page=${responseDTO.nextPage}, size=${responseDTO.pageRequestDTO.size}, companyId=${companyId})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</th:block>
</body>
</html>
