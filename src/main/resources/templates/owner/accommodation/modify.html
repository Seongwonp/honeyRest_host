<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">

<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3>숙소 수정</h3>
        <p class="text-subtitle text-muted">숙소 정보를 수정합니다.</p>
    </div>

    <div class="page-content">
        <form th:action="@{/owner/accommodation/modify}" method="post" enctype="multipart/form-data">
            <!-- accommodationId hidden -->
            <input type="hidden" name="accommodationId" th:value="${accommodation.accommodationId}" />

            <!-- 업체 선택 -->
            <div class="mb-3">
                <label for="companyId" class="form-label">업체</label>
                <select name="companyId" class="form-select" id="companyId" required>
                    <option value="">업체 선택</option>
                    <option th:each="c : ${companies}"
                            th:value="${c.companyId}"
                            th:text="${c.name}"
                            th:selected="${c.companyId == accommodation.companyId}"></option>
                </select>
            </div>

            <!-- 카테고리 -->
            <div class="mb-3">
                <label for="categoryId" class="form-label">카테고리</label>
                <select name="categoryId" class="form-select" id="categoryId" required>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.categoryId}"
                            th:text="${cat.name}"
                            th:selected="${cat.categoryId == accommodation.categoryId}"></option>
                </select>
            </div>

            <!-- 지역 -->
            <div class="mb-3">
                <label for="mainRegionId" class="form-label">메인 지역</label>
                <select name="mainRegionId" class="form-select" id="mainRegionId" required>
                    <option value="">메인 지역 선택</option>
                    <option th:each="r : ${regions}" th:if="${r.level == 1}"
                            th:value="${r.regionId}" th:text="${r.name}"
                            th:selected="${r.regionId == accommodation.mainRegionId}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label for="subRegionId" class="form-label">서브 지역</label>
                <select name="subRegionId" class="form-select" id="subRegionId" required>
                    <option value="">서브 지역 선택</option>
                    <option th:each="r : ${regions}" th:if="${r.level == 2 && r.parentId == accommodation.mainRegionId}"
                            th:value="${r.regionId}" th:text="${r.name}"
                            th:selected="${r.regionId == accommodation.subRegionId}"></option>
                </select>
            </div>

            <!-- 기본 정보 -->
            <div class="mb-3">
                <label for="name" class="form-label">숙소 이름</label>
                <input type="text" name="name" class="form-control" id="name"
                       th:value="${accommodation.name}" required>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">주소</label>
                <input type="text" name="address" class="form-control" id="address"
                       th:value="${accommodation.address}" required>
            </div>
<!--            <div class="mb-3">-->
<!--                <label for="latitude" class="form-label">위도</label>-->
<!--                <input type="number" name="latitude" class="form-control" id="latitude"-->
<!--                       th:value="${accommodation.latitude}" step="0.000001" required>-->
<!--            </div>-->
<!--            <div class="mb-3">-->
<!--                <label for="longitude" class="form-label">경도</label>-->
<!--                <input type="number" name="longitude" class="form-control" id="longitude"-->
<!--                       th:value="${accommodation.longitude}" step="0.000001" required>-->
<!--            </div>-->

            <!-- 썸네일/설명/편의시설 -->
            <div class="mb-3">
                <label for="file">숙소 메인 이미지:</label>
                <input type="file" class="form-control" id="file" name="file"><br/>
                <span th:if="${accommodation.thumbnailUrl != null}">
                    현재 이미지: <img th:src="${accommodation.thumbnailUrl}" style="max-width: 300px; height: auto; border: 1px solid #ddd; padding: 4px; border-radius: 4px;" alt="이미지"/>
                </span>
            </div>

            <div class="mb-3">
                <label for="images" class="form-label">숙소 이미지</label>
                <input type="file" class="form-control" id="images" name="images" multiple>
                <div th:if="${accommodationImages != null}">
                    <span>현재 이미지:</span>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;">
                        <div th:each="img : ${accommodationImages}">
                            <img th:src="${img.imageUrl}"
                                 style="max-height: 150px; width: auto; border: 1px solid #ddd; padding: 4px; border-radius: 4px;"
                                 alt="이미지"/>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">설명</label>
                <textarea name="description" class="form-control" id="description" rows="3"
                          th:text="${accommodation.description}"></textarea>
            </div>
            <div class="mb-3">
                <label for="amenities" class="form-label">편의시설 (JSON)</label>
                <textarea name="amenities" class="form-control" id="amenities"
                          th:text="${accommodation.amenities}"></textarea>
            </div>

            <!-- 체크인/체크아웃 -->
            <div class="mb-3">
                <label for="checkInTime" class="form-label">체크인 시간</label>
                <input type="time" name="checkInTime" class="form-control" id="checkInTime"
                       th:value="${accommodation.checkInTime}" required>
            </div>
            <div class="mb-3">
                <label for="checkOutTime" class="form-label">체크아웃 시간</label>
                <input type="time" name="checkOutTime" class="form-control" id="checkOutTime"
                       th:value="${accommodation.checkOutTime}" required>
            </div>

            <!-- 평점 / 최소 가격 -->
            <div class="mb-3">
                <label for="rating" class="form-label">평점</label>
                <input type="number" name="rating" class="form-control" id="rating"
                       th:value="${accommodation.rating}" step="0.1" min="0" max="5">
            </div>
            <div class="mb-3">
                <label for="minPrice" class="form-label">최소 가격</label>
                <input type="number" name="minPrice" class="form-control" id="minPrice"
                       th:value="${accommodation.minPrice}" required>
            </div>

            <!-- 상태 -->
            <div class="mb-3">
                <label for="status" class="form-label">상태</label>
                <select name="status" class="form-select" id="status" required>
                    <option value="ACTIVE" th:selected="${accommodation.status == 'ACTIVE'}">활성</option>
                    <option value="INACTIVE" th:selected="${accommodation.status == 'INACTIVE'}">비활성</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">수정</button>
        </form>
    </div>
</th:block>
</body>
</html>
