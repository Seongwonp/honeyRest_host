<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">

<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3 th:text="${company != null} ? ${company.name} : '비활성 숙소 리스트'">숙소 리스트</h3>
        <!-- 회사 정보 카드 -->
        <div class="card shadow-lg border-0 mb-4" th:if="${company != null}">
            <!-- 헤더 -->
            <div class="card-header  py-3 d-flex justify-content-between align-items-center rounded-top">
                <h5 class="mb-0 fw-bold">
                    <i class="bi bi-building me-2"></i> 회사 상세 정보
                </h5>
                <span class="badge px-3 py-2" th:text="${company.status == 'ACTIVE'} ? '활성' : '비활성'">활성</span>
            </div>

            <!-- 본문 -->
            <div class="card-body p-4">
                <!-- 업체 기본 정보 -->
                <div class="row g-4 mb-3">
                    <div class="row g-4 ">
                        <div class="col-md-6">
                            <label class="text-muted small fw-semibold">업체명</label>
                            <div class="fs-5 fw-bold" th:text="${company.name}">한강리조트</div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-muted small fw-semibold">대표자명</label>
                            <div class="fs-5" th:text="${company.ownerName}">홍길동</div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-muted small fw-semibold">사업자등록번호</label>
                            <div th:text="${company.businessNumber}">123-45-67890</div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-muted small fw-semibold">수수료율</label>
                            <div class="fw-semibold" style="color:var(--honey-deeper)"" th:text="${company.commissionRate + '%'}">10%</div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-muted small fw-semibold">이메일</label>
                            <div th:text="${company.email}">email@example.com</div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-muted small fw-semibold">전화번호</label>
                            <div th:text="${company.phone}">010-1234-5678</div>
                        </div>
                        <div class="col-md-12">
                            <label class="text-muted small fw-semibold">주소</label>
                            <div th:text="${company.address}">서울특별시 강남구 ...</div>
                        </div>
                        <div class="col-md-6">
                            <label class="text-muted small fw-semibold">가입일</label>
                            <div th:text="${#temporals.format(company.createdAt, 'yyyy-MM-dd HH:mm')}">2025-08-31</div>
                        </div>
                    </div>

                    <!-- 정산 계좌 -->
                    <div class="mt-4 pt-3 border-top">
                        <h6 class="fw-bold mb-3">
                            <i class="bi bi-bank me-2" style="color:var(--honey-deeper)""></i> 정산 계좌 정보
                        </h6>
                        <div class="fs-6 ps-2 border-start border-3" th:text="${company.bankInfo}">
                            신한은행 123-456-789012
                        </div>
                    </div>

                    <!-- 버튼 영역 -->
                    <div class="mt-4 text-end d-flex justify-content-end gap-2 flex-wrap">
                        <a th:href="@{'/owner/sales/day/company/' + ${company.companyId}}" class="btn btn-success btn-sm px-3">
                            <i class="bi bi-graph-up me-1"></i> 매출 보기
                        </a>
                        <a th:href="@{'/owner/calendar/company/' + ${company.companyId} + '/calendar'}" class="btn btn-secondary btn-sm px-3">
                            <i class="bi bi-calendar-event me-1"></i> 예약 캘린더
                        </a>
                        <a th:href="@{'/owner/company/' + ${company.companyId} + '/modify'}" class="btn btn-primary btn-sm px-3">
                            <i class="bi bi-pencil-square me-1"></i> 업체 수정
                        </a>
                        <form th:action="@{'/owner/company/' + ${company.companyId} + '/delete'}"
                              method="post" style="display:inline-block;"
                              onsubmit="return confirm('정말 삭제하시겠습니까?');">
                            <button type="submit" class="btn btn-danger btn-sm px-3">
                                <i class="bi bi-trash me-1"></i> 삭제
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <p class="text-subtitle text-muted" th:if="${company == null}">
            업체 선택 시 해당 업체의 숙소만 조회됩니다.
        </p>
        <!-- 업체 선택 폼 -->
        <div class="card p-4 mb-4 shadow-sm">
            <form id="searchForm" class="row g-3 align-items-end">
                <div class="col-md-4 col-sm-8 position-relative">
                    <label class="form-label"><i class="bi bi-building me-1"></i>숙소 검색</label>
                    <input type="text" id="accommodationSearchInput" class="form-control" placeholder="숙소명을 입력하세요">
                    <div id="accommodationSearchResult" class="list-group position-absolute w-100"
                         style="z-index: 1000; display: none; height: 200px; overflow-y: auto;"></div>
                    <input type="hidden" name="accommodationIdInput" id="accommodationIdInput">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-warning text-dark custom-hover-dark">검색</button>
                </div>
                <div class="col text-end">
                    <a th:href="@{/owner/accommodation/create(companyId=${companyId})}" class="btn btn-primary">숙소 등록</a>
                </div>
            </form>
        </div>

        <!-- 객실 리스트 카드 -->
        <div class="mt-4">
            <h6 class="fw-bold mb-3">숙소 목록</h6>
            <div class="row g-4">
                <div class="col-md-4" th:each="a : ${accommodations}">
                    <div class="card h-100 shadow-sm p-3">
                        <div class="d-flex flex-column justify-content-between h-100">
                            <div class="d-flex flex-row justify-content-between">
                                <!-- 텍스트 영역 (왼쪽) -->
                                <div class="flex-grow-1 pe-3">
                                    <h5 class="card-title fw-bold mb-2">
                                        <a th:href="@{'/owner/accommodation/' + ${a.accommodationId} + '/rooms'}"
                                           th:text="${a.name}"
                                           class="text-decoration-none text-dark">숙소명</a>
                                    </h5>
                                    <p class="mb-1"><strong>ID:</strong> <span th:text="${a.accommodationId}">1</span></p>
                                    <p class="mb-1"><strong>주소:</strong> <span th:text="${a.address}">주소</span></p>
                                    <p class="mb-1"><strong>체크인:</strong> <span th:text="${a.checkInTime}">14:00</span></p>
                                    <p class="mb-1"><strong>체크아웃:</strong> <span th:text="${a.checkOutTime}">11:00</span></p>
                                    <p class="mb-1"><strong>가격:</strong> <span th:text="${a.minPrice + ' 원'}">120,000 원</span></p>
                                    <p class="mb-1"><strong>상태:</strong> <span th:text="${a.status}">예약 가능</span></p>
                                </div>

                                <!-- 이미지 (오른쪽) -->
                                <div class="ms-2">
                                    <img th:src="${a.thumbnailUrl}" alt="숙소 이미지"
                                         class="img-fluid rounded"
                                         style="width: 150px; height: 150px; object-fit: cover;">
                                </div>
                            </div>

                            <!-- 하단 버튼 영역 -->
                            <div class="mt-3 d-flex justify-content-end gap-2">
                                <a th:href="@{'/owner/accommodation/' + ${a.accommodationId} + '/modify'}"
                                   class="btn btn-sm btn-primary">수정</a>
                                <form th:action="@{'/owner/accommodation/' + ${a.accommodationId} + '/delete'}"
                                      method="post"
                                      onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                    <button type="submit" class="btn btn-sm btn-danger">삭제</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <div class="pagination mt-3">
            <ul class="pagination">
                <li class="page-item" th:if="${responseDTO.prev}">
                    <a class="page-link"
                       th:href="@{/owner/accommodation/inActive(page=${responseDTO.prevPage}, size=${responseDTO.pageRequestDTO.size}, companyId=${companyId})}">이전</a>
                </li>

                <li class="page-item"
                    th:each="num : ${responseDTO.pageNumList}"
                    th:classappend="${num == responseDTO.current} ? 'active'">
                    <a class="page-link"
                       th:href="@{/owner/accommodation/inActive(page=${num}, size=${responseDTO.pageRequestDTO.size}, companyId=${companyId})}"
                       th:text="${num}"></a>
                </li>

                <li class="page-item" th:if="${responseDTO.next}">
                    <a class="page-link"
                       th:href="@{/owner/accommodation/inActive(page=${responseDTO.nextPage}, size=${responseDTO.pageRequestDTO.size}, companyId=${companyId})}">다음</a>
                </li>
            </ul>
        </div>
    </div>
</th:block>
</body>
</html>
<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener("DOMContentLoaded", function () {
        const accommodationSearchInput = document.getElementById("accommodationSearchInput");
        const accommodationSearchResult = document.getElementById("accommodationSearchResult");
        const accommodationIdInput = document.getElementById("accommodationIdInput");
        const roomSelect = document.getElementById("roomSelect");
        const companyId = /*[[${companyId}]]*/ '';

        // 회사명 검색 (비동기)
        accommodationSearchInput.addEventListener("input", function () {
            const keyword = this.value.trim();
            if (keyword.length < 1) { // 최소 1글자부터 검색
                accommodationSearchResult.style.display = "none";
                return;
            }

            fetch(`/owner/accommodation/inActive/search?companyId=${companyId}&keyword=${keyword}`)
                .then(res => res.json())
                .then(data => {
                    accommodationSearchResult.innerHTML = "";
                    if (!data || data.length === 0) {
                        accommodationSearchResult.style.display = "none";
                        return;
                    }

                    data.forEach(c => {
                        const item = document.createElement("button");
                        item.className = "list-group-item list-group-item-action py-2 px-3";
                        item.type = "button";
                        item.textContent = `${c.name} (${c.ownerName})`;
                        item.onclick = () => {
                            accommodationSearchInput.value = c.name;
                            accommodationIdInput.value = c.accommodationId;
                            accommodationSearchResult.style.display = "none";
                            // loadAccommodations(c.companyId); // 선택한 회사 기준 숙소 불러오기
                        };
                        accommodationSearchResult.appendChild(item);
                    });

                    accommodationSearchResult.style.display = "block";
                });
        });

        // 숙소 목록 불러오기 (선택한 회사 기준)
        function loadAccommodations(companyId) {
            fetch(`/owner/company/${companyId}/accommodations/json`)
                .then(res => res.json())
                .then(data => {
                    accommodationSelect.innerHTML = '<option value="">전체</option>';
                    data.forEach(a => {
                        const opt = document.createElement("option");
                        opt.value = a.accommodationId;
                        opt.textContent = a.name;
                        accommodationSelect.appendChild(opt);
                    });
                });
        }

        // 검색폼 전송 시 URL 설정
        document.getElementById('searchForm').addEventListener('submit', function (event) {
            // const companyId = companyIdInput.value;
            const accommodationId = accommodationIdInput.value;
            let actionUrl = "/owner/accommodation/inActive";

            if (accommodationId) {
                actionUrl = `/owner/room/inActive`;
            }
            this.action = actionUrl;
        });
    });
    /*]]>*/
</script>
