<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<body>
<th:block layout:fragment="content">
    <div class="page-heading mb-4">
        <h3>숙소 등록</h3>
        <p class="text-subtitle text-muted">새 숙소를 등록합니다.</p>
    </div>

    <div class="page-content">
        <form th:action="@{/owner/accommodation/create}" method="post" enctype="multipart/form-data" class="needs-validation" >

            <div class="card shadow-sm mb-4 p-4">
                <h5 class="mb-3">기본 정보</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">업체</label>
                        <select name="companyId" class="form-select" required>
                            <option value="">업체 선택</option>
                            <option th:each="c : ${companies}" th:value="${c.companyId}" th:text="${c.name}"
                                    th:selected="${c.companyId == companyId}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">카테고리</label>
                        <select name="categoryId" class="form-select" required>
                            <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.name}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">메인 지역</label>
                        <select name="mainRegionId" class="form-select" id="mainRegionId" required>
                            <option value="">메인 지역 선택</option>
                            <option th:each="r : ${regions}" th:if="${r.level == 1}" th:value="${r.regionId}" th:text="${r.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">서브 지역</label>
                        <select name="subRegionId" class="form-select" id="subRegionId" required>
                            <option value="">서브 지역 선택</option>

                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">숙소 이름</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">주소</label>
                        <input type="text" id="addressInput" name="address" class="form-control" required>
                    </div>
                    <div class="addr-wrap">
                        <label for="userAddr1">주소</label>
                        <input type="text" id="userPostCode" name="userPostCode" placeholder="우편번호" disabled>
                        <button type="button" onclick="searchAddr();">주소찾기</button>
                        <input type="text" id="userAddr1" name="userAddr1" placeholder="우편번호" readonly>
                        <input type="text" id="userAddr2" name="userAddr2" placeholder="상세 주소 입력" required>
                    </div>

                </div>
            </div>

            <div class="card shadow-sm mb-4 p-4">
                <h5 class="mb-3">이미지 및 설명</h5>
                <div class="mb-3">
                    <label class="form-label">숙소 메인 이미지</label>
                    <input type="file" class="form-control" name="file">
                </div>

                <div class="mb-3">
                    <label class="form-label">숙소 추가 이미지</label>
                    <input type="file" class="form-control" name="images" multiple>
                </div>

                <div class="mb-3">
                    <label class="form-label">설명</label>
                    <textarea name="description" class="form-control" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">편의시설 (JSON)</label>
                    <textarea name="amenities" class="form-control" rows="3" placeholder='wifi,tv,...'></textarea>
                </div>
            </div>

            <div class="card shadow-sm mb-4 p-4">
                <h5 class="mb-3">운영 정보</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">체크인 시간</label>
                        <input type="datetime-local" name="checkInTime" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">체크아웃 시간</label>
                        <input type="datetime-local" name="checkOutTime" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">평점</label>
                        <input type="number" name="rating" class="form-control" step="0.1" min="0" max="5">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">최소 가격</label>
                        <input type="number" name="minPrice" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">상태</label>
                        <select name="status" class="form-select" required>
                            <option value="ACTIVE">활성</option>
                            <option value="INACTIVE">비활성</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="text-end">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-save me-1"></i> 등록
                </button>
            </div>
        </form>
    </div>

</th:block>

</body>
</html>
<script th:inline="javascript">
    let regions = [[${regions}]];
    const mainSelect = document.getElementById("mainRegionId");
    const subSelect = document.getElementById("subRegionId");
    const addressInput = document.getElementById("addressInput");

    function updateAddress() {
        const mainId = mainSelect.value;
        const subId = subSelect.value;

        if(mainId && subId) {
            const mainRegion = regions.find(r => r.regionId == mainId);
            const subRegion = regions.find(r => r.regionId == subId);

            if(mainRegion && subRegion) {
                addressInput.value = mainRegion.name + " " + subRegion.name;
            }
        } else {
            addressInput.value = ""; // 선택 안되었으면 초기화
        }
    }

    mainSelect.addEventListener("change", function () {
        const selectedMainId = this.value;
        subSelect.innerHTML = '<option value="">서브 지역 선택</option>';
        regions.filter(r => r.level === 2 && r.parentId == selectedMainId)
            .forEach(sr => {
                const option = document.createElement("option");
                option.value = sr.regionId;
                option.textContent = sr.name;
                subSelect.appendChild(option);
            });
        updateAddress(); // 메인 선택 바뀔 때도 주소 업데이트
    });

    subSelect.addEventListener("change", updateAddress);
</script>
    <script src="https://code.jquery.com/jquery-3.6.0.js"
            integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossOrigin="anonymous"></script>
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    //kakad map api
    function searchAddr() {
        new daum.Postcode({
            oncomplete: function (data) {
                // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성

                // 각 주소의 노출 규칙에 따라 주소를 조합한다.
                // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
                var addr = ''; // 주소 변수

                //사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
                if (data.userSelectedType === 'R') {
                    // 사용자가 도로명 주소를 선택했을 경우
                    addr = data.roadAddress;
                } else {
                    // 사용자가 지번 주소를 선택했을 경우(J)
                    addr = data.jibunAddress;
                }
                // 우편번호와 주소 정보를 해당 필드에 넣는다.
                $("#userPostCode").val(data.zonecode);
                $("#userAddr1").val(addr);
                // 커서를 상세주소 필드로 이동한다.
                $("#userAddr2").focus();
            }
        }).open();
    }
</script>
