<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">

<head>
    <title>숙소 관리자 대시보드</title>
    <th:block layout:fragment="head">
        <!-- 페이지별 head 내용 -->
    </th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3>총 관리자 대시보드</h3>
        <p class="text-subtitle text-muted">관리자용 숙소 및 예약 현황</p>
    </div>


    <div class="page-content">
        <section class="section">
            <div class="row">
                <!-- 등록 업체 수 카드 -->
                <div class="col-6 col-lg-3 col-md-6">
                    <div class="card">
                        <div class="card-body px-4 py-4">
                            <div class="d-flex align-items-center">
                                <div class="stats-icon purple mb-2">
                                    <i class="bi bi-house-door-fill"></i>
                                </div>
                                <div class="ms-3">
                                    <h6 class="text-muted font-semibold">등록 업체 수</h6>
                                    <h6 class="font-extrabold mb-0" th:text="${companies.size()}">-</h6>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 예약 건수 카드 (숙소 수로 변경 가능) -->
                <div class="col-6 col-lg-3 col-md-6">
                    <div class="card">
                        <div class="card-body px-4 py-4">
                            <div class="d-flex align-items-center">
                                <div class="stats-icon green mb-2">
                                    <i class="bi bi-calendar-check-fill"></i>
                                </div>
                                <div class="ms-3">
                                    <h6 class="text-muted font-semibold">숙소 수</h6>
                                    <h6 class="font-extrabold mb-0" th:text="${accommodations.size()}">0</h6>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 방 수 카드 -->
                <div class="col-12 col-lg-6">
                    <div class="card">
                        <div class="card-body py-4 px-4">
                            <div class="d-flex align-items-center">
                                <div class="avatar avatar-xl">
                                    <i class="bi bi-bell-fill"></i>
                                </div>
                                <div class="ms-3 name">
                                    <h5 class="font-bold" th:text="${rooms.size()} + '개 방'">0개 방</h5>
                                    <h6 class="text-muted mb-0">총 방 수</h6>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>


                <!-- 관리자 프로필 카드 -->
                <div class="col-12 col-lg-6">
                    <div class="card">
                        <div class="card-body py-4 px-4">
                            <div class="d-flex align-items-center">
                                <div class="avatar avatar-xl">
                                    이미지
                                </div>
                                <div class="ms-3 name">
                                    <h5 class="font-bold">admin01</h5>
                                    <h6 class="text-muted mb-0">HOST</h6>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</th:block>

<th:block layout:fragment="script">
    <!-- 페이지별 스크립트 -->
</th:block>
</body>
</html>
