<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<head>
    <title>업주 대시보드</title>
</head>

<body>
<th:block layout:fragment="content">

    <!-- 헤더 -->
    <div class="page-heading d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
            <h3 class="mb-1">업주 대시보드</h3>
            <div class="subtext">내 숙소 현황을 한눈에 확인하세요.</div>
        </div>
    </div>

    <!-- KPI 카드 -->
    <div class="page-content">
        <section class="section">
            <div class="row g-3 mb-4">

                <div class="col-6 col-lg-3">
                    <div class="card h-100">
                        <div class="card-body px-4 py-4">
                            <div class="d-flex align-items-center gap-3">
                                <div class="kpi-icon honey">
                                    <i class="bi bi-building"></i>
                                </div>
                                <div>
                                    <div class="text-muted small fw-semibold">등록 업체 수</div>
                                    <div class="fw-800 fs-4 lh-1 mt-1" th:text="${companyCount} ?: '0'">0</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-6 col-lg-3">
                    <div class="card h-100">
                        <div class="card-body px-4 py-4">
                            <div class="d-flex align-items-center gap-3">
                                <div class="kpi-icon green">
                                    <i class="bi bi-house-door-fill"></i>
                                </div>
                                <div>
                                    <div class="text-muted small fw-semibold">숙소 수</div>
                                    <div class="fw-800 fs-4 lh-1 mt-1" th:text="${accommodationCount} ?: '0'">0</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-6 col-lg-3">
                    <div class="card h-100">
                        <div class="card-body px-4 py-4">
                            <div class="d-flex align-items-center gap-3">
                                <div class="kpi-icon blue">
                                    <i class="bi bi-door-open-fill"></i>
                                </div>
                                <div>
                                    <div class="text-muted small fw-semibold">총 객실 수</div>
                                    <div class="fw-800 fs-4 lh-1 mt-1" th:text="${roomCount} ?: '0'">0</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-6 col-lg-3">
                    <div class="card h-100">
                        <div class="card-body px-4 py-4">
                            <div class="d-flex align-items-center gap-3">
                                <div class="kpi-icon red">
                                    <i class="bi bi-calendar-check-fill"></i>
                                </div>
                                <div>
                                    <div class="text-muted small fw-semibold">활성 예약</div>
                                    <div class="fw-800 fs-4 lh-1 mt-1" th:text="${reservationCount} ?: '0'">0</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 업주 프로필 카드 -->
            <div class="row g-3">
                <div class="col-12 col-lg-5">
                    <div class="card h-100">
                        <div class="card-header fw-bold">내 정보</div>
                        <div class="card-body px-4 py-4">
                            <div class="d-flex align-items-center gap-3">
                                <div class="kpi-icon honey" style="width:56px;height:56px;font-size:1.5rem;">
                                    <i class="bi bi-person-fill"></i>
                                </div>
                                <div>
                                    <div class="fw-bold fs-5" th:text="${currentAdmin != null ? currentAdmin.name : '업주'}">업주</div>
                                    <div class="text-muted small" th:text="${currentAdmin != null ? currentAdmin.email : '-'}">-</div>
                                    <div class="text-muted small" th:text="${currentAdmin != null ? currentAdmin.role : '-'}">-</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-lg-7">
                    <div class="card h-100">
                        <div class="card-header fw-bold">바로가기</div>
                        <div class="card-body px-4 py-3">
                            <div class="d-flex flex-wrap gap-2">
                                <a href="/owner/accommodation/list" class="btn btn-sm" style="background:var(--honey-soft);border:1px solid var(--honey-mid);color:var(--honey-deeper);font-weight:600;">
                                    <i class="bi bi-house-door me-1"></i>숙소 목록
                                </a>
                                <a href="/owner/reservation/list" class="btn btn-sm" style="background:var(--honey-soft);border:1px solid var(--honey-mid);color:var(--honey-deeper);font-weight:600;">
                                    <i class="bi bi-journal-bookmark me-1"></i>예약 관리
                                </a>
                                <a href="/owner/room/list" class="btn btn-sm" style="background:var(--honey-soft);border:1px solid var(--honey-mid);color:var(--honey-deeper);font-weight:600;">
                                    <i class="bi bi-door-open me-1"></i>객실 목록
                                </a>
                                <a href="/owner/sales/day" class="btn btn-sm" style="background:var(--honey-soft);border:1px solid var(--honey-mid);color:var(--honey-deeper);font-weight:600;">
                                    <i class="bi bi-bar-chart-line me-1"></i>매출 확인
                                </a>
                                <a href="/owner/coupon/list" class="btn btn-sm" style="background:var(--honey-soft);border:1px solid var(--honey-mid);color:var(--honey-deeper);font-weight:600;">
                                    <i class="bi bi-code-square me-1"></i>쿠폰/이벤트
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>


</th:block>
</body>
</html>
