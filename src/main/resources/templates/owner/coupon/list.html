<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<head>

    <title>쿠폰 목록</title>
<th:block layout:fragment="head"></th:block>
</head>
<body>

<th:block layout:fragment="content">
    <div class="page-heading">
        <h3>쿠폰 리스트</h3>
        <p class="text-subtitle text-muted">등록된 쿠폰 현황</p>
    </div>

    <div class="page-content">
        <section class="section">
            <div class="row">
                <div class="col-12">
                    <div class="card shadow-sm border-0">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">쿠폰 목록</h5>
                            <a th:href="@{/owner/coupon/create}" class="btn btn-primary">
                                <i class="bi bi-plus-circle me-1"></i> 쿠폰 등록
                            </a>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light text-center">
                                    <tr>
                                        <th>쿠폰 ID</th>
                                        <th>쿠폰 이름</th>
                                        <th>쿠폰 코드</th>
                                        <th>할인</th>
                                        <th>최대 할인</th>
                                        <th>최소 주문</th>
                                        <th>적용 대상</th>
                                        <th>사용 기간</th>
                                        <th>상태</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="c : ${coupons}" class="text-center">
                                        <td th:text="${c.couponId}"></td>
                                        <td th:text="${c.name}"></td>
                                        <td th:text="${c.code}"></td>
                                        <td>
                                        <span th:text="${c.discountType == 'PERCENT' ? c.discountValue + '%'
                                                       : #numbers.formatDecimal(c.discountValue, 1, 'COMMA', 2, 'POINT') + '원'}"></span>
                                        </td>
                                        <td th:text="${c.maxDiscountAmount != null ? #numbers.formatDecimal(c.maxDiscountAmount, 1, 'COMMA', 0, 'POINT') + '원' : '-'}"></td>
                                        <td th:text="${c.minOrderAmount != null ? #numbers.formatDecimal(c.minOrderAmount, 1, 'COMMA', 0, 'POINT') + '원' : '-'}"></td>
                                        <td th:text="${c.targetType}"></td>
                                        <td>
                                            <span th:text="${#temporals.format(c.startDate, 'yyyy-MM-dd')}"></span> ~
                                            <span th:text="${#temporals.format(c.endDate, 'yyyy-MM-dd')}"></span>
                                        </td>
                                        <td th:text="${c.isActive() ? '활성' : '비활성'}"
                                            th:classappend="${c.isActive() ? 'status-active' : 'status-inactive'}"></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(coupons)}">
                                        <td colspan="9" class="text-center">등록된 쿠폰이 없습니다.</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div> <!-- /.table-responsive -->
                        </div> <!-- /.card-body -->
                    </div> <!-- /.card -->
                </div>
            </div>
        </section>
    </div>

</th:block>
</body>
</html>
