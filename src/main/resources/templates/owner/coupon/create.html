<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<body>
<th:block layout:fragment="content">
    <div class="page-heading mb-4">
        <h3>쿠폰 등록</h3>
        <p class="text-subtitle text-muted">새 쿠폰을 등록합니다.</p>
    </div>

    <div class="page-content">
        <form th:action="@{/owner/coupon/create}" method="post" class="needs-validation" novalidate>

            <!-- 기본 정보 카드 -->
            <div class="card shadow-sm mb-4 p-4">
                <h5 class="mb-3">기본 정보</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">쿠폰 이름</label>
                        <input type="text" name="name" class="form-control" id="name" required>
                    </div>
                    <div class="col-md-6">
                        <label for="code" class="form-label">쿠폰 코드</label>
                        <input type="text" name="code" class="form-control" id="code" required>
                    </div>
                </div>

                <div class="row g-3 mt-3">
                    <div class="col-md-6">
                        <label for="discountType" class="form-label">할인 유형</label>
                        <select name="discountType" class="form-select" id="discountType" required>
                            <option value="PERCENTAGE">퍼센트 (%)</option>
                            <option value="AMOUNT">금액 (원)</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="discountValue" class="form-label">할인 값</label>
                        <input type="number" name="discountValue" class="form-control" id="discountValue" step="0.01" required>
                    </div>
                </div>

                <div class="row g-3 mt-3">
                    <div class="col-md-6">
                        <label for="minOrderAmount" class="form-label">최소 주문 금액</label>
                        <input type="number" name="minOrderAmount" class="form-control" id="minOrderAmount" step="0.01">
                    </div>
                    <div class="col-md-6">
                        <label for="maxDiscountAmount" class="form-label">최대 할인 금액</label>
                        <input type="number" name="maxDiscountAmount" class="form-control" id="maxDiscountAmount" step="0.01">
                    </div>
                </div>
            </div>

            <!-- 기간 / 대상 카드 -->
            <div class="card shadow-sm mb-4 p-4">
                <h5 class="mb-3">기간 및 대상</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="startDate" class="form-label">시작일</label>
                        <input type="datetime-local" name="startDate" class="form-control" id="startDate" required>
                    </div>
                    <div class="col-md-6">
                        <label for="endDate" class="form-label">종료일</label>
                        <input type="datetime-local" name="endDate" class="form-control" id="endDate" required>
                    </div>
                </div>

                <div class="row g-3 mt-3">
                    <div class="col-md-6">
                        <label for="targetType" class="form-label">대상 유형</label>
                        <select name="targetType" class="form-select" id="targetType" required>
                            <option value="COMPANY">업체</option>
                            <option value="ROOM">객실</option>
                            <option value="ALL">전체</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="targetId" class="form-label">대상 ID (선택)</label>
                        <input type="number" name="targetId" class="form-control" id="targetId">
                        <small class="text-muted">대상 유형이 ALL이면 비워두세요.</small>
                    </div>
                </div>

                <div class="form-check mt-3">
                    <input type="checkbox" name="isActive" class="form-check-input" id="isActive" checked>
                    <label for="isActive" class="form-check-label">활성화 여부</label>
                </div>
            </div>

            <div class="text-end">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-save me-1"></i> 등록
                </button>
            </div>
        </form>
    </div>
</th:block>
</body>
</html>
