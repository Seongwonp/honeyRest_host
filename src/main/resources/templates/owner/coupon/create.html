<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">

<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3>쿠폰 등록</h3>
        <p class="text-subtitle text-muted">새 쿠폰을 등록합니다.</p>
    </div>

    <div class="page-content">
        <form th:action="@{/owner/coupon/create}" method="post">
            <div class="mb-3">
                <label for="name" class="form-label">쿠폰 이름</label>
                <input type="text" name="name" class="form-control" id="name" required>
            </div>

            <div class="mb-3">
                <label for="code" class="form-label">쿠폰 코드</label>
                <input type="text" name="code" class="form-control" id="code" placeholder="자동 발급 시 비워두기">
            </div>

            <div class="mb-3">
                <label for="discountType" class="form-label">할인 유형</label>
                <select name="discountType" class="form-select" id="discountType" required>
                    <option value="PERCENT">퍼센트 (%)</option>
                    <option value="FIXED">고정 금액</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="discountValue" class="form-label">할인 값</label>
                <input type="number" name="discountValue" class="form-control" id="discountValue" step="0.01" required>
            </div>

            <div class="mb-3">
                <label for="minOrderAmount" class="form-label">최소 주문 금액</label>
                <input type="number" name="minOrderAmount" class="form-control" id="minOrderAmount" step="0.01">
            </div>

            <div class="mb-3">
                <label for="maxOrderAmount" class="form-label">최대 주문 금액</label>
                <input type="number" name="maxOrderAmount" class="form-control" id="maxOrderAmount" step="0.01">
            </div>

            <div class="mb-3">
                <label for="targetType" class="form-label">적용 대상</label>
                <select name="targetType" class="form-select" id="targetType">
                    <option value="ALL">전체</option>
                    <option value="ACCOMMODATION">숙소</option>
                    <option value="ROOM">방</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="targetId" class="form-label">적용 대상 ID</label>
                <input type="number" name="targetId" class="form-control" id="targetId" placeholder="특정 숙소/방 ID 입력">
            </div>

            <div class="mb-3">
                <label for="startDate" class="form-label">쿠폰 시작일</label>
                <input type="datetime-local" name="startDate" class="form-control" id="startDate" required>
            </div>
            <div class="mb-3">
                <label for="endDate" class="form-label">쿠폰 종료일</label>
                <input type="datetime-local" name="endDate" class="form-control" id="endDate" required>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" name="active" class="form-check-input" id="active" value="true">
                <label class="form-check-label" for="active">활성 여부</label>
            </div>

            <button type="submit" class="btn btn-primary">등록</button>
        </form>
    </div>
</th:block>
</body>
</html>
