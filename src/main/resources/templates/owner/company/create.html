<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<body>
<th:block layout:fragment="content">
    <div class="page-heading mb-4">
        <h3>업체 등록</h3>
        <p class="text-subtitle text-muted">새 업체를 등록합니다.</p>
    </div>

    <div class="page-content">
        <form th:action="@{/owner/company/create}" method="post" class="needs-validation">

            <!-- 기본 정보 카드 -->
            <div class="card shadow-sm mb-4 p-4">
                <h5 class="mb-3">기본 정보</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name" class="form-label">업체 이름</label>
                        <input type="text" name="name" class="form-control" id="name" required>
                    </div>
                    <div class="col-md-6">
                        <label for="businessNumber" class="form-label">사업자 등록번호</label>
                        <input type="text" name="businessNumber" class="form-control" id="businessNumber" required>
                    </div>
                </div>

                <div class="row g-3 mt-3">
                    <div class="col-md-6">
                        <label for="ownerName" class="form-label">대표자명</label>
                        <input type="text" name="ownerName" class="form-control" id="ownerName" required>
                    </div>
                    <div class="col-md-6">
                        <label for="phone" class="form-label">대표 연락처</label>
                        <input type="text" name="phone" class="form-control" id="phone" required>
                    </div>
                </div>

                <div class="row g-3 mt-3">
                    <div class="col-md-6">
                        <label for="email" class="form-label">대표 이메일</label>
                        <input type="email" name="email" class="form-control" id="email" required>
                    </div>
                    <div class="col-md-6">
                        <label for="address" class="form-label">사업장 주소</label>
                        <input type="text" name="address" class="form-control" id="address" required>
                    </div>
                </div>
            </div>

            <!-- 은행 / 수수료 카드 -->
            <div class="card shadow-sm mb-4 p-4">
                <h5 class="mb-3">은행 및 수수료 정보</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="bankInfo" class="form-label">은행 정보 (JSON)</label>
                        <textarea name="bankInfo" class="form-control" id="bankInfo" placeholder='예시) 농협, 3511060131544 , 김철수' required></textarea>
                    </div>
                    <div class="col-md-6">
                        <label for="commissionRate" class="form-label">수수료 (%)</label>
                        <input type="number" name="commissionRate" class="form-control" id="commissionRate" step="0.1" min="0" required>
                    </div>
                </div>
            </div>

            <!-- 운영 정보 카드 -->
            <div class="card shadow-sm mb-4 p-4">
                <h5 class="mb-3">운영 정보</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="status" class="form-label">상태</label>
                        <select name="status" class="form-select" id="status" required>
                            <option value="ACTIVE">활성</option>
                            <option value="INACTIVE">비활성</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="text-end">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-save me-1"></i> 등록
                </button>
            </div>
        </form>
    </div>
</th:block>
</body>
</html>
