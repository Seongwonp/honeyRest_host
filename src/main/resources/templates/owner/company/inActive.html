<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<head>
    <title>비활성 업체</title>
    <th:block layout:fragment="head">
        <style>
            .btn-chip { border-radius: var(--pill) !important; padding: .28rem .65rem; font-weight: 700; font-size: .82rem; }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 헤더 -->
    <div class="toolbar">
        <div class="d-flex align-items-center gap-2">
            <h3 class="mb-0">비활성 업체 목록</h3>
            <span class="count-badge"
                  th:if="${responseDTO != null}"
                  th:text="'총 ' + ${responseDTO.total} + '개'">총 0개</span>
        </div>
        <a th:href="@{/owner/company/list}" class="btn btn-soft btn-chip">활성 업체 보기</a>
    </div>

    <!-- 테이블 -->
    <div class="card">
        <div class="card-body table-responsive p-0">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-3">업체명</th>
                    <th>대표자</th>
                    <th class="hide-md">사업자번호</th>
                    <th class="hide-md">전화</th>
                    <th class="hide-sm">수수료율</th>
                    <th class="hide-sm">등록일</th>
                    <th class="text-center">액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${companies}">
                    <td class="ps-3 fw-semibold">
                        <div th:text="${c.name}">업체명</div>
                        <div class="text-muted" style="font-size:.8rem;" th:text="${c.email}">email</div>
                    </td>
                    <td th:text="${c.ownerName}">홍길동</td>
                    <td class="hide-md" th:text="${c.businessNumber}">123-45-67890</td>
                    <td class="hide-md" th:text="${c.phone}">010-0000-0000</td>
                    <td class="hide-sm" th:text="${c.commissionRate + '%'}">10%</td>
                    <td class="hide-sm text-muted" style="font-size:.84rem;"
                        th:text="${c.createdAt != null ? #temporals.format(c.createdAt,'yyyy-MM-dd') : '-'}">2025-01-01</td>
                    <td class="text-center">
                        <div class="d-inline-flex gap-1">
                            <a class="btn btn-ghost btn-chip"
                               th:href="@{'/owner/company/' + ${c.companyId} + '/modify'}">수정</a>
                            <form th:action="@{'/owner/company/' + ${c.companyId} + '/delete'}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                <button type="submit" class="btn btn-danger-soft btn-chip">삭제</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${companies == null or #lists.isEmpty(companies)}">
                    <td colspan="7" class="text-center py-5 text-muted">
                        <i class="bi bi-building d-block fs-2 mb-2"></i>
                        비활성 업체가 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div class="card-footer d-flex justify-content-between align-items-center"
             th:if="${responseDTO != null}">
            <div class="text-muted" style="font-size:.85rem;">
                총 <span th:text="${responseDTO.total}">0</span>개
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${!responseDTO.prev} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/company/inActive/list(page=${responseDTO.prevPage}, size=${responseDTO.pageRequestDTO.size})}">&laquo;</a>
                    </li>
                    <li class="page-item"
                        th:each="num : ${responseDTO.pageNumList}"
                        th:classappend="${num == responseDTO.current} ? 'active'">
                        <a class="page-link"
                           th:href="@{/owner/company/inActive/list(page=${num}, size=${responseDTO.pageRequestDTO.size})}"
                           th:text="${num}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${!responseDTO.next} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/company/inActive/list(page=${responseDTO.nextPage}, size=${responseDTO.pageRequestDTO.size})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</th:block>
</body>
</html>
