<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">

<head>
    <title>숙소 관리자 대시보드</title>
    <th:block layout:fragment="head"></th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3>캘린더</h3>
    </div>
    <div class="card p-4 mb-4 shadow-sm">
        <form method="get" action="/owner/sales/day" class="row g-3 align-items-end" id="searchForm">
            <!--            <div class="col-auto">-->
            <!--                <label class="form-label"><i class="bi bi-calendar-date me-1"></i>시작일</label>-->
            <!--                <input type="date" name="startDate" class="form-control">-->
            <!--            </div>-->
            <!--            <div class="col-auto">-->
            <!--                <label class="form-label"><i class="bi bi-calendar-date-fill me-1"></i>종료일</label>-->
            <!--                <input type="date" name="endDate" class="form-control">-->
            <!--            </div>-->
            <div class="col-md-4 col-sm-8">
                <label class="form-label"><i class="bi bi-building me-1"></i>회사</label>
                <select name="companyName" class="form-select" id="companySelect">
                    <option value="">전체</option>
                    <!-- 회사 목록은 JS로 채움 -->
                </select>
            </div>

            <div class="col-md-4 col-sm-8">
                <label class="form-label"><i class="bi bi-house-door me-1"></i>숙소</label>
                <select name="accommodationName" class="form-select" id="accommodationSelect">
                    <option value="">전체</option>
                    <!-- 선택한 회사의 숙소 목록만 JS로 채움 -->
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-warning text-dark custom-hover-dark">검색</button>
            </div>
        </form>
    </div>
    <div class="page-content">
        <section class="section">
            <div class="row">
                <div class="col-12">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>업체 ID</th>
                            <th>업체명</th>
                            <th>대표자</th>
                            <th>연락처</th>
                            <th>상태</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="company : ${companies}">
                            <td th:text="${company.companyId}"></td>
                            <td><a th:href="@{'/owner/company/' + ${company.companyId} + '/accommodations'}"
                                   th:text="${company.name}"></a></td>
                            <td th:text="${company.ownerName}"></td>
                            <td th:text="${company.phone}"></td>
                            <td th:text="${company.status}"></td>
                            <td>
                                <a th:href="@{'/owner/company/' + ${company.companyId} + '/modify'}"
                                   class="btn btn-primary btn-sm">수정</a>
                            </td>
                            <td>

                                <form th:action="@{'/owner/company/' + ${company.companyId} + '/delete'}"
                                      method="post"
                                      onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                    <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
    <div class="pagination mt-3">
        <ul class="pagination">
            <li class="page-item" th:if="${responseDTO.prev}">
                <a class="page-link"
                   th:href="@{/owner/company/list(page=${responseDTO.prevPage}, size=${responseDTO.pageRequestDTO.size})}">이전</a>
            </li>

            <li class="page-item"
                th:each="num : ${responseDTO.pageNumList}"
                th:classappend="${num == responseDTO.current} ? 'active'">
                <a class="page-link"
                   th:href="@{/owner/company/list(page=${num}, size=${responseDTO.pageRequestDTO.size})}"
                   th:text="${num}"></a>
            </li>

            <li class="page-item" th:if="${responseDTO.next}">
                <a class="page-link"
                   th:href="@{/owner/company/list(page=${responseDTO.nextPage}, size=${responseDTO.pageRequestDTO.size})}">다음</a>
            </li>
        </ul>
    </div>
</th:block>
</body>
</html>
