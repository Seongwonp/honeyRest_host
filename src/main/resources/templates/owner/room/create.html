<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3>방 등록</h3>
        <p class="text-subtitle text-muted">새 방을 등록합니다.</p>
    </div>
    <div class="page-content">

    <form th:action="@{/owner/room/create}" method="post" enctype="multipart/form-data">

        <!-- 숙소 ID -->
        <div class="mb-3">
            <label for="accommodationId" class="form-label">숙소</label>
            <select name="accommodationId" id="accommodationId" class="form-select" required>
                <option value="">숙소 선택</option>
                <option th:each="a : ${accommodations}"
                        th:value="${a.accommodationId}"
                        th:text="${a.name}"
                        th:selected="${a.accommodationId == accommodationId}"
                        th:attr="data-price=${a.minPrice}">></option>
            </select>
        </div>

        <!-- 방 이름 -->
        <div class="mb-3">
            <label for="name" class="form-label">방 이름</label>
            <input type="text" name="name" id="name" class="form-control" required>
        </div>

        <!-- 타입 -->
        <div class="mb-3">
            <label for="type" class="form-label">방 타입</label>
            <input type="text" name="type" id="type" class="form-control">
        </div>

        <!-- 가격 -->
        <div class="mb-3">
            <label for="price" class="form-label">가격</label>
            <input type="number" step="0.01" name="price" id="price" class="form-control" required>
        </div>

        <!-- 기준 인원 -->
        <div class="mb-3">
            <label for="standardOccupancy" class="form-label">기준 인원</label>
            <input type="number" name="standardOccupancy" id="standardOccupancy" class="form-control" required>
        </div>

        <!-- 최대 인원 -->
        <div class="mb-3">
            <label for="maxOccupancy" class="form-label">최대 인원</label>
            <input type="number" name="maxOccupancy" id="maxOccupancy" class="form-control" required>
        </div>

        <!-- 추가 인원 요금 -->
        <div class="mb-3">
            <label for="extraPersonFee" class="form-label">추가 인원 요금</label>
            <input type="number" step="0.01" name="extraPersonFee" id="extraPersonFee" class="form-control">
        </div>

        <!-- 침대 정보 (JSON 문자열로 입력받음) -->
        <div class="mb-3">
            <label for="bedInfo" class="form-label">침대 정보(JSON)</label>
            <textarea name="bedInfo" id="bedInfo" class="form-control" placeholder='예: 싱글 침대'></textarea>
        </div>

        <!-- 편의시설 (JSON 문자열로 입력받음) -->
        <div class="mb-3">
            <label for="amenities" class="form-label">편의시설(JSON)</label>
            <textarea name="amenities" id="amenities" class="form-control" placeholder='예: 와이파이,TV,에어컨'></textarea>
        </div>

        <!-- 설명 -->
        <div class="mb-3">
            <label for="description" class="form-label">설명</label>
            <textarea name="description" id="description" class="form-control"></textarea>
        </div>

        <!-- 총 객실 수 -->
        <div class="mb-3">
            <label for="totalRooms" class="form-label">총 객실 수</label>
            <input type="number" name="totalRooms" id="totalRooms" class="form-control" required>
        </div>

        <!-- 상태 -->
        <div class="mb-3">
            <label for="status" class="form-label">상태</label>
            <select name="status" id="status" class="form-select">
                <option value="AVAILABLE">사용 가능</option>
                <option value="UNAVAILABLE">사용 불가</option>
            </select>
        </div>


        <button type="submit" class="btn btn-primary">등록</button>
    </form>
</div>
</th:block>
</body>
</html>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector("form");
        const accommodationSelect = document.getElementById("accommodationId");
        const priceInput = document.getElementById("price");

        form.addEventListener("submit", function (e) {
            const selectedOption = accommodationSelect.options[accommodationSelect.selectedIndex];
            const accommodationPrice = parseFloat(selectedOption.getAttribute("data-price"));
            const roomPrice = parseFloat(priceInput.value);

            if (!isNaN(accommodationPrice) && roomPrice < accommodationPrice) {
                e.preventDefault();
                alert(`방의 가격은 숙소 가격(${accommodationPrice.toLocaleString()}원)보다 같거나 커야 합니다.`);
                priceInput.focus();
            }
        });
    });
</script>
