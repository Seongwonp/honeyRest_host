<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">

<head>
    <title>숙소 관리자 대시보드</title>
    <th:block layout:fragment="head"></th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3 th:text="${accommodation != null} ? ${accommodation.name} + ' 방 리스트' : '전체 방 리스트'">방 리스트</h3>
        <p class="text-subtitle text-muted">관리자용 숙소 및 예약 현황</p>

        <!-- 업체 선택 폼 -->
        <form id="accommodationForm">
            <select id="accommodationSelect" class="form-select">
                <option value="0">전체 방</option>
                <option value="">전체 숙소</option>
                <option th:each="a : ${accommodations}" th:value="${a.accommodationId}" th:text="${a.name}"
                        th:selected="${accommodation != null} ? ${a.accommodationId} == ${accommodation.accommodationId} : false">
                </option>
            </select>
        </form>
    </div>

    <div class="page-content">
        <section class="section">
            <div class="row">
                <div class="col-12">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>방 ID</th>
                            <th>방이름</th>
                            <th>최대인원</th>
                            <th>가격</th>
                            <th>상태</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="room : ${rooms}">
                            <td th:text="${room.roomId}"></td>
                            <td th:text="${room.name}"></td>
                            <td th:text="${room.maxOccupancy}"></td>
                            <td th:text="${room.price}"></td>
                            <td th:text="${room.status}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</th:block>
</body>
</html>
<script>
    document.getElementById('accommodationSelect').addEventListener('change', function () {
        const accommodationId = this.value
        if (accommodationId === "0") {
            window.location.href = `/owner/room/list`
        } else if (accommodationId) {
            window.location.href = `/owner/accommodation/${accommodationId}/rooms`;
        } else {
            window.location.href = `/owner/accommodation/list`
        }

    });
</script>
