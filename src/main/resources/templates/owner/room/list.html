<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<head>
    <title>객실 목록</title>
    <th:block layout:fragment="head">
        <style>
            .thumb { width: 56px; height: 56px; object-fit: cover; border-radius: var(--r); border: 1px solid var(--border); }
            .thumb-empty {
                width: 56px; height: 56px; border-radius: var(--r); border: 1px dashed #CBD5E1;
                color: var(--subtle); font-size: .7rem;
                display: flex; align-items: center; justify-content: center; background: #F8FAFC;
            }
            .btn-chip { border-radius: var(--pill) !important; padding: .28rem .65rem; font-weight: 700; font-size: .82rem; }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 숙소 컨텍스트 배너 (특정 숙소 필터 시) -->
    <div class="d-flex align-items-center gap-2 mb-3 p-3 rounded"
         style="background:var(--primary-soft);border:1px solid var(--primary-mid);"
         th:if="${accommodation != null}">
        <i class="bi bi-house-door text-primary fs-5"></i>
        <div>
            <span class="fw-bold" th:text="${accommodation.name}">숙소명</span>
            <span class="text-muted ms-2" style="font-size:.85rem;"
                  th:text="${accommodation.address ?: ''}"></span>
        </div>
        <a th:href="@{/owner/room/list}" class="btn btn-soft btn-chip ms-auto">전체 보기</a>
    </div>

    <!-- 헤더 -->
    <div class="toolbar">
        <div class="d-flex align-items-center gap-2">
            <h3 class="mb-0"
                th:text="${accommodation != null ? accommodation.name + ' 객실 목록' : '전체 객실 목록'}">객실 목록</h3>
            <span class="count-badge"
                  th:if="${pageResponse != null}"
                  th:text="'총 ' + ${pageResponse.total} + '개'">총 0개</span>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <form class="d-flex gap-2 align-items-center flex-wrap" method="get" th:action="@{/owner/room/list}">
                <select class="form-select form-select-sm" name="accommodationId" style="width:auto"
                        onchange="this.form.submit()">
                    <option value="">전체 숙소</option>
                    <option th:each="acc : ${accommodations}"
                            th:value="${acc.accommodationId}"
                            th:text="${acc.name}"
                            th:selected="${accommodationId != null and accommodationId == acc.accommodationId}">숙소명</option>
                </select>
            </form>
            <a th:href="@{/owner/room/create}" class="btn btn-primary btn-chip">
                <i class="bi bi-plus-lg me-1"></i>객실 등록
            </a>
        </div>
    </div>

    <!-- 테이블 -->
    <div class="card">
        <div class="card-body table-responsive p-0">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-3 hide-md text-center">ID</th>
                    <th class="hide-sm text-center">이미지</th>
                    <th>객실명</th>
                    <th class="hide-md">숙소</th>
                    <th class="hide-sm">유형</th>
                    <th class="hide-sm text-center">최대인원</th>
                    <th class="hide-sm text-end">가격</th>
                    <th class="text-center">상태</th>
                    <th class="text-center">액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="room : ${rooms}">
                    <td class="ps-3 hide-md text-center text-muted" style="font-size:.85rem;"
                        th:text="${room.roomId}">1</td>
                    <td class="hide-sm text-center">
                        <div class="thumb-empty mx-auto">이미지</div>
                    </td>
                    <td>
                        <div class="fw-semibold" th:text="${room.name}">객실명</div>
                        <div class="text-muted" style="font-size:.78rem;"
                             th:text="${room.type ?: ''}"></div>
                    </td>
                    <td class="hide-md text-muted" style="font-size:.88rem;"
                        th:text="${room.accommodationName ?: '-'}">숙소명</td>
                    <td class="hide-sm text-muted" style="font-size:.88rem;"
                        th:text="${room.type ?: '-'}">유형</td>
                    <td class="hide-sm text-center"
                        th:text="${room.maxOccupancy != null ? room.maxOccupancy + '명' : '-'}">4명</td>
                    <td class="hide-sm text-end fw-semibold"
                        th:text="${room.price != null ? #numbers.formatInteger(room.price, 3, 'COMMA') + '원' : '-'}">-</td>
                    <td class="text-center">
                        <span class="badge-chip"
                              th:classappend="${#strings.equalsIgnoreCase(room.status,'ACTIVE')}   ? ' badge-active'  :
                                             (${#strings.equalsIgnoreCase(room.status,'INACTIVE')} ? ' badge-inactive' : ' chip-unk')"
                              th:text="${room.status}">ACTIVE</span>
                    </td>
                    <td class="text-center">
                        <div class="d-inline-flex gap-1">
                            <a class="btn btn-ghost btn-chip"
                               th:href="@{'/owner/room/' + ${room.roomId} + '/modify'}">수정</a>
                            <form th:action="@{'/owner/room/' + ${room.roomId} + '/delete'}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                <button type="submit" class="btn btn-danger-soft btn-chip">삭제</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${rooms == null or #lists.isEmpty(rooms)}">
                    <td colspan="9" class="text-center py-5 text-muted">
                        <i class="bi bi-door-open d-block fs-2 mb-2"></i>
                        등록된 객실이 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div class="card-footer d-flex justify-content-between align-items-center"
             th:if="${pageResponse != null}">
            <div class="text-muted" style="font-size:.85rem;">
                총 <span th:text="${pageResponse.total}">0</span>개
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${!pageResponse.prev} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/room/list(page=${pageResponse.prevPage}, size=${pageResponse.pageRequestDTO.size}, accommodationId=${accommodationId})}">&laquo;</a>
                    </li>
                    <li class="page-item"
                        th:each="num : ${pageResponse.pageNumList}"
                        th:classappend="${num == pageResponse.current} ? 'active'">
                        <a class="page-link"
                           th:href="@{/owner/room/list(page=${num}, size=${pageResponse.pageRequestDTO.size}, accommodationId=${accommodationId})}"
                           th:text="${num}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${!pageResponse.next} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/room/list(page=${pageResponse.nextPage}, size=${pageResponse.pageRequestDTO.size}, accommodationId=${accommodationId})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</th:block>
</body>
</html>
