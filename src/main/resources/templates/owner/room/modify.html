<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">

<body>
<th:block layout:fragment="content">
    <div class="page-heading mb-4">
        <h3>객실 수정</h3>
        <p class="text-subtitle text-muted">객실 정보를 수정합니다.</p>
    </div>

    <div class="page-content">
        <form th:action="@{/owner/room/modify}" method="post" enctype="multipart/form-data"
              class="needs-validation" >
            <input type="hidden" name="roomId" th:value="${room.roomId}" />

            <!-- 기본 정보 -->
            <div class="card shadow-sm mb-4 p-4">
                <h5 class="mb-3">기본 정보</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">객실명</label>
                        <input type="text" name="name" class="form-control" th:value="${room.name}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">타입</label>
                        <input type="text" name="type" class="form-control" th:value="${room.type}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">소속 숙소</label>
                        <select name="accommodationId" id="accommodationId" class="form-select" required>
                            <option value="">숙소 선택</option>
                            <option th:each="a : ${accommodations}"
                                    th:value="${a.accommodationId}"
                                    th:text="${a.name}"
                                    th:selected="${a.accommodationId == room.accommodationId}"
                                    th:attr="data-price=${a.minPrice}"></option>

                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">상태</label>
                        <select name="status" class="form-select" required>
                            <option value="ACTIVE" th:selected="${room.status == 'ACTIVE'}">예약 가능</option>
                            <option value="INACTIVE" th:selected="${room.status == 'INACTIVE'}">예약 불가</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 상세 정보 -->
            <div class="card shadow-sm mb-4 p-4">
                <h5 class="mb-3">상세 정보</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">기준 인원</label>
                        <input type="number" name="standardOccupancy" id="standardOccupancy" class="form-control"
                               th:value="${room.standardOccupancy}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">최대 인원</label>
                        <input type="number" name="maxOccupancy" id="maxOccupancy" class="form-control"
                               th:value="${room.maxOccupancy}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">총 객실 수</label>
                        <input type="number" name="totalRooms" class="form-control"
                               th:value="${room.totalRooms}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">추가 인원 요금</label>
                        <input type="number" name="extraPersonFee" class="form-control"
                               th:value="${room.extraPersonFee}" step="100">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">가격</label>
                        <input type="number" name="price" id="price" class="form-control"
                               th:value="${room.price}" min="0" step="100" required>
                    </div>
                </div>

                <div class="mt-3">
                    <label class="form-label">설명</label>
                    <textarea name="description" class="form-control" rows="3"
                              th:text="${room.description}"></textarea>
                </div>

                <div class="mt-3">
                    <label class="form-label">편의시설 (JSON)</label>
                    <textarea name="amenities" class="form-control" rows="3"
                              th:text="${room.amenities}"></textarea>
                </div>

                <div class="mt-3">
                    <label class="form-label">침대 정보 (JSON)</label>
                    <textarea name="bedInfo" class="form-control" rows="3"
                              th:text="${room.bedInfo}"></textarea>
                </div>
            </div>

            <!-- 저장 버튼 -->
            <div class="text-end">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-save me-1"></i> 저장
                </button>
            </div>
        </form>
    </div>
</th:block>
</body>
</html>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector("form");
        const accommodationSelect = document.getElementById("accommodationId");
        const priceInput = document.getElementById("price");
        const standardOccupancy = document.getElementById("standardOccupancy");
        const maxOccupancy = document.getElementById("maxOccupancy");

        form.addEventListener("submit", function (e) {
            const selectedOption = accommodationSelect.options[accommodationSelect.selectedIndex];
            const accommodationPrice = parseFloat(selectedOption.getAttribute("data-price"));
            const roomPrice = parseFloat(priceInput.value);

            if (!isNaN(accommodationPrice) && roomPrice < accommodationPrice) {
                e.preventDefault();
                alert(`방의 가격은 숙소 가격(${accommodationPrice.toLocaleString()}원)보다 같거나 커야 합니다.`);
                priceInput.focus();
            }

            if (parseInt(standardOccupancy.value) > parseInt(maxOccupancy.value)) {
                e.preventDefault();
                alert("기준 인원이 최대 인원보다 많습니다.");
                standardOccupancy.focus();
            }
        });
    });
</script>
