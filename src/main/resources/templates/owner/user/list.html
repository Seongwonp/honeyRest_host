<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">

<head>
    <title>사용자 목록</title>
    <th:block layout:fragment="head"></th:block>
    <style>
        .table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .table thead th {
            background-color: #222;
            color: #f5f5f5;
            padding: 12px 18px;
            font-weight: 600;
            text-align: left;
            border-bottom: 2px solid #444;
        }

        .table tbody tr {
            border-bottom: 1px solid #ddd;
            transition: background-color 0.3s ease;
        }

        .table tbody tr:hover {
            background-color: #f0f0f0;
        }

        .table tbody td {
            padding: 14px 18px;
            color: #333;
        }

        .status-active {
            color: #008000; /* 진한 초록 */
            font-weight: 600;
        }

        .status-inactive {
            color: #cc0000; /* 진한 빨강 */
            font-weight: 600;
        }

        .status-pending {
            color: #ff8800; /* 주황색 */
            font-weight: 600;
        }

        .verified {
            background-color: #008000;
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .not-verified {
            background-color: #cc0000;
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .marketing-agree {
            color: #008000;
            font-weight: 600;
        }

        .marketing-disagree {
            color: #888;
            font-weight: 600;
        }

    </style>
</head>

<body>
<th:block layout:fragment="content">

    <div class="page-heading">
        <h3 th:text="${inActive != null} ? '숙소 대기 리스트' : (${company != null} ? company.name : '전체 숙소 리스트')">
            숙소 리스트
        </h3>
        <p class="text-subtitle text-muted">시스템에 등록된 사용자 정보 리스트</p>
    </div>

    <!-- 검색 폼 (선택 사항, 필요한 경우 필터 추가 가능) -->
    <div class="card p-4 mb-4 shadow-sm">
        <form method="get" action="/user/list" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label">이메일</label>
                <input type="text" name="email" class="form-control" placeholder="이메일 검색" />
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-warning text-dark custom-hover-dark">검색</button>
            </div>
        </form>
    </div>

    <!-- 사용자 테이블 -->
    <div class="page-content">
        <section class="section">
            <div class="row">
                <div class="col-12">
                    <div class="card shadow-sm border-0">
                        <div class="card-header">
                            <h5 class="mb-0">사용자 목록</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                    <tr>
                            <th>ID</th>
                            <th>이름</th>
                            <th>이메일</th>
                            <th>연락처</th>
                            <th>성별</th>
                            <th>생년월일</th>
                            <th>포인트</th>
                            <th>권한</th>
                            <th>상태</th>
                            <th>마케팅 동의</th>
                            <th>소셜 타입</th>
                            <th>인증 여부</th>
                            <th>최근 로그인</th>
                        </tr>
                        </thead>
                                    <tbody>
                                    <tr th:each="user : ${users}">
                                        <td th:text="${user.userId}"></td>
                                        <td th:text="${user.name}"></td>
                                        <td th:text="${user.email}"></td>
                                        <td th:text="${user.phone}"></td>
                                        <td th:text="${user.gender}"></td>
                                        <td th:text="${user.birthDate}"></td>
                                        <td th:text="${#numbers.formatInteger(user.point, 3, 'COMMA')} + ' P'"></td>
                                        <td th:text="${user.role}"></td>
                                        <td th:text="${user.status}"
                                            th:classappend="${user.status == '활성' ? 'status-active' : (user.status == '비활성' ? 'status-inactive' : 'status-pending')}"></td>
                                        <td th:text="${user.marketingAgree ? '동의' : '거부'}"
                                            th:classappend="${user.marketingAgree ? 'marketing-agree' : 'marketing-disagree'}"></td>
                                        <td th:text="${user.socialType != null ? user.socialType : '자체'}"></td>
                                        <td th:text="${user.verified ? '인증됨' : '미인증'}"
                                            th:classappend="${user.verified ? 'verified' : 'not-verified'}"></td>
                                        <td th:text="${user.lastLogin != null ? #temporals.format(user.lastLogin, 'yyyy-MM-dd HH:mm') : ''}"></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(users)}">
                                        <td colspan="13" class="text-center">등록된 사용자가 없습니다.</td>
                                    </tr>
                                    </tbody>

                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 페이지네이션 -->
    <div class="pagination mt-3">
        <ul class="pagination">
            <li class="page-item" th:if="${pageResponseDTO.prev}">
                <a class="page-link"
                   th:href="@{/owner/user/list(page=${pageResponseDTO.prevPage}, size=${pageResponseDTO.pageRequestDTO.size})}">이전</a>
            </li>

            <li class="page-item"
                th:each="pageNum : ${pageResponseDTO.pageNumList}"
                th:classappend="${pageNum == pageResponseDTO.current} ? 'active'">
                <a class="page-link"
                   th:href="@{/owner/user/list(page=${pageNum}, size=${pageResponseDTO.pageRequestDTO.size})}"
                   th:text="${pageNum}"></a>
            </li>

            <li class="page-item" th:if="${pageResponseDTO.next}">
                <a class="page-link"
                   th:href="@{/owner/user/list(page=${pageResponseDTO.nextPage}, size=${pageResponseDTO.pageRequestDTO.size})}">다음</a>
            </li>
        </ul>
    </div>

</th:block>
</body>
</html>
