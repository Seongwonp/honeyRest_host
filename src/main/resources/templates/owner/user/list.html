<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">

<head>
    <title>사용자 목록</title>
    <th:block layout:fragment="head"></th:block>
</head>

<body>
<th:block layout:fragment="content">

    <!-- 검색 폼 (선택 사항, 필요한 경우 필터 추가 가능) -->
    <div class="card p-4 mb-4 shadow-sm">
        <form id="searchForm" class="row g-3 align-items-end">
            <div class="col-md-4 col-sm-8 position-relative">
                <label class="form-label"><i class="bi bi-people me-1"></i>유저 검색</label>
                <input type="text" id="companySearchInput" class="form-control" placeholder="이름을 입력하세요">
                <div id="companySearchResult" class="list-group position-absolute w-100"
                     style="z-index: 1000; display: none; max-height: 200px; overflow-y: auto;"></div>
                <input type="hidden" name="companyId" id="companyIdInput">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-warning text-dark custom-hover-dark">검색</button>
            </div>
<!--            <div class="col text-end">-->
<!--                <a th:href="@{/owner/user/create}" class="btn btn-primary">유저 등록</a>-->
<!--            </div>-->
        </form>
    </div>

    <!-- 사용자 테이블 -->
    <div class="page-content">
        <section class="section">
            <div class="row">
                <div class="col-12">
                    <div class="card shadow-sm border-0">
                        <div class="card-header">
                            <h5 class="mb-0">사용자 목록</h5>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                    <tr>
                            <th>ID</th>
                            <th>이름</th>
                            <th>이메일</th>
                            <th>연락처</th>
                            <th>성별</th>
                            <th>생년월일</th>
                            <th>포인트</th>
                            <th>권한</th>
                            <th>상태</th>
                            <th>마케팅 동의</th>
                            <th>소셜 타입</th>
                            <th>인증 여부</th>
                            <th>최근 로그인</th>
                        </tr>
                        </thead>
                                    <tbody>
                                    <tr th:each="user : ${users}">
                                        <td th:text="${user.userId}"></td>
                                        <td th:text="${user.name}"></td>
                                        <td th:text="${user.email}"></td>
                                        <td th:text="${user.phone}"></td>
                                        <td th:text="${user.gender}"></td>
                                        <td th:text="${user.birthDate}"></td>
                                        <td th:text="${#numbers.formatInteger(user.point, 3, 'COMMA')} + ' P'"></td>
                                        <td th:text="${user.role}"></td>
                                        <td th:text="${user.status}"
                                            th:classappend="${user.status == '활성' ? 'status-active' : (user.status == '비활성' ? 'status-inactive' : 'status-pending')}"></td>
                                        <td th:text="${user.marketingAgree ? '동의' : '거부'}"
                                            th:classappend="${user.marketingAgree ? 'marketing-agree' : 'marketing-disagree'}"></td>
                                        <td th:text="${user.socialType != null ? user.socialType : '자체'}"></td>
                                        <td th:text="${user.verified ? '인증됨' : '미인증'}"
                                            th:classappend="${user.verified ? 'verified' : 'not-verified'}"></td>
                                        <td th:text="${user.lastLogin != null ? #temporals.format(user.lastLogin, 'yyyy-MM-dd HH:mm') : ''}"></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(users)}">
                                        <td colspan="13" class="text-center">등록된 사용자가 없습니다.</td>
                                    </tr>
                                    </tbody>

                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 페이지네이션 -->
    <div class="pagination mt-3">
        <ul class="pagination">
            <li class="page-item" th:if="${pageResponseDTO.prev}">
                <a class="page-link"
                   th:href="@{/owner/user/list(page=${pageResponseDTO.prevPage}, size=${pageResponseDTO.pageRequestDTO.size})}">이전</a>
            </li>

            <li class="page-item"
                th:each="pageNum : ${pageResponseDTO.pageNumList}"
                th:classappend="${pageNum == pageResponseDTO.current} ? 'active'">
                <a class="page-link"
                   th:href="@{/owner/user/list(page=${pageNum}, size=${pageResponseDTO.pageRequestDTO.size})}"
                   th:text="${pageNum}"></a>
            </li>

            <li class="page-item" th:if="${pageResponseDTO.next}">
                <a class="page-link"
                   th:href="@{/owner/user/list(page=${pageResponseDTO.nextPage}, size=${pageResponseDTO.pageRequestDTO.size})}">다음</a>
            </li>
        </ul>
    </div>

</th:block>
</body>
</html>
<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener("DOMContentLoaded", function () {
        const companySearchInput = document.getElementById("companySearchInput");
        const companySearchResult = document.getElementById("companySearchResult");
        const companyIdInput = document.getElementById("companyIdInput");

        // 회사명 검색 (비동기)
        companySearchInput.addEventListener("input", function () {
            const keyword = this.value.trim();
            if (keyword.length < 1) { // 최소 1글자부터 검색
                companySearchResult.style.display = "none";
                return;
            }

            fetch(`/owner/user/search?keyword=${keyword}`)
                .then(res => res.json())
                .then(data => {
                    companySearchResult.innerHTML = "";
                    if (!data || data.length === 0) {
                        companySearchResult.style.display = "none";
                        return;
                    }

                    data.forEach(c => {
                        const item = document.createElement("button");
                        item.type = "button";
                        item.className = "list-group-item list-group-item-action";
                        item.textContent = `${c.name}`;
                        item.onclick = () => {
                            companySearchInput.value = c.name;
                            companyIdInput.value = c.companyId;
                            companySearchResult.style.display = "none";
                            // loadAccommodations(c.companyId); // 선택한 회사 기준 숙소 불러오기
                        };
                        companySearchResult.appendChild(item);
                    });

                    companySearchResult.style.display = "block";
                });
        });

        // 검색폼 전송 시 URL 설정
        document.getElementById('searchForm').addEventListener('submit', function (event) {
            const companyId = companyIdInput.value;
            // const accommodationId = accommodationSelect.value;
            let actionUrl = "/owner/user/list";
            this.action = actionUrl;
        });
    });
    /*]]>*/
</script>
