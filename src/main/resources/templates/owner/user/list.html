<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<head>
    <title>회원 관리</title>
    <th:block layout:fragment="head">
        <style>
            .btn-chip { border-radius: var(--pill) !important; padding: .28rem .65rem; font-weight: 700; font-size: .82rem; }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 헤더 -->
    <div class="toolbar">
        <div class="d-flex align-items-center gap-2">
            <h3 class="mb-0">회원 관리</h3>
        </div>
        <div class="d-flex align-items-center gap-2">
            <form class="search-wrap" method="get" th:action="@{/owner/user/list}">
                <i class="bi bi-search text-muted"></i>
                <input type="search" name="keyword" placeholder="이름 / 이메일 검색"
                       th:value="${param.keyword}">
                <button class="btn btn-primary btn-chip">검색</button>
            </form>
        </div>
    </div>

    <!-- 테이블 -->
    <div class="card">
        <div class="card-body table-responsive p-0">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-3 text-center hide-md">ID</th>
                    <th>이름</th>
                    <th>이메일</th>
                    <th class="hide-md">연락처</th>
                    <th class="hide-sm text-end">포인트</th>
                    <th class="text-center">상태</th>
                    <th class="hide-sm">소셜</th>
                    <th class="hide-md">최근 로그인</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td class="ps-3 text-center hide-md text-muted" style="font-size:.85rem;"
                        th:text="${u.userId}">1</td>
                    <td>
                        <div class="fw-semibold" th:text="${u.name}">홍길동</div>
                        <div class="text-muted" style="font-size:.78rem;"
                             th:text="${u.gender != null ? u.gender : ''}"></div>
                    </td>
                    <td th:text="${u.email}">email@example.com</td>
                    <td class="hide-md" th:text="${u.phone ?: '-'}">010-0000-0000</td>
                    <td class="hide-sm text-end fw-semibold"
                        th:text="${u.point != null ? #numbers.formatInteger(u.point, 3, 'COMMA') + ' P' : '0 P'}">0 P</td>
                    <td class="text-center">
                        <span class="badge-chip"
                              th:classappend="${#strings.equalsIgnoreCase(u.status,'ACTIVE')} ? ' badge-active' :
                                             (${#strings.equalsIgnoreCase(u.status,'INACTIVE')} ? ' badge-inactive' : ' chip-wait')"
                              th:text="${u.status}">ACTIVE</span>
                    </td>
                    <td class="hide-sm text-muted" style="font-size:.84rem;"
                        th:text="${u.socialType != null ? u.socialType : '자체'}">자체</td>
                    <td class="hide-md text-muted" style="font-size:.82rem;"
                        th:text="${u.lastLogin != null ? #temporals.format(u.lastLogin,'yyyy-MM-dd HH:mm') : '-'}">-</td>
                </tr>
                <tr th:if="${users == null or #lists.isEmpty(users)}">
                    <td colspan="8" class="text-center py-5 text-muted">
                        <i class="bi bi-people d-block fs-2 mb-2"></i>
                        등록된 회원이 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div class="card-footer d-flex justify-content-between align-items-center"
             th:if="${pageResponseDTO != null}">
            <div class="text-muted" style="font-size:.85rem;">
                총 <span th:text="${pageResponseDTO.total}">0</span>개
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${!pageResponseDTO.prev} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/user/list(page=${pageResponseDTO.prevPage}, size=${pageResponseDTO.pageRequestDTO.size})}">&laquo;</a>
                    </li>
                    <li class="page-item"
                        th:each="num : ${pageResponseDTO.pageNumList}"
                        th:classappend="${num == pageResponseDTO.current} ? 'active'">
                        <a class="page-link"
                           th:href="@{/owner/user/list(page=${num}, size=${pageResponseDTO.pageRequestDTO.size})}"
                           th:text="${num}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${!pageResponseDTO.next} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/user/list(page=${pageResponseDTO.nextPage}, size=${pageResponseDTO.pageRequestDTO.size})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</th:block>
</body>
</html>
