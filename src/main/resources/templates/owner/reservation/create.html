<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3>예약 생성</h3>
        <p class="text-subtitle text-muted">새로운 예약 정보를 등록합니다.</p>
    </div>
    <div class="page-content">

        <form th:action="@{/owner/reservation/create}" method="post">

            <input type="hidden" name="accommodations" th:value="${accommodations}">
            <!-- 사용자 ID -->
            <div class="mb-3">
                <label for="guestName" class="form-label">사용자 이름</label>
                <input type="number" name="guestName" id="guestName" class="form-control" required>
            </div>
            <!-- 투숙자 연락처 -->
            <div class="mb-3">
                <label for="guestPhone" class="form-label">손님 연락처</label>
                <input type="tel" name="guestPhone" id="guestPhone" class="form-control" required>
            </div>

            <!-- 숙소 ID -->
            <div class="mb-3">
                <label for="companyId" class="form-label">업체</label>
                <select name="companyId" id="companyId" class="form-select" required>
                    <option value="">업체 선택</option>
                    <option th:each="c : ${companies}"
                            th:value="${c.companyId}"
                            th:text="${c.name}"></option>
                </select>
            </div>
            <!-- 숙소 ID -->
            <div class="mb-3">
                <label for="accommodationId" class="form-label">숙소</label>
                <select name="accommodationId" id="accommodationId" class="form-select" required>
                    <option value="">숙소 선택</option>

                </select>
            </div>
            <!-- 숙소 ID -->
            <div class="mb-3">
                <label for="roomId" class="form-label">객실</label>
                <select name="roomId" id="roomId" class="form-select" required>
                    <option value="">객실 선택</option>

                </select>
            </div>
            <!-- 체크인 날짜 -->
            <div class="mb-3">
                <label for="checkInDate" class="form-label">체크인 날짜</label>
                <input type="date" name="checkInDate" id="checkInDate" class="form-control" required>
            </div>

            <!-- 체크아웃 날짜 -->
            <div class="mb-3">
                <label for="checkOutDate" class="form-label">체크아웃 날짜</label>
                <input type="date" name="checkOutDate" id="checkOutDate" class="form-control" required>
            </div>

            <!-- 투숙 인원 수 -->
            <div class="mb-3">
                <label for="guestCount" class="form-label">투숙 인원 수</label>
                <input type="number" min="1" name="guestCount" id="guestCount" class="form-control" required>
            </div>

            <!-- 최종 결제 금액 -->
<!--            <div class="mb-3">-->
<!--                <label for="price" class="form-label">최종 결제 금액</label>-->
<!--                <input type="number" step="0.01" min="0" name="price" id="price" class="form-control" required>-->
<!--            </div>-->

            <!-- 원가 -->
            <div class="mb-3">
                <label for="originalPrice" class="form-label">기본 금액</label>
                <input type="number" step="100" min="0" name="originalPrice" id="originalPrice" class="form-control">
            </div>

            <!-- 할인 금액 -->
            <div class="mb-3">
                <label for="discountAmount" class="form-label">할인 금액</label>
                <input type="number" step="100" min="0" name="discountAmount" id="discountAmount" class="form-control">
            </div>

            <!-- 특별 요청 사항 -->
            <div class="mb-3">
                <label for="specialRequest" class="form-label">특별 요청 사항</label>
                <textarea name="specialRequest" id="specialRequest" class="form-control"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">예약 생성</button>
        </form>

    </div>
</th:block>
</body>
</html>
<script th:inline="javascript">
    let companies = [[${companies}]];
    let accommodations = [[${accommodations}]];
    let rooms = [[${rooms}]];

    const companySelect = document.getElementById("companyId");
    const accommodationSelect = document.getElementById("accommodationId");
    const roomSelect = document.getElementById("roomId");

    companySelect.addEventListener("change", function() {
        const selectedCompanyId = this.value;

        // 기존 옵션 제거
        accommodationSelect.innerHTML = '<option value="">숙소 선택</option>';

        // 선택된 메인 지역의 서브 지역만 필터링
        accommodations
            .filter(a => a.companyId == selectedCompanyId)
            .forEach(sr => {
                const option = document.createElement("option");
                option.value = sr.accommodationId;
                option.textContent = sr.name;
                accommodationSelect.appendChild(option);
            });
    });

    accommodationSelect.addEventListener("change", function() {
        const selectedAccommodationId = this.value;

        roomSelect.innerHTML = `<option value="">객실 선택</option>`;

        rooms
            .filter(r => r.accommodationId == selectedAccommodationId)
            .forEach(sr => {
                const option = document.createElement("option");
                option.value = sr.roomId;
                option.textContent = sr.name;
                roomSelect.appendChild(option);
            })
    })
</script>
