<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">
<head>
    <title>예약 관리</title>
    <th:block layout:fragment="head">
        <style>
            .btn-chip { border-radius: var(--pill) !important; padding: .28rem .65rem; font-weight: 700; font-size: .82rem; }
        </style>
    </th:block>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 헤더 -->
    <div class="toolbar">
        <div class="d-flex align-items-center gap-2">
            <h3 class="mb-0"
                th:text="${company != null ? company.name + ' 예약 목록' : '전체 예약 목록'}">예약 목록</h3>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <form id="searchForm" class="d-flex gap-2 align-items-center flex-wrap">
                <select id="companySelect" name="companyId" class="form-select form-select-sm" style="width:auto">
                    <option value="">전체 업체</option>
                </select>
                <select id="accommodationSelect" name="accommodationId" class="form-select form-select-sm" style="width:auto">
                    <option value="">전체 숙소</option>
                </select>
                <select id="roomSelect" name="roomId" class="form-select form-select-sm" style="width:auto">
                    <option value="">전체 객실</option>
                </select>
                <button type="submit" class="btn btn-primary btn-chip">검색</button>
            </form>
            <a th:href="@{/owner/reservation/create}" class="btn btn-primary btn-chip">
                <i class="bi bi-plus-lg me-1"></i>예약 등록
            </a>
        </div>
    </div>

    <!-- 테이블 -->
    <div class="card">
        <div class="card-body table-responsive p-0">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th class="ps-3 text-center hide-md">ID</th>
                    <th>예약자</th>
                    <th class="hide-sm">숙소명</th>
                    <th class="hide-md">객실</th>
                    <th class="hide-md">연락처</th>
                    <th class="hide-sm">체크인</th>
                    <th class="hide-sm">체크아웃</th>
                    <th class="hide-sm text-end">가격</th>
                    <th class="text-center">액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="res : ${reservations}">
                    <td class="ps-3 text-center hide-md text-muted" style="font-size:.85rem;"
                        th:text="${res.reservationId}">1</td>
                    <td>
                        <div class="fw-semibold" th:text="${res.guestName}">홍길동</div>
                        <div class="text-muted hide-sm d-sm-none" style="font-size:.78rem;"
                             th:text="${res.accommodationName}"></div>
                    </td>
                    <td class="hide-sm" th:text="${res.accommodationName ?: '-'}">숙소명</td>
                    <td class="hide-md" th:text="${res.roomName ?: '-'}">객실명</td>
                    <td class="hide-md" th:text="${res.guestPhone ?: '-'}">010-0000-0000</td>
                    <td class="hide-sm" th:text="${res.checkInDate}">2025-01-01</td>
                    <td class="hide-sm" th:text="${res.checkOutDate}">2025-01-02</td>
                    <td class="hide-sm text-end fw-semibold"
                        th:text="${res.price != null ? #numbers.formatInteger(res.price, 3, 'COMMA') + '원' : '-'}">-</td>
                    <td class="text-center">
                        <div class="d-inline-flex gap-1">
                            <a class="btn btn-ghost btn-chip"
                               th:href="@{'/owner/reservation/' + ${res.reservationId} + '/modify'}">수정</a>
                            <form th:action="@{'/owner/reservation/' + ${res.reservationId} + '/delete'}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                <button type="submit" class="btn btn-danger-soft btn-chip">삭제</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${reservations == null or #lists.isEmpty(reservations)}">
                    <td colspan="9" class="text-center py-5 text-muted">
                        <i class="bi bi-journal-bookmark d-block fs-2 mb-2"></i>
                        예약 내역이 없습니다.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- 페이지네이션 -->
        <div class="card-footer d-flex justify-content-between align-items-center"
             th:if="${reservationPage != null}">
            <div class="text-muted" style="font-size:.85rem;">
                페이지 <span th:text="${reservationPage.current}">1</span>
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${!reservationPage.prev} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/reservation/list(page=${reservationPage.prevPage}, size=${reservationPage.pageRequestDTO.size}, companyId=${companyId})}">&laquo;</a>
                    </li>
                    <li class="page-item"
                        th:each="num : ${reservationPage.pageNumList}"
                        th:classappend="${num == reservationPage.current} ? 'active'">
                        <a class="page-link"
                           th:href="@{/owner/reservation/list(page=${num}, size=${reservationPage.pageRequestDTO.size}, companyId=${companyId})}"
                           th:text="${num}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${!reservationPage.next} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/owner/reservation/list(page=${reservationPage.nextPage}, size=${reservationPage.pageRequestDTO.size}, companyId=${companyId})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</th:block>

<th:block layout:fragment="script">
<script th:inline="javascript">
/*<![CDATA[*/
const companySelect = document.getElementById("companySelect");
const accommodationSelect = document.getElementById("accommodationSelect");
const roomSelect = document.getElementById("roomSelect");

const companies = /*[[${companies}]]*/ [];
const accommodations = /*[[${accommodations}]]*/ [];
const rooms = /*[[${rooms}]]*/ [];
const selectedCompanyId = /*[[${companyId}]]*/ '';
const selectedAccommodationId = /*[[${accommodationId}]]*/ '';
const selectedRoomId = /*[[${roomId}]]*/ '';

function loadCompanyOptions() {
    companySelect.innerHTML = '<option value="">전체 업체</option>';
    companies.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.companyId; opt.textContent = c.name;
        if (c.companyId == selectedCompanyId) opt.selected = true;
        companySelect.appendChild(opt);
    });
}
function loadAccommodationOptions(companyId) {
    accommodationSelect.innerHTML = '<option value="">전체 숙소</option>';
    let filtered = companyId ? accommodations.filter(a => a.companyId == companyId) : accommodations;
    filtered.forEach(a => {
        const opt = document.createElement("option");
        opt.value = a.accommodationId; opt.textContent = a.name;
        if (a.accommodationId == selectedAccommodationId) opt.selected = true;
        accommodationSelect.appendChild(opt);
    });
}
function loadRoomOptions(accommodationId) {
    roomSelect.innerHTML = '<option value="">전체 객실</option>';
    let filtered = accommodationId ? rooms.filter(r => r.accommodationId == accommodationId) : rooms;
    filtered.forEach(r => {
        const opt = document.createElement("option");
        opt.value = r.roomId; opt.textContent = r.name;
        if (r.roomId == selectedRoomId) opt.selected = true;
        roomSelect.appendChild(opt);
    });
}

companySelect.addEventListener("change", function () { loadAccommodationOptions(this.value); loadRoomOptions(''); });
accommodationSelect.addEventListener("change", function () { loadRoomOptions(this.value); });

loadCompanyOptions();
loadAccommodationOptions(selectedCompanyId);
loadRoomOptions(selectedAccommodationId);

document.getElementById('searchForm').addEventListener('submit', function (e) {
    const cId = companySelect.value;
    const aId = accommodationSelect.value;
    const rId = roomSelect.value;
    let url = "/owner/reservation/list";
    if (rId) url = `/owner/reservation/room/${rId}?companyId=${cId}&accommodationId=${aId}&roomId=${rId}`;
    else if (aId) url = `/owner/reservation/accommodation/${aId}?companyId=${cId}&accommodationId=${aId}`;
    else if (cId) url = `/owner/reservation/company/${cId}?companyId=${cId}`;
    this.action = url;
});
/*]]>*/
</script>
</th:block>
</body>
</html>
