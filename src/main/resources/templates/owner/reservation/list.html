<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">

<head>
    <title>숙소 예약 현황</title>
    <th:block layout:fragment="head"></th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3 th:text="${company != null} ? ${company.name} + ' 예약 리스트' : '전체 예약 리스트'">
            예약 리스트
        </h3>
        <p class="text-subtitle text-muted">관리자용 숙소 및 예약 현황</p>
        <div>
            <a th:href="@{/owner/reservation/create}" class="btn btn-primary">예약 등록</a>
        </div>
        <!-- 숙소 선택 폼 -->
    </div>
    <div class="card p-4 mb-4 shadow-sm">
        <form method="get" th:action="@{/owner/reservation/accommodation/{accommodationId} }" class="row g-3 align-items-end" id="searchForm">
            <!--            <div class="col-auto">-->
            <!--                <label class="form-label"><i class="bi bi-calendar-date me-1"></i>시작일</label>-->
            <!--                <input type="date" name="startDate" class="form-control">-->
            <!--            </div>-->
            <!--            <div class="col-auto">-->
            <!--                <label class="form-label"><i class="bi bi-calendar-date-fill me-1"></i>종료일</label>-->
            <!--                <input type="date" name="endDate" class="form-control">-->
            <!--            </div>-->
            <div class="col-md-4 col-sm-8">
                <label class="form-label"><i class="bi bi-building me-1"></i>회사</label>
                <select name="companyId" class="form-select" id="companySelect">
                    <!-- 회사 목록은 JS로 채움 -->
                </select>
            </div>

            <div class="col-md-4 col-sm-8">
                <label class="form-label"><i class="bi bi-house-door me-1"></i>숙소</label>
                <select name="accommodationId" class="form-select" id="accommodationSelect">
                    <!-- 선택한 회사의 숙소 목록만 JS로 채움 -->
                </select>
            </div>

            <div class="col-md-3 col-sm-8">
                <label class="form-label fw-semibold"><i class="bi bi-1-square me-1"></i>객실</label>
                <select name="roomId" class="form-select" id="roomSelect"></select>
            </div>

            <div class="col-auto">
                <button type="submit" class="btn btn-warning text-dark custom-hover-dark">검색</button>
            </div>
        </form>
    </div>

    <div class="page-content">
        <section class="section">
            <div class="row">
                <div class="col-12">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>예약 ID</th>
                            <th>예약자명</th>
                            <th>숙소명</th>
                            <th>연락처</th>
                            <th>가격</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="res : ${reservations}">
                            <td th:text="${res.reservationId}"></td>
                            <td th:text="${res.guestName}"></td>
                            <td th:text="${res.accommodationName}"></td>
                            <td th:text="${res.guestPhone}"></td>
                            <td th:text="${#numbers.formatInteger(res.price, 3, 'COMMA')} + ' 원'"></td>
                            <td>
                                <a th:href="@{'/owner/reservation/' + ${res.reservationId} + '/modify'}"
                                   class="btn btn-primary btn-sm">수정</a>
                            </td>
                            <td>
                                <form th:action="@{'/owner/reservation/' + ${res.reservationId} + '/delete'}"
                                      method="post"
                                      onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                    <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(reservations)}">
                            <td colspan="5" class="text-center">예약 내역이 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
    <div class="pagination mt-3">
        <ul class="pagination">
            <li class="page-item" th:if="${reservationPage.prev}">
                <a class="page-link"
                   th:href="@{/owner/reservation/list(page=${reservationPage.prevPage}, size=${reservationPage.pageRequestDTO.size}, companyId=${companyId})}">이전</a>
            </li>

            <li class="page-item"
                th:each="num : ${reservationPage.pageNumList}"
                th:classappend="${num == reservationPage.current} ? 'active'">
                <a class="page-link"
                   th:href="@{/owner/reservation/list(page=${num}, size=${reservationPage.pageRequestDTO.size}, companyId=${companyId})}"
                   th:text="${num}"></a>
            </li>

            <li class="page-item" th:if="${reservationPage.next}">
                <a class="page-link"
                   th:href="@{/owner/reservation/list(page=${reservationPage.nextPage}, size=${reservationPage.pageRequestDTO.size}, companyId=${companyId})}">다음</a>
            </li>
        </ul>
    </div>
</th:block>
</body>
</html>
<script th:inline="javascript">

        const companySelect = document.getElementById("companySelect");
        const accommodationSelect = document.getElementById("accommodationSelect");
        const roomSelect = document.getElementById("roomSelect");

        const companies = /*[[${companies}]]*/ [];
        const accommodations = /*[[${accommodations}]]*/ [];
        const rooms = /*[[${rooms}]]*/ [];

        const selectedCompanyId = /*[[${companyId}]]*/ '';
        const selectedAccommodationId = /*[[${accommodationId}]]*/ '';
        const selectedRoomId = /*[[${roomId}]]*/ '';


        function loadCompanyOptions() {
            companySelect.innerHTML = '<option value="">전체</option>';
            companies.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c.companyId;
                opt.textContent = c.name;
                if (c.companyId == selectedCompanyId) opt.selected = true;
                companySelect.appendChild(opt);
            });
        }

        function loadAccommodationOptions(companyId) {
            accommodationSelect.innerHTML = '<option value="">전체</option>';
            let filtered = accommodations;
            if (companyId) {
                filtered = accommodations.filter(a => a.companyId == companyId);
            }
            filtered.forEach(a => {
                const opt = document.createElement("option");
                opt.value = a.accommodationId;
                opt.textContent = a.name;
                if (a.accommodationId == selectedAccommodationId) opt.selected = true;
                accommodationSelect.appendChild(opt);
            });
        }

        function loadRoomOptions(accommodationId) {
            roomSelect.innerHTML = '<option value="">객실 선택</option>';
            let filtered = rooms;
            if (accommodationId) filtered = rooms.filter(a => a.accommodationId == accommodationId);
            filtered.forEach(a => {
                const opt = document.createElement("option");
                opt.value = a.roomId;
                opt.textContent = a.name;
                if (a.roomId == selectedRoomId) opt.selected = true;
                roomSelect.appendChild(opt);
            });
        }

        // 회사 선택 시 숙소 드랍다운 갱신
        companySelect.addEventListener("change", function () {
            loadAccommodationOptions(this.value);
        });
        accommodationSelect.addEventListener("change", function() {
            loadRoomOptions(this.value);
        })


        // 초기 로딩
        loadCompanyOptions();
        loadAccommodationOptions(selectedCompanyId);
        loadRoomOptions(selectedAccommodationId);


        document.getElementById('searchForm').addEventListener('submit', function (event) {
            const companyId = companySelect.value;
            const accommodationId = accommodationSelect.value;
            const roomId  = roomSelect.value;
            let actionUrl = "/owner/reservation/list";
            if(roomId) {
                actionUrl = `/owner/reservation/room/${roomId}`;
            } else if (accommodationId) {
                actionUrl = `/owner/reservation/accommodation/${accommodationId}`;
            } else if (companyId) {
                actionUrl = `/owner/reservation/company/${companyId}`;
            }
            this.action = actionUrl;
        });

</script>
