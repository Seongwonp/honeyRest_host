<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/base}">

<head>
    <title>숙소 예약 현황</title>
    <th:block layout:fragment="head"></th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div class="page-heading">
        <h3 th:text="${accommodation != null} ? ${accommodation.name} + ' 예약 리스트' : '전체 예약 리스트'">
            예약 리스트
        </h3>
        <p class="text-subtitle text-muted">관리자용 숙소 및 예약 현황</p>

        <!-- 숙소 선택 폼 -->
        <form id="accommodationForm">
            <select id="accommodationSelect" class="form-select">
                <option value="0" th:selected="${accommodationId == 0}">전체 예약</option>
                <option th:each="a : ${accommodations}"
                        th:value="${a.accommodationId}"
                        th:text="${a.name}"
                        th:selected="${a.accommodationId == accommodationId}">
                </option>
            </select>
        </form>
    </div>

    <div class="page-content">
        <section class="section">
            <div class="row">
                <div class="col-12">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>예약 ID</th>
                            <th>예약자명</th>
                            <th>숙소명</th>
                            <th>연락처</th>
                            <th>가격</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="res : ${reservations}">
                            <td th:text="${res.reservationId}"></td>
                            <td th:text="${res.guestName}"></td>
                            <td th:text="${res.accommodationName}"></td>
                            <td th:text="${res.guestPhone}"></td>
                            <td th:text="${#numbers.formatInteger(res.price, 3, 'COMMA')} + ' 원'"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(reservations)}">
                            <td colspan="5" class="text-center">예약 내역이 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</th:block>
</body>
</html>

<script>
    document.getElementById('accommodationSelect').addEventListener('change', function () {
        const accommodationId = this.value;
        if (accommodationId === "0") {
            window.location.href = `/owner/reservation/accommodations`;
        } else if (accommodationId){
            window.location.href = `/owner/reservation/list/accommodation/${accommodationId}`;
        } else {
            window.location.href = `/owner/reservation/accommodations`;
        }
    });
</script>
